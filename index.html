<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="canifly">
<meta name="description" content="canifly — keyless drone preflight: can I fly here, now, and how high? One map, live weather, winds aloft, FAA airspace, radar and traffic.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%9B%A9%3C/text%3E%3C/svg%3E">
<title>canifly</title>

<!-- canifly — self-contained drone-preflight map. One HTML file: no backend,
     build, keys or npm. Vanilla JS + MapLibre GL (CDN). Locked map centred on you
     (no pan/zoom/controls); a docked panel (full-screen page on iPhone portrait)
     carries the flyability chart + a distance-sorted SITREP. Data refreshes every
     5 s; the verdict reads off the ring colour. All feeds keyless + CORS-*. -->

<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

<style>
  :root{
    --bg:#000000; --panel:#000000f5; --line:#1a2730;
    --ink:#d6e2ee; --ink-dim:#748596; --accent:#2fe07a;
    --danger:#ff4455; --warn:#ffb454; --ok:#2fe07a;
    --mono:"SF Mono",ui-monospace,"Cascadia Code",Menlo,Consolas,monospace;
    --sa-t:env(safe-area-inset-top,0px); --sa-b:env(safe-area-inset-bottom,0px);
    --sa-r:env(safe-area-inset-right,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  /* height:100% (not dvh — iOS Safari's floating URL bar makes dvh resolve short) */
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font-family:var(--mono);font-size:13px;overflow:hidden;
    overscroll-behavior:none;touch-action:manipulation}
  #map{position:absolute;inset:0}
  /* map attribution — ghosted black along the bottom, left of the panel; click-through */
  #map-attrib{position:absolute;z-index:3;bottom:3px;left:0;
    right:calc(320px + var(--sa-r));text-align:center;pointer-events:none;
    color:#000;opacity:.55;font-family:var(--mono);font-size:9px;letter-spacing:.2px;
    text-transform:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    padding:0 8px}
  button{font-family:var(--mono);cursor:pointer}
  a{color:var(--accent)}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:#233247;border-radius:4px}
  ::-webkit-scrollbar-track{background:transparent}

  /* ---------- SITREP panel (desktop: docked right / iPhone portrait: full-screen page) ---------- */
  .panel{position:absolute;z-index:15;background:var(--panel);
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    display:flex;flex-direction:column;overflow:hidden}
  /* LEFT edge only carries the border (the panel↔map divider); the other three sit
     at the screen edge where a boxed corner would clip on rounded screens. */
  #sitrep{top:0;right:0;left:auto;width:320px;bottom:0;
    border-left:1px solid var(--line)}
  /* ---------- canifly flyability chart — the panel's top section, sized to content ----------
     cq units fall back to the viewport; the px caps keep cells sane iPhone→iPad. */
  #fly-pane{flex:0 0 auto;min-height:0;border-bottom:1px solid var(--line);background:#000;
    container-type:normal;
    display:flex;flex-direction:column;align-items:center;
    gap:min(1.6cqh,10px);padding:min(2cqh,12px) min(3cqw,14px)}
  #fly-pane .board{position:relative;width:100%;max-width:560px;flex:0 1 auto;min-height:0}
  #fly-pane .grid{width:100%;border:1px solid var(--line);border-radius:12px;
    padding:min(1.4cqh,8px) min(2cqw,10px);display:grid;
    grid-template-columns:minmax(0,1.15fr) repeat(4,minmax(0,1fr));   /* labels + NOW..+3h */
    align-content:center;font-variant-numeric:tabular-nums}
  #fly-pane .grow{display:contents}
  #fly-pane .ga,#fly-pane .gc{display:flex;align-items:center;min-width:0;white-space:nowrap;
    padding:min(1.3cqh,2cqw,5px) min(.6cqh,.9cqw,6px);line-height:1}
  #fly-pane .ga{justify-content:flex-start;color:var(--ink);letter-spacing:.03em;
    font-size:min(2.6cqh,3.6cqw,12px)}
  #fly-pane .gc{justify-content:center;font-weight:700;font-size:min(3.5cqh,4.6cqw,15px);
    color:var(--ink);border-left:1px solid #16212b}   /* faint rule between time columns */
  /* reference-unit tags (FT, MPH) */
  #fly-pane .gu{font-size:.58em;font-weight:600;color:inherit;letter-spacing:.02em;margin-left:.18em}
  /* cell fills — binary: fly / can't fly */
  #fly-pane .gc.good{background:rgba(47,224,122,.14);color:var(--ok)}
  #fly-pane .gc.bad{background:rgba(255,68,85,.16);color:var(--danger)}
  #fly-pane .ga.bad{color:var(--danger)}
  #fly-pane .ghead .gc.bad{background:none;color:var(--danger)}
  #fly-pane .ghead .ga,#fly-pane .ghead .gc{border-bottom:1px solid var(--line);
    padding-bottom:min(.8cqh,1.2cqw);font-weight:500;font-size:min(2.6cqh,3.6cqw,12px);color:var(--ink)}
  #fly-pane .ghead .gc{border-left:0}
  #fly-pane .ghead .gc.now{font-weight:700}
  /* NOW header ambers when a gate input is unknown (unverified ≠ clear) */
  #fly-pane .ghead .gc.unk{color:var(--warn)}
  #fly-pane .ga.hi{font-weight:700}
  #fly-pane .ggust .ga,#fly-pane .ggust .gc{border-top:1px solid rgba(116,133,150,.4)}
  /* a cap/gate code cell (GUST/VIS/SKY/WIND/FAA/TRFC/PCPN/KPx) */
  #fly-pane .gc.rsn{font-size:min(2.5cqh,3.4cqw,13px);font-weight:800;letter-spacing:.03em}
  /* loading shimmer — one cell-text line tall, so nothing shifts on load */
  @keyframes flypulse{0%,100%{opacity:1}50%{opacity:.2}}
  #fly-pane .sk{display:block;border-radius:4px;background:var(--ink-dim);opacity:.22;
    width:58%;height:min(3.5cqh,4.6cqw,15px);margin:0 auto;animation:flypulse 1.6s ease-in-out infinite}
  @media (prefers-reduced-motion:reduce){#fly-pane .sk{animation:none}}
  /* aircraft breach flashes its card headline, map halo and the chart's TRFC cell(s) */
  @keyframes acflash{0%,100%{color:var(--danger)}50%{color:#fff}}
  .sit-row.acflash .s1,#fly-pane .gc.acflash{
    animation:acflash .9s ease-in-out infinite}
  @media (prefers-reduced-motion:reduce){
    .sit-row.acflash .s1,#fly-pane .gc.acflash{animation:none}}
  #sit-body{display:flex;flex-direction:column;align-content:start;
    overflow-y:auto;padding:4px 0;-webkit-overflow-scrolling:touch;flex:1 1 auto;min-height:0}
  /* every SITREP row is a uniform info-only 3-line block: icon · three text lines */
  .sit-row{display:flex;align-items:center;gap:9px;padding:8px 12px;font-size:13px;min-height:62px;
    border-bottom:1px solid #10171f}
  .sit-row .ic{flex:0 0 30px;text-align:center;align-self:center;
    font-size:23px;line-height:1;text-transform:none}
  .sit-row .tx{flex:1;min-width:0;line-height:1.34;display:flex;flex-direction:column;justify-content:center}
  .sit-row .tx .s1,.sit-row .tx .s2,.sit-row .tx .s3{display:block;white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis}   /* any overlong line truncates with … */
  .sit-row .tx .s1{color:var(--ink)}
  .sit-row .tx .s2,.sit-row .tx .s3{color:var(--ink-dim);font-size:12px}
  .sit-row.alert .s1{color:var(--warn)}
  .sit-row.danger .s1{color:var(--danger)}
  .sit-empty{padding:14px 12px;font-size:13px;color:var(--ink-dim);line-height:1.5}
  /* everything upper-cased; .u.lc opts a unit out (SI symbols / Kp) — none in use now */
  body{text-transform:uppercase}
  .u{letter-spacing:0;font-style:normal}
  .u.lc{text-transform:none}
  .sit-row .tx .s1{letter-spacing:.3px}

  #user-dot{width:16px;height:16px;border-radius:50%;background:var(--accent);
    border:2.5px solid #fff;box-shadow:0 0 0 0 rgba(47,224,122,.6);animation:pulse 2.2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(47,224,122,.6)}70%{box-shadow:0 0 0 16px rgba(47,224,122,0)}100%{box-shadow:0 0 0 0 rgba(47,224,122,0)}}

  /* ---------- mobile PORTRAIT: two full-screen pages, map ⇄ panel ----------
     (landscape is wide enough for the docked panel → falls through to desktop above) */
  @media (max-width:1000px) and (orientation:portrait){
    #map{bottom:0}
    /* panel slides up over the map; hidden by default, body.panel-open shows it.
       100dvh tracks the shrinking address bar so it never spills under Safari's chrome. */
    .panel{left:0!important;right:0!important;top:0!important;bottom:auto!important;
      width:auto!important;height:100dvh;z-index:30;padding:0!important;
      background:var(--panel);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
      border:none;border-radius:0;box-shadow:none;
      /* CLOSED: translate by 100vh (includes iOS's toolbar band) + margin so it fully
         clears the screen; height stays 100dvh so the OPEN panel fits the viewport. */
      transform:translateY(calc(100vh + 40px));
      transition:transform .26s cubic-bezier(.22,.61,.36,1);visibility:visible}
    body.panel-open .panel{transform:translateY(0)}
    /* pad the chart below the notch / status bar */
    #fly-pane{padding-top:calc(var(--sa-t) + 10px)}
    #sit-body{padding-bottom:calc(var(--sa-b) + 6px)}
    #fly-board{cursor:pointer}          /* tap the chart to drop back to the map */
    #map-attrib{right:0;bottom:calc(var(--sa-b) + 2px)}
  }
</style>
</head>
<body>
<div id="map"></div>
<!-- map attribution (OSM/CARTO licence), ghosted into the dark basemap -->
<div id="map-attrib" aria-hidden="true">© OpenStreetMap · © CARTO · NEXRAD · Iowa State Mesonet</div>
<!-- panel: docked right (desktop/tablet), full-screen page on iPhone portrait.
     No header/title — chart, then scrolling SITREP cards; verdict = ring colour. -->
<div id="sitrep" class="panel">
  <!-- hidden canonical verdict element; sitrepTick stamps its class (tests/parity) -->
  <span id="sit-title" hidden></span>
  <div id="fly-pane">
    <div id="fly-board" class="board" role="group" aria-label="Can I Fly? drone preflight"></div>
  </div>
  <div id="sit-body">
    <div class="sit-empty">ACQUIRING POSITION…</div>
  </div>
</div>


<script>
"use strict";
/* =====================================================================
   0. helpers
   ===================================================================== */
const $ = s => document.querySelector(s);
const el = (t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
// SINGLE mobile breakpoint, matching the CSS @media below. The two-page toggle is
// PORTRAIT-only: a phone in landscape is wide enough for the docked-right panel
// (like a tablet/desktop), so landscape falls through to the docked layout. Every
// JS layout decision reads this — a 900/1000 mix once left the 901–1000px range
// with sheet panels but desktop map padding.
const MQ_MOBILE=window.matchMedia('(max-width:1000px) and (orientation:portrait)');
// Coarse pointer (finger / iPad trackpad cursor) — on touch the raw gestures are
// swallowed at map init; on desktop MapLibre's own (disabled) handlers cover it.
const COARSE=!!(window.matchMedia&&window.matchMedia('(pointer:coarse)').matches);
async function getJSON(url,opts={}){
  const c=new AbortController(); const to=setTimeout(()=>c.abort(),opts.timeout||15000);
  try{
    const r=await fetch(url,{signal:c.signal,headers:opts.headers||{}});
    if(!r.ok) throw new Error('HTTP '+r.status);
    return await r.json();
  } finally { clearTimeout(to); }
}
// All times shown in the user's LOCAL time — the timezone detected for their
// location (USER.tz, from IP geolocation), falling back to the browser's zone.
const tzOpt = () => USER.tz ? {timeZone:USER.tz} : {};
// THE data-refresh cadence, seconds. Everything live reads this one knob: the
// auto-refresh pulse, the every-pulse feeds (refresh:REFRESH_S below) and the
// per-layer cadences (refresh/REFRESH_S pulses). Feeds with their own natural
// cadence declare it explicitly (NWS 15 s, SPC 15 min, Kp ~3 min, radar via
// RADAR_BUST_S, winds-aloft via ALOFT_TTL_MS) so a faster pulse doesn't hammer
// sources whose data doesn't change that fast.
const REFRESH_S=5;
// persist a setting; storage can be blocked (private mode) and that's fine
const store=(k,v)=>{ try{ localStorage.setItem(k,String(v)); }catch(e){} };
// equirectangular °-offsets spanning `km` at a latitude — THE lat/lon↔km math,
// shared by the view framing, the ring geometry and the ring zoom cap so they
// can never disagree about how big a mile is on screen.
const geoDeltas=(km,lat)=>({dLat:km/111.32,
  dLon:km/(111.32*Math.max(0.2,Math.cos(lat*Math.PI/180)))});
// great-circle distance, km
function havKm(lat1,lon1,lat2,lon2){
  const R=6371,d=Math.PI/180;
  const a=Math.sin((lat2-lat1)*d/2)**2+
    Math.cos(lat1*d)*Math.cos(lat2*d)*Math.sin((lon2-lon1)*d/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
// Initial compass bearing from point 1 → point 2, degrees (0=N, clockwise).
function bearing(lat1,lon1,lat2,lon2){
  const d=Math.PI/180;
  const y=Math.sin((lon2-lon1)*d)*Math.cos(lat2*d);
  const x=Math.cos(lat1*d)*Math.sin(lat2*d)-Math.sin(lat1*d)*Math.cos(lat2*d)*Math.cos((lon2-lon1)*d);
  return (Math.atan2(y,x)/d+360)%360;
}
const COMPASS8=['N','NE','E','SE','S','SW','W','NW'];
const compass=deg=>COMPASS8[Math.round(deg/45)%8];
// wraps a unit token; lc:true preserves case for units that need it (see .u.lc)
const U = (s,lc) => `<span class="u${lc?' lc':''}">${s}</span>`;
const fmtMi = km => { const mi=km*0.621371;
  return mi<0.5?Math.round(mi*5280)+U(' ft'):mi<100?mi.toFixed(1)+U(' mi'):Math.round(mi)+U(' mi'); };

// ADS-B: airplanes.live primary, adsb.fi fallback (readsb /v2 schema)
const ADSB_HOSTS=['https://api.airplanes.live/v2','https://opendata.adsb.fi/api/v2'];
async function adsb(path){
  let err;
  for(const h of ADSB_HOSTS){   // 9s/host: fall to the next mirror before a stuck one hangs the load
    try{ return await getJSON(h+path,{timeout:9000}); }catch(e){ err=e; }
  }
  throw err||new Error('all ADS-B hosts unreachable');   // treated as error → keep existing planes, retry
}
const KM_TO_NM=0.539957, ADSB_MAX_NM=100;
// Fetch radius = the fixed #3 DATA RADIUS (DATA_MI) → covers the whole visible map, so
// every plane on the map is pulled. Floor 15 nm covers the 5 mi net; 100 nm cap is a guard.
function adsbRadiusNm(){
  return Math.min(ADSB_MAX_NM,Math.max(15,Math.ceil(DATA_MI*MI_TO_KM*KM_TO_NM)));
}
async function adsbViewport(){
  // Centre on YOU (not the panel-offset canvas centre), so the set is symmetric about
  // your position. Pre-fix falls back to the map centre.
  const c = USER.lat!=null ? {lat:USER.lat,lng:USER.lon} : gl.getCenter();
  const j=await adsb('/point/'+c.lat.toFixed(3)+'/'+c.lng.toFixed(3)+'/'+adsbRadiusNm());
  return {ac:j.ac||[]};
}
// rotorcraft? ICAO emitter category A7, else a helicopter/rotor mention in the description
const isHeli=a=>a.category==='A7'||/helicopter|\brotor/i.test(a.desc||'');
// ONE property builder for every ADS-B contact (civil/mil/emergency feeds), so the
// card / chart / AGL fields never drift apart between feeds.
function acProps(a,kind){
  return {_kind:kind, heli:isHeli(a)?1:0,
    flight:String(a.flight||a.r||a.hex||'?').trim(),
    reg:String(a.r||'').trim(),   // tail registration, a line-2 fallback
    type:a.t||'?',desc:a.desc||'',op:a.ownOp||'',
    alt:a.alt_baro??a.alt_geom??'?',
    // barometric altitude kept separate so AGL can QNH-correct it; null if only geometric
    altBaro:(typeof a.alt_baro==='number'?a.alt_baro:null),
    spd:a.gs!=null?Math.round(a.gs):'?',
    trk:a.track!=null?Math.round(a.track):null,
    _rot:a.track!=null?a.track:(a.true_heading!=null?a.true_heading:0),
    sq:a.squawk||'',hex:a.hex||'',mil:a.dbFlags&1?1:0};
}
const acFeature=(a,kind,extra)=>({type:'Feature',
  geometry:{type:'Point',coordinates:[a.lon,a.lat]},
  properties:extra?Object.assign(acProps(a,kind),extra):acProps(a,kind)});
function acFeatures(j,kind){
  return (j.ac||[]).filter(a=>a.lat!=null&&a.lon!=null).map(a=>acFeature(a,kind));
}
// features last loaded for a layer id (from our own LAYER_STATE, not MapLibre internals)
function featsIn(id){const st=LAYER_STATE[id];return (st&&st.features)||[];}
// visible map bounds as an ArcGIS envelope (west,south,east,north) + edge margin —
// scopes the airspace/NPS overlays to the view (refetched on recenter, see refreshViewport)
function viewEnv(){
  const b=gl.getBounds(), m=0.05;   // ~5 km lat margin
  return [b.getWest()-m,b.getSouth()-m,b.getEast()+m,b.getNorth()+m]
    .map(n=>n.toFixed(3)).join(',');
}
// polygon feature -> a representative [lon,lat] (first vertex)
function polyPt(f){
  const g=f.geometry; if(!g) return null;
  if(g.type==='Point') return g.coordinates;
  if(g.type==='Polygon') return g.coordinates[0] && g.coordinates[0][0];
  if(g.type==='MultiPolygon') return g.coordinates[0] && g.coordinates[0][0] && g.coordinates[0][0][0];
  return null;
}
// nearest point on a polygon's boundary to (lon,lat) — projected onto the nearest
// edge segment (not just a vertex); drives a zone's distance/direction and range test.
// Planar lon/lat with a cos(lat) x-scale. Returns {pt:[lon,lat], km}.
function nearestEdge(f,lon,lat){
  const g=f.geometry; if(!g) return null;
  const rings=g.type==='Polygon'?g.coordinates:g.type==='MultiPolygon'?g.coordinates.flat():[];
  const k=Math.cos(lat*Math.PI/180)||1e-6;
  let best=null,bd=Infinity;
  rings.forEach(r=>{ for(let i=0;i+1<r.length;i++){
    const ax=(r[i][0]-lon)*k, ay=r[i][1]-lat, bx=(r[i+1][0]-lon)*k, by=r[i+1][1]-lat;
    const dx=bx-ax, dy=by-ay, l2=dx*dx+dy*dy;
    let t=l2>0?-(ax*dx+ay*dy)/l2:0; t=t<0?0:t>1?1:t;
    const cx=ax+t*dx, cy=ay+t*dy, d2=cx*cx+cy*cy;
    if(d2<bd){ bd=d2; best=[lon+cx/k, lat+cy]; }
  }});
  return best?{pt:best,km:havKm(lat,lon,best[1],best[0])}:null;
}
// point-in-polygon (ray casting) — e.g. is a location inside an SPC outlook risk area
function pointInRing(lon,lat,ring){
  let inside=false;
  for(let i=0,j=ring.length-1;i<ring.length;j=i++){
    const xi=ring[i][0],yi=ring[i][1],xj=ring[j][0],yj=ring[j][1];
    if(((yi>lat)!==(yj>lat)) && (lon<(xj-xi)*(lat-yi)/(yj-yi)+xi)) inside=!inside;
  }
  return inside;
}
function pointInFeature(f,lon,lat){
  const g=f.geometry; if(!g) return false;
  const polys=g.type==='Polygon'?[g.coordinates]:g.type==='MultiPolygon'?g.coordinates:[];
  for(const poly of polys){
    if(poly[0] && pointInRing(lon,lat,poly[0]) && !poly.slice(1).some(h=>pointInRing(lon,lat,h))) return true;
  }
  return false;
}
const escapeHtml =s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));


/* =====================================================================
   1. MAP — CARTO dark basemap (keyless raster tiles)
   ===================================================================== */
// NEXRAD base-reflectivity mosaic tiles (Iowa State Mesonet, keyless). ?bust pulls a
// fresh mosaic once per RADAR_BUST_S window (source updates ~5 min), decoupled from the
// faster pulse. ONE bust value shared by the map layer + PCPN sampler → shared cache.
const RADAR_URL='https://mesonet.agron.iastate.edu/cache/tile.py/1.0.0/nexrad-n0q-900913/{z}/{x}/{y}.png';
const RADAR_BUST_S=60;
const radarBust=()=>Math.floor(Date.now()/(RADAR_BUST_S*1000));
let _radarBust=radarBust();
const RADAR_TILE=RADAR_URL+'?'+_radarBust;
function refreshRadar(){
  const b=radarBust(); if(b===_radarBust) return;   // same refresh window — nothing new
  _radarBust=b;
  const s=gl.getSource('radar'); if(s&&s.setTiles) s.setTiles([RADAR_URL+'?'+b]);
}
const gl = new maplibregl.Map({
  container:'map',
  style:{
    version:8,
    glyphs:'https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf',
    sources:{
      carto:{ type:'raster', tileSize:256,
        tiles:['https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png',
               'https://b.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png',
               'https://c.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png'] },
      // NEXRAD mosaic; maxzoom caps the TILE fetch at its native detail (~z8), not the map zoom
      radar:{ type:'raster', tileSize:256, maxzoom:8,
        tiles:[RADAR_TILE] }
    },
    // raster-resampling:'nearest' → raw NEXRAD pixels, no bilinear smoothing
    layers:[{id:'carto',type:'raster',source:'carto'},
      {id:'radar',type:'raster',source:'radar',
        paint:{'raster-opacity':0.5,'raster-resampling':'nearest'}}]
  },
  center:[-96,39], zoom:3.4, minZoom:1.1, maxZoom:16,   // start over the USA until a fix lands
  renderWorldCopies:true, attributionControl:false
});
// panel padding applied before the first render → the first view is already framed
// left of the docked panel; setMapPadding() keeps it in sync on resize/orientation

/* =====================================================================
   2. ICONS — the only map markers: plane / helicopter silhouettes (per the ADS-B
   rotorcraft category), tinted green civil / yellow military / red emergency, drawn
   nose-up so icon-rotate = heading. Rasterised to canvas, registered via addImage.
   ===================================================================== */
// ONE colour per aircraft feed — map silhouettes, layer defs and the SITREP tail-number
// tint all read this, so map and panel agree on what green/yellow/red means.
const AC_COL={nearair:'#2fe07a',mil:'#ffce4d',sos:'#ff4455'};
// shared canvas setup for the silhouette rasterisers (centre-origin, u = 1/32 px)
function iconCanvas(px){
  const s=px||40, c=document.createElement('canvas'); c.width=c.height=s;
  const x=c.getContext('2d',{willReadFrequently:true}); x.translate(s/2,s/2);
  return {x,u:s/32,s};
}
function shapeIcon(color,pts,px){
  const {x,u,s}=iconCanvas(px);
  x.fillStyle=color; x.strokeStyle='rgba(3,8,14,.75)'; x.lineWidth=u*1.4;
  x.lineJoin='round'; x.beginPath();
  pts.forEach((p,i)=>{const X=p[0]*u,Y=p[1]*u; i?x.lineTo(X,Y):x.moveTo(X,Y);});
  x.closePath(); x.fill(); x.stroke();
  return x.getImageData(0,0,s,s);
}
// plane silhouette, nose up
const PLANE=[[0,-15],[-1.6,-6],[-13,3],[-13,6],[-1.6,3.5],[-1.6,11],[-5,14.5],[-5,16],[0,14],
  [5,16],[5,14.5],[1.6,11],[1.6,3.5],[13,6],[13,3],[1.6,-6]];
// helicopter silhouette, nose up — drawn from parts (rotor bar + pod + tail boom/rotor),
// since a rotor disc can't be traced as one outline
function heliShape(color,px){
  const {x,u,s}=iconCanvas(px);
  x.lineJoin='round'; x.lineCap='round';
  const rod=(x1,y1,x2,y2,w)=>{           // colour bar with a dark outline
    x.strokeStyle='rgba(3,8,14,.8)'; x.lineWidth=u*(w+1.6);
    x.beginPath(); x.moveTo(x1*u,y1*u); x.lineTo(x2*u,y2*u); x.stroke();
    x.strokeStyle=color; x.lineWidth=u*w;
    x.beginPath(); x.moveTo(x1*u,y1*u); x.lineTo(x2*u,y2*u); x.stroke();
  };
  rod(0,2, 0,15, 2.2);          // tail boom (nose up → tail down)
  rod(2,14.5, 7,14.5, 1.8);     // tail rotor
  rod(-14,-2, 14,-2, 2.4);      // main rotor bar over the cabin
  x.beginPath(); x.ellipse(0,-2,4.4*u,7.2*u,0,0,Math.PI*2);   // fuselage pod (over the hub)
  x.fillStyle=color; x.fill();
  x.strokeStyle='rgba(3,8,14,.8)'; x.lineWidth=u*1.4; x.stroke();
  return x.getImageData(0,0,s,s);
}
function addImg(name,data){ if(!gl.hasImage(name)) gl.addImage(name,data,{pixelRatio:2}); }
function registerIcons(){
  addImg('ac-near',  shapeIcon(AC_COL.nearair,PLANE));    // civil plane = green
  addImg('ac-mil',   shapeIcon(AC_COL.mil,PLANE));        // military plane = yellow
  addImg('ac-sos',   shapeIcon(AC_COL.sos,PLANE,44));     // emergency plane = red
  addImg('heli-near',heliShape(AC_COL.nearair));          // civil helicopter = green
  addImg('heli-mil', heliShape(AC_COL.mil));              // military helicopter = yellow
  addImg('heli-sos', heliShape(AC_COL.sos,44));           // emergency helicopter = red
}

defLayer({
  id:'sos', label:'Emergency squawks', color:AC_COL.sos, refresh:REFRESH_S,
  icon:acIconExpr('sos'), rotate:true, iconSize:0.6,
  loader: async ()=>{
    // 7700 = general emergency, 7600 = radio failure, 7500 = unlawful interference
    const codes=['7700','7600','7500'];
    const results=await Promise.allSettled(codes.map(c=>adsb('/squawk/'+c)));
    // all three down = outage, not "zero emergencies" → throw so the runtime keeps
    // last-good and retries; a single failure still returns the others
    if(results.every(r=>r.status!=='fulfilled')) throw results[0].reason;

        feats.push(acFeature(a,'sos',{code:codes[i],_rot:a.track!=null?a.track:0}));
      });
    });

  }
});

// airspace FLOOR in feet: SFC/blank/0 → 0; FL180 → 18000; a number → that; else 0
// (conservative). Used to drop zones that begin above the drone band.
function floorFt(v){
  if(v==null) return 0;
  const s=String(v).trim().toUpperCase();
  if(s===''||/^(SFC|SURF|GND|GROUND|0)$/.test(s)) return 0;
  const fl=s.match(/FL\s*0*(\d+)/); if(fl) return +fl[1]*100;
  const n=parseFloat(s.replace(/[, ]/g,''));
  return isFinite(n)?n:0;
}

/* =====================================================================
   4. LAYER RUNTIME — sources, styles, refresh loop
   ===================================================================== */
const LAYER_STATE={};
// icons grow with zoom so they read clearly far out and up close
const iconSize=base=>['interpolate',['linear'],['zoom'],2,base*0.85,6,base*1.3,11,base*1.9];
// SITREP re-reads layer data every refresh — debounced so a burst of layer updates
// recomputes once. The chart repaints FIRST (its TRFC cells read the aircraft layers)
// so the SITREP tick can colour its title from the chart's fresh NOW column.
let sitrepRefreshT=null;
function scheduleSitrep(){ clearTimeout(sitrepRefreshT); sitrepRefreshT=setTimeout(()=>{
  try{if(FLY.data)flyPaint();}catch(e){console.warn('[fly-paint]',e);}
  try{sitrepTick();}catch(e){console.warn('[sitrep]',e);} },300); }

// Ground elevation (ft AMSL) for AGL = alt − ground, cached by ~1 km cell.
// groundElevFt() is a synchronous read (null until known); ensureGroundElev() kicks the
// fetch. Terrain is sampled UNDER EACH PLANE so AGL stays right over rolling ground.
// A FAILED lookup is NEVER cached (a poisoned 0 would silently disable AGL in high
// terrain) — it backs off and retries on a later tick.
const _elevCache={}; let _elevBusy=false, _elevFailAt=0, _elevAt=0;
const ELEV_RETRY_MS=15000;
// Cooldown between elevation fetches — without it, cells that never cache (plane over
// water → non-finite elevation) would loop-fetch and rate-limit the weather pull (same host).
const ELEV_COOLDOWN_MS=20000;
const elevKey=(la,lo)=>la.toFixed(2)+','+lo.toFixed(2);
function groundElevFt(la,lo){
  const v=_elevCache[elevKey(la,lo)];
  return v==null?null:v;
}
// Pull elevation for any uncached [lat,lon] cells in one batched request (deduped +
// capped), then re-run the SITREP so AGL fills in.
function ensureGroundElev(pts){
  if(_elevBusy || Date.now()-_elevFailAt<=ELEV_RETRY_MS || Date.now()-_elevAt<ELEV_COOLDOWN_MS) return;
  const need=[], seen=new Set();
  for(const p of pts){ if(!p||!isFinite(p[0])||!isFinite(p[1])) continue;
    const k=elevKey(p[0],p[1]); if((k in _elevCache)||seen.has(k)) continue;
    seen.add(k); need.push([p[0],p[1],k]); }
  if(!need.length) return;
  const batch=need.slice(0,90);
  _elevBusy=true; _elevAt=Date.now();
  const lats=batch.map(n=>n[0].toFixed(4)).join(',');
  const lons=batch.map(n=>n[1].toFixed(4)).join(',');
  getJSON(`https://api.open-meteo.com/v1/elevation?latitude=${lats}&longitude=${lons}`,{timeout:9000})
    .then(d=>{ const arr=d&&Array.isArray(d.elevation)?d.elevation:null;
      if(arr&&arr.length===batch.length){
        batch.forEach((n,idx)=>{ const m=arr[idx];
          if(typeof m==='number'&&isFinite(m)) _elevCache[n[2]]=m*M_TO_FT; }); }
      else _elevFailAt=Date.now(); })
    .catch(()=>{ _elevFailAt=Date.now(); })
    .finally(()=>{ _elevBusy=false; scheduleSitrep(); });
}
// Local sea-level pressure [hPa] (≈ QNH) from the weather pull — converts ADS-B
// pressure altitude to true MSL. null until the first weather fetch lands.
let QNH_HPA=null;

function ensureMapLayer(cfg){
  const sid='src-'+cfg.id;
  if(gl.getSource(sid)) return;
  gl.addSource(sid,{type:'geojson',data:{type:'FeatureCollection',features:[]}});
  if(cfg.geom==='fill'){
    const fillCol=cfg.colored?['coalesce',['get','_col'],cfg.color]:cfg.color;
    gl.addLayer({id:'ly-'+cfg.id,type:'fill',source:sid,
      paint:{'fill-color':fillCol,'fill-opacity':cfg.fillOpacity!=null?cfg.fillOpacity:0.26,
        'fill-outline-color':fillCol}});
    gl.addLayer({id:'lyl-'+cfg.id,type:'line',source:sid,
      paint:{'line-color':fillCol,'line-width':cfg.lineWidth!=null?cfg.lineWidth:1.4,
        'line-opacity':cfg.lineOpacity!=null?cfg.lineOpacity:0.85}});
  }else{
    gl.addLayer({id:'ly-'+cfg.id,type:'symbol',source:sid,layout:{

      'icon-size': iconSize(cfg.iconSize||0.6),
      'icon-rotate': cfg.rotate?['coalesce',['get','_rot'],0]:0,

  const vis=cfg.defaultOff?'none':'visible';
  gl.setLayoutProperty('ly-'+cfg.id,'visibility',vis);
  if(gl.getLayer('lyl-'+cfg.id)) gl.setLayoutProperty('lyl-'+cfg.id,'visibility',vis);
}

async function runLayer(cfg){
  const st=LAYER_STATE[cfg.id];
  // Generation token: a call only writes if it's still the newest, so overlapping
  // refreshes (pan + tick + resize) finishing out of order can't clobber fresh data.
  // st.loading lets the scheduler skip a layer that's still fetching.
  const myGen=++st.gen;
  st.loading=true; st.loadStart=Date.now();
  try{
    if(st.quickTimer){ clearTimeout(st.quickTimer); st.quickTimer=null; }
    // up to 3 attempts with exponential backoff before giving up this cycle
    let lastErr=null;
    for(let attempt=0;attempt<3;attempt++){
      try{
        const fc=await cfg.loader();
        if(myGen!==st.gen) return;               // superseded by a newer refresh — drop this result
        // a null result = "no update" — keep what's loaded
        if(fc){
          const src=gl.getSource('src-'+cfg.id);
          if(src) src.setData(fc);
          st.features=fc.features||[];
        }
        st.fails=0;
        scheduleSitrep();   // SITREP re-reads the fresh data as part of the refresh
        return;
      }catch(e){
        lastErr=e;
        if(myGen!==st.gen) return;                // a newer refresh owns the layer now
        if(attempt<2){
          await new Promise(r=>setTimeout(r,1200*Math.pow(3,attempt))); // 1.2s, 3.6s
          if(myGen!==st.gen) return;
        }
      }
    }
    // Failed this cycle — NEVER wipe the map; keep features and retry on a bounded
    // backoff (6→30s) instead of waiting a full refresh interval.
    st.fails=(st.fails||0)+1; st.failAt=Date.now();   // the pulse backs off while failing
    console.warn('[layer '+cfg.id+']',lastErr&&lastErr.message);
    if(!st.quickTimer){
      const delay=Math.min(30000,6000*st.fails);
      st.quickTimer=setTimeout(()=>{ st.quickTimer=null; runLayer(cfg); },delay);
    }
  } finally {
    if(myGen===st.gen) st.loading=false;
  }
}

// ---- unified refresh: ONE pulse() drives every data kick. Scheduled pulls the DUE
//      dynamic layers on their cadence; forced pulls every started layer. Both then
//      kick the chart, weather and radar. Cadence-less viewport layers (airspace, NPS)
//      don't ride the pulse — they refetch on recenter (see refreshViewport). ----
// A stuck/slow mirror could hold st.loading through the whole retry chain (tens of
// seconds), freezing the aircraft mid-air. Once a load runs past this, a pulse may
// start a FRESH attempt — the generation token drops the stale one.
const LOAD_STALL_MS=15000;   // ~ one full two-host ADS-B timeout; a healthy load is a second or two
let refreshBase=Date.now(), pulseCount=0;
function pulse(force){
  if(!force) pulseCount++;   // forced pulls don't shift the slow-layer cadence grid
  LAYERS.forEach(cfg=>{
    const st=LAYER_STATE[cfg.id];
    if(!st||!st.started) return;
    if(st.loading && Date.now()-(st.loadStart||0)<LOAD_STALL_MS) return;   // fetching, not yet stalled
    if(!force){
      if(!(cfg.refresh>0)) return;
      // refresh every N pulses (N = refresh/REFRESH_S), grid-aligned so a moveend
      // that reset the countdown can't push a layer's refresh past a whole cycle
      const everyN=Math.max(1,Math.round(cfg.refresh/REFRESH_S));
      if(pulseCount%everyN!==0) return;
      // a failing feed backs off (6→30 s); the quickTimer set at failure owns the retry
      if(st.fails && Date.now()-(st.failAt||0)<Math.min(30000,6000*st.fails)) return;
    }
    runLayer(cfg);
  });
  // the chart rides the same pulse; each of its inputs self-throttles inside
  // flyRefresh()/loadWeather() on its own natural cadence
  flyRefresh(); loadWeather(force); refreshRadar();
  refreshBase=Date.now();   // restart the auto-refresh countdown from zero
}
function refreshTick(){ if(Date.now()-refreshBase>=REFRESH_S*1000) pulse(); }

// every layer's source + style is created here and stays on (SPC defaultOff = hidden,
// loaded only to feed the SITREP outlook card)
function initLayers(){
  LAYERS.forEach(cfg=>{
    LAYER_STATE[cfg.id]={features:[],started:false,
      gen:0,quickTimer:null,fails:0,loading:false,loadStart:0};
    ensureMapLayer(cfg);
  });
}

/* =====================================================================
   6. SPACE WEATHER + WEATHER FORECAST (SITREP cards)
   NOAA SWPC (GOES X-ray flare) + Open-Meteo forecast — keyless. Kp is NOT fetched
   here; the SPACE WEATHER card reads the chart's own kpNow so they always agree.
   ===================================================================== */
let XRAY=null; // latest GOES X-ray flare class
async function loadXray(){
  try{
    const j=await getJSON('https://services.swpc.noaa.gov/json/goes/primary/xray-flares-latest.json');
    const f=Array.isArray(j)?j[0]:j;
    XRAY=(f&&(f.current_class||f.max_class))||null;
  }catch(e){ XRAY=null; }
  scheduleSitrep();
}
// ---- WEATHER FORECAST (Open-Meteo, keyless) — the always-present bottom SITREP card.
//      Refetched when the crosshair moves >2 km or the reading ages past ~5 min.
//      WMO codes map to emoji + plain-english condition. ----
let WX=null, wxLat=null, wxLon=null, wxAt=0, wxBusy=false;
const WMO={0:['☀️','clear'],1:['🌤️','mostly clear'],2:['⛅','partly cloudy'],3:['☁️','overcast'],
  45:['🌫️','fog'],48:['🌫️','icy fog'],
  51:['🌦️','light drizzle'],53:['🌦️','drizzle'],55:['🌧️','heavy drizzle'],56:['🌧️','freezing drizzle'],57:['🌧️','freezing drizzle'],
  61:['🌧️','light rain'],63:['🌧️','rain'],65:['🌧️','heavy rain'],66:['🌧️','freezing rain'],67:['🌧️','freezing rain'],
  71:['🌨️','light snow'],73:['🌨️','snow'],75:['🌨️','heavy snow'],77:['🌨️','snow grains'],
  80:['🌦️','light showers'],81:['🌧️','showers'],82:['⛈️','heavy showers'],85:['🌨️','snow showers'],86:['🌨️','snow showers'],
  95:['⛈️','thunderstorm'],96:['⛈️','storm, hail'],99:['⛈️','storm, hail']};
async function loadWeather(force){
  if(wxBusy) return;
  const c=gl.getCenter();
  if(!force && WX && wxLat!=null && havKm(wxLat,wxLon,c.lat,c.lng)<2 && Date.now()-wxAt<300000) return;
  wxBusy=true;
  try{
    const u=`https://api.open-meteo.com/v1/forecast?latitude=${c.lat.toFixed(3)}&longitude=${c.lng.toFixed(3)}`
      +`&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m`
      +`&daily=temperature_2m_max,temperature_2m_min`
      +`&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=auto&forecast_days=1`;
    const d=await getJSON(u,{timeout:12000});
    const cur=d.current||{}, day=d.daily||{};
    WX={tempF:cur.temperature_2m, feelsF:cur.apparent_temperature, code:cur.weather_code,
        windMph:cur.wind_speed_10m, windDir:cur.wind_direction_10m,
        hiF:(day.temperature_2m_max||[])[0], loF:(day.temperature_2m_min||[])[0]};
    wxLat=c.lat; wxLon=c.lng; wxAt=Date.now();
  }catch(e){ /* keep the last-good WX */ }
  finally{ wxBusy=false; scheduleSitrep(); }
}
// THE ONE weather card — a single feed, a single card. It changes rank/colour/text
// with severity: a weather GATE limiting NOW promotes it to a top hazard (red grounded /
// amber reduced-ceiling) with conditions folded onto line 3; otherwise it's the routine
// bottom conditions card ('stale' = last-good amber, 'down' = never loaded, red+promoted).
// Returns {pin, card}: pin floats it up with hazards. card = [cls,icon,l1,l2,l3,hazard].
function wxCard(wxState, wn){
  const rnd=n=>n==null?null:Math.round(n);
  // compact conditions line — reused as line 3 of a promoted card so temp/sky/wind show once
  const condLine=()=>{
    if(!WX) return '';
    const [,d]=WMO[WX.code]||['','—'];
    const t=rnd(WX.tempF), w=rnd(WX.windMph), wd=WX.windDir!=null?compass(WX.windDir)+' ':'';
    return (t!=null?t+'° · ':'')+d.toUpperCase()+(w!=null?' · '+wd+w+U(' mph'):'');
  };
  // feed totally down — chart can't compute; pin it so the outage is unmissable
  if(wxState==='down') return {pin:true, card:['danger','🌡️','WEATHER UNAVAILABLE',
    'feed down · chart can\'t compute','retrying every 5 s',true]};
  // an active weather GATE promotes the card to a top hazard (grounded red / capped
  // amber); conditions ride line 3, so the sky/temp aren't repeated elsewhere
  if(wn){
    const wxCap=Math.min(wn.windCeilFt,wn.cloudCapFt);   // weather-only ceiling (ft)
    if(wn.gust||wn.vis||wn.precip||wxCap<0){
      let ic,head,sub;
      if(wn.precip){ ic='⛈️'; head='PRECIPITATION'; sub='radar echo within '+GREY_MI+U(' mi'); }
      else if(wn.gust){ ic='💨'; head='HIGH WIND'; sub='gust '+Math.round(wn.gustMph)+U(' mph')+' · max '+LIM.wind; }
      else if(wn.windCeilFt<0){ ic='💨'; head='HIGH WIND'; sub=Math.round(wn.windPeakMph)+U(' mph')+' aloft · max '+LIM.wind; }
      else if(wn.vis){ ic='🌫️'; head='LOW VISIBILITY'; sub=(wn.visSM!=null?wn.visSM.toFixed(1):'—')+U(' SM')+' · min 3'+U(' SM'); }
      else { ic='☁️'; head='LOW CLOUD'; sub='base '+Math.round(wn.cloudCapFt+SPEC.clrFt)+U(' ft')+' · need 500 clr'; }
      return {pin:true, card:['danger',ic,head,sub,condLine(),true]};
    }
    // PRECIP NEARBY: an echo within DATA_MI but not yet in the 5 mi grounding ring —
    // amber ("land now"), above a mere reduced ceiling; red in-range precip outranks it.
    if(wn.precipInbound){
      return {pin:true, card:['alert','🌧️','PRECIP NEARBY','radar echo within '+DATA_MI+U(' mi'),condLine(),true]};
    }
    if(wxCap<SPEC.regFt){
      const wind=wn.windCeilFt<=wn.cloudCapFt;
      return {pin:true, card:['alert',wind?'💨':'☁️',(wind?'WIND':'CLOUD')+' CEILING '+wxCap+U(' ft'),
        wind?'winds aloft over max':'low cloud base',condLine(),true]};
    }
  }
  // no gate — routine conditions card at the bottom (neutral / amber-if-stale)
  if(!WX) return {pin:false, card: wxState==='stale'   // no conditions loaded yet
    ? ['alert','🌡️','WEATHER','feed unreachable','retrying every 5 s',true]
    : ['','🌡️','WEATHER','ACQUIRING FORECAST…','',false]};
  const [emoji,desc]=WMO[WX.code]||['🌡️','—'];
  const t=rnd(WX.tempF), f=rnd(WX.feelsF), w=rnd(WX.windMph), hi=rnd(WX.hiF), lo=rnd(WX.loF);
  const l1=(t!=null?t+'°':'—')+' · '+desc.toUpperCase();
  const wd=WX.windDir!=null?compass(WX.windDir)+' ':'';
  const l2='WIND '+wd+(w!=null?w+U(' mph'):'—')+(f!=null?' · FEELS '+f+'°':'');
  const l3=(hi!=null?'HIGH '+hi+'°':'')+(hi!=null&&lo!=null?' · ':'')+(lo!=null?'LOW '+lo+'°':'');
  if(wxState==='stale') return {pin:false, card:['alert',emoji,l1,l2,(l3?l3+' · ':'')+'STALE',true]};
  return {pin:false, card:['',emoji,l1,l2,l3,false]};
}
/* =====================================================================
   7. LOCATION + SITREP — the "at a glance" intelligence layer
   Fix chain: ipwho.is (instant, keyless) -> browser GPS refine (denial keeps the IP
   fix). All client-side; position leaves the browser only as anonymous lat/lon params.
   ===================================================================== */
let userMarker=null, sitrepTimer=null;

// FIXED framing zoom — a pure function of LATITUDE (not the viewport), so the locked
// view shows the SAME scale on every device. VIEW_REF_PX is the on-screen pixel diameter
// the `miles`-radius circle targets; Web-Mercator m/px then fixes the zoom for that latitude.
const VIEW_REF_PX=475;   // tuned to the comfortable desktop framing of the 10 mi view
function viewZoom(lat,miles){
  const span=2*(miles||VIEW_MI)*MI_TO_KM*1000;              // circle diameter, metres
  const mpp0=40075016.686*Math.cos(lat*Math.PI/180)/512;   // metres/pixel at zoom 0 (512-px tiles)
  return Math.max(0, Math.log2(VIEW_REF_PX*mpp0/span));
}
// Frame the map to a `miles`-radius circle around (lat,lon) at the fixed viewZoom,
// so the framed scale is identical across devices. The map's padding (set on
// desktop) still lands the point centred in the open area left of the panel.
function flyToRadiusMi(lat,lon,miles){
  const z=viewZoom(lat,miles);
  try{ gl.flyTo({center:[lon,lat],zoom:z,duration:1200}); }
  catch(e){ gl.jumpTo({center:[lon,lat],zoom:z}); }
}

// ---- FIX PIPELINE — GPS watch starts at load. A ping ≤ GEO_GOOD_ACC_M commits
// immediately; otherwise pings are collected up to GEO_SETTLE_MS and the most accurate
// commits. IP is a fallback only if GPS delivers nothing by GEO_IP_FALLBACK_MS (a later
// GPS grant re-frames onto the real spot). No absolute accuracy cut-off — a couple of km
// off beats an IP centroid. After commit, pings keep updating the fix (EMA-smoothed).
const GEO_SETTLE_MS=3000, GEO_IP_FALLBACK_MS=6000;
const GEO_GOOD_ACC_M=65;   // a ping this accurate is good enough → commit NOW, don't wait out the settle
const GEO_EMA=0.25;        // dot low-pass factor (0 = frozen, 1 = raw/no smoothing)
const GEO_JUMP_KM=0.05;    // a fix >50 m from the smoothed point = real move → snap, no lag
let _geoBest=null, _geoBestAcc=Infinity, _geoDone=false, _ipFix=null;
let _emaLat=null,_emaLon=null;
function commitGeo(){
  if(_geoDone||!_geoBest) return;
  _geoDone=true;
  _emaLat=_geoBest.lat; _emaLon=_geoBest.lon;
  setUserFix(_geoBest.lat,_geoBest.lon,'gps',null);
}
function onGeoFix(lat,lon,acc){
  const a=acc==null?9999:acc;
  if(a<_geoBestAcc) _geoBestAcc=a;
  if(!_geoDone){
    // settle window: the first ping arms the ceiling, every ping competes on accuracy,
    // but a sharp-enough ping commits at once (the ceiling only bites if none shows up)
    if(!_geoBest) setTimeout(commitGeo,GEO_SETTLE_MS);
    if(!_geoBest || a<=_geoBest.acc) _geoBest={lat,lon,acc:a};
    if(a<=GEO_GOOD_ACC_M) commitGeo();   // good enough → frame now
    return;
  }
  if(a>Math.max(150,_geoBestAcc*3)) return;   // junk vs what this device can do → drop
  if(_emaLat==null || havKm(_emaLat,_emaLon,lat,lon)>GEO_JUMP_KM){ // real move → snap
    _emaLat=lat; _emaLon=lon;
  } else {                                                          // stationary jitter → smooth
    _emaLat+=GEO_EMA*(lat-_emaLat); _emaLon+=GEO_EMA*(lon-_emaLon);
  }
  setUserFix(_emaLat,_emaLon,'gps',null);
}
// IP frames the map only as a fallback: GPS denied/unavailable, or no ping by the timer
let _geoFailed=false;
function ipFallbackNow(){
  if(!_geoDone && USER.lat==null && _ipFix) setUserFix(_ipFix.lat,_ipFix.lon,'ip',_ipFix.meta);
}
let _ipTimer=null;
async function locate(){
  startGeoWatch();   // pings start now; the settled fix commits 3 s after the first
  if(!_ipTimer) _ipTimer=setTimeout(ipFallbackNow,GEO_IP_FALLBACK_MS);
  if(_ipFix) return;   // IP already looked up (a retry only needs the watch kick)
  try{
    const j=await getJSON('https://ipwho.is/',{timeout:9000});
    if(j&&j.success!==false&&j.latitude!=null){
      _ipFix={lat:j.latitude,lon:j.longitude,
        meta:{place:j.city,region:j.region,rc:j.region_code,cc:j.country_code,
          tz:(j.timezone&&j.timezone.id)||''}};
      if(_ipFix.meta.tz&&!USER.tz) USER.tz=_ipFix.meta.tz;   // tz is safe to take early
      if(_geoFailed) ipFallbackNow();   // GPS already refused → don't wait out the timer
    }
  }catch(e){ console.warn('[ip-locate]',e.message); }
}
let geoWatchId=null;
function startGeoWatch(){
  if(geoWatchId!=null) return;
  if(!navigator.geolocation){ _geoFailed=true; ipFallbackNow(); return; }
  try{
    geoWatchId=navigator.geolocation.watchPosition(
      pos=>onGeoFix(pos.coords.latitude,pos.coords.longitude,pos.coords.accuracy),
      err=>{ if(err&&err.code===1){ _geoFailed=true; ipFallbackNow(); } },   // PERMISSION_DENIED
      {enableHighAccuracy:true,timeout:10000,maximumAge:5000});
  }catch(e){ _geoFailed=true; ipFallbackNow(); }
}
// map is always locked on your location; locMode is a constant (2 = locked) so the
// checks below read clearly, and never changes
const locMode=2;
// disable the remaining MapLibre handlers (dragPan on desktop, boxZoom, keyboard);
// the rest are already disabled at map init. Called once at load — never unlocks.
function setPanLock(on){
  (COARSE?['boxZoom','keyboard']:['dragPan','boxZoom','keyboard'])
    .forEach(k=>{ try{ on?gl[k].disable():gl[k].enable(); }catch(e){} });
}
// ---- FRAMING + LOCKED FOLLOW --------------------------------------------------
// frameNow() is the ONE authoritative camera move: center on a point + reset the zoom to
// the 10 mi VIEW; _framing blocks interruption of the ~1.2s animation. While locked, each
// committed fix runs lockFollow(): within LOCK_FOLLOW_KM → hold; walking → ease onto the
// fix; a huge correction (> LOCK_REFRAME_KM) → full re-frame.
const LOCK_FOLLOW_KM=0.025;    // follow deadband — the fix must really move ~25 m
const LOCK_REFRAME_KM=3;       // beyond this it's not walking — re-frame outright
const LOCK_ONTARGET_KM=0.12;   // "view is on the fix" for the fetch gate + snap-back
let _framing=false, _frameT=null;
function frameNow(lat,lon){
  _framing=true; clearTimeout(_frameT);
  flyToRadiusMi(lat,lon,VIEW_MI);
  // when the flyTo settles, correct the zoom to exactly the fixed scale — flyTo lands a
  // touch low under the panel padding, so padded/unpadded layouts would otherwise differ
  _frameT=setTimeout(()=>{
    _framing=false;
    const z=viewZoom(gl.getCenter().lat);
    if(Math.abs(gl.getZoom()-z)>0.01) gl.setZoom(z);
  },1300);
}
function lockFollow(){
  if(locMode!==2||_framing||USER.lat==null) return;
  const c=gl.getCenter();
  const off=havKm(c.lat,c.lng,USER.lat,USER.lon);
  if(off<=LOCK_FOLLOW_KM) return;                       // jitter floor — hold
  if(off>LOCK_REFRAME_KM){ frameNow(USER.lat,USER.lon); return; }
  gl.easeTo({center:[USER.lon,USER.lat],duration:600}); // walking — glide onto the fix
}
// Engage the lock at load — the map is frozen from the start and never unlocks;
// the first fix frames on you and the view holds on you from then on.
setPanLock(true);
// ROBUST LOCK: disabling the handlers stops pan + zoom, but some touch platforms
// (notably iOS Safari) can still nudge the camera via exotic gestures. As a belt-and-
// braces guarantee, whenever a USER gesture (originalEvent present) ends the map while
// locked and off your fix, snap it straight back onto the fix. Programmatic moves
// (easeTo / fitBounds) carry no originalEvent, so framing animations never trip this —
// and any data fetch is positionally gated (see refreshViewport), so the moment spent
// off-target can't load data for the wrong spot either.
let _lockSnap=false;
gl.on('moveend',e=>{
  if(locMode!==2||_lockSnap||_framing||!e||!e.originalEvent||USER.lat==null) return;
  const ctr=gl.getCenter();
  if(havKm(ctr.lat,ctr.lng,USER.lat,USER.lon)<=LOCK_ONTARGET_KM) return;
  _lockSnap=true;
  gl.easeTo({center:[USER.lon,USER.lat],duration:200});
  gl.once('moveend',()=>{ _lockSnap=false; });
});

// padding keeps the centre in the open area left of the docked panel (desktop only;
// on mobile the panel is an overlay sheet → no padding)
let _pad=null;
function setMapPadding(){
  const p=MQ_MOBILE.matches
    ? {top:0,right:0,bottom:0,left:0}
    : {top:20,left:24,right:336,bottom:24};
  if(_pad&&_pad.top===p.top&&_pad.left===p.left&&_pad.right===p.right&&_pad.bottom===p.bottom) return;
  _pad=p; gl.setPadding(p);   // only on change — avoids needless camera nudges
}
window.addEventListener('resize',()=>{ clearTimeout(window.__pad);
  window.__pad=setTimeout(setMapPadding,200); });
function setUserFix(lat,lon,src,meta){
  const first=USER.lat==null;
  if(!first&&src==='ip'&&USER.src==='gps') return; // never downgrade gps -> ip
  USER.lat=lat; USER.lon=lon; USER.src=src;
  if(meta&&meta.tz) USER.tz=meta.tz;   // timezone drives the local-time formatting
  if(!userMarker){
    const d=el('div'); d.id='user-dot';
    userMarker=new maplibregl.Marker({element:d}).setLngLat([lon,lat]).addTo(gl);
  } else userMarker.setLngLat([lon,lat]);
  // first fix flies in from the world view; a later refinement only gently recenters
  if(first) frameNow(lat,lon);
  else lockFollow();   // follows the fix — moves only when your location moves
  sitrepTick();
}


// concise text, no "…" (CSS clips)
const cut=(s,n)=>escapeHtml(String(s==null?'':s).trim().slice(0,n));

// -- CATEGORY MODEL --------------------------------------------------------
// Each in-view feature becomes ONE SITREP card; a cfg maps a feed to a card shape
// (distance/direction added by the SITREP code):
//   cls(f) → '' / 'alert' (amber) / 'danger' (red)   hazard : drives the title colour
//   head : line 1     sub : line 2     detail : appended to line 3 after the distance
// readsb reports alt_baro:'ground' for taxiing aircraft — show as a word, not "ground ft"
const ALT=f=>{const a=f.properties.alt;
  return a==='ground'?'on ground':a!=null&&a!=='?'?a+U(' ft'):'—';};
// aircraft line-2 cascade that never shows '?', blank or a repeat of line 1:
// description → ICAO type → operator → tail reg (if different) → generic by kind
const acSub=f=>{const p=f.properties;
  const type=p.type&&p.type!=='?'?p.type:'';
  const tail=String(p.flight||p.hex||'').trim().toUpperCase();
  const reg=p.reg&&p.reg.toUpperCase()!==tail?p.reg:'';
  const generic=p.mil?'military aircraft':(p.heli?'helicopter':'aircraft');
  return escapeHtml(p.desc||type||p.op||reg||generic);};
// aircraft card icon — ✈️ / 🚁 for every aircraft; civil/mil/emergency is by COLOUR
// (the tail string is tinted to match the map icon via AC_COL)
const acIcon=f=>f.properties.heli?'🚁':'✈️';
// tail-number label (callsign → hex → `fb`), clipped
const acTail=(f,n,fb)=>cut(f.properties.flight||f.properties.hex||fb||'?',n);
// stable identity for a contact — dedupe across feeds, breach bookkeeping
const acKey=p=>p.hex||p.flight||'';
// hexes squawking an emergency — the same airframe also appears in the civil/mil feeds,
// so those cards filter against this set (the sos card is its one card). Rebuilt in sitrepTick.
let SOS_HEX=new Set();
const notSos=f=>!f.properties.hex||!SOS_HEX.has(f.properties.hex);
const CATS=[
  {src:'sos', hazard:true, air:true, icon:acIcon, cls:()=>'danger',
   head:f=>acTail(f,12),
   sub:acSub,
   detail:f=>'sq '+(f.properties.code||'7700')},
  {src:'nws', hazard:true, icon:'⚠️',
   cls:f=>/Extreme|Severe/i.test(f.properties.severity)?'danger':'alert',
   head:f=>cut((f.properties.event||'warning').replace(/\s*warning$/i,'').toUpperCase(),22),
   sub:f=>cut(f.properties.area,26),
   // line 3 = when the warning ends (severity is already in the headline + colour)
   detail:f=>{const e=f.properties.ends,d=e&&new Date(e);
     return d&&!isNaN(d)?'til '+d.toLocaleTimeString([],Object.assign({hour:'numeric',minute:'2-digit'},tzOpt())):'';}},
  {src:'nearair', hazard:false, air:true, icon:acIcon, cls:()=>'', filter:notSos,
   head:f=>acTail(f,12),
   sub:acSub, detail:ALT},
  {src:'mil', hazard:false, air:true, icon:acIcon, cls:()=>'alert', filter:notSos,
   head:f=>acTail(f,10),
   sub:acSub, detail:ALT},
  // FAA airspace restrictions that gate a drone — HARD no-fly (red: defense/prohibited/
  // security) or CONDITIONAL (amber: restricted/stadium, only when active). hazard:true.
  {src:'airspace', hazard:true, filter:f=>f.properties.sev==='hard'||f.properties.sev==='caution',
   // class glyph: 🛡️ defense · 🔒 security · ⛔ prohibited · 🏟️ stadium · ⚠️ restricted
   icon:f=>({DEF:'🛡️',NSUFR:'🔒',P:'⛔',STDM:'🏟️',R:'⚠️'}[f.properties.cls]
     ||(f.properties.sev==='hard'?'⛔':'⚠️')),
   cls:f=>f.properties.sev==='hard'?'danger':'alert',
   head:f=>({DEF:'DEFENSE AIRSPACE',NSUFR:'SECURITY NO-FLY',P:'PROHIBITED AREA',R:'RESTRICTED AREA',
     STDM:'STADIUM TFR'}[f.properties.cls]||'AIRSPACE'),
   sub:f=>cut(f.properties.name||'—',26),
   detail:f=>f.properties.sev==='hard'?'drones prohibited'
     :f.properties.cls==='STDM'?'no-fly during events':'no-fly if active'},
  // ADVISORY special-use airspace (MOA/Warning/Alert/Danger): does NOT restrict a
  // ≤400 ft drone — activity to be aware of, not a no-fly. hazard:false.
  {src:'airspace', hazard:false, filter:f=>f.properties.sev==='advisory', icon:'🎯', cls:()=>'',
   head:f=>({MOA:'MILITARY OPS AREA',W:'WARNING AREA',A:'ALERT AREA',D:'DANGER AREA'}[f.properties.cls]||'SPECIAL-USE AIRSPACE'),
   sub:f=>cut(f.properties.name||'—',26), detail:()=>'advisory only'},
  // Controlled airspace (Class B/C/D + surface E) — the AUTHORIZATION case: fly with
  // LAANC up to the grid ceiling, so the actual no-fly severity is carried by the FAA
  // CEILING card. hazard:false; cls 'alert' is a fallback tint if _col is missing.
  {src:'airspace', hazard:false, ctrl:true, filter:f=>f.properties.sev==='ctrl', icon:'🗼', cls:()=>'alert',
   head:f=>({B:'CLASS B AIRSPACE',C:'CLASS C AIRSPACE',D:'CLASS D AIRSPACE',E:'CLASS E AIRSPACE'}[f.properties.cls]||'AIRSPACE'),
   sub:f=>cut(f.properties.name||'—',26),
   detail:()=>'authorization (LAANC)'},
  // National Park Service lands — a drone no-fly (can't launch / land / operate).
  {src:'nps', hazard:true, icon:'🏞️', cls:()=>'danger',
   head:f=>cut(f.properties.name||'NPS LAND',20),
   sub:()=>'drones prohibited', detail:f=>cut(f.properties.utype||'NPS unit',18)},
];
// features of a category within rKm of the crosshair — a point by its radius, a
// polygon when the crosshair is inside it OR its nearest edge falls within the radius
function catItems(cfg,lat,lon,rKm){
  let items=featsIn(cfg.src); if(cfg.filter) items=items.filter(cfg.filter);
  return items.filter(f=>{
    const g=f.geometry; if(!g) return false;
    if(g.type==='Point') return havKm(lat,lon,g.coordinates[1],g.coordinates[0])<=rKm;
    if(pointInFeature(f,lon,lat)) return true;
    const ne=nearestEdge(f,lon,lat);
    return !!ne&&ne.km<=rKm;
  });
}
// planes within rKm with a usable numeric altitude, deduped by hex across the three
// feeds — ONE shared collector so the LOW AIRCRAFT card and the chart's TRFC cells agree
function planesNear(lat,lon,rKm){
  const out=[], seen=new Set();
  ['sos','nearair','mil'].forEach(id=>featsIn(id).forEach(f=>{
    const p=f.properties;
    const alt=+p.alt; if(!isFinite(alt)) return;   // 'ground'/'?' → not airborne data
    const g=f.geometry&&f.geometry.coordinates; if(!g) return;
    const km=havKm(lat,lon,g[1],g[0]); if(km>rKm) return;
    const hx=acKey(p);
    if(hx){ if(seen.has(hx)) return; seen.add(hx); }
    out.push({f,km,alt,pt:g});
  }));
  return out;
}
// best-estimate MSL altitude [ft]: ADS-B barometric alt is PRESSURE altitude (~27.3
// ft/hPa off true MSL), QNH-corrected when known; else the raw value
const FT_PER_HPA=27.3, ISA_MSL_HPA=1013.25;
function planeMslFt(a){
  const baro=a.f.properties.altBaro;
  if(baro!=null && QNH_HPA!=null) return baro+(QNH_HPA-ISA_MSL_HPA)*FT_PER_HPA;
  return a.alt;
}
// ground elevation for a plane's AGL: terrain under the plane, else the crosshair cell, else null
function planeGroundFt(a,crossGround){
  const g=groundElevFt(a.pt[1],a.pt[0]);
  return g!=null?g:crossGround;
}
// {ground, agl}; ground null → AGL is raw MSL (fails toward NOT flagging over unknown terrain)
function planeAglFt(a,crossGround){
  const ground=planeGroundFt(a,crossGround);
  return {ground, agl: ground==null?planeMslFt(a):planeMslFt(a)-ground};
}
// only plausibly-low planes need a terrain lookup — a FL350 cruiser can't breach 1,000 ft AGL
const AGL_CAND_MAX_FT=16000;

function sitrepTick(){
  // SITREP reflects what's inside the OPERATIONAL RANGE (RED_MI around the map centre);
  // fully synchronous — reads only already-loaded state.
  const c=gl.getCenter();
  const lat=c.lat, lon=c.lng, rangeKm=RED_MI*MI_TO_KM;
  // aircraft are tracked further out (the 5 mi GREY ring) so you see traffic approaching:
  // low in the grey ring → amber heads-up; low inside the red ring → red flashing alert
  const warnKm=GREY_MI*MI_TO_KM;
  SOS_HEX=new Set(featsIn('sos').map(f=>f.properties.hex).filter(Boolean));
  const rows=[];
  // every row is a 3-line info card. flash: breaching aircraft → .s1 flashes red/white.
  // col: explicit headline colour (airspace uses its polygon colour), sanitised to a bare hex.
  const row=(cls,ic,l1,l2,l3,flash,col)=>rows.push(
    `<div class="sit-row${cls?' '+cls:''}${flash?' acflash':''}"><span class="ic">${ic}</span>`+
    `<span class="tx"><span class="s1"${col?` style="color:${col}"`:''}>${l1||''}</span><span class="s2">${l2||''}</span><span class="s3">${l3||''}</span></span></div>`);
  // Distance + direction are measured from the map centre (your location).
  const dirMi=(la,lo)=>compass(bearing(lat,lon,la,lo))+' '+fmtMi(havKm(lat,lon,la,lo));

  const cards=[];   // [cls, icon, l1, l2, l3, hazard, flash, col]

  // -- LOW AIRCRAFT (two-tier): a plane (civil / military / emergency) under the
  //    WARN_AGL_FT (400 ft ceiling + FAA_SEP_FT) warning altitude. Where it is
  //    decides the tier: inside the RED range ring → the RED flashing LOW AIRCRAFT
  //    alert; out in the 5 mi GREY ring → an AMBER low-aircraft heads-up. Rather
  //    than a separate pinned card, the plane's OWN card (below) transforms into
  //    the alert while it's low, and reverts to the normal plane card when it climbs
  //    out / leaves — always exactly ONE card per plane. planesNear() is the SAME
  //    deduped collector that drives the chart's TRFC cells, so card, chart and halo
  //    always agree. AGL = QNH-corrected MSL altitude (planeMslFt) − ground elevation
  //    UNDER THE PLANE (planeAglFt; cached, keyless Open-Meteo, crosshair fallback).
  //    breachInfo maps a plane's hex/callsign → {label, inRange}; the item loop
  //    reads it. Ground aircraft (alt='ground'/'?') skip. --
  const acGround=groundElevFt(lat,lon);          // ft AMSL at crosshair, null until fetched
  // Scan for low traffic across the whole GREY ring (5 mi) — a low plane out there
  // gets the amber heads-up, and one inside the red range ring gets the red alert.
  const near=planesNear(lat,lon,warnKm);
  // pull terrain under the crosshair + every plausibly-low plane in one batch
  ensureGroundElev([[lat,lon],...near.filter(a=>a.alt<AGL_CAND_MAX_FT).map(a=>[a.pt[1],a.pt[0]])]);
  const lowAc=near
    .map(a=>{ const {ground,agl}=planeAglFt(a,acGround); return {...a,ground,agl}; })
    .filter(a=>a.agl<WARN_AGL_FT);
  const breachInfo=new Map();   // acKey → {label:'254 ft AGL'/'254 ft', inRange:bool}
  const redBreach=[];           // low + inside the red range ring → flashing alert + halo
  lowAc.forEach(a=>{
    const inRange=havKm(lat,lon,a.pt[1],a.pt[0])<=rangeKm;
    breachInfo.set(acKey(a.f.properties),{
      label:Math.max(0,Math.round(a.agl))+U(' ft')+(a.ground==null?'':' AGL'),
      inRange});
    if(inRange) redBreach.push(a);
  });
  const acFlash=redBreach.length>0;   // title flashes only for an in-range red breach
  // pulsing map halo(s) at the RED breaching aircraft only (empty = cleared)
  setAcAlert(redBreach.map(a=>({type:'Feature',
    geometry:{type:'Point',coordinates:a.pt},properties:{}})));

  // -- FAA CEILING (pinned): surfaces the chart's own airspace gate — reads the SAME
  //    aspCapFt the chart's FAA column reads (LAANC grid + defense TFRs), so they can't
  //    disagree: red no-fly when it grounds, amber when it caps < 400 ft. Unknown → no card. --
  const faaCap=(FLY.detail&&!FLY.detail.aspUnknown)?FLY.detail.aspCapFt:null;
  if(faaCap!=null && faaCap<SPEC.regFt){
    const rangeTxt='within '+RNG.mi.toFixed(1)+U(' mi');
    if(faaCap<0) cards.push(['danger','⛔','FAA NO-FLY','LAANC grid · 0 ft ceiling',
      rangeTxt,true]);
    else cards.push(['alert','🛑','FAA CEILING '+faaCap+U(' ft'),'LAANC grid',
      rangeTxt,true]);
  }

  // the weather card (below) folds every weather gate into itself — one feed, one card
  const wn=FLY.detail&&FLY.detail.wxNow;

  // -- SPACE WEATHER (pinned): a Kp storm degrades GPS/compass. RED grounding at
  //    Kp ≥ kpGnd (G3+), AMBER at Kp ≥ kpCaut (G1–G2). Reads the SAME kpNow the chart's
  //    KP gate uses, so they can't disagree. Quiet/unknown → no card. --
  const kpNow=FLY.detail?FLY.detail.kpNow:null;
  if(kpNow!=null && kpNow>=SPEC.kpGnd){
    cards.push(['danger','🧲','SPACE WEATHER','Kp '+Math.round(kpNow)+' · geomagnetic storm',
      'GPS / compass unreliable',true]);
  }else if(kpNow!=null && kpNow>=SPEC.kpCaut){
    cards.push(['alert','🧲','SPACE WEATHER','Kp '+Math.round(kpNow)+' · geomagnetic storm',
      'GPS accuracy may be reduced',true]);
  }

  // -- DATA HEALTH (pinned): gates fail OPEN (keep last-good, quietly amber the NOW
  //    header). This surfaces that once a feed is stale past the grace window — FAA /
  //    Kp / radar only (weather health rides the weather card). Auto-retries on the pulse. --
  const unstable=flyUnknownStable();
  const wxStale=unstable.includes('weather');
  const dataBad=unstable.filter(x=>x!=='weather');
  if(dataBad.length){
    cards.push(['alert','📡','DATA UNVERIFIED',cut(dataBad.join(' · '),30),
      'retrying every 5 s',true]);
  }
  // weather-feed health: down = never loaded (red), stale = last-good shows (amber)
  const wxState=wxStale?(FLY.data?'stale':'down'):'ok';
  // a limiting weather gate (or a down feed) pins here; a routine card sinks to the bottom
  const wxc=wxCard(wxState, wn);
  if(wxc.pin) cards.push(wxc.card);

  // -- GENERAL context cards (area-wide) — appended at the BOTTOM, background context --
  const general=[];
  // SPC Day-1 outlook: is the map centre under a severe/tornado risk today? Just an
  // OUTLOOK, so an info card (no colour) above the weather card.
  const spcCards=[];
  const spcF=featsIn('spc');
  if(spcF.length){
    const tornHit=spcF.filter(f=>f.properties.kind==='torn'&&pointInFeature(f,lon,lat))
      .sort((a,b)=>(parseFloat(b.properties.code)||0)-(parseFloat(a.properties.code)||0))[0];
    const catHit=spcF.filter(f=>f.properties.kind==='cat'&&f.properties.rank>=1&&pointInFeature(f,lon,lat))
      .sort((a,b)=>b.properties.rank-a.properties.rank)[0];
    if(tornHit) spcCards.push(['','🌪️','TORNADO OUTLOOK',cut(tornHit.properties.label,16)+' today',
      tornHit.properties.sig?'significant EF2+ risk':'SPC Day 1 outlook',false]);
    if(catHit) spcCards.push(['','⛈️','SEVERE WX OUTLOOK',cut(catHit.properties.label,16)+' today',
      'tornado / hail / wind risk',false]);
  }
  // solar flare: an M/X GOES X-ray flare risks an HF radio blackout — a context card,
  // not a chart gate (the Kp storm above is the one that grounds)
  if(XRAY&&/^[MX]/.test(XRAY)) general.push([/^X/.test(XRAY)?'danger':'alert','☀️','SOLAR FLARE '+XRAY,'GOES X-ray · '+(/^X/.test(XRAY)?'major':'moderate'),
    'HF radio blackout risk',true]);

  // -- INDIVIDUAL item cards: one per in-view feature, interleaved. Hazards outrank
  //    routine traffic; tiers red → amber → rest, distance sorts within each. Capped. --
  const items=[];
  CATS.forEach(cfg=>catItems(cfg,lat,lon,cfg.air?warnKm:rangeKm).forEach(f=>{
    const g=f.geometry; if(!g) return;
    // pt = closest edge point to the map centre (label + sorting); inside → "overhead"
    const inside=g.type!=='Point'&&pointInFeature(f,lon,lat);
    let cls=cfg.cls?cfg.cls(f):'', det=null, headOv=null, subOv=null, icOv=null, flash=false, hazardOv=null;
    // LOW AIRCRAFT: a low plane's own card BECOMES the alert (red flashing inside the red
    // ring, amber in the grey ring) and reverts on climb-out — one card per plane, never two
    const bi=cfg.air?breachInfo.get(acKey(f.properties)):null;
    if(bi){
      icOv=acIcon(f); hazardOv=true; headOv='LOW AIRCRAFT';   // ✈️/🚁, same as every card
      if(bi.inRange){ cls='danger'; flash=true; }             // red range ring → flashing
      else { cls='alert'; }                                   // grey ring only → amber heads-up
      subOv='<span style="color:'+AC_COL[cfg.src]+'">'+acTail(f,12,'aircraft')+'</span>';
      det=bi.label;
    }
    // effective hazard uses the per-card override (hazardOv) when set, so an amber
    // low-aircraft card tiers as an amber hazard (tier 1) — surviving the cap, colouring the title
    const hazard=hazardOv!=null?hazardOv:cfg.hazard;
    const tier=flash?0:(hazard?(cls==='danger'?0:1):2);
    let pt, km;
    if(g.type==='Point'){ pt=g.coordinates; km=havKm(lat,lon,pt[1],pt[0]); }
    else {
      const ne=nearestEdge(f,lon,lat)||{pt:polyPt(f),km:0};
      pt=ne.pt; km=inside?0:ne.km;
    }
    if(!pt) return;
    // pt drives the label (direction/distance) + sorting = the NEAREST EDGE.
    items.push({cfg,f,pt,cls,tier,inside,km,det,headOv,subOv,icOv,flash,hazardOv});
  }));
  // a named airspace zone (esp. Class B) arrives as many shelf polygons — collapse
  // to the nearest single card per class+name
  const nearestAsp=new Map();
  const aspKey=it=>(it.f.properties.cls||'')+'|'+(it.f.properties.name||'');
  items.forEach(it=>{ if(it.cfg.src!=='airspace') return;
    const k=aspKey(it), ex=nearestAsp.get(k); if(!ex||it.km<ex.km) nearestAsp.set(k,it); });
  const shown=items.filter(it=>it.cfg.src!=='airspace'||nearestAsp.get(aspKey(it))===it);
  shown.sort((a,z)=>a.tier-z.tier||a.km-z.km);
  const ITEM_CAP=14;
  shown.slice(0,ITEM_CAP).forEach(({cfg,f,pt,cls,inside,det,headOv,subOv,icOv,flash,hazardOv})=>{
    const detTxt=det!=null?det:(cfg.detail?cfg.detail(f):'');
    const ic=icOv!=null?icOv:(typeof cfg.icon==='function'?cfg.icon(f):cfg.icon);
    const head=headOv!=null?headOv:cfg.head(f);
    const sub=subOv!=null?subOv:((cfg.sub?cfg.sub(f):'')||'—');
    // headline colour: airspace takes its polygon colour, a regular aircraft card tints
    // its tail number to its map-icon colour; a LOW AIRCRAFT override keeps its verdict
    // colour (tail tinted on l2). Only a bare hex passes, so a feed can't inject.
    const rawCol=(flash||head==='LOW AIRCRAFT')?null:cfg.src==='airspace'?f.properties._col:cfg.air?AC_COL[cfg.src]:null;
    const col=/^#[0-9a-fA-F]{3,8}$/.test(rawCol||'')?rawCol:undefined;
    // every plane card carries its ground speed on line 3 after the altitude (mph, omit if unknown)
    let l3=(inside?'overhead':dirMi(pt[1],pt[0]))+(detTxt?' · '+detTxt:'');
    if(cfg.air){ const s=Number(f.properties.spd); if(isFinite(s)) l3+=' · '+Math.round(toMph(s))+U(' mph'); }
    cards.push([cls, ic, head, sub, l3,
      hazardOv!=null?hazardOv:cfg.hazard, flash?true:undefined, col]);
  });
  general.forEach(c=>cards.push(c));   // area-wide context cards sink to the bottom
  spcCards.forEach(c=>cards.push(c));  // SPC outlook (info) sits just above weather
  if(!wxc.pin) cards.push(wxc.card);   // routine conditions card (a gate/outage pins it up top)

  // -- ON-SCREEN CONTEXT: map objects OUTSIDE their ring become neutral, distance-sorted
  //    cards in their OWN list, rendered last so they're always the bottom of the pile
  //    (never ride up on a weather promotion). No hazard tier, no flash → never colour the title. --
  const ctxCards=[];
  // "on screen" = within the fixed #3 DATA RADIUS (DATA_MI) — the same on every device,
  // so every object plotted on the map lands on the SITREP
  const screenKm=DATA_MI*MI_TO_KM;
  const ctx=[];
  CATS.forEach(cfg=>{
    const ringRad=cfg.air?warnKm:rangeKm;
    let feats=featsIn(cfg.src); if(cfg.filter) feats=feats.filter(cfg.filter);
    feats.forEach(f=>{
      const g=f.geometry; if(!g) return;
      let pt,km;
      if(g.type==='Point'){ pt=g.coordinates; km=havKm(lat,lon,pt[1],pt[0]); }
      else { const ne=nearestEdge(f,lon,lat); if(!ne) return;
        pt=ne.pt; km=pointInFeature(f,lon,lat)?0:ne.km; }
      if(km<=ringRad) return;   // already shown as an in-ring card above
      if(km>screenKm) return;   // beyond the on-screen radius → not shown
      ctx.push({cfg,f,pt,km});
    });
  });
  // collapse airspace shelves (same class+name) to the nearest, like the in-ring set
  const ctxKey=it=>(it.f.properties.cls||'')+'|'+(it.f.properties.name||'');
  const ctxAsp=new Map();
  ctx.forEach(it=>{ if(it.cfg.src!=='airspace') return; const k=ctxKey(it),ex=ctxAsp.get(k); if(!ex||it.km<ex.km) ctxAsp.set(k,it); });
  const CTX_CAP=24;
  ctx.filter(it=>it.cfg.src!=='airspace'||ctxAsp.get(ctxKey(it))===it)
     .sort((a,z)=>a.km-z.km).slice(0,CTX_CAP)
     .forEach(({cfg,f,pt})=>{
       const ic=typeof cfg.icon==='function'?cfg.icon(f):cfg.icon;
       const head=cfg.head(f);
       const sub=(cfg.sub?cfg.sub(f):'')||'—';
       const detTxt=cfg.detail?cfg.detail(f):'';
       let l3=dirMi(pt[1],pt[0])+(detTxt?' · '+detTxt:'');
       if(cfg.air){ const s=Number(f.properties.spd); if(isFinite(s)) l3+=' · '+Math.round(toMph(s))+U(' mph'); }
       const rawCol=cfg.src==='airspace'?f.properties._col:cfg.air?AC_COL[cfg.src]:null;
       const col=/^#[0-9a-fA-F]{3,8}$/.test(rawCol||'')?rawCol:undefined;
       ctxCards.push(['', ic, head, sub, l3, false, undefined, col]);   // neutral, no hazard/flash
     });

  // title severity: 0 none · 1 alert (amber) · 2 warn (red). Driven by the
  // flyability NOW column FIRST — any grounding value/condition reds it, any
  // reduced ceiling (below the 400 ft cap) OR any unverified gate input
  // (failed airspace / Kp / radar / weather pull — unknown ≠ clear) yellows
  // it — then raised further by any hazard card (emergency / severe warning /
  // restriction) in range.
  let titleSev=0;
  const g0=FLY.detail&&FLY.detail.grid&&FLY.detail.grid[0];
  if(g0) titleSev=g0.grounded?2:(g0.maxFly<SPEC.regFt?1:0);
  if(FLY.detail&&flyUnknown().length) titleSev=Math.max(titleSev,1);
  cards.forEach(cd=>{ if(cd[5]) titleSev=Math.max(titleSev,cd[0]==='danger'?2:cd[0]==='alert'?1:0); });
  // stamp the verdict on the hidden #sit-title (tests/parity); the visible verdict is the ring colour
  { const t=$('#sit-title'); if(t){
    t.classList.remove('warn','alert');
    if(titleSev>=2) t.classList.add('warn'); else if(titleSev>=1) t.classList.add('alert');
    t.classList.toggle('acflash',acFlash);
  }}
  // both rings track the verdict colour (green/amber/red), distinguished by dash pattern
  const sevCol=SEV_COL[titleSev]||SEV_COL[0];
  if(gl.getLayer('ly-ring')) gl.setPaintProperty('ly-ring','line-color',sevCol);
  if(gl.getLayer('ly-warnring')) gl.setPaintProperty('ly-warnring','line-color',sevCol);
  // card priority: a red flashing in-range LOW AIRCRAFT breach tops the pile, then red
  // groundings, then the amber LOW AIRCRAFT heads-up, then everything else in built order.
  // Stable rank sort (index tie-break) keeps distance order within each rank.
  const rank=cd=>cd[6]?0                                   // red flashing low-aircraft breach
    :(cd[5]&&cd[0]==='danger')?1                           // red grounding hazard
    :(cd[2]==='LOW AIRCRAFT'&&cd[0]==='alert')?2           // amber low-aircraft heads-up
    :3;                                                    // everything else
  const ordered=cards.map((cd,i)=>({cd,i})).sort((a,z)=>rank(a.cd)-rank(z.cd)||a.i-z.i).map(x=>x.cd);
  // context cards ALWAYS render last (a promoted card can rise, but context stays bottom)
  [...ordered, ...ctxCards].forEach(cd=>row(cd[0],cd[1],cd[2],cd[3],cd[4],cd[6],cd[7]));

  $('#sit-body').innerHTML=rows.join('');
}

// Viewport-scoped feeds refetch when the visible bounds change — on every move AND every
// resize (a resize enlarges the view without a pan, so moveend alone would miss it).
let moveDebounce=null, lastViewKey=null;
function refreshViewport(){
  clearTimeout(moveDebounce);
  moveDebounce=setTimeout(()=>{
    scheduleSitrep();   // SITREP + chart recompute for the crosshair (cheap, no network)
    // POSITIONAL gate: the map is locked on you, so a moveend is the view settling onto
    // your fix. Only fetch once it's actually ON the fix — a stray nudge before the
    // snap-back lands off-target and must not fetch for the wrong spot.
    if(USER.lat==null) return;   // still locating — the boot fallback covers a no-fix load
    const c0=gl.getCenter();
    if(havKm(c0.lat,c0.lng,USER.lat,USER.lon)>LOCK_ONTARGET_KM*2) return;
    // refetch viewport feeds only when the area actually changed (rounded to collapse jitter)
    const b=gl.getBounds(),z=gl.getZoom();
    const key=[b.getWest(),b.getSouth(),b.getEast(),b.getNorth()].map(n=>n.toFixed(2)).join(',')+'@'+z.toFixed(1);
    if(key!==lastViewKey){
      lastViewKey=key;
      LAYERS.filter(l=>l.viewport).forEach(cfg=>{
        const st=LAYER_STATE[cfg.id];
        if(st&&st.started) runLayer(cfg);
      });
      refreshBase=Date.now();   // restart the refresh countdown from now
    }
    flyOnMove();   // chart DATA refetch (its own threshold)
  },250);
}
gl.on('moveend',refreshViewport);
gl.on('resize',refreshViewport);   // resize doesn't reliably fire moveend

// ---- MOBILE TWO-PAGE TOGGLE — map and panel are two full-screen pages. Tap the map to
//      bring the panel up; tap ANYWHERE on the panel to drop back (scrolling fires no
//      click, so it never flips). Desktop keeps the docked-right panel (MQ). --
(function panelToggle(){
  const body=document.body;
  const open =()=>{ if(MQ_MOBILE.matches) body.classList.add('panel-open'); };
  const close=()=>body.classList.remove('panel-open');
  gl.on('click',open);   // MapLibre fires 'click' only on a tap, never a drag/pinch
  $('#sitrep').addEventListener('click',()=>{ if(MQ_MOBILE.matches) close(); });
  MQ_MOBILE.addEventListener('change',e=>{ if(!e.matches) close(); });   // rotate to desktop → show docked
})();

/* =====================================================================
   8. CAN I FLY — the drone-preflight chart (altitudes 400→SFC × NOW/+1/+2/+3h),
   located at the map-centre crosshair, riding the unified refresh pulse. Two-way
   integration with the SITREP: the 1 mi RED ring is also the LOW AIRCRAFT radius —
   manned traffic in it under the warning altitude reds the NOW cell (TRFC); a NEXRAD
   echo in it grounds the NOW column (PCPN), from the same mosaic the radar draws.
   ===================================================================== */
const M_TO_FT=3.28084, FT_TO_M=0.3048, M_TO_SM=1/1609.34, KT_TO_MPH=1.15078, MI_TO_KM=1.60934;
const toMph=kt=>kt==null?null:kt*KT_TO_MPH;
const comma=n=>Number(Math.round(n)).toLocaleString('en-US');
const fmt=(n,d=0)=>(n==null||isNaN(n))?'–':Number(n).toFixed(d);
// FAA Part 107 / physics limits — all fixed. Kp is right-sized to a drone's GPS/compass
// risk: NOAA flags GPS degradation only at G3 (Kp 7), so kpCaut (Kp 5) ambers and kpGnd
// (Kp 7) grounds.
const SPEC={kpCaut:5,kpGnd:7,visSM:3,clrFt:500,regFt:400};
// vertical separation to keep BELOW manned traffic [ft] — 500 ft is the manned minimum
// safe altitude over non-congested areas (§91.119(c)), the conservative buffer
const FAA_SEP_FT=500;
// traffic warning altitude [ft AGL] = drone ceiling + separation. A plane below this
// fires the LOW AIRCRAFT alert AND caps the chart's NOW column — one shared number.
const WARN_AGL_FT=SPEC.regFt+FAA_SEP_FT;   // 400 + 500 = 900
const LIM={wind:27};   // aircraft max wind [mph] — gates surface gust + caps the wind-aloft scan
// three FIXED radii [statute miles]: RED = OPERATIONAL RANGE (1 mi) — FAA query, red
// low-aircraft alert, TRFC cap. GREY = OPERATIONAL BUBBLE (5 mi) — traffic net + amber
// heads-up + PCPN grounding. VIEW = 10 mi — the framing radius + tightest allowed zoom.
const RED_MI=1, GREY_MI=5, VIEW_MI=10;
const RNG={mi:RED_MI};
// #3 DATA RADIUS [mi] — a FIXED radius, centred on YOU, that always covers the visible
// map plus a bit on any device. This is the old "on screen": everything within it is
// PULLED (aircraft, airspace) and carded on the SITREP, and a radar echo within it
// ambers. Fixed (not the pixel viewport) so every device shows the same results; the
// locked map zoom is kept separate, so this always reaches a touch beyond the map.
const DATA_MI=25;
// Altitude ladder, 50 ft steps through the FAA band (matches the grid rows).
const ALTS_UP=(()=>{const a=[];for(let f=0;f<=SPEC.regFt;f+=50)a.push(f);return a;})();
const ALTS=[...ALTS_UP].reverse();
const FC_HOURS=3;   // forecast columns: NOW + the next 3 hourly steps
const KP_URL='https://services.swpc.noaa.gov/products/noaa-planetary-k-index-forecast.json';
// FAA ArcGIS services (official AIS, CORS-open): LAANC grid ceiling + defense no-fly zones
const FAA_GIS='https://services6.arcgis.com/ssFJjBXIUyZDrSYZ/ArcGIS/rest/services';
const gisUrl=(svc,lat,lon,rng,fields)=>`${FAA_GIS}/${svc}/FeatureServer/0/query`
  +`?geometry=${lon.toFixed(3)},${lat.toFixed(3)}&geometryType=esriGeometryPoint&inSR=4326`
  +`&spatialRel=esriSpatialRelIntersects&distance=${rng}&units=esriSRUnit_StatuteMile`
  +`&outFields=${fields}&returnGeometry=false&f=json`;
const aspUrl=(lat,lon,rng)=>gisUrl('FAA_UAS_FacilityMap_Data',lat,lon,rng,'CEILING,UNIT');
const defUrl=(lat,lon,rng)=>gisUrl('National_Defense_Airspace_TFR_Areas',lat,lon,rng,'NAME');
// Pressure levels scanned for cloud decks; lowest level ≥12% cover = the base.
const PRES_LEVELS=[1000,975,950,925,900,850,800,700];
const CLOUD_FEW_PCT=12;
function aloftUrl(lat,lon){
  const h=['wind_speed_10m','wind_speed_80m','wind_speed_120m','wind_speed_180m','wind_gusts_10m','visibility',
    'cloud_cover_low','temperature_2m','dew_point_2m']
    .concat(PRES_LEVELS.map(p=>`geopotential_height_${p}hPa`))
    .concat(PRES_LEVELS.map(p=>`cloud_cover_${p}hPa`));
  const cur=['wind_speed_10m','wind_gusts_10m','cloud_cover_low',
    'visibility','temperature_2m','dew_point_2m','pressure_msl']
    .concat(PRES_LEVELS.map(p=>`cloud_cover_${p}hPa`));
  return `https://api.open-meteo.com/v1/forecast?latitude=${lat.toFixed(3)}&longitude=${lon.toFixed(3)}`
    +`&current=${cur.join(',')}`
    +`&hourly=${h.join(',')}`
    +`&wind_speed_unit=kn&forecast_days=2&timezone=auto`;
}
// retry a flaky fetch before letting it fail — a transient blip is usually gone next attempt
async function retry(fn,tries=3,baseMs=600){
  let err;
  for(let a=0;a<tries;a++){
    try{ return await fn(); }
    catch(e){ err=e; if(a<tries-1) await new Promise(r=>setTimeout(r,baseMs*(a+1))); }
  }
  throw err;
}
// Open-Meteo: surface + winds aloft (height levels through the FAA band), gusts,
// visibility, per-level cloud cover/height. One row per grid column.
async function getAloft(lat,lon){
  const d=await getJSON(aloftUrl(lat,lon),{timeout:10000});
  let i=0;
  if(d.current?.time&&d.hourly?.time){const now=d.current.time.slice(0,13);i=d.hourly.time.findIndex(t=>t.slice(0,13)===now);if(i<0)i=0;}
  const H=d.hourly||{}, elev=d.elevation??0;
  const gh=H.wind_gusts_10m||[];
  const cur=d.current||{};
  // stash local sea-level pressure (≈ QNH) for the aircraft-AGL baro correction
  if(typeof cur.pressure_msl==='number'&&isFinite(cur.pressure_msl)) QNH_HPA=cur.pressure_msl;
  const cloudBaseAt=n=>{
    const idx=i+n, C=k=>n===0?(cur[k]??H[k]?.[idx]):H[k]?.[idx];
    let deckFt=null;
    for(const p of PRES_LEVELS){
      const cc=C(`cloud_cover_${p}hPa`), ghm=H[`geopotential_height_${p}hPa`]?.[idx]??H[`geopotential_height_${p}hPa`]?.[i];
      if(cc==null||ghm==null) continue;
      const agl=(ghm-elev)*M_TO_FT; if(agl<=0) continue;
      if(cc>=CLOUD_FEW_PCT){ deckFt=agl; break; }
    }
