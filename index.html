<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="canifly">
<meta name="description" content="canifly — keyless drone preflight: can I fly here, now, and how high? One map, live weather, winds aloft, FAA airspace, radar and traffic.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%9B%A9%3C/text%3E%3C/svg%3E">
<title>canifly</title>

<!-- ============================================================
     canifly — self-contained drone-preflight map
     ------------------------------------------------------------
     Constraints (non-negotiable): one HTML file, no backend, no
     build step, no API keys, no npm. Opens directly in a browser.
     Vanilla JS + MapLibre GL (CDN).

     Layout: a full-map canvas with a single docked panel on the right
     (on mobile, a bottom sheet): the canifly flyability chart + range
     settings, then a distance-sorted SITREP briefing of everything in
     the range ring — all driven by the map-centre crosshair.

     Map layers (all keyless, CORS-*): live aircraft (adsb), NWS
     warnings, NEXRAD radar (Iowa State Mesonet), FAA airspace (Class
     B/C/D + special-use / prohibited / security / stadium restrictions),
     National Park Service lands, plus a dashed range ring at the crosshair
     matching the RANGE setting. Card/chart-only feeds: SPC Day-1 outlook,
     NOAA SWPC space weather (Kp / GOES X-ray).
     All sources are keyless with ACAO:* so fetch works cross-origin;
     anything requiring a key is excluded by the keyless rule.
     ============================================================ -->

<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

<style>
  :root{
    --bg:#000000; --panel:#000000f5; --panel2:#0a0f14; --line:#1a2730;
    --ink:#d6e2ee; --ink-dim:#748596; --accent:#2fe07a;
    --danger:#ff4455; --warn:#ffb454; --ok:#2fe07a;
    --mono:"SF Mono",ui-monospace,"Cascadia Code",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --sa-t:env(safe-area-inset-top,0px); --sa-b:env(safe-area-inset-bottom,0px);
    --sa-l:env(safe-area-inset-left,0px); --sa-r:env(safe-area-inset-right,0px);
    --topbar-h:var(--sa-t);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  /* Full viewport height so the bottom nav anchors to the true bottom of the
     page. (dvh was tried but iOS Safari's floating URL bar makes it resolve
     shorter than the visible area, leaving the nav floating with a gap below —
     100% fills correctly. Closed panels use visibility:hidden below so nothing
     bleeds under the nav regardless.) */
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font-family:var(--mono);font-size:13px;overflow:hidden;
    overscroll-behavior:none;touch-action:manipulation}
  #map{position:absolute;inset:0}
  /* centre reticle: white, subtle, never blocks the map (pointer-events:none).
     Position is set in JS to the map's projected centre so it stays exact under
     panel padding and on mobile. */
  #crosshair{position:absolute;z-index:5;left:50%;top:50%;
    transform:translate(-50%,-50%);pointer-events:none;opacity:.8;
    filter:drop-shadow(0 0 1px #000) drop-shadow(0 0 2px #0008)}
  /* static map attribution — ghosted black, centred along the bottom of the map
     area left of the docked SITREP panel. pointer-events:none so it never blocks
     the map; natural case + a low z so it reads as part of the basemap. */
  #map-attrib{position:absolute;z-index:3;bottom:3px;left:0;
    right:calc(360px + var(--sa-r));text-align:center;pointer-events:none;
    color:#000;opacity:.55;font-family:var(--mono);font-size:9px;letter-spacing:.2px;
    text-transform:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    padding:0 8px}
  button{font-family:var(--mono);cursor:pointer}
  a{color:var(--accent)}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:#233247;border-radius:4px}
  ::-webkit-scrollbar-track{background:transparent}

  /* ---------- status badges (in SITREP header) ---------- */
  /* ---------- SITREP panel (desktop: docked right / mobile: bottom sheet) ----------
     The only panel now: header, scrolling cards, then canifly. The
     map fills everything to its left. */
  .panel{position:absolute;z-index:15;background:var(--panel);
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    display:flex;flex-direction:column;overflow:hidden}
  #sitrep{top:0;right:0;left:auto;width:360px;bottom:0;
    border:1px solid var(--line)}
  /* REFRESH DIAL — a circular sweep that FILLS over the refresh cycle (a number-
     less countdown); tap = refresh now. While a feed is fetching it spins (a
     rotating arc), folding in the old load spinner. Two instances share .rdial:
     one right-justified in the SITREP header, and a duplicate at the map's
     top-right shown on an iPhone (portrait's map page, and landscape where the
     header is dropped) so the countdown / tap-to-refresh stays reachable. */
  .rdial{position:relative;width:24px;height:24px;flex:0 0 auto;border:none;background:none;
    padding:0;cursor:pointer;color:var(--ink-dim);-webkit-user-select:none;user-select:none}
  .rdial .rdial-prog{position:absolute;inset:0;border-radius:50%;
    background:conic-gradient(var(--accent) var(--rp,0deg), #2a3a4d 0deg);
    -webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 3px),#000 calc(100% - 3px));
            mask:radial-gradient(farthest-side,transparent calc(100% - 3px),#000 calc(100% - 3px))}
  .rdial.busy .rdial-prog{background:conic-gradient(var(--accent) 90deg,#2a3a4d 0deg);animation:sp .8s linear infinite}
  #refresh-badge{margin-left:auto}
  /* the map-page dial is shown in EVERY layout (the panel header is dropped) — a solid
     BLACK disc + black outline so the countdown reads over any map. It sits at the map's
     TOP-RIGHT, clearing the docked 360px panel (right:376 — NO safe-area add, since the
     panel itself sits flush at right:0; adding it double-counted and left a gap). In
     portrait the panel is an overlay sheet, so it moves to the true screen right edge. */
  #map-refresh{position:absolute;z-index:16;top:calc(var(--sa-t) + 12px);right:376px;
    display:block;background:#000;border-radius:50%;box-shadow:0 0 0 2px #000}
  @media (max-width:1000px) and (orientation:portrait){ #map-refresh{right:calc(14px + var(--sa-r))} }
  /* ---------- canifly — the static drone-preflight chart ----------
     Ported from the canifly repo (which stays standalone and untouched): just
     the flyability grid + the settings box, no title/coords/refresh line.
     The pane is sized to its CONTENT (the chart never changes size) and
     pinned to the BOTTOM of the panel; the SITREP cards above fill down to its
     top edge. cq units fall back to the viewport (container-type:normal) so the
     chart has a deterministic size independent of the pane it lives in; the px
     caps in the grid rules keep the cells sane from an iPhone to a wide iPad. */
  #fly-pane{flex:0 0 auto;min-height:0;border-bottom:1px solid var(--line);background:#000;
    container-type:normal;--fti:min(2.4cqh,3.3cqw,12px);
    display:flex;flex-direction:column;align-items:center;
    gap:min(1.6cqh,10px);padding:min(2cqh,12px) min(3cqw,14px)}
  /* the board holds the grid (sized to its content) */
  #fly-pane .board{position:relative;width:100%;max-width:560px;flex:0 1 auto;min-height:0}
  #fly-pane .grid{width:100%;border:1px solid var(--line);border-radius:12px;
    padding:min(1.4cqh,8px) min(2cqw,10px);display:grid;
    grid-template-columns:minmax(0,1.15fr) repeat(4,minmax(0,1fr));   /* labels + NOW..+3h */
    align-content:center;font-variant-numeric:tabular-nums}
  #fly-pane .grow{display:contents}
  #fly-pane .ga,#fly-pane .gc{display:flex;align-items:center;min-width:0;white-space:nowrap;
    padding:min(1.3cqh,2cqw,5px) min(.6cqh,.9cqw,6px);line-height:1}
  #fly-pane .ga{justify-content:flex-start;color:var(--ink);letter-spacing:.03em;
    font-size:min(2.6cqh,3.6cqw,12px)}
  #fly-pane .gc{justify-content:center;font-weight:700;font-size:min(3.5cqh,4.6cqw,15px);
    color:var(--ink);border-left:1px solid #16212b}   /* faint rule between time columns */
  /* reference-unit tags (FT on the 400 label, MPH on the gust row's last cell) */
  #fly-pane .gu{font-size:.58em;font-weight:600;color:inherit;letter-spacing:.02em;margin-left:.18em}
  /* cell fills — binary: fly / can't fly */
  #fly-pane .gc.good{background:rgba(47,224,122,.14);color:var(--ok)}
  #fly-pane .gc.bad{background:rgba(255,68,85,.16);color:var(--danger)}
  #fly-pane .ga.bad{color:var(--danger)}
  #fly-pane .ghead .gc.bad{background:none;color:var(--danger)}
  #fly-pane .ghead .ga,#fly-pane .ghead .gc{border-bottom:1px solid var(--line);
    padding-bottom:min(.8cqh,1.2cqw);font-weight:500;font-size:min(2.6cqh,3.6cqw,12px);color:var(--ink)}
  #fly-pane .ghead .gc{border-left:0}
  #fly-pane .ghead .gc.now{font-weight:700}
  /* NOW header ambers when any gate input is unknown (unverified ≠ clear) */
  #fly-pane .ghead .gc.unk{color:var(--warn)}
  #fly-pane .ga.hi{font-weight:700}
  #fly-pane .ggust .ga,#fly-pane .ggust .gc{border-top:1px solid rgba(116,133,150,.4)}
  /* a cap/gate code cell (GUST/VIS/SKY/WIND/FAA/TRFC/PCPN/KPx) */
  #fly-pane .gc.rsn{font-size:min(2.5cqh,3.4cqw,13px);font-weight:800;letter-spacing:.03em}
  /* loading shimmer — exactly one cell-text line tall, so nothing shifts on load */
  @keyframes flypulse{0%,100%{opacity:1}50%{opacity:.2}}
  #fly-pane .sk{display:block;border-radius:4px;background:var(--ink-dim);opacity:.22;
    width:58%;height:min(3.5cqh,4.6cqw,15px);margin:0 auto;animation:flypulse 1.6s ease-in-out infinite}
  @media (prefers-reduced-motion:reduce){#fly-pane .sk{animation:none}}
  /* ---------- toasts ---------- */
  #toast{position:absolute;top:calc(var(--topbar-h) + 10px);left:50%;transform:translateX(-50%);
    z-index:25;max-width:min(320px,86vw);display:flex;flex-direction:column;gap:6px;
    align-items:center;pointer-events:none}
  .tmsg{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--accent);
    padding:8px 11px;border-radius:8px;font-size:13px;color:var(--ink);animation:sl .25s ease}
  @keyframes sl{from{transform:translateY(8px);opacity:0}to{transform:none;opacity:1}}
  @keyframes sp{to{transform:rotate(360deg)}}
  /* ---------- SITREP briefing panel (right side) ----------
     The panel HEADER is dropped in EVERY layout — the CANIFLY verdict and the refresh
     dial live on the map instead — so the panel is just the chart + cards. #sit-head is
     hidden (not removed): #sit-title stays in the DOM, updated by sitrepTick as the
     canonical verdict that the on-map #map-title mirrors. */
  #sit-head{display:none}
  /* CANIFLY verdict tag at the map's TOP-left — the single visible title now the panel
     header is gone, shown in EVERY layout. Same green/amber/red + breach-flash as the
     (hidden) header title, which sitrepTick keeps it in sync with. A black glyph outline
     (text-stroke, painted BEHIND the fill) keeps it legible over any map. Its colour
     rules sit here, BEFORE the acflash rule, so the flash animation still wins. */
  #map-title{position:absolute;z-index:16;left:calc(14px + var(--sa-l));
    top:calc(var(--sa-t) + 14px);display:block;pointer-events:none;
    color:var(--accent);font-size:15px;letter-spacing:2px;font-weight:700;
    -webkit-text-stroke:3px #000;paint-order:stroke fill;filter:drop-shadow(0 0 2px #000)}
  #map-title.alert{color:var(--warn)}
  #map-title.warn{color:var(--danger)}
  /* EXTRA ALERT — an aircraft breaching the range+altitude threshold flashes the
     CANIFLY tag, its card headline, its map halo AND the chart's TRFC cell(s)
     between red and white (a TRFC cell only appears while a plane breaches). */
  @keyframes acflash{0%,100%{color:var(--danger)}50%{color:#fff}}
  #map-title.acflash,.sit-row.acflash .s1,#fly-pane .gc.acflash{
    animation:acflash .9s ease-in-out infinite}
  @media (prefers-reduced-motion:reduce){
    #map-title.acflash,.sit-row.acflash .s1,#fly-pane .gc.acflash{animation:none}}
  /* center-on-me / lock button — a single WHITE box in the map's bottom-right
     corner (inside the map area, clear of the docked 360px panel on desktop; on
     mobile the panel is an overlay sheet so it sits at the true bottom-right).
     White border + glyph on a dark blurred bg; inverts to a white fill with a dark
     glyph on press. The icon swaps to a padlock while follow-locked. */
  #loc-btn{position:absolute;z-index:16;bottom:calc(var(--sa-b) + 14px);
    right:376px;width:42px;height:42px;padding:0;
    border:1px solid #fff;border-radius:9px;background:var(--panel);color:#fff;
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
  #loc-btn:active{background:#fff;color:#00140a}
  #sit-body{display:flex;flex-direction:column;align-content:start;
    overflow-y:auto;padding:4px 0;-webkit-overflow-scrolling:touch;flex:1 1 auto;min-height:0}
  /* every SITREP row is a uniform 3-line block: icon · three text lines · an
     action chevron. Lines CLIP (no "…") — content is written concise enough to
     fit the width. */
  .sit-row{display:flex;align-items:center;gap:9px;padding:8px 12px;font-size:13px;min-height:62px;
    border-bottom:1px solid #10171f}
  /* card icon: clearly visible but not oversized, vertically centred next to the
     three text lines. .u keeps the emoji from being forced upper-case. */
  .sit-row .ic{flex:0 0 30px;text-align:center;align-self:center;
    font-size:23px;line-height:1;text-transform:none}
  .sit-row .tx{flex:1;min-width:0;line-height:1.34;display:flex;flex-direction:column;justify-content:center}
  .sit-row .tx .s1,.sit-row .tx .s2,.sit-row .tx .s3{display:block;white-space:nowrap;
    overflow:hidden;text-overflow:clip}
  .sit-row .tx .s1{color:var(--ink)}
  .sit-row .tx .s2,.sit-row .tx .s3{color:var(--ink-dim);font-size:12px}
  /* the whole card is the click target — no button. A chevron hints tappability. */
  .sit-row.clickable{cursor:pointer}
  .sit-row.clickable::after{content:"›";flex:0 0 auto;align-self:center;color:var(--ink-dim);
    font-size:20px;line-height:1;padding-left:2px}
  @media(hover:hover){.sit-row.clickable:hover{background:var(--panel2)}}
  .sit-row.clickable:active{background:var(--panel2)}
  .sit-row.clickable:hover::after,.sit-row.clickable:active::after{color:var(--accent)}
  .sit-row.alert .s1{color:var(--warn)}
  .sit-row.danger .s1{color:var(--danger)}
  .sit-empty{padding:14px 12px;font-size:13px;color:var(--ink-dim);line-height:1.5}
  /* ---- minimalist: EVERYTHING is upper-case, units included ----
     Units (.u) inherit the all-caps by default (ft→FT, mi→MI, mph→MPH — all
     correct upper-cased). ONLY a unit whose meaning depends on lower case
     (SI symbols like km/kt, or a mixed-case index like Kp) is tagged .u.lc to
     stay verbatim; there are none in the current UI, but the escape exists. */
  body{text-transform:uppercase}
  .u{letter-spacing:0;font-style:normal}
  .u.lc{text-transform:none}
  .sit-row .tx .s1{letter-spacing:.3px}

  #user-dot{width:16px;height:16px;border-radius:50%;background:var(--accent);
    border:2.5px solid #fff;box-shadow:0 0 0 0 rgba(47,224,122,.6);animation:pulse 2.2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(47,224,122,.6)}70%{box-shadow:0 0 0 16px rgba(47,224,122,0)}100%{box-shadow:0 0 0 0 rgba(47,224,122,0)}}

  /* ---------- mobile PORTRAIT: two full-screen pages, map ⇄ panel ----------
     Landscape (even on a phone) is wide enough for the docked-right panel, so it
     deliberately falls through to the desktop layout above. */
  @media (max-width:1000px) and (orientation:portrait){
    #map{bottom:0}
    /* The CANIFLY panel is a full-screen page that slides up over the map.
       Hidden by default (the map is page one); body.panel-open slides it in.
       100dvh (dynamic viewport) tracks the shrinking address bar so the panel
       never spills below Safari's chrome. */
    .panel{left:0!important;right:0!important;top:0!important;bottom:auto!important;
      width:auto!important;height:100dvh;z-index:30;padding:0!important;
      background:var(--panel);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
      border:none;border-radius:0;box-shadow:none;
      /* CLOSED: translate by the LARGE viewport unit (vh — on iOS this includes the
         toolbar band that 100dvh excludes) + a margin, so the panel fully clears
         the screen in every toolbar state and never peeks at the bottom. Height
         stays 100dvh so the OPEN panel fits the CURRENT viewport without spilling
         under the address bar. */
      transform:translateY(calc(100vh + 40px));
      transition:transform .26s cubic-bezier(.22,.61,.36,1);visibility:visible}
    body.panel-open .panel{transform:translateY(0)}
    #sit-body{padding-bottom:calc(var(--sa-b) + 6px)}
    #fly-board{cursor:pointer}          /* tap the chart to drop back to the map */
    /* the panel is an overlay sheet on mobile, so the center-on-me button sits at
       the TRUE bottom-right of the map (no docked panel to clear), above the safe area */
    #loc-btn{right:calc(14px + var(--sa-r));bottom:calc(var(--sa-b) + 14px)}
    #map-attrib{right:0;bottom:calc(var(--sa-b) + 2px)}
  }
  /* Landscape (phone/tablet/desktop) needs no special block: the header is dropped and
     the map overlays are on in every layout by default, positioned to clear the docked
     panel. Only iPhone PORTRAIT (above) differs, where the panel is an overlay sheet. */
</style>
</head>
<body>
<div id="map"></div>
<!-- static map attribution (OSM/CARTO licence) — ghosted in black so it sinks
     into the dark basemap, centred along the bottom of the visible map area -->
<div id="map-attrib" aria-hidden="true">© OpenStreetMap · © CARTO · NEXRAD · Iowa State Mesonet</div>
<!-- fixed reticle marking the exact map centre (what SITREP / the ME button use) -->
<svg id="crosshair" width="30" height="30" viewBox="0 0 30 30" aria-hidden="true">
  <g fill="none" stroke="#fff" stroke-width="1.4" stroke-linecap="round">
    <line x1="15" y1="2"  x2="15" y2="10"/><line x1="15" y1="20" x2="15" y2="28"/>
    <line x1="2"  y1="15" x2="10" y2="15"/><line x1="20" y1="15" x2="28" y2="15"/>
  </g>
  <circle cx="15" cy="15" r="1.3" fill="#fff"/>
</svg>

<!-- CANIFLY panel — desktop: docked right. Mobile: a drag-up bottom sheet over
     the map (grab handle on top). Top to bottom: title + refresh timer, the
     flyability chart + settings, then the SITREP cards (scroll). -->
<div id="sitrep" class="panel">
  <div id="sit-head">
    <span class="title" id="sit-title">◈ CANIFLY</span>
    <button id="refresh-badge" class="rdial" type="button" title="tap to refresh · auto every 15 s" aria-label="refresh data now">
      <span class="rdial-prog"></span>
    </button>
  </div>
  <!-- canifly drone-preflight chart — the flyability grid, driven by the
       map-centre crosshair on the same unified data-refresh pulse. -->
  <div id="fly-pane">
    <div id="fly-board" class="board" role="group" aria-label="Can I Fly? drone preflight"></div>
  </div>
  <div id="sit-body">
    <div class="sit-empty">ACQUIRING POSITION…</div>
  </div>
</div>

<!-- refresh dial duplicated at the map's top-right — shown only on an iPhone in
     portrait (map OR panel visible, not both) so the countdown / tap-to-refresh is
     reachable from the map page. -->
<button id="map-refresh" class="rdial" type="button" title="tap to refresh · auto every 15 s" aria-label="refresh data now">
  <span class="rdial-prog"></span>
</button>

<!-- CANIFLY verdict tag mirrored at the map's bottom-left — shown on an iPhone
     (portrait's map page, and landscape where the header is dropped) so the
     at-a-glance verdict colour is always reachable. sitrepTick keeps its
     colour/flash in sync with the header title. -->
<div id="map-title" aria-hidden="true">◈ CANIFLY</div>

<!-- center-on-me / lock control — a single button in the map's bottom-right
     corner. Cycles armed → lock → unlock → reset (see centerOnMe). The icon
     swaps to a padlock while follow-locked. -->
<button id="loc-btn" title="center map on my location" aria-label="center on my location"><svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><circle cx="12" cy="12" r="3.2" fill="currentColor"/><circle cx="12" cy="12" r="7" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M12 1.5v3.4M12 19.1v3.4M1.5 12h3.4M19.1 12h3.4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></button>

<div id="toast"></div>

<script>
"use strict";
/* =====================================================================
   0. helpers
   ===================================================================== */
const $ = s => document.querySelector(s);
const el = (t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
// SINGLE mobile breakpoint, matching the CSS @media below. The two-page toggle is
// PORTRAIT-only: a phone in landscape is wide enough for the docked-right panel
// (like a tablet/desktop), so landscape falls through to the docked layout. Every
// JS layout decision reads this — a 900/1000 mix once left the 901–1000px range
// with sheet panels but desktop map padding.
const MQ_MOBILE=window.matchMedia('(max-width:1000px) and (orientation:portrait)');
function toast(msg){
  const t=el('div','tmsg',msg);
  $('#toast').appendChild(t);
  setTimeout(()=>{t.style.transition='opacity .4s';t.style.opacity='0';setTimeout(()=>t.remove(),400);},4500);
}
async function getJSON(url,opts={}){
  const c=new AbortController(); const to=setTimeout(()=>c.abort(),opts.timeout||15000);
  try{
    const r=await fetch(url,{signal:c.signal,headers:opts.headers||{}});
    if(!r.ok) throw new Error('HTTP '+r.status);
    return await r.json();
  } finally { clearTimeout(to); }
}
// All times shown in the user's LOCAL time — the timezone detected for their
// location (USER.tz, from IP geolocation), falling back to the browser's zone.
const tzOpt = () => USER.tz ? {timeZone:USER.tz} : {};
// THE data-refresh cadence, seconds. Everything live reads this one knob: the
// countdown clock + pulse, the every-pulse feeds (refresh:REFRESH_S below), the
// per-layer cadences (refresh/REFRESH_S pulses), and the radar tile cache-bust
// window. Change this alone and the whole live board follows.
const REFRESH_S=15;
// persist a setting; storage can be blocked (private mode) and that's fine
const store=(k,v)=>{ try{ localStorage.setItem(k,String(v)); }catch(e){} };
// equirectangular °-offsets spanning `km` at a latitude — THE lat/lon↔km math,
// shared by the view framing, the ring geometry and the ring zoom cap so they
// can never disagree about how big a mile is on screen.
const geoDeltas=(km,lat)=>({dLat:km/111.32,
  dLon:km/(111.32*Math.max(0.2,Math.cos(lat*Math.PI/180)))});
// great-circle distance, km
function havKm(lat1,lon1,lat2,lon2){
  const R=6371,d=Math.PI/180;
  const a=Math.sin((lat2-lat1)*d/2)**2+
    Math.cos(lat1*d)*Math.cos(lat2*d)*Math.sin((lon2-lon1)*d/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
// Initial compass bearing from point 1 → point 2, degrees (0=N, clockwise).
function bearing(lat1,lon1,lat2,lon2){
  const d=Math.PI/180;
  const y=Math.sin((lon2-lon1)*d)*Math.cos(lat2*d);
  const x=Math.cos(lat1*d)*Math.sin(lat2*d)-Math.sin(lat1*d)*Math.cos(lat2*d)*Math.cos((lon2-lon1)*d);
  return (Math.atan2(y,x)/d+360)%360;
}
const COMPASS8=['N','NE','E','SE','S','SW','W','NW'];
const compass=deg=>COMPASS8[Math.round(deg/45)%8];
// Imperial units. U() wraps a unit token; by default it follows the all-caps
// chrome (ft→FT, mi→MI, mph→MPH — all correct). Pass lc:true only for a unit
// that needs its case preserved to stay correct (see .u / .u.lc in CSS).
const U = (s,lc) => `<span class="u${lc?' lc':''}">${s}</span>`;
const fmtMi = km => { const mi=km*0.621371;
  return mi<0.5?Math.round(mi*5280)+U(' ft'):mi<100?mi.toFixed(1)+U(' mi'):Math.round(mi)+U(' mi'); };

// ---- ADS-B: airplanes.live primary, adsb.fi fallback (adsb.lol is down).
// Both share the readsb /v2 schema: {ac:[{hex,flight,lat,lon,alt_baro,gs,...}]}
const ADSB_HOSTS=['https://api.airplanes.live/v2','https://opendata.adsb.fi/api/v2'];
async function adsb(path){
  let err;
  for(const h of ADSB_HOSTS){
    // 9s per host (was 12): a normal /point response is a second or two, so a longer
    // wait just means a stuck mirror hangs the whole load — fall back to the next sooner.
    try{ return await getJSON(h+path,{timeout:9000}); }catch(e){ err=e; }
  }
  throw err||new Error('all ADS-B hosts unreachable');
}
// Aircraft near the MAP CENTRE — one single 250-nm point query, nothing fancy.
// The readsb mirrors cap point queries at 250 nm; that one circle around the
// centre is plenty and dead reliable. Refetched on every map move and every
// refresh pulse. adsb() throws if every mirror is unreachable, which the runtime
// treats as an error (keeps the planes already on the map + retries) rather
// than a "zero aircraft" wipe.
async function adsbViewport(){
  const c=gl.getCenter();
  const j=await adsb('/point/'+c.lat.toFixed(3)+'/'+c.lng.toFixed(3)+'/250');
  return {ac:j.ac||[]};
}
// Is this ADS-B contact a rotorcraft? The emitter CATEGORY 'A7' is the ICAO
// "Rotorcraft" class (the authoritative signal); fall back to the human-readable
// description mentioning a helicopter/rotor when the category is absent.
const isHeli=a=>a.category==='A7'||/helicopter|\brotor/i.test(a.desc||'');
// ONE property builder for every ADS-B contact — the civil/mil viewport feeds
// AND the emergency-squawk feed build their features from this, so the card /
// chart / AGL fields can never drift apart between feeds.
function acProps(a,kind){
  return {_kind:kind, heli:isHeli(a)?1:0,
    flight:String(a.flight||a.r||a.hex||'?').trim(),
    type:a.t||'?',desc:a.desc||'',op:a.ownOp||'',
    alt:a.alt_baro??a.alt_geom??'?',
    // barometric (pressure-altitude) value kept separate so AGL can QNH-correct
    // it; null when the plane only reports geometric altitude (already ~MSL)
    altBaro:(typeof a.alt_baro==='number'?a.alt_baro:null),
    spd:a.gs!=null?Math.round(a.gs):'?',
    trk:a.track!=null?Math.round(a.track):null,
    _rot:a.track!=null?a.track:(a.true_heading!=null?a.true_heading:0),
    sq:a.squawk||'',hex:a.hex||'',mil:a.dbFlags&1?1:0};

const acFeature=(a,kind,extra)=>({type:'Feature',
  geometry:{type:'Point',coordinates:[a.lon,a.lat]},
  properties:extra?Object.assign(acProps(a,kind),extra):acProps(a,kind)});
function acFeatures(j,kind){
  return (j.ac||[]).filter(a=>a.lat!=null&&a.lon!=null).map(a=>acFeature(a,kind));
}
// Features last loaded for a layer id — read from our own LAYER_STATE, never
// from MapLibre's private source internals (which can break on any upgrade).
function featsIn(id){const st=LAYER_STATE[id];return (st&&st.features)||[];}
// STATIC REGIONAL CACHE — airspace/NPS barely change (56-day chart cycle) and
// the FAA service can't return the whole US in one shot (~50 MB, times out) and
// ignores server generalisation, so we can't "pull the entire thing". Instead we
// pull a fixed REGION_DEG box around the crosshair ONCE, cache it, draw it at
// EVERY zoom, and drop it from the periodic refresh — only re-pulling when the
// crosshair travels past REGION_REFETCH_KM (so the cached region still overlaps).
const REGION_DEG=1.25;                 // half-box, ° (~85 mi each way around you)
const REGION_REFETCH_KM=85;            // travel this far → re-pull the region
function regionEnv(){
  const c=gl.getCenter();
  return [c.lng-REGION_DEG, c.lat-REGION_DEG, c.lng+REGION_DEG, c.lat+REGION_DEG]
    .map(n=>n.toFixed(3)).join(',');
}
// polygon feature -> a representative [lon,lat] (first vertex), for fly-to / bounds
function polyPt(f){
  const g=f.geometry; if(!g) return null;
  if(g.type==='Point') return g.coordinates;
  if(g.type==='Polygon') return g.coordinates[0] && g.coordinates[0][0];
  if(g.type==='MultiPolygon') return g.coordinates[0] && g.coordinates[0][0] && g.coordinates[0][0][0];
  return null;
}
// The point on a polygon feature's BOUNDARY nearest to (lon,lat) — the closest
// EDGE point (projected onto the nearest edge segment, not just the nearest
// vertex), used for a card's distance/direction label, sorting, and range
// inclusion (the nearest edge is what determines whether a zone is in range).
// Planar lon/lat with a cos(lat) x-scale — exact enough at these scales.
// Returns {pt:[lon,lat], km}.
function nearestEdge(f,lon,lat){
  const g=f.geometry; if(!g) return null;
  const rings=g.type==='Polygon'?g.coordinates:g.type==='MultiPolygon'?g.coordinates.flat():[];
  const k=Math.cos(lat*Math.PI/180)||1e-6;
  let best=null,bd=Infinity;
  rings.forEach(r=>{ for(let i=0;i+1<r.length;i++){
    const ax=(r[i][0]-lon)*k, ay=r[i][1]-lat, bx=(r[i+1][0]-lon)*k, by=r[i+1][1]-lat;
    const dx=bx-ax, dy=by-ay, l2=dx*dx+dy*dy;
    let t=l2>0?-(ax*dx+ay*dy)/l2:0; t=t<0?0:t>1?1:t;
    const cx=ax+t*dx, cy=ay+t*dy, d2=cx*cx+cy*cy;
    if(d2<bd){ bd=d2; best=[lon+cx/k, lat+cy]; }
  }});
  return best?{pt:best,km:havKm(lat,lon,best[1],best[0])}:null;
}
// Area-weighted centroid [lon,lat] of a polygon feature — the "middle" of the
// zone, used so an airspace/TFR card flies the crosshair to the centre of the
// polygon rather than its nearest edge. Outer rings only, each ring weighted by
// |area| so a MultiPolygon (or mixed winding) centres correctly. Planar lon/lat
// (exact enough at these scales); falls back to the vertex mean, then polyPt,
// for a degenerate (zero-area) polygon.
function polyCenter(f){
  const g=f.geometry; if(!g) return null;
  const rings=g.type==='Polygon'?[g.coordinates[0]]
    :g.type==='MultiPolygon'?g.coordinates.map(p=>p[0]):[];
  let accX=0,accY=0,accW=0,vx=0,vy=0,vn=0;
  for(const r of rings){ if(!r||r.length<3) continue;
    let A=0,X=0,Y=0;
    for(let i=0,j=r.length-1;i<r.length;j=i++){
      const cross=r[j][0]*r[i][1]-r[i][0]*r[j][1];
      A+=cross; X+=(r[j][0]+r[i][0])*cross; Y+=(r[j][1]+r[i][1])*cross;
      vx+=r[i][0]; vy+=r[i][1]; vn++;
    }
    if(A!==0){ const w=Math.abs(A); accX+=(X/(3*A))*w; accY+=(Y/(3*A))*w; accW+=w; }
  }
  if(accW>0) return [accX/accW, accY/accW];
  if(vn>0) return [vx/vn, vy/vn];
  return polyPt(f);
}
// point-in-polygon (ray casting) for a GeoJSON Polygon/MultiPolygon feature —
// used to test whether a location sits inside an SPC outlook risk area
function pointInRing(lon,lat,ring){
  let inside=false;
  for(let i=0,j=ring.length-1;i<ring.length;j=i++){
    const xi=ring[i][0],yi=ring[i][1],xj=ring[j][0],yj=ring[j][1];
    if(((yi>lat)!==(yj>lat)) && (lon<(xj-xi)*(lat-yi)/(yj-yi)+xi)) inside=!inside;
  }
  return inside;
}
function pointInFeature(f,lon,lat){
  const g=f.geometry; if(!g) return false;
  const polys=g.type==='Polygon'?[g.coordinates]:g.type==='MultiPolygon'?g.coordinates:[];
  for(const poly of polys){
    if(poly[0] && pointInRing(lon,lat,poly[0]) && !poly.slice(1).some(h=>pointInRing(lon,lat,h))) return true;
  }
  return false;
}
const escapeHtml =s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));


/* =====================================================================
   1. MAP — CARTO dark basemap (keyless raster tiles)
   ===================================================================== */
// NEXRAD base-reflectivity mosaic tiles (Iowa State Mesonet, keyless). The
// ?bust pulls the latest mosaic on each refresh pulse (tracking the "Xs to
// update" clock); sharing ONE bust value between the map layer and the PCPN
// sampler lets them share the browser cache instead of double-fetching tiles.
const RADAR_URL='https://mesonet.agron.iastate.edu/cache/tile.py/1.0.0/nexrad-n0q-900913/{z}/{x}/{y}.png';
const radarBust=()=>Math.floor(Date.now()/(REFRESH_S*1000));   // one window per refresh pulse
let _radarBust=radarBust();
const RADAR_TILE=RADAR_URL+'?'+_radarBust;
function refreshRadar(){
  const b=radarBust(); if(b===_radarBust) return;   // same refresh window — nothing new
  _radarBust=b;
  const s=gl.getSource('radar'); if(s&&s.setTiles) s.setTiles([RADAR_URL+'?'+b]);
}
const gl = new maplibregl.Map({
  container:'map',
  style:{
    version:8,
    glyphs:'https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf',
    sources:{
      carto:{ type:'raster', tileSize:256,
        tiles:['https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png',
               'https://b.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png',
               'https://c.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png'] },
      // NEXRAD base-reflectivity mosaic (~1 km, latest) — Iowa State Mesonet,
      // keyless. refreshRadar() rides the refresh pulse (new tiles once per mosaic
      // minute — see radarBust above). Sits above the
      // basemap, below the aircraft/warning layers (added later). maxzoom caps
      // the TILE fetch at the mosaic's native detail (~z8); it does NOT cap the
      // map's zoom — you can still zoom all the way in, and beyond z8 MapLibre
      // bilinearly upsamples that tile so the radar stays smooth instead of
      // showing the blocky server-upscaled tiles you'd get by fetching deeper.
      radar:{ type:'raster', tileSize:256, maxzoom:8,
        tiles:[RADAR_TILE] }
    },
    layers:[{id:'carto',type:'raster',source:'carto'},
      {id:'radar',type:'raster',source:'radar',
        paint:{'raster-opacity':0.5,'raster-resampling':'linear'}}]
  },
  center:[-96,39], zoom:3.4, minZoom:1.1, maxZoom:16,   // start over the USA until a location fix lands
  renderWorldCopies:true, attributionControl:false
});
// No on-map controls — zoom is scroll/pinch and recentre is the ⌖ ME button.
window.__sitrep={map:gl}; // debug/test handle

// Zoom is a SEPARATE action from panning. MapLibre's built-in scroll, double-
// click AND pinch zoom all anchor to the CURSOR/fingers, which slides the map
// sideways (and pinch can rotate/tilt) as you zoom. We disable all of them and
// re-implement zoom around the map CENTRE — on desktop via the wheel, on touch
// via a custom two-finger pinch (below) — so zooming never drifts the lat/lon or
// tilts the north-up, crosshair-centric view. One-finger DRAG stays the only way
// to pan. Minimalist and predictable: pinch = zoom, drag = move, nothing else.
gl.scrollZoom.disable();
gl.doubleClickZoom.disable();
gl.touchZoomRotate.disable();   // replaced by the centre-anchored pinch below
gl.touchPitch.disable();        // no tilt — the view stays flat / north-up
gl.dragRotate.disable();        // no rotate (desktop right-drag)
// Programmatic camera moves (ME button, fly-to, fitBounds) must CANCEL the
// wheel-zoom loop below first — its per-frame setZoom would abort their
// easeTo/flyTo mid-animation if the user had just scroll-zoomed.
let cancelCenterZoom=()=>{};
(function centerZoom(){
  const cvs=gl.getCanvasContainer();
  const clamp=z=>Math.max(gl.getMinZoom(),Math.min(gl.getMaxZoom(),z));
  // A single requestAnimationFrame loop eases the LIVE zoom toward a target that
  // wheel/double-click nudge. One continuous animation (not a new easeTo per
  // event) is what makes it smooth — stacked easeTos restart every frame and
  // stutter. setZoom keeps the map CENTRE fixed, so zoom never pans the view.
  let target=gl.getZoom(), running=false, last=-1e9;
  function frame(){
    if(!running) return;                 // cancelled by a programmatic camera move
    const cur=gl.getZoom(), diff=target-cur;
    if(Math.abs(diff)<0.003){ if(cur!==target) gl.setZoom(target); running=false; return; }
    gl.setZoom(cur+diff*0.2);            // exponential ease-out toward target
    requestAnimationFrame(frame);
  }
  function kick(){ if(!running){ running=true; requestAnimationFrame(frame); } }
  cancelCenterZoom=()=>{ running=false; target=gl.getZoom(); };
  cvs.addEventListener('wheel',e=>{
    e.preventDefault();
    const now=e.timeStamp;
    if(now-last>200) target=gl.getZoom();   // idle gap: resync to the live zoom
    last=now;
    let d=e.deltaY;
    if(e.deltaMode===1) d*=16; else if(e.deltaMode===2) d*=400;   // line / page → px
    target=clamp(target - d*0.0022);
    kick();
  },{passive:false});
  cvs.addEventListener('dblclick',e=>{
    e.preventDefault();
    target=clamp((running?target:gl.getZoom())+(e.shiftKey?-1:1));
    kick();
  });
  // ---- Touch / trackpad devices: fully custom, minimalist navigation via
  //      Pointer Events (which unify finger, pen AND the iPad trackpad cursor).
  //      MapLibre's own pan is disabled and we drive it ourselves: ONE pointer
  //      (a finger OR a trackpad click-drag) PANS; TWO pointers (two fingers)
  //      ZOOM around the map CENTRE — never a pan, never a rotate/tilt. Gated to
  //      a coarse pointer, so a desktop mouse keeps MapLibre's dragPan + wheel. ----
  if(window.matchMedia&&window.matchMedia('(pointer:coarse)').matches){
    gl.dragPan.disable();
    cvs.style.touchAction='none';   // we own the gestures; stop the browser scrolling/zooming the page
    const pts=new Map();            // active pointerId -> {x,y}
    let pinchD=0, pinchZ=0;
    const two=()=>{ const a=[...pts.values()]; return Math.hypot(a[0].x-a[1].x, a[0].y-a[1].y); };
    cvs.addEventListener('pointerdown',e=>{
      pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
      if(pts.size===2){ pinchD=two(); pinchZ=gl.getZoom(); target=pinchZ; }
      try{ cvs.setPointerCapture(e.pointerId); }catch(_){}
    });
    cvs.addEventListener('pointermove',e=>{
      const p=pts.get(e.pointerId); if(!p) return;
      const dx=e.clientX-p.x, dy=e.clientY-p.y; p.x=e.clientX; p.y=e.clientY;
      if(pts.size>=2){
        const d=two(); if(pinchD>0&&d>0){ target=clamp(pinchZ+Math.log2(d/pinchD)); kick(); }   // zoom around centre
      }else if(pts.size===1&&(dx||dy)){
        cancelCenterZoom(); gl.panBy([-dx,-dy],{animate:false});   // content follows the pointer
      }
      e.preventDefault();
    });
    const lift=e=>{ pts.delete(e.pointerId); if(pts.size<2) pinchD=0; };
    cvs.addEventListener('pointerup',lift);
    cvs.addEventListener('pointercancel',lift);
  }
})();

/* =====================================================================
   2. ICONS — the only map markers are the aircraft silhouettes: a PLANE or a
   HELICOPTER shape (chosen per contact from the ADS-B rotorcraft category) in
   the type colour (green civil / yellow military / red emergency), drawn nose-up
   so icon-rotate = heading works. Rasterised to canvas, registered with addImage.
   ===================================================================== */
// ONE colour per aircraft feed — the map silhouettes, the layer definitions and
// the SITREP tail-number tint (AC_COL[src] in the card builder) all read this,
// so map and panel can never disagree about what green/yellow/red means.
const AC_COL={nearair:'#2fe07a',mil:'#ffce4d',sos:'#ff4455'};
// shared canvas setup for the silhouette rasterisers (centre-origin, u = 1/32 px)
function iconCanvas(px){
  const s=px||40, c=document.createElement('canvas'); c.width=c.height=s;
  const x=c.getContext('2d',{willReadFrequently:true}); x.translate(s/2,s/2);
  return {x,u:s/32,s};
}
function shapeIcon(color,pts,px){
  const {x,u,s}=iconCanvas(px);
  x.fillStyle=color; x.strokeStyle='rgba(3,8,14,.75)'; x.lineWidth=u*1.4;
  x.lineJoin='round'; x.beginPath();
  pts.forEach((p,i)=>{const X=p[0]*u,Y=p[1]*u; i?x.lineTo(X,Y):x.moveTo(X,Y);});
  x.closePath(); x.fill(); x.stroke();
  return x.getImageData(0,0,s,s);
}
// plane silhouette, nose up
const PLANE=[[0,-15],[-1.6,-6],[-13,3],[-13,6],[-1.6,3.5],[-1.6,11],[-5,14.5],[-5,16],[0,14],
  [5,16],[5,14.5],[1.6,11],[1.6,3.5],[13,6],[13,3],[1.6,-6]];
// helicopter silhouette, nose up — same colour scheme as the plane, but a rotor
// bar + fuselage pod + tail boom/rotor so it reads as a helicopter on the map.
// Drawn from parts (each a colour rod with a dark edge, plus a filled pod) rather
// than one polygon, since a rotor disc can't be traced as a single outline.
function heliShape(color,px){
  const {x,u,s}=iconCanvas(px);
  x.lineJoin='round'; x.lineCap='round';
  const rod=(x1,y1,x2,y2,w)=>{           // colour bar with a dark outline
    x.strokeStyle='rgba(3,8,14,.8)'; x.lineWidth=u*(w+1.6);
    x.beginPath(); x.moveTo(x1*u,y1*u); x.lineTo(x2*u,y2*u); x.stroke();
    x.strokeStyle=color; x.lineWidth=u*w;
    x.beginPath(); x.moveTo(x1*u,y1*u); x.lineTo(x2*u,y2*u); x.stroke();
  };
  rod(0,2, 0,15, 2.2);          // tail boom (nose up → tail down)
  rod(2,14.5, 7,14.5, 1.8);     // tail rotor
  rod(-14,-2, 14,-2, 2.4);      // main rotor bar over the cabin
  x.beginPath(); x.ellipse(0,-2,4.4*u,7.2*u,0,0,Math.PI*2);   // fuselage pod (over the hub)
  x.fillStyle=color; x.fill();
  x.strokeStyle='rgba(3,8,14,.8)'; x.lineWidth=u*1.4; x.stroke();
  return x.getImageData(0,0,s,s);
}
function addImg(name,data){ if(!gl.hasImage(name)) gl.addImage(name,data,{pixelRatio:2}); }
function registerIcons(){
  addImg('ac-near',  shapeIcon(AC_COL.nearair,PLANE));    // civil plane = green
  addImg('ac-mil',   shapeIcon(AC_COL.mil,PLANE));        // military plane = yellow
  addImg('ac-sos',   shapeIcon(AC_COL.sos,PLANE,44));     // emergency plane = red
  addImg('heli-near',heliShape(AC_COL.nearair));          // civil helicopter = green
  addImg('heli-mil', heliShape(AC_COL.mil));              // military helicopter = yellow
  addImg('heli-sos', heliShape(AC_COL.sos,44));           // emergency helicopter = red
}
// per-contact map icon: the heli silhouette for rotorcraft, the plane otherwise
const acIconExpr=k=>['case',['==',['get','heli'],1],'heli-'+k,'ac-'+k];

/* =====================================================================

   Each: id, label, color, refresh (sec), loader() -> GeoJSON (or null =

const LAYERS=[];
const defLayer=c=>LAYERS.push(c);
// user position state — filled by IP geolocation instantly, refined by GPS
const USER={lat:null,lon:null,src:null,tz:''};

  viewport:true,   // data is scoped to the map area → refetch on every view change

defLayer({
  id:'mil', label:'Military aircraft', color:AC_COL.mil, refresh:REFRESH_S,
  icon:acIconExpr('mil'), rotate:true, iconSize:0.5,
  loader: async ()=> ({type:'FeatureCollection',features:acFeatures(await adsb('/mil'),'mil')})
});

defLayer({
  id:'sos', label:'Emergency squawks', color:AC_COL.sos, refresh:REFRESH_S,
  icon:acIconExpr('sos'), rotate:true, iconSize:0.6,
  loader: async ()=>{
    // 7700 = general emergency, 7600 = radio failure, 7500 = unlawful interference
    const codes=['7700','7600','7500'];
    const results=await Promise.allSettled(codes.map(c=>adsb('/squawk/'+c)));
    // ALL three queries down = a feed outage, not "zero emergencies" — throw so
    // the runtime keeps the last-good aircraft and retries (the loader contract).
    // A single failed code still returns the others: that plane's regular
    // civil/mil card takes over until the next pulse.
    if(results.every(r=>r.status!=='fulfilled')) throw results[0].reason;
    const feats=[];
    results.forEach((r,i)=>{
      if(r.status!=='fulfilled') return;
      (r.value.ac||[]).forEach(a=>{
        if(a.lat==null||a.lon==null) return;
        // extra: which emergency code hit; _rot keeps this feed's original
        // plain-track rotation (no true_heading fallback) — behaviour unchanged
        feats.push(acFeature(a,'sos',{code:codes[i],_rot:a.track!=null?a.track:0}));
      });
    });
    return {type:'FeatureCollection',features:feats};
  }
});

// A special-use-airspace FLOOR (LOWER_VAL / Floor) in feet: 'SFC'/blank/0 →
// surface (0); 'FL180' → 18000; a plain number → that many feet; anything
// unparseable → surface (conservative — show it). Used to drop zones that begin
// above the drone band, which can't touch a ≤400-ft flight.
function floorFt(v){
  if(v==null) return 0;
  const s=String(v).trim().toUpperCase();
  if(s===''||/^(SFC|SURF|GND|GROUND|0)$/.test(s)) return 0;
  const fl=s.match(/FL\s*0*(\d+)/); if(fl) return +fl[1]*100;
  const n=parseFloat(s.replace(/[, ]/g,''));
  return isFinite(n)?n:0;
}

defLayer({
  // FAA AIRSPACE overlay — the zones that gate low drone flight, drawn LIGHTLY
  // as background context (faint fill + thin outline). Two feeds, both keyless
  // FAA ArcGIS (CORS *), the SAME two the canifly FAA cap queries:
  //   • Class_Airspace — controlled airspace around airports: Class B / C / D
  //     (and surface Class E2). C and D are literally radius rings around a
  //     field, B the stacked "wedding cake" over a hub. Aeronautical colours:
  //     blue for B/D, magenta for C/E2.
  //   • National_Defense_Airspace_TFR_Areas — the standing national-defense
  //     no-fly zones (a zone in range forces the canifly ceiling to 0). Drawn
  //     in red so they read as "avoid", but still light.
  // STATIC regional cache (see regionEnv): pulled once for a box around you,
  // shown at every zoom, refreshed only when you travel — not on the pulse.
  // This is a VISUAL layer only — the canifly gate still runs its own strict
  // point-buffer query, so a soft-failing overlay never understates a no-fly.
  id:'airspace', label:'FAA airspace + restrictions', color:'#5b8def',
  static:true, geom:'fill', colored:true, fillOpacity:0.05,
  lineWidth:1, lineOpacity:0.34,
  loader: async ()=>{
    const env=regionEnv();
    const q=(svc,fields,where)=>`https://services6.arcgis.com/ssFJjBXIUyZDrSYZ/ArcGIS/rest/services/${svc}/FeatureServer/0/query`
      +`?geometry=${env}&geometryType=esriGeometryEnvelope&inSR=4326`
      +`&spatialRel=esriSpatialRelIntersects&returnGeometry=true&outFields=${fields}`
      +(where?`&where=${encodeURIComponent(where)}`:'')+`&f=geojson`;
    // five keyless CORS feeds from the FAA org, each fail-soft (a soft failure just
    // omits its features — the canifly gate still runs its own strict query).
    // Class_Airspace is filtered SERVER-side to the classes we draw (B/C/D + the
    // surface-E2), so the huge en-route Class-E5 geometry never hits the wire.
    const [cls,def,sua,nsufr,stad]=await Promise.all([
      getJSON(q('Class_Airspace','NAME,CLASS,LOCAL_TYPE',"CLASS IN ('B','C','D') OR LOCAL_TYPE='CLASS_E2'"),{timeout:20000}).catch(()=>null),
      getJSON(q('National_Defense_Airspace_TFR_Areas','NAME'),{timeout:12000}).catch(()=>null),
      getJSON(q('Special_Use_Airspace','NAME,TYPE_CODE,UPPER_VAL,LOWER_VAL'),{timeout:15000}).catch(()=>null),
      getJSON(q('Part_Time_National_Security_UAS_Flight_Restrictions','Facility,Floor,Ceiling'),{timeout:12000}).catch(()=>null),
      getJSON(q('Stadiums','NAME'),{timeout:12000}).catch(()=>null)]);
    const feats=[];
    const push=(geom,props)=>{ if(geom) feats.push({type:'Feature',geometry:geom,properties:props}); };
    // controlled airspace around airports (advisory, aeronautical blue/magenta)
    const CTRL={B:'#5b8def',C:'#c06ad0',D:'#5b8def'};
    ((cls&&cls.features)||[]).forEach(f=>{ const p=f.properties||{},cl=p.CLASS;
      if(!(/^[BCD]$/.test(cl)||p.LOCAL_TYPE==='CLASS_E2')||!f.geometry) return;
      push(f.geometry,{_kind:'airspace',sev:'ctrl',cls:cl,code:cl,name:p.NAME||'',_col:CTRL[cl]||'#c06ad0'}); });
    // national-defense TFR zones — hard no-fly (red)
    ((def&&def.features)||[]).forEach(f=>push(f.geometry,{_kind:'airspace',sev:'hard',cls:'DEF',code:'DEF',
      name:(f.properties&&f.properties.NAME)||'',_col:'#ff5a3c'}));
    // special-use airspace, right-sized to a drone at ≤400 ft:
    //   • Prohibited (P)        → HARD no-fly (red)
    //   • Restricted (R)        → CONDITIONAL no-fly (amber, only when active)
    //   • MOA/Warning/Alert/Danger → ADVISORY (they don't restrict a Part-107
    //     drone — military/hazard activity to be aware of, not a no-fly)
    // Any zone whose FLOOR is above the drone band (400 ft) is dropped — it can't
    // touch these altitudes, so drawing/carding it would be noise.
    const SUA={P:['hard','PROH','#ff5a3c'],R:['caution','RSTD','#ff8c42'],

    ((sua&&sua.features)||[]).forEach(f=>{ const p=f.properties||{},t=SUA[p.TYPE_CODE]; if(!t||!f.geometry) return;
      if(floorFt(p.LOWER_VAL)>SPEC.regFt) return;   // starts above the drone band → irrelevant

        name:p.NAME||'',lo:p.LOWER_VAL,hi:p.UPPER_VAL,_col:t[2]}); });
    // part-time national-security UAS zones — hard no-fly for drones (red)

    // stadiums → 3 nm (5.556 km) rings (the 99.7 event TFR), amber advisory
    ((stad&&stad.features)||[]).forEach(f=>{ const g=f.geometry; if(!g||g.type!=='Point') return;
      push({type:'Polygon',coordinates:[circleRing(g.coordinates[1],g.coordinates[0],5.556,48)]},
        {_kind:'airspace',sev:'caution',cls:'STDM',code:'STDM',name:(f.properties&&f.properties.NAME)||'stadium',_col:'#d9b44a'}); });

/* =====================================================================
   4. LAYER RUNTIME — sources, styles, refresh loop
   ===================================================================== */
const LAYER_STATE={};
// icons grow with zoom so they read clearly world-wide and up close (kept ~40%
// smaller than before so a plane doesn't blanket a mile at the load zoom, while the
// detailed shape is still distinguishable and the zoom-scaling curve is preserved)
const iconSize=base=>['interpolate',['linear'],['zoom'],2,base*0.85,6,base*1.3,11,base*1.9];
// The SITREP re-reads layer data as part of every refresh — debounced so a
// burst of near-simultaneous layer updates recomputes it once, not N times.
let sitrepRefreshT=null;
// The canifly chart repaints on the same debounce: its TRFC traffic cells read
// the aircraft layers, so fresh plane data must reach both views together. The
// chart paints FIRST so the SITREP tick can colour its title from the chart's
// freshly-computed NOW column (grounded → red, reduced ceiling → yellow).
function scheduleSitrep(){ clearTimeout(sitrepRefreshT); sitrepRefreshT=setTimeout(()=>{
  try{if(FLY.data)flyPaint();}catch(e){console.warn('[fly-paint]',e);}
  try{sitrepTick();}catch(e){console.warn('[sitrep]',e);} },300); }

// Ground elevation (ft AMSL) for AGL = alt − ground, cached by ~0.01° cell
// (≈1 km). groundElevFt() is a pure SYNCHRONOUS read (null until known);
// ensureGroundElev() kicks the fetch. Sampling the terrain UNDER EACH PLANE
// (not just the crosshair) keeps AGL right when the range is wide or the ground
// rolls — a plane 15 mi away over a ridge no longer inherits the valley floor's
// elevation. Misses are pulled in ONE batched Open-Meteo request (the elevation
// API takes many lat/lon at once), so per-plane terrain costs a single call.
// A FAILED lookup is NEVER cached — a poisoned 0 would silently disable the AGL
// correction (and the low-traffic warnings) in high terrain for the session; it
// just backs off briefly and retries on a later tick.
const _elevCache={}; let _elevBusy=false, _elevFailAt=0, _elevAt=0;
const ELEV_RETRY_MS=15000;
// Hard COOLDOWN between elevation fetches. Without it the finally's scheduleSitrep
// re-ticks → re-calls ensureGroundElev, and any cell that never caches (a plane
// over water/off-grid returns a non-finite elevation, which we correctly refuse
// to cache) stays in `need` forever → a tight fetch loop that hammers Open-Meteo
// and rate-limits the chart's OWN weather pull (same host) into failing. The
// cooldown caps this to ~one batch per interval no matter what.
const ELEV_COOLDOWN_MS=20000;
const elevKey=(la,lo)=>la.toFixed(2)+','+lo.toFixed(2);
function groundElevFt(la,lo){
  const v=_elevCache[elevKey(la,lo)];
  return v==null?null:v;
}
// Pull elevation for any of these [lat,lon] cells not already cached, in one
// batched request. Deduped by cell and capped so the URL stays sane. Re-runs the
// SITREP + chart when it lands so AGL fills in on the next tick.
function ensureGroundElev(pts){
  if(_elevBusy || Date.now()-_elevFailAt<=ELEV_RETRY_MS || Date.now()-_elevAt<ELEV_COOLDOWN_MS) return;
  const need=[], seen=new Set();
  for(const p of pts){ if(!p||!isFinite(p[0])||!isFinite(p[1])) continue;
    const k=elevKey(p[0],p[1]); if((k in _elevCache)||seen.has(k)) continue;
    seen.add(k); need.push([p[0],p[1],k]); }
  if(!need.length) return;
  const batch=need.slice(0,90);
  _elevBusy=true; _elevAt=Date.now();
  const lats=batch.map(n=>n[0].toFixed(4)).join(',');
  const lons=batch.map(n=>n[1].toFixed(4)).join(',');
  getJSON(`https://api.open-meteo.com/v1/elevation?latitude=${lats}&longitude=${lons}`,{timeout:9000})
    .then(d=>{ const arr=d&&Array.isArray(d.elevation)?d.elevation:null;
      if(arr&&arr.length===batch.length){
        batch.forEach((n,idx)=>{ const m=arr[idx];
          if(typeof m==='number'&&isFinite(m)) _elevCache[n[2]]=m*M_TO_FT; }); }
      else _elevFailAt=Date.now(); })
    .catch(()=>{ _elevFailAt=Date.now(); })
    .finally(()=>{ _elevBusy=false; scheduleSitrep(); });
}
// Local sea-level pressure [hPa] (≈ QNH / altimeter setting) from the winds-aloft
// weather pull — used to convert ADS-B pressure altitude to true MSL. null until
// the first weather fetch lands (then AGL uses the raw 29.92" value).
let QNH_HPA=null;

function ensureMapLayer(cfg){
  const sid='src-'+cfg.id;
  if(gl.getSource(sid)) return;
  gl.addSource(sid,{type:'geojson',data:{type:'FeatureCollection',features:[]}});
  if(cfg.geom==='fill'){
    const fillCol=cfg.colored?['coalesce',['get','_col'],cfg.color]:cfg.color;
    gl.addLayer({id:'ly-'+cfg.id,type:'fill',source:sid,
      paint:{'fill-color':fillCol,'fill-opacity':cfg.fillOpacity!=null?cfg.fillOpacity:0.26,
        'fill-outline-color':fillCol}});
    gl.addLayer({id:'lyl-'+cfg.id,type:'line',source:sid,
      paint:{'line-color':fillCol,'line-width':cfg.lineWidth!=null?cfg.lineWidth:1.4,
        'line-opacity':cfg.lineOpacity!=null?cfg.lineOpacity:0.85}});
  }else{
    gl.addLayer({id:'ly-'+cfg.id,type:'symbol',source:sid,layout:{
      'icon-image': cfg.icon,
      'icon-size': iconSize(cfg.iconSize||0.6),
      'icon-rotate': cfg.rotate?['coalesce',['get','_rot'],0]:0,
      'icon-rotation-alignment':'map','icon-pitch-alignment':'map',
      'icon-allow-overlap':true,'icon-ignore-placement':true}});
  }
  const vis=cfg.defaultOff?'none':'visible';
  gl.setLayoutProperty('ly-'+cfg.id,'visibility',vis);
  if(gl.getLayer('lyl-'+cfg.id)) gl.setLayoutProperty('lyl-'+cfg.id,'visibility',vis);
}

async function runLayer(cfg){
  const st=LAYER_STATE[cfg.id];
  // Generation token: every call bumps it, and a call only writes data/state if
  // it's still the newest. Overlapping refreshes (pan + tick + resize) can
  // finish out of order; without this a slow stale fetch could clobber a fresh
  // one. The latest request always wins. st.loading lets the master scheduler
  // skip a layer that's still fetching.
  const myGen=++st.gen;
  st.loading=true;
  // static layers cache a whole region; snapshot the region centre at fetch
  // start so the travel-based refetch measures from where this data was pulled
  const startCenter=cfg.static?gl.getCenter():null;
  try{
    if(st.quickTimer){ clearTimeout(st.quickTimer); st.quickTimer=null; }
    // up to 3 attempts with exponential backoff before giving up this cycle
    let lastErr=null;
    for(let attempt=0;attempt<3;attempt++){
      try{
        const fc=await cfg.loader();
        if(myGen!==st.gen) return;               // superseded by a newer refresh — drop this result
        // a null result = "no update" — keep what's loaded
        if(fc){
          const src=gl.getSource('src-'+cfg.id);
          if(src) src.setData(fc);
          st.features=fc.features||[];
        }
        if(startCenter) st.center=startCenter;   // region now cached around here
        st.fails=0;
        scheduleSitrep();   // SITREP re-reads the fresh data as part of the refresh
        return;
      }catch(e){
        lastErr=e;
        if(myGen!==st.gen) return;                // a newer refresh owns the layer now
        if(attempt<2){
          await new Promise(r=>setTimeout(r,1200*Math.pow(3,attempt))); // 1.2s, 3.6s
          if(myGen!==st.gen) return;
        }
      }
    }
    // Failed this cycle. NEVER wipe what's on the map — keep the existing
    // features and retry with a short bounded backoff (6→30s) instead of
    // waiting a full refresh interval.
    st.fails=(st.fails||0)+1;
    console.warn('[layer '+cfg.id+']',lastErr&&lastErr.message);
    if(!st.quickTimer){
      const delay=Math.min(30000,6000*st.fails);
      st.quickTimer=setTimeout(()=>{ st.quickTimer=null; runLayer(cfg); },delay);
    }
  } finally {
    if(myGen===st.gen){
      st.loading=false;
      // a region load that finished while the crosshair kept moving (e.g. the
      // boot load landing after the location fix flew the map) may already be
      // stale — re-check so the cache catches up to where you actually are
      if(cfg.static) ensureStaticRegion();
    }
  }
}
// Static regional layers (airspace, NPS): (re)pull the region around the
// crosshair when nothing is cached yet, or the crosshair has travelled past the
// cached region's overlap. Never fires on zoom or the pulse — only on travel.
function ensureStaticRegion(){
  const c=gl.getCenter();
  LAYERS.filter(l=>l.static).forEach(cfg=>{
    const st=LAYER_STATE[cfg.id]; if(!st||!st.started||st.loading) return;
    if(!st.center || havKm(st.center.lat,st.center.lng,c.lat,c.lng)>REGION_REFETCH_KM) runLayer(cfg);
  });
}

// ---- unified refresh: ONE pulse() drives every data kick. Scheduled (the
//      countdown) and forced (tapping the badge) differ ONLY in which layers
//      they pull — scheduled pulls the DUE dynamic layers on their cadence;
//      forced pulls every started layer regardless. Both then kick the chart,
//      weather and radar and restart the countdown from zero. STATIC layers
//      (airspace, NPS) never ride the scheduled pulse — they're a regional
//      cache refreshed on travel (see refreshViewport). Layers already
//      mid-flight are skipped (st.loading). ----
let refreshBase=Date.now(), pulseCount=0;
function pulse(force){
  if(!force) pulseCount++;   // forced pulls don't shift the slow-layer cadence grid
  LAYERS.forEach(cfg=>{
    const st=LAYER_STATE[cfg.id];
    if(!st||!st.started||st.loading) return;
    if(!force){
      if(cfg.static||!(cfg.refresh>0)) return;
      // refresh every N pulses (N=refresh/30), grid-aligned so a moveend that
      // reset the countdown can't push a layer's refresh past a whole cycle
      const everyN=Math.max(1,Math.round(cfg.refresh/REFRESH_S));
      if(pulseCount%everyN!==0) return;
    }
    runLayer(cfg);
  });
  // The canifly chart rides the SAME pulse: weather + the radar-echo sample every
  // pulse; Kp throttles itself to the 180s space-weather cadence and the FAA
  // airspace to its location/range-keyed cache — all inside flyRefresh().
  // loadWeather self-throttles (~5 min / >2 km moves) unless forced.
  flyRefresh(); loadWeather(force); refreshRadar();
  refreshBase=Date.now();   // the refresh dials refill from here (updateLoadRing)
}
function forceRefresh(){ pulse(true); }   // tapping a refresh dial / the DATA card
// fires the pulse at the end of each cycle; the dial fill is painted by updateLoadRing
function refreshTick(){ if(Date.now()-refreshBase>=REFRESH_S*1000) pulse(); }
// both refresh dials (SITREP header + iPhone-portrait map) force a refresh on tap
(function bindRefreshDials(){
  document.querySelectorAll('.rdial').forEach(b=>b.addEventListener('click',forceRefresh));
})();

// No layer selector: every layer's map source + style is created here and stays
// on (SPC is defaultOff = hidden, loaded only to feed the SITREP outlook card).
function initLayers(){
  LAYERS.forEach(cfg=>{
    LAYER_STATE[cfg.id]={features:[],started:false,
      gen:0,quickTimer:null,fails:0,loading:false};
    ensureMapLayer(cfg);
  });
}

/* =====================================================================
   6. SPACE WEATHER + WEATHER FORECAST (SITREP cards)
   NOAA SWPC (GOES X-ray flare class) + Open-Meteo forecast — keyless, CORS *.
   Surfaced as SITREP cards, not map layers. Planetary Kp is NOT fetched here:
   the pinned SPACE WEATHER card reads the chart's own kpNow (getKp forecast),
   so the card and the chart's KP grounding gate always agree.
   ===================================================================== */
let XRAY=null; // latest GOES X-ray flare class
async function loadXray(){
  try{
    const j=await getJSON('https://services.swpc.noaa.gov/json/goes/primary/xray-flares-latest.json');
    const f=Array.isArray(j)?j[0]:j;
    XRAY=(f&&(f.current_class||f.max_class))||null;
  }catch(e){ XRAY=null; }
  scheduleSitrep();
}
// ---- WEATHER FORECAST (Open-Meteo, keyless CORS-*) — the always-present bottom
//      SITREP card, so the panel is never empty. Fetched for the crosshair,
//      refreshed when it moves >2 km or the reading ages past ~5 min. WMO weather
//      codes map to an emoji + a plain-english condition. ----
let WX=null, wxLat=null, wxLon=null, wxAt=0, wxBusy=false;
const WMO={0:['☀️','clear'],1:['🌤️','mostly clear'],2:['⛅','partly cloudy'],3:['☁️','overcast'],
  45:['🌫️','fog'],48:['🌫️','icy fog'],
  51:['🌦️','light drizzle'],53:['🌦️','drizzle'],55:['🌧️','heavy drizzle'],56:['🌧️','freezing drizzle'],57:['🌧️','freezing drizzle'],

async function loadWeather(force){
  if(wxBusy) return;
  const c=gl.getCenter();
  if(!force && WX && wxLat!=null && havKm(wxLat,wxLon,c.lat,c.lng)<2 && Date.now()-wxAt<300000) return;
  wxBusy=true;
  try{
    const u=`https://api.open-meteo.com/v1/forecast?latitude=${c.lat.toFixed(3)}&longitude=${c.lng.toFixed(3)}`
      +`&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m`
      +`&daily=temperature_2m_max,temperature_2m_min`
      +`&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=auto&forecast_days=1`;
    const d=await getJSON(u,{timeout:12000});
    const cur=d.current||{}, day=d.daily||{};
    WX={tempF:cur.temperature_2m, feelsF:cur.apparent_temperature, code:cur.weather_code,
        windMph:cur.wind_speed_10m, windDir:cur.wind_direction_10m,
        hiF:(day.temperature_2m_max||[])[0], loF:(day.temperature_2m_min||[])[0]};

// THE ONE weather card. There's a single weather feed, so there's a single card
// for it — no transient "WX WARNING" duplicating the static forecast card. It
// changes RANK, COLOUR and TEXT with its own severity:
//   • a weather GATE is limiting the NOW column → the card is PROMOTED to a top
//     hazard (red grounded / amber reduced-ceiling), headlined by the gate, with
//     the current conditions folded onto line 3 (so nothing is shown twice);
//   • otherwise it's the routine conditions card at the BOTTOM (neutral), which
//     also carries feed health: 'stale' = failing but last-good shows (amber),
//     'down' = never loaded so the chart is blind (red, promoted so a total
//     outage can't hide at the bottom behind a green skeleton).
// Returns {pin, card}: pin=true floats it up with the other hazards; the card is
// the usual [cls, icon, l1, l2, l3, action, hazard] tuple. wn = FLY.detail.wxNow.
function wxCard(wxState, wn){
  const rnd=n=>n==null?null:Math.round(n);
  const retry='data-act="refresh"';
  // compact current-conditions line — reused as line 3 of a promoted gate card so
  // the temperature / sky / wind still appear exactly once (no separate card)
  const condLine=()=>{
    if(!WX) return '';
    const [,d]=WMO[WX.code]||['','—'];
    const t=rnd(WX.tempF), w=rnd(WX.windMph), wd=WX.windDir!=null?compass(WX.windDir)+' ':'';
    return (t!=null?t+'° · ':'')+d.toUpperCase()+(w!=null?' · '+wd+w+U(' mph'):'');
  };
  // feed totally down — chart can't compute; pin it so the outage is unmissable
  if(wxState==='down') return {pin:true, card:['danger','🌡️','WEATHER UNAVAILABLE',
    'feed down · chart can\'t compute','tap to retry',retry,true]};
  // an active weather GATE promotes the card to a top hazard (grounded red / capped
  // amber); conditions ride line 3, so the sky/temp aren't repeated elsewhere
  if(wn){
    const wxCap=Math.min(wn.windCeilFt,wn.cloudCapFt);   // weather-only ceiling (ft)
    if(wn.gust||wn.vis||wn.precip||wxCap<0){
      let ic,head,sub;
      if(wn.precip){ ic='⛈️'; head='PRECIPITATION'; sub='radar echo in range'; }
      else if(wn.gust){ ic='💨'; head='HIGH WIND'; sub='gust '+Math.round(wn.gustMph)+U(' mph')+' · max '+LIM.wind; }
      else if(wn.windCeilFt<0){ ic='💨'; head='HIGH WIND'; sub=Math.round(wn.windPeakMph)+U(' mph')+' aloft · max '+LIM.wind; }
      else if(wn.vis){ ic='🌫️'; head='LOW VISIBILITY'; sub=(wn.visSM!=null?wn.visSM.toFixed(1):'—')+U(' SM')+' · under 3 min'; }
      else { ic='☁️'; head='LOW CLOUD'; sub='base '+Math.round(wn.cloudCapFt+SPEC.clrFt)+U(' ft')+' · need 500 clr'; }
      return {pin:true, card:['danger',ic,head,sub,condLine(),'',true]};
    }
    // PRECIP INBOUND: an echo in the grey ring (1–5 mi) but not yet grounding in the
    // red ring — a storm approaching. Promote the card to amber ("land now") above a
    // mere reduced ceiling; red precip overhead (above) already outranks it.
    if(wn.precipInbound){
      return {pin:true, card:['alert','🌧️','PRECIP INBOUND','radar echo within '+GREY_MI+U(' mi'),condLine(),'',true]};
    }
    if(wxCap<SPEC.regFt){
      const wind=wn.windCeilFt<=wn.cloudCapFt;
      return {pin:true, card:['alert',wind?'💨':'☁️',(wind?'WIND':'CLOUD')+' CEILING '+wxCap+U(' ft'),
        wind?'winds aloft over max':'low cloud base',condLine(),'',true]};
    }
  }
  // no gate — routine conditions card at the bottom (neutral / amber-if-stale)
  if(!WX) return {pin:false, card: wxState==='stale'   // no conditions loaded yet
    ? ['alert','🌡️','WEATHER','feed unreachable','tap to retry',retry,true]
    : ['','🌡️','WEATHER','ACQUIRING FORECAST…','','',false]};
  const [emoji,desc]=WMO[WX.code]||['🌡️','—'];
  const t=rnd(WX.tempF), f=rnd(WX.feelsF), w=rnd(WX.windMph), hi=rnd(WX.hiF), lo=rnd(WX.loF);
  const l1=(t!=null?t+'°':'—')+' · '+desc.toUpperCase();
  const wd=WX.windDir!=null?compass(WX.windDir)+' ':'';
  const l2='WIND '+wd+(w!=null?w+U(' mph'):'—')+(f!=null?' · FEELS '+f+'°':'');
  const l3=(hi!=null?'HIGH '+hi+'°':'')+(hi!=null&&lo!=null?' · ':'')+(lo!=null?'LOW '+lo+'°':'');
  if(wxState==='stale') return {pin:false, card:['alert',emoji,l1,l2,(l3?l3+' · ':'')+'STALE — TAP',retry,true]};
  return {pin:false, card:['',emoji,l1,l2,l3,'',false]};
}
/* =====================================================================
   7. LOCATION + SITREP — the "at a glance" intelligence layer
   Fix chain: ipwho.is (instant, keyless, no prompt) -> browser GPS

   is computed client-side; position never leaves the browser except
   as anonymous lat/lon query params to the public weather APIs.

let userMarker=null, sitrepTimer=null;

// Frame the map to a `miles`-radius circle around (lat,lon). fitBounds honours
// the panel padding, so the point lands centred in the visible area between the
// panels.
// (radii RED_MI / GREY_MI / VIEW_MI are fixed constants defined with the settings)
function flyToRadiusMi(lat,lon,miles,opts){
  cancelCenterZoom();
  const {dLat,dLon}=geoDeltas(miles*MI_TO_KM,lat);
  try{
    gl.fitBounds([[lon-dLon,lat-dLat],[lon+dLon,lat+dLat]],
      Object.assign({duration:1200,maxZoom:15},opts||{}));
  }catch(e){ gl.flyTo({center:[lon,lat],zoom:11}); }
}

async function locate(){
  try{
    const j=await getJSON('https://ipwho.is/',{timeout:9000});
    if(j&&j.success!==false&&j.latitude!=null)
      setUserFix(j.latitude,j.longitude,'ip',
        {place:j.city,region:j.region,rc:j.region_code,cc:j.country_code,
         tz:(j.timezone&&j.timezone.id)||''});
  }catch(e){ console.warn('[ip-locate]',e.message); }
  startGeoWatch();
}
// LIVE DOT — one continuous geolocation watch keeps USER (and the green map dot)
// tracking the real position; watchPosition's first callback is the initial GPS
// fix, so it replaces the old one-shot getCurrentPosition. Started once; ignored
// on repeat calls or when geolocation is unavailable/denied.
// Raw GPS jitters even when you're standing still, so every fix passes through
// onGeoFix first: (4) an ACCURACY GATE drops obvious garbage, and the position is
// EMA-SMOOTHED so the dot glides instead of twitching. A fix far from the smoothed
// point is a real move → snap (no lag). The map-follow DEADBAND lives in setUserFix.
const GEO_ACC_MAX_M=100;   // drop GPS fixes reported worse than this (m) — kills spikes
const GEO_EMA=0.25;        // dot low-pass factor (0 = frozen, 1 = raw/no smoothing)
const GEO_JUMP_KM=0.05;    // a fix >50 m from the smoothed point = real move → snap, no lag
const GEO_FOLLOW_DEADBAND_KM=0.018;   // locked map recenters only past ~18 m — kills the fidget
let _emaLat=null,_emaLon=null;
function onGeoFix(lat,lon,acc){
  if(acc!=null && acc>GEO_ACC_MAX_M) return;                       // (4) accuracy gate
  if(_emaLat==null || havKm(_emaLat,_emaLon,lat,lon)>GEO_JUMP_KM){ // bootstrap / real move → snap
    _emaLat=lat; _emaLon=lon;
  } else {                                                          // stationary jitter → smooth
    _emaLat+=GEO_EMA*(lat-_emaLat); _emaLon+=GEO_EMA*(lon-_emaLon);

  setUserFix(_emaLat,_emaLon,'gps',null);

let geoWatchId=null;

      pos=>onGeoFix(pos.coords.latitude,pos.coords.longitude,pos.coords.accuracy),
      ()=>{},{enableHighAccuracy:true,timeout:10000,maximumAge:5000});

}
// The ⌖ / lock icons. The location icon = the framed crosshair; the lock icon =
// a padlock (shown while FOLLOW-locked). Both use currentColor (white, inverting
// on press), so they inherit the button styling.
const LOC_SVG='<svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><circle cx="12" cy="12" r="3.2" fill="currentColor"/><circle cx="12" cy="12" r="7" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M12 1.5v3.4M12 19.1v3.4M1.5 12h3.4M19.1 12h3.4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>';
const LOCK_SVG='<svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path d="M7.5 10.5V7.5a4.5 4.5 0 0 1 9 0v3" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/><rect x="4.7" y="10.2" width="14.6" height="10.4" rx="2.3" fill="currentColor"/></svg>';
function setLocIcon(locked){
  const b=$('#loc-btn'); if(!b) return;
  b.innerHTML=locked?LOCK_SVG:LOC_SVG;
  b.title=locked?'following your location — tap to unlock':'center map on my location';
  b.setAttribute('aria-label',locked?'unlock location follow':'center on my location');
}
// The ⌖ button toggles two states, and it STARTS LOCKED:
//   LOCKED   → UNLOCK      : release the map (icon → crosshair; drag re-enabled),
//                            the current view is kept.
//   UNLOCKED → RESET + LOCK : center on you AND reset the zoom to the 10 mi VIEW
//                            framing, then re-lock + FOLLOW (icon → padlock, panning
//                            disabled — zoom still works).
// No fix yet → first tap kicks off location. locMode: 0 unlocked · 2 locked.
// Start LOCKED at 2: load auto-locates, frames on you and follows from the first
// fix; the first tap UNLOCKS, the next RESETS + re-locks, and so on.
let locMode=2;
function setPanLock(on){ try{ on?gl.dragPan.disable():gl.dragPan.enable(); }catch(e){} }
function centerOnMe(){
  if(USER.lat==null){ toast('LOCATING…'); locate(); return; }
  if(locMode===2){                 // LOCKED → unlock (release the map, keep the view)
    locMode=0; setLocIcon(false); setPanLock(false);
  } else {                         // UNLOCKED → center + reset zoom to the 10 mi VIEW, re-lock
    flyToRadiusMi(USER.lat,USER.lon,VIEW_MI);
    locMode=2; setLocIcon(true); setPanLock(true);
  }
}
$('#loc-btn').addEventListener('click',centerOnMe);
// Engage the lock at load — the app starts following your location (padlock icon,
// panning disabled). The first fix frames on you and the follow keeps it there.
setLocIcon(true); setPanLock(true);
// ROBUST LOCK: dragPan.disable() stops the pan handler, but some touch platforms
// (notably iOS Safari) can still nudge the camera via other gestures. As a belt-
// and-braces guarantee, whenever a USER gesture (originalEvent present) ends the
// map while FOLLOW-locked, snap the crosshair straight back onto the live fix —
// keeping the user's zoom. Programmatic moves (easeTo / fitBounds) carry no
// originalEvent, so the follow + framing animations never trip this.
let _lockSnap=false;
gl.on('moveend',e=>{
  if(locMode!==2||_lockSnap||!e||!e.originalEvent||USER.lat==null) return;
  const ctr=gl.getCenter();
  if(havKm(ctr.lat,ctr.lng,USER.lat,USER.lon)<=GEO_FOLLOW_DEADBAND_KM) return;
  _lockSnap=true;
  gl.easeTo({center:[USER.lon,USER.lat],duration:200});
  gl.once('moveend',()=>{ _lockSnap=false; });

// Map padding keeps the geographic centre inside the open area left of the
// docked SITREP panel (desktop only; on mobile the panel is an overlay sheet).
let _pad=null;
function setMapPadding(){
  // the SITREP panel is docked right (360px) — keep map content centred in the
  // area to its left; on mobile the panel is an overlay sheet so no padding.
  const p=MQ_MOBILE.matches
    ? {top:0,right:0,bottom:0,left:0}
    : {top:20,left:24,right:376,bottom:24};
  if(_pad&&_pad.top===p.top&&_pad.left===p.left&&_pad.right===p.right&&_pad.bottom===p.bottom) return;
  _pad=p; gl.setPadding(p);   // only when it actually changed — avoids needless camera nudges
}
window.addEventListener('resize',()=>{ clearTimeout(window.__pad);
  window.__pad=setTimeout(setMapPadding,200); });
// Pin the centre reticle to the map's projected centre (accounts for panel
// padding on desktop and the raised map bottom on mobile). Cheap: only writes
// when the pixel actually moves.
let _chx=-1,_chy=-1;
function placeCrosshair(){
  const ch=$('#crosshair'); if(!ch) return;
  const c=gl.project(gl.getCenter());
  const x=Math.round(c.x), y=Math.round(c.y);
  if(x===_chx&&y===_chy) return;
  _chx=x; _chy=y; ch.style.left=x+'px'; ch.style.top=y+'px';

gl.on('render',placeCrosshair);
window.addEventListener('resize',placeCrosshair);

function setUserFix(lat,lon,src,meta){
  const first=USER.lat==null;
  if(!first&&src==='ip'&&USER.src==='gps') return; // never downgrade gps -> ip
  const pLat=USER.lat,pLon=USER.lon;
  USER.lat=lat; USER.lon=lon; USER.src=src;
  if(meta&&meta.tz) USER.tz=meta.tz;   // timezone drives the local-time formatting
  if(!userMarker){
    const d=el('div'); d.id='user-dot';
    userMarker=new maplibregl.Marker({element:d}).setLngLat([lon,lat]).addTo(gl);
  } else userMarker.setLngLat([lon,lat]);
  // One clean camera move. The first fix flies in from the world view; a later
  // GPS refinement of the IP guess only gently recenters, and only if it moved
  // us far — so the load isn't a stutter of two back-to-back zoom animations.
  if(first){
    // first fix: one clean animation to the 10 mi VIEW framing
    flyToRadiusMi(lat,lon,VIEW_MI);
  } else if(locMode===2){
    // FOLLOW-LOCKED: keep the crosshair on the live position at the current zoom
    // (so the whole SITREP/chart tracks where you actually are) — but only recenter
    // once you've moved beyond a DEADBAND (1), so residual GPS jitter can't fidget
    // the map. Inside the deadband the map holds; the dot still updates.
    const ctr=gl.getCenter();
    if(havKm(ctr.lat,ctr.lng,lat,lon)>GEO_FOLLOW_DEADBAND_KM){
      cancelCenterZoom();
      gl.easeTo({center:[lon,lat],duration:500});
    }
  } else if(src==='gps'&&pLat!=null&&havKm(pLat,pLon,lat,lon)>8){
    // GPS refined the IP guess by a lot (>8 km): re-frame at the precise spot.
    // Re-framing (not easeTo) so the final ZOOM is always the right one — easeTo
    // mid-fitBounds was leaving the zoom half-finished ("hung"). For small
    // corrections we leave the camera and just move the marker.
    flyToRadiusMi(lat,lon,VIEW_MI);
  }

}


// concise text, no "…" (CSS clips)
const cut=(s,n)=>escapeHtml(String(s==null?'':s).trim().slice(0,n));
