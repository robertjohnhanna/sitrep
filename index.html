<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0e14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="description" content="sitrep — keyless multi-domain OSINT dashboard: one map, every liftable public signal, auto-tuned emergency broadcast.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%A1%3C/text%3E%3C/svg%3E">
<title>sitrep — keyless OSINT + emergency broadcast</title>

<!-- ============================================================
     sitrep — self-contained OSINT map + auto emergency broadcast
     ------------------------------------------------------------
     Constraints (non-negotiable): one HTML file, no backend, no
     build step, no API keys, no npm. Opens directly in a browser.
     Vanilla JS + MapLibre GL (CDN) + satellite.js (CDN, SGP4).

     Layout: two docked, full-height, equal-width side panels —
     OBJECTS (map layers) on the left, SITREP on the right. The
     SITREP panel also auto-tunes the nearest EMERGENCY BROADCAST
     to the detected location and replays it whenever that location
     changes (no controls: radio-browser emergency/public-safety/
     weather/news pool, ranked by weighted great-circle distance).

     CORS notes (verified in browser context, not just curl):
       ACAO:* confirmed — fetch works cross-origin:
         USGS, CelesTrak, Amtrak(amtraker), NASA EONET, NOAA SWPC
         (Kp / GOES X-ray / OVATION aurora), wheretheiss.at,
         DeepStateMap, Wikipedia, RestCountries, Wikidata,
         Nominatim, adsb.lol, radio-browser
       DROPPED — require a key, violating the keyless rule:
         OpenAQ v3 (401), NASA FIRMS (MAP_KEY), APRS.fi,
         OpenSky, aisstream, Shodan, GFW, Sentinel Hub.

     Audio fact used throughout: <audio> media loading is NOT
     gated by CORS — only fetch()/XHR is. Emergency-broadcast
     streams play cross-origin without ACAO headers; browsers only
     defer autoplay until the first user gesture on the page.
     ============================================================ -->

<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/satellite.js@5.0.0/dist/satellite.min.js"></script>

<style>
  :root{
    --bg:#000000; --panel:#000000f5; --panel2:#0a0f14; --line:#1a2730;
    --ink:#d6e2ee; --ink-dim:#748596; --accent:#2fe07a; --accent2:#ff4455;
    --danger:#ff4455; --warn:#ffb454; --ok:#2fe07a; --live:#ff4455;
    --mono:"SF Mono",ui-monospace,"Cascadia Code",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --sa-t:env(safe-area-inset-top,0px); --sa-b:env(safe-area-inset-bottom,0px);
    --sa-l:env(safe-area-inset-left,0px); --sa-r:env(safe-area-inset-right,0px);
    --topbar-h:var(--sa-t);
    /* symmetric top/bottom inset so the gaps match even with a home-indicator
       safe area (which is only on the bottom) */
    --inset:calc(max(var(--sa-t),var(--sa-b)) + 8px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font-family:var(--mono);font-size:13px;overflow:hidden;
    overscroll-behavior:none;touch-action:manipulation}
  #map{position:absolute;inset:0}
  button{font-family:var(--mono);cursor:pointer}
  a{color:var(--accent)}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:#233247;border-radius:4px}
  ::-webkit-scrollbar-track{background:transparent}

  /* ---------- status badges (in SITREP header) ---------- */
  .badge{display:flex;align-items:center;gap:4px;background:var(--panel2);
    border:1px solid var(--line);padding:4px 8px;border-radius:5px;font-size:13px;
    color:var(--ink-dim);white-space:nowrap;flex:0 0 auto}
  .badge b{color:var(--ink)}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--ink-dim)}

  /* ---------- panels (desktop: docked full-height side panels / mobile: bottom sheets) ---------- */
  /* Both panels are unfloated: flush to the screen edges, full viewport height,
     identical width. OBJECTS docks left, SITREP docks right. */
  .panel{position:absolute;z-index:15;background:var(--panel);
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    display:flex;flex-direction:column;overflow:hidden}
  #layers{top:0;left:0;width:320px;bottom:0;
    padding-left:var(--sa-l);border-right:1px solid var(--line)}
  #layers-scroll{overflow-y:auto;padding:8px;-webkit-overflow-scrolling:touch;
    flex:1 1 auto;min-height:0}
  #sitrep{top:0;right:0;left:auto;width:320px;bottom:0;
    padding-right:var(--sa-r);border-left:1px solid var(--line)}
  #obj-head{flex:0 0 auto;display:flex;align-items:center;gap:8px;padding:11px 12px;
    border-bottom:1px solid var(--line);font-size:13px;letter-spacing:2px;color:var(--accent);
    font-weight:700}
  #obj-head .brand{color:var(--ink-dim);letter-spacing:.5px;font-weight:400;margin-left:auto;font-size:13px}

  .sheet-grip{display:none}
  .sec-h{font-size:13px;letter-spacing:1.2px;color:var(--ink-dim);
    text-transform:uppercase;margin:12px 2px 6px}
  .sec-h:first-child{margin-top:2px}
  .layer{display:flex;align-items:center;gap:9px;padding:7px 6px;border-radius:8px;
    min-height:36px}
  .layer:hover{background:var(--panel2)}
  .layer .sw{width:10px;height:10px;border-radius:50%;flex:0 0 auto;box-shadow:0 0 7px currentColor}
  .layer label{flex:1;cursor:pointer;user-select:none;-webkit-user-select:none}
  .layer .cnt{font-size:13px;color:var(--ink-dim);min-width:30px;text-align:right}
  .layer input{accent-color:#8a99a8;cursor:pointer;width:16px;height:16px;flex:0 0 auto}
  .layer .pic{width:20px;height:20px;flex:0 0 auto;object-fit:contain}
  .layer .pic.emj{display:flex;align-items:center;justify-content:center;font-size:15px;line-height:1}
  .layer.off{opacity:.5}
  .layer .warnflag{color:var(--warn);font-size:13px;cursor:help}
  #panel-foot{padding:9px 12px;border-top:1px solid var(--line);font-size:13px;
    color:var(--ink-dim);line-height:1.5}

  /* ---------- emergency broadcast footer (NOAA weather radio, auto-tuned) ---------- */
  #emg{padding:10px 12px calc(10px + var(--sa-b)/2);border-top:1px solid var(--line);
    background:var(--panel2);flex:0 0 auto}
  #emg-top{display:flex;align-items:center;gap:10px}
  #emg-toggle{flex:0 0 auto;width:38px;height:38px;padding:0;font-size:16px;line-height:1;
    background:var(--panel);border:1px solid var(--accent);color:var(--accent);border-radius:9px;
    display:flex;align-items:center;justify-content:center}
  #emg-toggle:active{background:var(--accent);color:#00140a}
  #emg-meta{flex:1;min-width:0}
  #emg-label{font-size:13px;letter-spacing:1.4px;color:var(--live);margin-bottom:3px;font-weight:700;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #emg-name{font-size:13px;color:var(--accent);white-space:nowrap;overflow:hidden;
    text-overflow:ellipsis;min-height:16px}
  #emg-sub{font-size:13px;color:var(--ink-dim);white-space:nowrap;overflow:hidden;
    text-overflow:ellipsis}
  #audio{display:none}

  /* ---------- popups ---------- */
  .maplibregl-popup-content{background:var(--panel);color:var(--ink);
    border:1px solid var(--line);border-radius:10px;font-family:var(--mono);
    box-shadow:0 10px 34px #000c;max-width:300px;padding:12px 14px}
  .maplibregl-popup-close-button{color:var(--ink-dim);font-size:18px;padding:2px 8px}
  .maplibregl-popup-anchor-bottom .maplibregl-popup-tip{border-top-color:#000}
  .maplibregl-popup-anchor-top .maplibregl-popup-tip{border-bottom-color:#000}
  .pop h4{margin:0 0 6px;color:var(--accent);font-size:13px}
  .pop .kv{display:flex;gap:6px;font-size:13px;margin:2px 0}
  .pop .kv span{color:var(--ink-dim);min-width:66px;flex:0 0 auto}
  .pop .sub{font-size:13px;color:var(--ink);line-height:1.45;margin-top:6px;
    max-height:120px;overflow:auto}
  .pop .lnk{margin-top:7px;font-size:13px}

  /* ---------- toasts ---------- */
  #toast{position:absolute;top:calc(var(--topbar-h) + 10px);left:50%;transform:translateX(-50%);
    z-index:25;max-width:min(320px,86vw);display:flex;flex-direction:column;gap:6px;
    align-items:center;pointer-events:none}
  .tmsg{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--accent);
    padding:8px 11px;border-radius:8px;font-size:13px;color:var(--ink);animation:sl .25s ease}
  .tmsg.err{border-left-color:var(--danger)}
  .tmsg.warn{border-left-color:var(--warn)}
  @keyframes sl{from{transform:translateY(8px);opacity:0}to{transform:none;opacity:1}}
  .spin{display:inline-block;width:9px;height:9px;border:2px solid #2a3a4d;
    border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  /* ---------- SITREP briefing panel (right side, matches OBJECTS) ---------- */
  #sit-title.warn{color:var(--danger)!important}
  #sit-title.alert{color:var(--warn)!important}
  #sit-head{display:flex;align-items:center;gap:8px;padding:11px 12px;
    border-bottom:1px solid var(--line);flex:0 0 auto;min-height:44px}
  #sit-head .title{color:var(--accent);font-size:13px;letter-spacing:2px;font-weight:700;
    flex:0 0 auto}
  #utc-badge{flex:0 0 auto}
  #sit-head .loc{margin-left:auto;color:var(--ink);font-size:13px;white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis;max-width:44%;text-align:right;flex:0 1 auto}
  /* center-on-me: floating control at the bottom-right corner of the map
     (the open area sits just left of the 320px right panel) */
  #loc-btn{position:absolute;z-index:16;right:calc(334px + var(--sa-r));bottom:16px;
    width:42px;height:42px;padding:0;font-size:20px;line-height:1;
    background:var(--panel);border:1px solid var(--accent);color:var(--accent);border-radius:9px;
    display:flex;align-items:center;justify-content:center;
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
  #loc-btn:active{background:var(--accent);color:#00140a}
  #sit-body{display:flex;flex-direction:column;align-content:start;
    overflow-y:auto;padding:4px 0;-webkit-overflow-scrolling:touch;flex:1 1 auto;min-height:0}
  .sit-row{display:flex;align-items:center;gap:9px;padding:7px 12px;font-size:13px;min-height:34px;
    border-bottom:1px solid #10171f}
  .sit-row .ic{flex:0 0 18px;text-align:center}
  .sit-row .tx{flex:1;min-width:0;line-height:1.4}
  .sit-row .tx s1{display:block;color:var(--ink)}
  .sit-row .tx s2{display:block;color:var(--ink-dim);font-size:13px}
  .sit-row .act{flex:0 0 auto;background:var(--panel2);border:1px solid var(--accent);
    color:var(--accent);border-radius:14px;padding:4px 11px;font-size:13px;cursor:pointer;
    letter-spacing:.5px;min-height:28px}
  .sit-row .act:active{background:var(--accent);color:#06231e}
  .sit-row.alert s1{color:var(--warn)}
  .sit-row.danger s1{color:var(--danger)}
  .sit-empty{padding:14px 12px;font-size:13px;color:var(--ink-dim);line-height:1.5}
  .sit-anom{grid-column:1/-1;font-size:13px;letter-spacing:1.4px;color:var(--danger);
    font-weight:700;padding:8px 12px 3px;border-top:1px solid #2a1520}
  .sit-anom:first-child{border-top:none}
  .sit-div{grid-column:1/-1;height:1px;background:var(--line);margin:5px 12px}
  /* ---- minimalist: EVERYTHING is upper-case except unit tokens (.u) ---- */
  body{text-transform:uppercase}
  .u{text-transform:none!important;letter-spacing:0;font-style:normal}
  .sit-row .tx s1{letter-spacing:.3px}

  #user-dot{width:16px;height:16px;border-radius:50%;background:var(--accent);
    border:2.5px solid #fff;box-shadow:0 0 0 0 rgba(47,224,122,.6);animation:pulse 2.2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(47,224,122,.6)}70%{box-shadow:0 0 0 16px rgba(47,224,122,0)}100%{box-shadow:0 0 0 0 rgba(47,224,122,0)}}

  /* ---------- mobile bottom navigation + sheets ---------- */
  #mnav{display:none}
  @media (max-width:1000px){
    /* map stops at the nav bar so no tiles bleed under it */
    #map{bottom:calc(54px + var(--sa-b))}
    #mnav{position:absolute;left:0;right:0;bottom:0;z-index:30;display:flex;
      height:calc(54px + var(--sa-b));padding:0 var(--sa-r) var(--sa-b) var(--sa-l);
      background:#000;border-top:1px solid var(--line)}
    #mnav button{flex:1;background:none;border:none;color:var(--ink-dim);
      font-size:13px;letter-spacing:.6px;display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:3px;min-height:44px}
    #mnav button .ic{font-size:18px;line-height:1}
    #mnav button.active{color:var(--accent)}
    /* Selected panel fills the whole screen (top safe-area down to the nav
       bar) and scrolls internally — an opaque full-height pull-up, so nothing
       bleeds behind the browser chrome and long lists scroll properly. */
    .panel{left:0!important;right:0!important;top:0!important;width:auto!important;
      bottom:calc(54px + var(--sa-b))!important;max-height:none!important;z-index:20;
      padding-top:var(--sa-t);background:var(--bg);
      backdrop-filter:none;-webkit-backdrop-filter:none;
      border-radius:0;border:none;
      transform:translateY(100%);transition:transform .28s cubic-bezier(.32,.72,.35,1);
      box-shadow:0 -12px 40px #000a}
    .panel.open{transform:translateY(0)}
    .sheet-grip{display:block;flex:0 0 auto;padding:8px 0 2px;cursor:grab}
    .sheet-grip::before{content:"";display:block;width:38px;height:4px;border-radius:2px;
      background:#2a3a4d;margin:0 auto}
    .maplibregl-ctrl-bottom-right{bottom:calc(58px + var(--sa-b))}
    /* map is full-width on mobile; keep the button above the bottom nav */
    #loc-btn{right:calc(14px + var(--sa-r));bottom:calc(54px + var(--sa-b) + 14px)}
  }
  @media (max-width:520px){
    .badge{padding:3px 6px}
  }
</style>
</head>
<body>
<div id="map"></div>

<!-- objects panel -->
<div id="layers" class="panel">
  <div class="sheet-grip" data-close="layers"></div>
  <div id="obj-head">◧ OBJECTS <span class="brand">SITREP</span></div>
  <div id="layers-scroll">
    <div class="sec-h">Aircraft</div><div id="grp-air"></div>
    <div class="sec-h">Maritime &amp; rail</div><div id="grp-surface"></div>
    <div class="sec-h">Space</div><div id="grp-space"></div>
    <div class="sec-h">Earth &amp; hazard</div><div id="grp-hazard"></div>
  </div>
  <div id="panel-foot"><span style="opacity:.6">© OpenStreetMap · CARTO</span></div>
</div>

<!-- SITREP briefing panel (right side) + auto-tuned emergency broadcast -->
<div id="sitrep" class="panel">
  <div class="sheet-grip" data-close="sitrep"></div>
  <div id="sit-head">
    <span class="title" id="sit-title">◈ SITREP</span>
    <span class="badge" id="utc-badge" title="UTC"><b id="utc">--:--</b></span>
    <span class="loc" id="sit-loc">LOCATING…</span>
  </div>
  <div id="sit-body">
    <div class="sit-empty">ACQUIRING POSITION…</div>
  </div>
  <div id="emg">
    <div id="emg-top">
      <button id="emg-toggle" title="play / pause" aria-label="play"><svg viewBox="0 0 24 24" width="17" height="17" aria-hidden="true"><path d="M8 5.5v13a1 1 0 0 0 1.52.85l10.5-6.5a1 1 0 0 0 0-1.7L9.52 4.65A1 1 0 0 0 8 5.5z" fill="currentColor"/></svg></button>
      <div id="emg-meta">
        <div id="emg-label">NOAA weather radio</div>
        <div id="emg-name">— locating nearest station —</div>
        <div id="emg-sub"></div>
      </div>
    </div>
    <audio id="audio" preload="none"></audio>
  </div>
</div>

<!-- center-on-me: floating control, bottom-right of the map -->
<button id="loc-btn" title="center map on my location" aria-label="center on my location"><svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><circle cx="12" cy="12" r="3.2" fill="currentColor"/><circle cx="12" cy="12" r="7" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M12 1.5v3.4M12 19.1v3.4M1.5 12h3.4M19.1 12h3.4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></button>

<!-- mobile bottom navigation -->
<div id="mnav">
  <button data-p="" class="active"><span class="ic">🗺</span>MAP</button>
  <button data-p="sitrep"><span class="ic">◈</span>SITREP</button>
  <button data-p="layers"><span class="ic">◧</span>OBJECTS</button>
</div>

<div id="toast"></div>

<script>
"use strict";
/* =====================================================================
   0. helpers
   ===================================================================== */
const $ = s => document.querySelector(s);
const el = (t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
function toast(msg,kind){
  const t=el('div','tmsg'+(kind?' '+kind:''),msg);
  $('#toast').appendChild(t);
  setTimeout(()=>{t.style.transition='opacity .4s';t.style.opacity='0';setTimeout(()=>t.remove(),400);},4500);
}
async function getJSON(url,opts={}){
  const c=new AbortController(); const to=setTimeout(()=>c.abort(),opts.timeout||15000);
  try{
    const r=await fetch(url,{signal:c.signal,headers:opts.headers||{}});
    if(!r.ok) throw new Error('HTTP '+r.status);
    return await r.json();
  } finally { clearTimeout(to); }
}
async function getText(url,opts={}){
  const c=new AbortController(); const to=setTimeout(()=>c.abort(),opts.timeout||20000);
  try{ const r=await fetch(url,{signal:c.signal}); if(!r.ok)throw new Error('HTTP '+r.status); return await r.text(); }
  finally{ clearTimeout(to); }
}
const fmtTime = ts => new Date(ts).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});
// great-circle distance, km
function havKm(lat1,lon1,lat2,lon2){
  const R=6371,d=Math.PI/180;
  const a=Math.sin((lat2-lat1)*d/2)**2+
    Math.cos(lat1*d)*Math.cos(lat2*d)*Math.sin((lon2-lon1)*d/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
// Imperial units. U() wraps a unit token so it stays lowercase inside
// ALL-CAPS chrome (see .u in CSS). Distances in mi/ft, temp °F, wind mph.
const U = s => `<span class="u">${s}</span>`;
const fmtMi = km => { const mi=km*0.621371;
  return mi<0.5?Math.round(mi*5280)+U(' ft'):mi<100?mi.toFixed(1)+U(' mi'):Math.round(mi)+U(' mi'); };
const cToF = c => Math.round(c*9/5+32);

// ---- ADS-B: airplanes.live primary, adsb.fi fallback (adsb.lol is down).
// Both share the readsb /v2 schema: {ac:[{hex,flight,lat,lon,alt_baro,gs,...}]}
const ADSB_HOSTS=['https://api.airplanes.live/v2','https://opendata.adsb.fi/api/v2'];
async function adsb(path){
  let err;
  for(const h of ADSB_HOSTS){
    try{ return await getJSON(h+path,{timeout:12000}); }catch(e){ err=e; }
  }
  throw err||new Error('all ADS-B hosts unreachable');
}
// Aircraft in the CURRENT MAP AREA. The CORS-open readsb mirrors cap point
// queries at 250 nm, so we tile the visible bounds with as many 250-nm cells
// as it takes (1 when zoomed in, a few for a region), merge and dedupe by hex.
// Refetched on every map move and once a minute. A budget caps the cell count
// so an extreme zoom-out samples rather than firing hundreds of requests.
async function adsbViewport(){
  const b=gl.getBounds();
  const S=b.getSouth(),N=b.getNorth(),W=b.getWest(),E=b.getEast();
  const midLat=(N+S)/2;
  const latSpan=Math.max(0.02,N-S);
  const lonSpan=Math.max(0.02,(E-W))*Math.max(0.15,Math.cos(midLat*Math.PI/180));
  const COVER=6;          // degrees a 250-nm cell usefully covers
  const MAX_CELLS=20;     // per-refresh request budget
  let rows=Math.max(1,Math.ceil(latSpan/COVER));
  let cols=Math.max(1,Math.ceil(lonSpan/COVER));
  while(rows*cols>MAX_CELLS){ (cols>=rows?cols--:rows--); }  // shrink to budget when zoomed way out
  const centers=[];
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++)
    centers.push([S+(N-S)*(r+0.5)/rows, W+(E-W)*(c+0.5)/cols]);
  const seen=new Set(), ac=[];
  const results=await Promise.allSettled(
    centers.map(([la,lo])=>adsb('/point/'+la.toFixed(3)+'/'+lo.toFixed(3)+'/250')));
  results.forEach(r=>{
    if(r.status!=='fulfilled') return;
    (r.value.ac||[]).forEach(a=>{
      const id=a.hex||a.r||(a.lat+','+a.lon);   // dedupe overlap between cells
      if(seen.has(id)) return; seen.add(id);
      ac.push(a);
    });
  });
  return {ac};
}
function acFeatures(j,kind){
  return (j.ac||[]).filter(a=>a.lat!=null&&a.lon!=null).map(a=>({
    type:'Feature',geometry:{type:'Point',coordinates:[a.lon,a.lat]},
    properties:{_kind:kind,
      flight:String(a.flight||a.r||a.hex||'?').trim(),
      type:a.t||'?',desc:a.desc||'',op:a.ownOp||'',
      alt:a.alt_baro??a.alt_geom??'?',spd:a.gs!=null?Math.round(a.gs):'?',

function nearestIn(srcId,lat,lon){
  const s=gl.getSource(srcId); if(!s||!s._data) return null;
  let best=null,bd=Infinity;
  (s._data.features||[]).forEach(f=>{
    if(!f.geometry||f.geometry.type!=='Point') return;
    const [flon,flat]=f.geometry.coordinates;
    const dkm=havKm(lat,lon,flat,flon);
    if(dkm<bd){bd=dkm;best={f,km:dkm};}
  });
  return best;
}
function countWithin(srcId,lat,lon,km){
  const s=gl.getSource(srcId); if(!s||!s._data) return 0;
  return (s._data.features||[]).filter(f=>f.geometry&&f.geometry.type==='Point'&&
    havKm(lat,lon,f.geometry.coordinates[1],f.geometry.coordinates[0])<=km).length;
}
// map-area (viewport bounds) scoped variants — SITREP reflects only what's in view
function inBounds(b,lon,lat){return lon>=b.getWest()&&lon<=b.getEast()&&lat>=b.getSouth()&&lat<=b.getNorth();}

function countView(srcId,b){return featsIn(srcId).filter(f=>f.geometry&&f.geometry.type==='Point'&&
  inBounds(b,f.geometry.coordinates[0],f.geometry.coordinates[1])).length;}
function nearView(srcId,b,lat,lon){
  let best=null,bd=Infinity;
  featsIn(srcId).forEach(f=>{ if(!f.geometry||f.geometry.type!=='Point')return;
    const [flon,flat]=f.geometry.coordinates;
    if(!inBounds(b,flon,flat))return;
    const d=havKm(lat,lon,flat,flon); if(d<bd){bd=d;best={f,km:d};}});

}
// polygon feature -> a representative [lon,lat] (first vertex), for fly-to / bounds
function polyPt(f){
  const g=f.geometry; if(!g) return null;
  if(g.type==='Point') return g.coordinates;
  if(g.type==='Polygon') return g.coordinates[0] && g.coordinates[0][0];
  if(g.type==='MultiPolygon') return g.coordinates[0] && g.coordinates[0][0] && g.coordinates[0][0][0];

}

function nwsInView(b){
  return featsIn('src-nws').filter(f=>{
    const g=f.geometry; if(!g) return false;
    const rings = g.type==='Polygon'?g.coordinates : g.type==='MultiPolygon'?g.coordinates.flat() : [];

function emojiIcon(emoji,px){
  const s=px||46, c=document.createElement('canvas'); c.width=c.height=s;
  const x=c.getContext('2d');
  x.font=Math.floor(s*0.78)+'px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji","Twemoji Mozilla",sans-serif';
  x.textAlign='center'; x.textBaseline='middle';

}
function shapeIcon(color,pts,px){
  const s=px||40, c=document.createElement('canvas'); c.width=c.height=s;
  const x=c.getContext('2d'); x.translate(s/2,s/2); const u=s/32;
  x.fillStyle=color; x.strokeStyle='rgba(3,8,14,.75)'; x.lineWidth=u*1.4;
  x.lineJoin='round'; x.beginPath();
  pts.forEach((p,i)=>{const X=p[0]*u,Y=p[1]*u; i?x.lineTo(X,Y):x.moveTo(X,Y);});
  x.closePath(); x.fill(); x.stroke();
  return x.getImageData(0,0,s,s);
}
// same silhouette as a data-URL, for the OBJECTS panel (matches the map icon)
function shapeURL(color,pts){
  const s=40,c=document.createElement('canvas');c.width=c.height=s;
  const x=c.getContext('2d');x.translate(s/2,s/2);const u=s/32;
  x.fillStyle=color;x.strokeStyle='rgba(3,8,14,.7)';x.lineWidth=u*1.3;x.lineJoin='round';
  x.beginPath();pts.forEach((p,i)=>{const X=p[0]*u,Y=p[1]*u;i?x.lineTo(X,Y):x.moveTo(X,Y);});

}

// shared: TLE text -> propagated FeatureCollection
function tleToFC(txt){
  const lines=txt.split(/\r?\n/).filter(l=>l.trim().length);
  const now=new Date(); const gmst=satellite.gstime(now);
  const feats=[];
  for(let i=0;i+2<lines.length;i+=3){
    try{
      const name=lines[i].trim();
      const rec=satellite.twoline2satrec(lines[i+1],lines[i+2]);
      const pv=satellite.propagate(rec,now); if(!pv.position) continue;
      const gd=satellite.eciToGeodetic(pv.position,gmst);
      const lon=satellite.degreesLong(gd.longitude), lat=satellite.degreesLat(gd.latitude);
      if(!isFinite(lon)||!isFinite(lat)) continue;
      feats.push({type:'Feature',geometry:{type:'Point',coordinates:[lon,lat]},
        properties:{_kind:'sat',name,alt:Math.round(gd.height)}});
    }catch(e){}
  }
  return {type:'FeatureCollection',features:feats};
}

  // GDACS — UN/EC global disaster alerts: quakes, cyclones, floods, volcanoes,
  // droughts, wildfires; colour = alert level (green/orange/red). Keyless, CORS *.
  loader: async ()=>{
    const j=await getJSON('https://www.gdacs.org/gdacsapi/api/events/geteventlist/MAP',{timeout:20000});
    const TYPE={EQ:'earthquake',TC:'cyclone',FL:'flood',VO:'volcano',DR:'drought',WF:'wildfire',TS:'tsunami'};
    const LVL={Green:'#4be08a',Orange:'#ffb454',Red:'#ff5c6c'};
    return {type:'FeatureCollection',features:(j.features||[])
      .filter(f=>f.geometry&&f.geometry.type==='Point').map(f=>{
        const p=f.properties||{};
        return {type:'Feature',geometry:f.geometry,properties:{_kind:'gdacs',
          _icon:GDACS_ICON[p.eventtype]||'ico-disaster',
          _col:LVL[p.alertlevel]||'#ffb454',
          name:p.name||TYPE[p.eventtype]||'event',type:TYPE[p.eventtype]||p.eventtype,
          level:p.alertlevel,country:p.country||'',
          sev:(p.severitydata&&p.severitydata.severitytext)||''}};
      })};
  },
  icon:'ico-disaster', iconProp:true, iconSize:0.5,
  popup:p=>`<h4>🌀 ${escapeHtml(String(p.type).toUpperCase())} — ${escapeHtml(p.level)}</h4>
    <div class="kv"><span>event</span>${escapeHtml(p.name)}</div>
    ${p.country?`<div class="kv"><span>country</span>${escapeHtml(p.country)}</div>`:''}
    ${p.sev?`<div class="kv"><span>severity</span>${escapeHtml(p.sev)}</div>`:''}
    <div class="kv"><span>src</span>GDACS (UN/EC)</div>`
});

defLayer({
  id:'launch', label:'Rocket launches', color:'#c77dff', group:'space', refresh:3600, defaultOff:true, icon:'ico-launch', iconSize:0.5,
  // upcoming orbital launches worldwide, plotted at the pad. Launch Library 2
  // (thespacedevs) — keyless, CORS *, anonymous rate-limited so we poll hourly.
  loader: async ()=>{
    const j=await getJSON('https://ll.thespacedevs.com/2.2.0/launch/upcoming/?limit=100&hide_recent_previous=true',{timeout:20000});
    return {type:'FeatureCollection',features:(j.results||[])
      .filter(r=>r.pad&&r.pad.latitude&&r.pad.longitude).map(r=>({
        type:'Feature',geometry:{type:'Point',coordinates:[+r.pad.longitude,+r.pad.latitude]},
        properties:{_kind:'launch',name:r.name,net:r.net||'',pad:(r.pad.name||''),
          prov:(r.launch_service_provider||{}).name||'',status:(r.status||{}).abbrev||''}}))};
  },
  popup:p=>`<h4>🚀 ${escapeHtml(p.name)}</h4>
    ${p.prov?`<div class="kv"><span>provider</span>${escapeHtml(p.prov)}</div>`:''}
    <div class="kv"><span>T-0 (UTC)</span>${escapeHtml(String(p.net).slice(0,16).replace('T',' '))}</div>
    <div class="kv"><span>pad</span>${escapeHtml(p.pad)}</div>
    <div class="kv"><span>status</span>${escapeHtml(p.status)}</div>`
});

defLayer({
  // THE earthquake layer (USGS 24h duplicate removed). Real-time global
  // seismicity from EMSC — dots SIZED by magnitude and COLOURED by recency,
  // so a big fresh quake reads instantly. bg-loaded for SITREP anomalies.
  id:'emsc', label:'Earthquakes (live)', color:'#ff8a5c', group:'hazard', refresh:120,
  bg:true, sized:true, colored:true,
  loader: async ()=>{
    const j=await getJSON('https://www.seismicportal.eu/fdsnws/event/1/query?limit=1000&format=json&minmag=2',{timeout:15000});
    const now=Date.now();
    (j.features||[]).forEach(f=>{ const p=f.properties||{};
      const mag=+p.mag||0, age=(now-Date.parse(p.time))/3.6e6; // hours since event
      // colour = recency (fresh → hot), but any major quake stays vivid red
      let col= age<1?'#ff2d55': age<6?'#ff6a3d': age<24?'#ffb454': age<72?'#e0c34b':'#7f8c9b';
      if(mag>=6) col='#ff2d55'; else if(mag>=5&&age<72) col='#ff6a3d';
      f.properties={_kind:'emsc',_r:2.6+mag*2.6,_col:col,mag:p.mag,age:age,
        place:p.flynn_region||p.region||'',time:p.time,depth:p.depth}; });
    return j;
  },
  popup:p=>`<h4>M ${p.mag} EARTHQUAKE</h4>
    <div class="kv"><span>region</span>${escapeHtml(p.place)}</div>
    <div class="kv"><span>depth</span>${Math.round(p.depth||0)} ${U('km')}</div>
    <div class="kv"><span>time</span>${fmtTime(p.time)}${p.age!=null?' · '+(p.age<1?Math.round(p.age*60)+U(' min'):Math.round(p.age)+U(' h'))+' ago':''}</div>
    <div class="kv"><span>src</span>EMSC (live)</div>`
});

defLayer({
  id:'water', label:'River / flood gauges', color:'#38d0ff', group:'hazard', refresh:600, icon:'ico-water', iconSize:0.42,
  // USGS live stream gauges in the current view (gauge height, ft)
  loader: async ()=>{
    const b=gl.getBounds();
    if((b.getEast()-b.getWest())>6.5||(b.getNorth()-b.getSouth())>6.5)
      return {type:'FeatureCollection',features:[]}; // USGS bbox cap — zoom in
    const bbox=[b.getWest(),b.getSouth(),b.getEast(),b.getNorth()].map(n=>n.toFixed(3)).join(',');
    const j=await getJSON(`https://waterservices.usgs.gov/nwis/iv/?format=json&bBox=${bbox}&parameterCd=00065&siteStatus=active`,{timeout:15000});
    const seen={}, feats=[];
    ((j.value&&j.value.timeSeries)||[]).forEach(ts=>{
      const g=ts.sourceInfo.geoLocation.geogLocation, id=ts.sourceInfo.siteCode&&ts.sourceInfo.siteCode[0].value;
      if(seen[id])return; seen[id]=1;
      const v=ts.values&&ts.values[0]&&ts.values[0].value&&ts.values[0].value[0];
      feats.push({type:'Feature',geometry:{type:'Point',coordinates:[+g.longitude,+g.latitude]},
        properties:{_kind:'water',name:ts.sourceInfo.siteName,level:v?v.value:'?'}});
    });
    return {type:'FeatureCollection',features:feats};
  },
  popup:p=>`<h4>💧 ${escapeHtml(p.name)}</h4>
    <div class="kv"><span>gauge</span>${escapeHtml(String(p.level))} ${U('ft')}</div>
    <div class="kv"><span>src</span>USGS water</div>`
});

defLayer({
  // NOAA / NWS active alerts, filtered to WARNINGS ONLY (not watches, advisories
  // or statements) — the US half of the worldwide warnings picture (GDACS below
  // is the global multi-hazard half). Keyless, CORS *. Polygons where present
  // (tornado / severe-thunderstorm / flash-flood / red-flag warnings carry them).
  id:'nws', label:'NWS warnings (US)', color:'#ff4455', group:'hazard', refresh:120,
  bg:true, geom:'fill', colored:true,
  loader: async ()=>{
    const j=await getJSON('https://api.weather.gov/alerts/active',{timeout:20000});
    const feats=[];
    (j.features||[]).forEach(f=>{
      const p=f.properties||{}, ev=(p.event||'').trim();
      if(!/warning$/i.test(ev)) return;   // WARNINGS only — excludes Watch/Advisory/Statement
      if(!f.geometry) return;             // needs an area polygon to draw
      feats.push({type:'Feature',geometry:f.geometry,properties:{_kind:'nws',
        event:ev,severity:p.severity||'',area:p.areaDesc||'',
        _col:/Extreme/i.test(p.severity)?'#ff2d55':/Severe/i.test(p.severity)?'#ff6a3d':'#ffb454'}});
    });
    return {type:'FeatureCollection',features:feats};
  },
  popup:p=>`<h4 style="color:var(--danger)">⚠ ${escapeHtml(String(p.event).toUpperCase())}</h4>
    ${p.severity?`<div class="kv"><span>severity</span>${escapeHtml(p.severity)}</div>`:''}
    <div class="kv"><span>area</span>${escapeHtml(String(p.area).slice(0,90))}</div>
    <div class="kv"><span>src</span>NOAA / NWS</div>`
});

defLayer({
  // SPACE WEATHER (map layer): live auroral oval — NOAA SWPC OVATION model,
  // 1° grid, cells kept where visible-aurora probability ≥ 40%. Keyless, CORS *.
  id:'aurora', label:'Aurora forecast', color:'#4be08a', group:'hazard', refresh:300, colored:true,
  loader: async ()=>{
    const j=await getJSON('https://services.swpc.noaa.gov/json/ovation_aurora_latest.json',{timeout:25000});
    const feats=[];
    (j.coordinates||[]).forEach(c=>{
      const [lon,lat,val]=c;
      if(val<40) return;
      const lon180 = lon>180 ? lon-360 : lon;
      feats.push({type:'Feature',geometry:{type:'Point',coordinates:[lon180,lat]},
        properties:{_kind:'aurora',_col:val>=80?'#b6ff7a':val>=60?'#4be08a':'#2ba86b',p:val}});
    });
    return {type:'FeatureCollection',features:feats};
  },
  popup:p=>`<h4>🌌 Aurora</h4>
    <div class="kv"><span>probability</span>${p.p}%</div>
    <div class="kv"><span>src</span>NOAA SWPC OVATION</div>`
});

/* =====================================================================
   3. LAYER RUNTIME — sources, styles, toggles, refresh loop
   ===================================================================== */
const LAYER_STATE={};
// icons grow with zoom so they read clearly world-wide and up close
const iconSize=base=>['interpolate',['linear'],['zoom'],2,base*1.4,6,base*2.2,11,base*3.2];

function ensureMapLayer(cfg){
  const sid='src-'+cfg.id;
  if(gl.getSource(sid)) return;
  gl.addSource(sid,{type:'geojson',data:{type:'FeatureCollection',features:[]}});
  if(cfg.geom==='fill'){
    const fillCol=cfg.colored?['coalesce',['get','_col'],cfg.color]:cfg.color;
    gl.addLayer({id:'ly-'+cfg.id,type:'fill',source:sid,
      paint:{'fill-color':fillCol,'fill-opacity':0.26,'fill-outline-color':fillCol}});
    gl.addLayer({id:'lyl-'+cfg.id,type:'line',source:sid,
      paint:{'line-color':fillCol,'line-width':1.4,'line-opacity':0.85}});
  }else if(cfg.icon){
    gl.addLayer({id:'ly-'+cfg.id,type:'symbol',source:sid,layout:{
      'icon-image': cfg.iconProp?['coalesce',['get','_icon'],cfg.icon]:cfg.icon,
      'icon-size': iconSize(cfg.iconSize||0.6),
      'icon-rotate': cfg.rotate?['coalesce',['get','_rot'],0]:0,
      'icon-rotation-alignment':'map','icon-pitch-alignment':'map',
      'icon-allow-overlap':true,'icon-ignore-placement':true}});
  }else{
    gl.addLayer({id:'ly-'+cfg.id,type:'circle',source:sid,
      paint:{
        'circle-radius': cfg.sized?['coalesce',['get','_r'],5]:5,
        'circle-color': cfg.colored?['coalesce',['get','_col'],cfg.color]:cfg.color,
        'circle-opacity':0.85,
        'circle-stroke-color':'#0a0e14','circle-stroke-width':1
      }});
  }
  const vis=cfg.defaultOff?'none':'visible';
  gl.setLayoutProperty('ly-'+cfg.id,'visibility',vis);
  if(gl.getLayer('lyl-'+cfg.id)) gl.setLayoutProperty('lyl-'+cfg.id,'visibility',vis);
}

async function runLayer(cfg){
  const st=LAYER_STATE[cfg.id];
  const row=$('#row-'+cfg.id);
  const cntEl=row&&row.querySelector('.cnt');
  if(cntEl && !st.retrying) cntEl.innerHTML='<span class="spin"></span>';
  // up to 3 attempts with exponential backoff before giving up this cycle
  let lastErr=null;
  for(let attempt=0;attempt<3;attempt++){
    try{
      const fc=await cfg.loader();
      const src=gl.getSource('src-'+cfg.id);
      if(src) src.setData(fc);
      st.cnt=(fc.features||[]).length;
      st.at=Date.now(); st.errored=false; st.retrying=false;
      if(cntEl) cntEl.textContent=st.cnt;
      if(row) row.title=cfg.label+' · updated '+fmtTime(st.at);
      return;
    }catch(e){
      lastErr=e;
      if(attempt<2){ st.retrying=true;
        if(cntEl) cntEl.innerHTML='<span class="spin" title="retry '+(attempt+1)+'…"></span>';
        await new Promise(r=>setTimeout(r,1200*Math.pow(3,attempt))); // 1.2s, 3.6s
      }
    }
  }
  // silent: keep whatever count we had, show a neutral dash, and keep
  // retrying on the normal refresh cycle — no error text anywhere.
  st.errored=true; st.retrying=false;
  if(cntEl) cntEl.textContent=st.cnt||'–';
  console.warn('[layer '+cfg.id+']',lastErr&&lastErr.message);
}

function scheduleLayer(cfg){
  const st=LAYER_STATE[cfg.id];
  runLayer(cfg);
  if(cfg.refresh>0){
    if(st.timer) clearInterval(st.timer);
    st.timer=setInterval(()=>{ if(st.on) runLayer(cfg); },cfg.refresh*1000);
  }
}

function buildLayerPanel(){
  const groups={air:'#grp-air',surface:'#grp-surface',space:'#grp-space',
    hazard:'#grp-hazard'};
  LAYERS.forEach(cfg=>{
    LAYER_STATE[cfg.id]={cnt:0,timer:null,on:!cfg.defaultOff,started:!cfg.defaultOff};
    ensureMapLayer(cfg);
    const row=el('div','layer'+(cfg.defaultOff?' off':''));
    row.id='row-'+cfg.id;
    row.innerHTML=`
      <input type="checkbox" id="ck-${cfg.id}" ${cfg.defaultOff?'':'checked'}>
      ${panelIconHTML(cfg)}
      <label for="ck-${cfg.id}">${cfg.label}</label>
      <span class="cnt">–</span>`;
    $(groups[cfg.group]).appendChild(row);
    row.querySelector('input').addEventListener('change',ev=>{
      const st=LAYER_STATE[cfg.id];
      st.on=ev.target.checked;
      row.classList.toggle('off',!st.on);
      const vis=st.on?'visible':'none';
      gl.setLayoutProperty('ly-'+cfg.id,'visibility',vis);
      if(gl.getLayer('lyl-'+cfg.id)) gl.setLayoutProperty('lyl-'+cfg.id,'visibility',vis);
      if(st.on&&!st.started){ st.started=true; scheduleLayer(cfg); }
    });
  });
}

/* =====================================================================
   4. CLICK POPUPS + RIGHT-CLICK / LONG-PRESS DOSSIER
      (Nominatim + RestCountries + Wikidata + Wikipedia + Open-Meteo)
   ===================================================================== */
function bindLayerPopups(){
  LAYERS.forEach(cfg=>{
    const lid='ly-'+cfg.id;
    gl.on('click',lid,e=>{
      const f=e.features[0];
      const html=cfg.popup?cfg.popup(f.properties):'';
      if(!html) return;
      new maplibregl.Popup({closeButton:true,maxWidth:'300px'})
        .setLngLat(f.geometry.type==='Point'?f.geometry.coordinates:e.lngLat)
        .setHTML('<div class="pop">'+html+'</div>').addTo(gl);
    });
    gl.on('mouseenter',lid,()=>gl.getCanvas().style.cursor='pointer');
    gl.on('mouseleave',lid,()=>gl.getCanvas().style.cursor='');
  });
}

async function openDossier(lngLat){
  const {lng,lat}=lngLat;
  const pop=new maplibregl.Popup({closeButton:true,maxWidth:'300px'})
    .setLngLat(lngLat)
    .setHTML(`<div class="pop"><h4>Dossier</h4>
      <div class="kv"><span>coords</span>${lat.toFixed(3)}, ${lng.toFixed(3)}</div>
      <div class="sub"><span class="spin"></span> resolving place, country…</div></div>`)
    .addTo(gl);
  try{
    const g=await getJSON(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}&zoom=10`,
      {headers:{'Accept-Language':'en'}});
    const a=g.address||{};
    const cc=(a.country_code||'').toUpperCase();
    const placeName=g.name||a.city||a.town||a.village||a.state||a.county||
      (g.display_name||'open ocean').split(',')[0];
    let html=`<h4>${escapeHtml(placeName)}</h4>
      <div class="kv"><span>coords</span>${lat.toFixed(3)}, ${lng.toFixed(3)}</div>`;
    if(a.country) html+=`<div class="kv"><span>country</span>${escapeHtml(a.country)}</div>`;

    const tasks=[
      getJSON('https://en.wikipedia.org/api/rest_v1/page/summary/'+
        encodeURIComponent(placeName)).then(r=>({wiki:r})).catch(()=>({}))
    ];
    if(cc){
      tasks.push(getJSON('https://restcountries.com/v3.1/alpha/'+cc).then(r=>({country:r})).catch(()=>({})));
      if(a.country) tasks.push(headOfState(a.country).then(h=>({hos:h})).catch(()=>({})));
    }
    const res=Object.assign({},...(await Promise.all(tasks)));

    if(res.country){
      const c=Array.isArray(res.country)?res.country[0]:res.country;
      if(c){
        html+=`<div class="kv"><span>capital</span>${escapeHtml((c.capital||[])[0]||'—')}</div>`;
        html+=`<div class="kv"><span>population</span>${(c.population||0).toLocaleString()}</div>`;
      }
    }
    if(res.hos) html+=`<div class="kv"><span>head of st.</span>${escapeHtml(res.hos)}</div>`;
    if(res.wiki&&res.wiki.extract) html+=`<div class="sub">${escapeHtml(res.wiki.extract.slice(0,260))}</div>`;
    if(res.wiki&&res.wiki.content_urls)
      html+=`<div class="lnk"><a target="_blank" rel="noopener" href="${res.wiki.content_urls.desktop.page}">Wikipedia ↗</a></div>`;
    pop.setHTML('<div class="pop">'+html+'</div>');
  }catch(err){
    pop.setHTML(`<div class="pop"><h4>Dossier</h4>
      <div class="kv"><span>coords</span>${lat.toFixed(3)}, ${lng.toFixed(3)}</div>
      <div class="sub" style="color:var(--danger)">lookup failed: ${escapeHtml(err.message)}</div></div>`);
  }
}
gl.on('contextmenu',e=>openDossier(e.lngLat));
// touch long-press = dossier (contextmenu isn't reliable on iOS Safari)
(function(){
  let t=null,start=null;
  const cv=gl.getCanvasContainer();
  cv.addEventListener('touchstart',e=>{
    if(e.touches.length!==1) return;
    start={x:e.touches[0].clientX,y:e.touches[0].clientY};
    t=setTimeout(()=>{
      const p=gl.unproject([start.x,start.y]);
      openDossier(p);
    },550);
  },{passive:true});
  const cancel=()=>{ if(t){clearTimeout(t);t=null;} };
  cv.addEventListener('touchmove',e=>{
    if(!start||!e.touches.length) return cancel();
    const dx=e.touches[0].clientX-start.x, dy=e.touches[0].clientY-start.y;
    if(dx*dx+dy*dy>144) cancel();
  },{passive:true});
  cv.addEventListener('touchend',cancel);
  cv.addEventListener('touchcancel',cancel);
})();

async function headOfState(countryName){
  const q=`SELECT ?hosLabel WHERE{
    ?c wdt:P31 wd:Q6256; rdfs:label "${countryName}"@en.
    ?c wdt:P35 ?hos.
    SERVICE wikibase:label{bd:serviceParam wikibase:language "en".}
  } LIMIT 1`;
  const j=await getJSON('https://query.wikidata.org/sparql?format=json&query='+encodeURIComponent(q),
    {timeout:9000});
  const b=j.results.bindings[0];
  return b?b.hosLabel.value:null;
}

/* =====================================================================
   6. UTC CLOCK + SPACE WEATHER (global Kp index, GOES X-ray flare class)
   NOAA SWPC — keyless, CORS *. Polled every 2 min; surfaced in the SITREP
   as a conditions row and, when active, as geomagnetic-storm / solar-flare
   anomalies (the auroral-oval map layer is the visual half).
   ===================================================================== */
setInterval(()=>{ $('#utc').textContent=new Date().toISOString().slice(11,16); },1000);
$('#utc').textContent=new Date().toISOString().slice(11,16);
let KP=null, XRAY=null; // latest planetary Kp + GOES X-ray flare class
async function loadKp(){
  try{
    const j=await getJSON('https://services.swpc.noaa.gov/products/noaa-planetary-k-index.json');
    let kp=null;
    for(let i=j.length-1;i>=0;i--){
      const r=j[i]; const v=Array.isArray(r)?r[1]:r.Kp;
      const n=parseFloat(v); if(isFinite(n)){kp=n;break;}
    }
    KP=kp;
  }catch(e){ KP=null; }
}
async function loadXray(){
  try{
    const j=await getJSON('https://services.swpc.noaa.gov/json/goes/primary/xray-flares-latest.json');
    const f=Array.isArray(j)?j[0]:j;
    XRAY=(f&&(f.current_class||f.max_class))||null;
  }catch(e){ XRAY=null; }
}

/* =====================================================================
   6b. LOCATION + SITREP — the "at a glance" intelligence layer
   Fix chain: ipwho.is (instant, keyless, no prompt) -> browser GPS
   refine (one prompt; denial silently keeps the IP fix). Everything
   is computed client-side; position never leaves the browser except
   as anonymous lat/lon query params to the public weather APIs.
   ===================================================================== */
let userMarker=null, sitrepTimer=null;

async function locate(){
  try{
    const j=await getJSON('https://ipwho.is/',{timeout:9000});
    if(j&&j.success!==false&&j.latitude!=null)
      setUserFix(j.latitude,j.longitude,'ip',
        {place:j.city,region:j.region,rc:j.region_code,cc:j.country_code});
  }catch(e){ console.warn('[ip-locate]',e.message); }
  if(navigator.geolocation){
    try{
      navigator.geolocation.getCurrentPosition(
        pos=>setUserFix(pos.coords.latitude,pos.coords.longitude,'gps',null),
        ()=>{},{enableHighAccuracy:true,timeout:10000,maximumAge:60000});
    }catch(e){}
  }
  if(USER.lat==null) $('#sit-loc').textContent='no fix — tap ⌖ on the map';
}
// "center on me": fly to the fix (respecting panel padding); if none yet,
// kick off IP + GPS location and prompt for precise GPS.
function centerOnMe(){
  if(USER.lat!=null){
    gl.flyTo({center:[USER.lon,USER.lat],zoom:USER.src==='gps'?11:8.5,speed:1.6});
  } else {
    toast('LOCATING…','');
    locate();
  }
  if(navigator.geolocation) try{ navigator.geolocation.getCurrentPosition(
    p=>setUserFix(p.coords.latitude,p.coords.longitude,'gps',null),()=>{},
    {enableHighAccuracy:true,timeout:10000}); }catch(e){}
}
$('#loc-btn').addEventListener('click',centerOnMe);

// Map padding keeps the geographic centre inside the open area between the
// panels (desktop only; on mobile the panels are overlay sheets).
function setMapPadding(){
  if(window.matchMedia('(max-width:900px)').matches){
    gl.setPadding({top:0,right:0,bottom:0,left:0}); return;
  }
  // both docked side panels are 320px wide — keep map content centred between them
  gl.setPadding({top:20,left:336,right:336,bottom:24});
}
window.addEventListener('resize',()=>{ clearTimeout(window.__pad);
  window.__pad=setTimeout(setMapPadding,200); });

function setUserFix(lat,lon,src,meta){
  const first=USER.lat==null;
  if(!first&&src==='ip'&&USER.src==='gps') return; // never downgrade gps -> ip
  USER.lat=lat; USER.lon=lon; USER.src=src;
  if(meta){USER.place=meta.place||'';USER.region=meta.region||'';
    USER.rc=meta.rc||'';USER.cc=meta.cc||'';}
  if(!userMarker){
    const d=el('div'); d.id='user-dot';
    userMarker=new maplibregl.Marker({element:d}).setLngLat([lon,lat]).addTo(gl);
  } else userMarker.setLngLat([lon,lat]);
  gl.flyTo({center:[lon,lat],zoom:src==='gps'?9.5:7.5,speed:1.5});
  $('#sit-loc').textContent=(USER.place?USER.place+', ':'')+
    (USER.rc||USER.region||USER.cc||lat.toFixed(2)+', '+lon.toFixed(2))+
    ' · '+src.toUpperCase();
  if(src==='gps'&&!meta) reverseFill();
  // (re)tune the nearest emergency broadcast every time the location changes
  emergencyTune(lat,lon);
  sitrepTick();
}

async function reverseFill(){
  try{
    const g=await getJSON(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${USER.lat}&lon=${USER.lon}&zoom=10`,
      {headers:{'Accept-Language':'en'}});
    const a=g.address||{};
    USER.place=a.city||a.town||a.village||a.county||g.name||'';
    USER.region=a.state||''; USER.cc=(a.country_code||'').toUpperCase();
    $('#sit-loc').textContent=(USER.place?USER.place+', ':'')+
      (USER.region||USER.cc)+' · GPS';
  }catch(e){}
}

let sitrepGen=0;
async function sitrepTick(){
  // SITREP reflects the CURRENT MAP AREA (viewport bounds), not just the user.
  const myGen=++sitrepGen;
  const c=gl.getCenter(), b=gl.getBounds();
  const lat=c.lat, lon=c.lng;
  const rows=[];
  const row=(cls,ic,l1,l2,act)=>rows.push(
    `<div class="sit-row${cls?' '+cls:''}"><span class="ic">${ic}</span>`+
    `<span class="tx"><s1>${l1}</s1>${l2?`<s2>${l2}</s2>`:''}</span>${act||''}</div>`);
  const flyBtn=f=>`<button class="act" data-act="fly" data-ll="${f.geometry.coordinates.slice(0,2).join(',')}">VIEW</button>`;
  const polyFlyBtn=f=>{const p=polyPt(f);return p?`<button class="act" data-act="fly" data-ll="${p[0]+','+p[1]}">VIEW</button>`:'';};

  // -- ANOMALIES in view (+ global space weather). No header line: the
  //    "SITREP" title in the bar turns red when anything is flagged. --
  const anom=[];
  const sosN=countView('src-sos',b);
  if(sosN){ const n=nearView('src-sos',b,lat,lon);
    anom.push(['danger','🚨','AIRCRAFT EMERGENCY',sosN+' squawking 7500/7600/7700'+(n?' · '+fmtMi(n.km):''),n?flyBtn(n.f):'']); }
  const gRed=featsIn('src-gdacs').filter(f=>inBounds(b,f.geometry.coordinates[0],f.geometry.coordinates[1])&&(f.properties.level==='Red'||f.properties.level==='Orange'));
  if(gRed.length){ const nr=nearView('src-gdacs',b,lat,lon);
    anom.push([gRed.some(f=>f.properties.level==='Red')?'danger':'alert','🌀','DISASTER ALERT',gRed.length+' red/orange in view'+(nr?' · '+fmtMi(nr.km):''),nr?flyBtn(nr.f):'']); }
  const nws=nwsInView(b);
  if(nws.length){ const ex=nws.some(f=>/Extreme/i.test(f.properties.severity));
    const top=nws.slice().sort((x,y)=>({Extreme:3,Severe:2}[y.properties.severity]||1)-({Extreme:3,Severe:2}[x.properties.severity]||1))[0];
    anom.push([ex?'danger':'alert','⚠','WEATHER WARNING',nws.length+' NWS warning'+(nws.length>1?'s':'')+' in view · '+escapeHtml(String(top.properties.event)),polyFlyBtn(top)]); }
  const bigQ=featsIn('src-emsc').filter(f=>inBounds(b,f.geometry.coordinates[0],f.geometry.coordinates[1])&&(+f.properties.mag)>=5).sort((x,y)=>y.properties.mag-x.properties.mag)[0];
  if(bigQ) anom.push(['danger','🌍','MAJOR EARTHQUAKE','M'+bigQ.properties.mag+' · '+escapeHtml(String(bigQ.properties.place||'').slice(0,42)),flyBtn(bigQ)]);
  // space weather (global, not view-scoped): geomagnetic storm + solar flare
  if(KP!=null&&KP>=5) anom.push(['alert','🧲','GEOMAGNETIC STORM','Kp '+KP+' — HF / GPS / grid impact possible','']);
  if(XRAY&&/^[MX]/.test(XRAY)) anom.push([/^X/.test(XRAY)?'danger':'alert','☀','SOLAR FLARE '+XRAY,'HF radio blackout risk','']);
  // title severity: 0 none · 1 alert (amber) · 2 warning (red)
  let titleSev=0;
  anom.forEach(a=>{ titleSev=Math.max(titleSev,a[0]==='danger'?2:1); row(a[0],a[1],a[2],a[3],a[4]); });

  if(myGen!==sitrepGen) return; // a newer tick superseded this one — don't clobber
  const t=$('#sit-title');
  t.classList.remove('warn','alert');
  if(titleSev>=2) t.classList.add('warn'); else if(titleSev>=1) t.classList.add('alert');

  // -- global space weather conditions (always shown) --
  row(KP!=null&&KP>=5?'alert':'','🛰','SPACE WEATHER',
    'Kp '+(KP!=null?KP:'–')+' · SOLAR '+(XRAY||'–'));

  // -- everything else scoped to the map area (nearest-in-view) --
  const acN=countView('src-nearair',b);
  if(acN){ const nn=nearView('src-nearair',b,lat,lon);
    row('','✈',acN+' AIRCRAFT IN VIEW',
      nn?('closest '+escapeHtml(nn.f.properties.flight)+' · '+fmtMi(nn.km)+' · '+nn.f.properties.alt+U(' ft')):'',
      nn?flyBtn(nn.f):''); }
  const milN=countView('src-mil',b);
  if(milN){ const nm=nearView('src-mil',b,lat,lon);
    row('alert','🎖',milN+' MILITARY AIRCRAFT IN VIEW',
      nm?('closest '+escapeHtml(nm.f.properties.flight)+' · '+fmtMi(nm.km)):'', nm?flyBtn(nm.f):''); }
  const nq=nearView('src-emsc',b,lat,lon);
  if(nq) row('','🌍','M'+nq.f.properties.mag+' EARTHQUAKE · '+fmtMi(nq.km),
    escapeHtml(String(nq.f.properties.place||''))+' · '+fmtTime(nq.f.properties.time),flyBtn(nq.f));
  const ne=nearView('src-eonet',b,lat,lon);
  if(ne) row('','🔥',(ne.f.properties.cat||'EVENT').toUpperCase()+' · '+fmtMi(ne.km),
    escapeHtml(String(ne.f.properties.title||'').slice(0,56)),flyBtn(ne.f));
  const nd=nearView('src-gdacs',b,lat,lon);
  if(nd&&!gRed.includes(nd.f)) row('','🌀',(nd.f.properties.type||'DISASTER').toUpperCase()+' · '+fmtMi(nd.km),
    escapeHtml(String(nd.f.properties.name||'').slice(0,56)),flyBtn(nd.f));

  $('#sit-body').innerHTML=rows.length?rows.join(''):
    '<div class="sit-empty">NO SIGNALS IN THIS AREA — PAN OR ZOOM THE MAP</div>';
}

// SITREP action chips
$('#sit-body').addEventListener('click',e=>{

/* =====================================================================
   7. EMERGENCY BROADCAST — NOAA WEATHER RADIO, auto-tuned (THE CORE FEATURE)
   The nearest NOAA Weather Radio (NWR All Hazards) station to the DETECTED
   location plays automatically and re-tunes whenever that location changes;
   a ▶/⏸ button lets you stop/start it. NWR is US-only. radio-browser.info is
   the keyless, CORS-* index — it carries ~18 streamable NWR feeds, ~6 with
   coordinates and the rest with a city/state in the name, so we geolocate the
   rest to a US state centroid. <audio> media loading isn't CORS-gated, so the
   stream plays cross-origin without ACAO headers.
   ===================================================================== */
const audio=$('#audio');
// mirror servers — one dead host never stops the retune
const RB_HOSTS=['https://de1.api.radio-browser.info','https://nl1.api.radio-browser.info',
  'https://at1.api.radio-browser.info'];
// radio-browser searches that surface NWR feeds; matched names must look NWR
const NWR_TERMS=['name=noaa','name=weather%20radio','tag=weather%20radio','tag=noaa','name=nwr'];
const NWR_RE=/noaa|weather radio|nwr/i;
// state-centroid geolocation for NWR feeds that lack coordinates
const US_STATES=[
 ['AL','ALABAMA',32.8,-86.8],['AK','ALASKA',64.0,-152.0],['AZ','ARIZONA',34.3,-111.7],
 ['AR','ARKANSAS',34.9,-92.4],['CA','CALIFORNIA',37.2,-119.3],['CO','COLORADO',39.0,-105.5],
 ['CT','CONNECTICUT',41.6,-72.7],['DE','DELAWARE',39.0,-75.5],['FL','FLORIDA',28.6,-82.4],
 ['GA','GEORGIA',32.6,-83.4],['HI','HAWAII',20.3,-156.4],['ID','IDAHO',44.4,-114.6],
 ['IL','ILLINOIS',40.0,-89.2],['IN','INDIANA',39.9,-86.3],['IA','IOWA',42.0,-93.5],
 ['KS','KANSAS',38.5,-98.4],['KY','KENTUCKY',37.5,-85.3],['LA','LOUISIANA',31.0,-92.0],
 ['ME','MAINE',45.4,-69.2],['MD','MARYLAND',39.0,-76.8],['MA','MASSACHUSETTS',42.3,-71.8],
 ['MI','MICHIGAN',44.3,-85.4],['MN','MINNESOTA',46.3,-94.3],['MS','MISSISSIPPI',32.7,-89.7],
 ['MO','MISSOURI',38.4,-92.5],['MT','MONTANA',47.0,-109.6],['NE','NEBRASKA',41.5,-99.8],
 ['NV','NEVADA',39.3,-116.6],['NH','NEW HAMPSHIRE',43.7,-71.6],['NJ','NEW JERSEY',40.2,-74.7],
 ['NM','NEW MEXICO',34.4,-106.1],['NY','NEW YORK',42.9,-75.5],['NC','NORTH CAROLINA',35.5,-79.4],
 ['ND','NORTH DAKOTA',47.5,-100.5],['OH','OHIO',40.3,-82.8],['OK','OKLAHOMA',35.6,-97.5],
 ['OR','OREGON',43.9,-120.6],['PA','PENNSYLVANIA',40.9,-77.8],['RI','RHODE ISLAND',41.7,-71.5],
 ['SC','SOUTH CAROLINA',33.9,-80.9],['SD','SOUTH DAKOTA',44.4,-100.2],['TN','TENNESSEE',35.9,-86.4],
 ['TX','TEXAS',31.5,-99.3],['UT','UTAH',39.3,-111.7],['VT','VERMONT',44.1,-72.7],
 ['VA','VIRGINIA',37.5,-78.9],['WA','WASHINGTON',47.4,-120.5],['WV','WEST VIRGINIA',38.6,-80.6],
 ['WI','WISCONSIN',44.6,-89.9],['WY','WYOMING',43.0,-107.6],['DC','WASHINGTON DC',38.9,-77.0]];
const CITY_HINT=[['ATL',33.75,-84.39],['NEW YORK CITY',40.71,-74.0],['STILLWATER',36.12,-97.06]];
function geocodeNWR(name){
  const up=name.toUpperCase();
  for(const [k,la,lo] of CITY_HINT) if(up.includes(k)) return [la,lo];
  let m=up.match(/,\s*([A-Z]{2})\b/);
  if(m){ const st=US_STATES.find(s=>s[0]===m[1]); if(st) return [st[2],st[3]]; }
  for(const s of US_STATES) if(up.includes(s[1])) return [s[2],s[3]];
  m=up.match(/\b([A-Z]{2})\b/);
  if(m){ const st=US_STATES.find(s=>s[0]===m[1]); if(st) return [st[2],st[3]]; }
  return null;
}
let emgPool=null;         // NWR station pool (fetched once, cached when non-empty)
let emgPoolPromise=null;  // shared in-flight fetch so concurrent callers wait as one
let emgCur=null;          // stationuuid currently tuned
// Starts PAUSED: the nearest station is tuned in the background but nothing
// plays until the user hits ▶ (no surprise autoplay on load).
let emgPaused=true;       // user intent from the play/pause button
// crisp centred play / pause glyphs (SVG, not emoji) for the toggle button
const ICON_PLAY='<svg viewBox="0 0 24 24" width="17" height="17" aria-hidden="true"><path d="M8 5.5v13a1 1 0 0 0 1.52.85l10.5-6.5a1 1 0 0 0 0-1.7L9.52 4.65A1 1 0 0 0 8 5.5z" fill="currentColor"/></svg>';
const ICON_PAUSE='<svg viewBox="0 0 24 24" width="17" height="17" aria-hidden="true"><rect x="6.5" y="5" width="4" height="14" rx="1.2" fill="currentColor"/><rect x="13.5" y="5" width="4" height="14" rx="1.2" fill="currentColor"/></svg>';
function setEmgIcon(playing){
  const b=$('#emg-toggle');
  b.innerHTML=playing?ICON_PAUSE:ICON_PLAY;
  b.setAttribute('aria-label',playing?'pause':'play');
}

async function rbGet(path){
  let err;
  for(const h of RB_HOSTS){
    try{ return await getJSON(h+path,{timeout:15000}); }catch(e){ err=e; }
  }
  throw err||new Error('radio-browser unreachable');
}
function loadEmgPool(){
  if(emgPool) return Promise.resolve(emgPool);
  if(emgPoolPromise) return emgPoolPromise;
  emgPoolPromise=(async()=>{
    const byId={};
    const results=await Promise.allSettled(NWR_TERMS.map(t=>
      rbGet('/json/stations/search?'+t+'&hidebroken=true&limit=800')));
    results.forEach(r=>{
      if(r.status!=='fulfilled'||!Array.isArray(r.value)) return;
      r.value.forEach(s=>{
        const name=(s.name||'').trim(), url=s.url_resolved||s.url;
        if(!url||!NWR_RE.test(name)||byId[s.stationuuid]) return; // NOAA/NWR only
        let lat=+s.geo_lat, lon=+s.geo_long;
        if(!isFinite(lat)||!isFinite(lon)){ const g=geocodeNWR(name); if(!g) return; lat=g[0]; lon=g[1]; }
        byId[s.stationuuid]={id:s.stationuuid,name,url,lat,lon};
      });
    });
    const pool=Object.values(byId);
    if(pool.length){ emgPool=pool; }
    else { emgPoolPromise=null; }   // nothing came back — allow a later retry
    return pool;
  })();
  return emgPoolPromise;
}

// Pick + play the nearest NOAA Weather Radio station to (lat,lon). Called on
// every location change; if the winner is already tuned it's left playing.
async function emergencyTune(lat,lon){
  if(lat==null||lon==null) return;
  const pool=await loadEmgPool();
  if(!pool||!pool.length){
    $('#emg-name').textContent='no NOAA station found';
    setTimeout(()=>{ emgPoolPromise=null; if(USER.lat!=null) emergencyTune(USER.lat,USER.lon); },30000);
    return;
  }
  let best=null,bd=Infinity;
  pool.forEach(s=>{ const d=havKm(lat,lon,s.lat,s.lon); if(d<bd){bd=d;best={s,km:d};} });
  if(!best) return;
  updateEmgLabel(best);
  if(best.s.id===emgCur) return;                   // already on the nearest — keep playing
  emgCur=best.s.id;
  playEmergency(best.s);
}
function updateEmgLabel(best){
  $('#emg-name').textContent=best.s.name;
  $('#emg-sub').innerHTML=fmtMi(best.km)+' away';   // fmtMi keeps units in .u (lowercase)
}
function playEmergency(s){
  audio.src=s.url;
  if(!emgPaused){ const p=audio.play(); if(p&&p.catch) p.catch(()=>{}); setEmgIcon(true); }
}
// play / pause control
function setEmgPaused(p){
  emgPaused=p; setEmgIcon(!p);
  if(p){ try{audio.pause();}catch(e){} }
  else { const q=audio.play(); if(q&&q.catch) q.catch(()=>{}); }
}
$('#emg-toggle').addEventListener('click',()=>setEmgPaused(!emgPaused));
// Live streams don't "end"; on a stream error, drop that station and retune to
// the next-nearest so a dead feed never leaves the board silent.
let emgErrTs=0;
audio.addEventListener('error',()=>{
  if(!emgCur) return;
  const now=Date.now(); if(now-emgErrTs<4000) return; emgErrTs=now;
  if(emgPool) emgPool=emgPool.filter(s=>s.id!==emgCur);
  emgCur=null;
  if(USER.lat!=null) emergencyTune(USER.lat,USER.lon);
});
// Browsers defer autoplay until the page sees a user gesture — resume on the
// first one (unless the user has explicitly paused).
['pointerdown','touchstart','keydown'].forEach(ev=>
  window.addEventListener(ev,()=>{
    if(!emgPaused&&emgCur&&audio.paused){ const p=audio.play(); if(p&&p.catch) p.catch(()=>{}); }
  },{passive:true}));

// Viewport-scoped feeds refetch for the new area whenever the visible bounds
// change — on every map move AND on every container resize. A resize (window,
// panel, orientation, sheet) enlarges the view without a pan, so without this
// the newly-revealed area kept its stale aircraft until the next 60s refresh.
let moveDebounce=null, lastGeoC=null;
function refreshViewport(withLabel){
  clearTimeout(moveDebounce);
  moveDebounce=setTimeout(()=>{
    ['nearair','water'].forEach(id=>{
      const st=LAYER_STATE[id];
      if(st&&st.on&&st.started) runLayer(LAYERS.find(l=>l.id===id));
    });
    sitrepTick();
    if(withLabel) updateAreaLabel();
  },500);
}
gl.on('moveend',()=>refreshViewport(true));
// container resize doesn't reliably fire moveend, so refetch here too
gl.on('resize',()=>refreshViewport(false));
// the location chip follows the MAP CENTRE (reverse-geocoded), so panning
// updates both the label and the SITREP for wherever you're looking
async function updateAreaLabel(){
  const c=gl.getCenter();
  if(lastGeoC && havKm(lastGeoC.lat,lastGeoC.lng,c.lat,c.lng)<8) return; // moved <8 km
  lastGeoC={lat:c.lat,lng:c.lng};
  try{
    const g=await getJSON(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${c.lat.toFixed(3)}&lon=${c.lng.toFixed(3)}&zoom=8`,
      {headers:{'Accept-Language':'en'}});
    const a=g.address||{};
    const place=a.city||a.town||a.village||a.county||a.state||g.name||'';
    const cc=(a.country_code||'').toUpperCase();
    $('#sit-loc').textContent=(place?place+', ':'')+(a.country?(cc||a.country):(c.lat.toFixed(1)+', '+c.lng.toFixed(1)));
  }catch(e){ $('#sit-loc').textContent=c.lat.toFixed(2)+', '+c.lng.toFixed(2); }
}

// mobile: MAP / LAYERS / RADIO bottom nav toggles the panels as sheets
const mnavBtns=document.querySelectorAll('#mnav button');
function openSheet(which){
  ['layers','sitrep'].forEach(id=>$('#'+id).classList.toggle('open',id===which));
  mnavBtns.forEach(b=>b.classList.toggle('active',b.dataset.p===which));
}
mnavBtns.forEach(b=>b.addEventListener('click',()=>openSheet(b.dataset.p)));
document.querySelectorAll('.sheet-grip').forEach(gr=>
  gr.addEventListener('click',()=>openSheet('')));
// tapping the map closes any open sheet (mobile only; harmless on desktop)
gl.on('dragstart',()=>{ if(window.matchMedia('(max-width:900px)').matches) openSheet(''); });

gl.on('load',()=>{
  registerIcons();

  LAYERS.forEach(cfg=>{ if(!cfg.defaultOff) scheduleLayer(cfg); });
