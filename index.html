];
// features of a category within RANGE (rKm) of the crosshair — the SITREP lists
// only what's inside the range ring, not the whole visible map. A point counts
// when it's within the radius; a polygon (warning / airspace / park) counts when
// the crosshair sits inside it OR its nearest EDGE point falls within the radius
// (true edge distance — a vertex-only test misses polygons whose long edges pass
// close by, and it's the same edge distance the card displays).
function catItems(cfg,lat,lon,rKm){
  let items=featsIn(cfg.src); if(cfg.filter) items=items.filter(cfg.filter);
  return items.filter(f=>{
    const g=f.geometry; if(!g) return false;
    if(g.type==='Point') return havKm(lat,lon,g.coordinates[1],g.coordinates[0])<=rKm;
    if(pointInFeature(f,lon,lat)) return true;
    const ne=nearestEdge(f,lon,lat);
    return !!ne&&ne.km<=rKm;
  });
}
// Every plane within rKm of (lat,lon) with a usable numeric altitude, DEDUPED
// by hex across the three aircraft feeds (an emergency squawker also appears in
// the civil feed; a military one in the mil feed). ONE shared collector so the
// SITREP's LOW AIRCRAFT card and the chart's TRFC cells always agree.
function planesNear(lat,lon,rKm){
  const out=[], seen=new Set();
  ['sos','nearair','mil'].forEach(id=>featsIn(id).forEach(f=>{
    const p=f.properties;
    const alt=+p.alt; if(!isFinite(alt)) return;   // 'ground'/'?' → not airborne data
    const g=f.geometry&&f.geometry.coordinates; if(!g) return;
    const km=havKm(lat,lon,g[1],g[0]); if(km>rKm) return;
    const hx=acKey(p);
    if(hx){ if(seen.has(hx)) return; seen.add(hx); }
    out.push({f,km,alt,pt:g});
  }));
  return out;
}
// Best-estimate MSL altitude [ft] for a plane: ADS-B barometric altitude is
// PRESSURE altitude (29.92"/1013.25 hPa reference), so on a non-standard-pressure
// day it's off true MSL by ~27.3 ft per hPa. When the local sea-level pressure is
// known we correct it; otherwise (or when the plane only reports geometric
// altitude, which is already ~MSL) we use the raw value.
const FT_PER_HPA=27.3, ISA_MSL_HPA=1013.25;
function planeMslFt(a){
  const baro=a.f.properties.altBaro;
  if(baro!=null && QNH_HPA!=null) return baro+(QNH_HPA-ISA_MSL_HPA)*FT_PER_HPA;
  return a.alt;
}
// Ground elevation to use for a plane's AGL: the terrain under the PLANE, falling
// back to the crosshair cell (usually already cached), then null (unknown).
function planeGroundFt(a,crossGround){
  const g=groundElevFt(a.pt[1],a.pt[0]);
  return g!=null?g:crossGround;
}
// {ground, agl} for a plane. ground null → AGL is the raw MSL (fails toward NOT
// flagging over unknown high terrain; retried once the elevation lands).
function planeAglFt(a,crossGround){
  const ground=planeGroundFt(a,crossGround);
  return {ground, agl: ground==null?planeMslFt(a):planeMslFt(a)-ground};
}
// Only planes plausibly LOW need their own terrain lookup — a cruiser at FL350
// can't breach 1,000 ft AGL over any US terrain, so skip its elevation cell.
// (WARN_AGL_FT + the highest US terrain, generous margin.)
const AGL_CAND_MAX_FT=16000;

function sitrepTick(){
  // SITREP reflects what's inside the RED RANGE RING (RED_MI around the crosshair),
  // not the whole visible map — the same radius the flyability check sweeps.
  // Fully synchronous: reads only already-loaded layer/chart state.
  const c=gl.getCenter();
  const lat=c.lat, lon=c.lng, rangeKm=RED_MI*MI_TO_KM;
  // Aircraft are TRACKED further out than everything else in the SITREP — to the
  // 5 mi GREY ring (GREY_MI; the grey dotted ring marks it) — so you see traffic
  // approaching. A low plane in the grey ring gets an AMBER low-aircraft heads-up
  // card; a low plane inside the red range ring escalates to the RED flashing LOW
  // AIRCRAFT alert (below). Everything else in the SITREP stays inside the red ring.
  const warnKm=GREY_MI*MI_TO_KM;
  SOS_HEX=new Set(featsIn('sos').map(f=>f.properties.hex).filter(Boolean));
  const rows=[];
  // Every row is 3 lines (l1/l2/l3). The WHOLE card is the click target — the
  // action (fly-to / open) rides as data-* on the row, so tapping anywhere on a
  // plane card flies to the plane, an outlook card opens SPC, etc. A row with no
  // valid action gets no data-* and isn't clickable.
  // flash: extra-alert headline (a breaching aircraft) → the .s1 flashes red/white
  // col: an explicit headline colour (airspace cards use their polygon colour) —
  // an inline style so it wins over the cls (alert/danger) colour; sanitised to a
  // bare hex so it can't break out of the attribute.
  const row=(cls,ic,l1,l2,l3,act,flash,col)=>rows.push(
    `<div class="sit-row${cls?' '+cls:''}${flash?' acflash':''}${act?' clickable':''}"${act?' '+act:''}><span class="ic">${ic}</span>`+
    `<span class="tx"><span class="s1"${col?` style="color:${col}"`:''}>${l1||''}</span><span class="s2">${l2||''}</span><span class="s3">${l3||''}</span></span></div>`);
  const llBtn=(lo,la)=>isFinite(lo)&&isFinite(la)?`data-act="fly" data-ll="${lo+','+la}"`:'';
  const openBtn=url=>`data-act="open" data-url="${escapeHtml(url)}"`;
  // Distance + direction are measured from the CROSSHAIR (map centre) — the
  // location chip already reverse-geocodes it, so the whole panel describes the
  // point you're looking at. It sits on you by default and after the ME button.
  const dirMi=(la,lo)=>compass(bearing(lat,lon,la,lo))+' '+fmtMi(havKm(lat,lon,la,lo));
  const SWPC='https://www.swpc.noaa.gov/', SPCU='https://www.spc.noaa.gov/products/outlook/day1otlk.html';

  const cards=[];   // [cls, icon, l1, l2, l3, action, hazard]

  // -- LOW AIRCRAFT (two-tier): a plane (civil / military / emergency) under the
  //    WARN_AGL_FT (400 ft ceiling + FAA_SEP_FT) warning altitude. Where it is
  //    decides the tier: inside the RED range ring → the RED flashing LOW AIRCRAFT
  //    alert; out in the 5 mi GREY ring → an AMBER low-aircraft heads-up. Rather
  //    than a separate pinned card, the plane's OWN card (below) transforms into
  //    the alert while it's low, and reverts to the normal plane card when it climbs
  //    out / leaves — always exactly ONE card per plane. planesNear() is the SAME
  //    deduped collector that drives the chart's TRFC cells, so card, chart and halo
  //    always agree. AGL = QNH-corrected MSL altitude (planeMslFt) − ground elevation
  //    UNDER THE PLANE (planeAglFt; cached, keyless Open-Meteo, crosshair fallback).
  //    breachInfo maps a plane's hex/callsign → {label, inRange}; the item loop
  //    reads it. Ground aircraft (alt='ground'/'?') skip. --
  const acGround=groundElevFt(lat,lon);          // ft AMSL at crosshair, null until fetched
  // Scan for low traffic across the whole GREY ring (5 mi) — a low plane out there
  // gets the amber heads-up, and one inside the red range ring gets the red alert.
  const near=planesNear(lat,lon,warnKm);
  // pull terrain under the crosshair + every plausibly-low plane in one batch
  ensureGroundElev([[lat,lon],...near.filter(a=>a.alt<AGL_CAND_MAX_FT).map(a=>[a.pt[1],a.pt[0]])]);
  const lowAc=near
    .map(a=>{ const {ground,agl}=planeAglFt(a,acGround); return {...a,ground,agl}; })
    .filter(a=>a.agl<WARN_AGL_FT);
  const breachInfo=new Map();   // acKey → {label:'254 ft AGL'/'254 ft', inRange:bool}
  const redBreach=[];           // low + inside the red range ring → flashing alert + halo
  lowAc.forEach(a=>{
    const inRange=havKm(lat,lon,a.pt[1],a.pt[0])<=rangeKm;
    breachInfo.set(acKey(a.f.properties),{
      label:Math.max(0,Math.round(a.agl))+U(' ft')+(a.ground==null?'':' AGL'),
      inRange});
    if(inRange) redBreach.push(a);
  });
  const acFlash=redBreach.length>0;   // title flashes only for an in-range red breach
  // pulsing map halo(s) at the RED breaching aircraft only (empty = cleared)
  setAcAlert(redBreach.map(a=>({type:'Feature',
    geometry:{type:'Point',coordinates:a.pt},properties:{}})));

  // -- FAA CEILING (pinned): surfaces the chart's OWN airspace gate directly.
  //    The chart caps/grounds on the FAA LAANC UASFM grid + defense TFRs
  //    (getAirspace → FLY.detail.aspCapFt), whose 0-ft cells follow approach
  //    corridors and don't match the drawn Class-airspace bubbles. So the chart
  //    can be FAA-grounded with no charted-airspace card in range. This card
  //    reads the SAME aspCapFt the chart's FAA column reads, so the two can
  //    never disagree: red no-fly when it grounds, amber when it caps < 400 ft.
  //    (Unknown → no card; the NOW header + title already amber "unverified".) --
  const faaCap=(FLY.detail&&!FLY.detail.aspUnknown)?FLY.detail.aspCapFt:null;
  if(faaCap!=null && faaCap<SPEC.regFt){
    const rangeTxt='within '+RNG.mi.toFixed(1)+U(' mi');
    if(faaCap<0) cards.push(['danger','⛔','FAA NO-FLY','LAANC grid · 0 ft ceiling',
      rangeTxt,openBtn(faaMapUrl(lat,lon)),true]);
    else cards.push(['alert','🛑','FAA CEILING '+faaCap+U(' ft'),'LAANC grid',
      rangeTxt,openBtn(faaMapUrl(lat,lon)),true]);
  }

  // The weather card (built below) folds every weather GATE — precipitation,
  // gusts, winds aloft, low visibility, low cloud — into itself: there's one
  // weather feed, so one card. No separate "WX WARNING" duplicating it.
  const wn=FLY.detail&&FLY.detail.wxNow;

  // -- SPACE WEATHER (pinned): a geomagnetic Kp storm degrades the GPS/compass a
  //    drone relies on. Right-sized to actual drone impact (NOAA flags GPS
  //    degradation only at G3): RED grounding at Kp ≥ kpGnd (G3+, nav unreliable),
  //    AMBER caution at Kp ≥ kpCaut (G1–G2, accuracy may drop but flyable). Reads
  //    the SAME kpNow the chart's KP gate uses (the finalized OBSERVED value for
  //    NOW), so card and chart can't disagree. Quiet/unknown Kp → no card. --
  const kpNow=FLY.detail?FLY.detail.kpNow:null;
  if(kpNow!=null && kpNow>=SPEC.kpGnd){
    cards.push(['danger','🧲','SPACE WEATHER','Kp '+Math.round(kpNow)+' · geomagnetic storm',
      'GPS / compass unreliable',openBtn(SWPC),true]);
  }else if(kpNow!=null && kpNow>=SPEC.kpCaut){
    cards.push(['alert','🧲','SPACE WEATHER','Kp '+Math.round(kpNow)+' · geomagnetic storm',
      'GPS accuracy may be reduced',openBtn(SWPC),true]);
  }

  // -- DATA HEALTH (pinned): the flyability gates fail OPEN — an unverifiable feed
  //    keeps its last-good value and only ambers the NOW header quietly. This card
  //    surfaces that explicitly (and touch-accessibly, unlike the hover tooltip)
  //    once a feed has been stale past the grace window. WEATHER is excluded here
  //    — its health rides the weather card itself (no duplicate card for the same
  //    feed) — so this covers FAA airspace / Kp / radar only. Amber; tap to force
  //    a refresh; clears the moment every feed is fresh. --
  const unstable=flyUnknownStable();
  const wxStale=unstable.includes('weather');
  const dataBad=unstable.filter(x=>x!=='weather');
  if(dataBad.length){
    cards.push(['alert','📡','DATA UNVERIFIED',cut(dataBad.join(' · '),30),
      'tap to retry','data-act="refresh"',true]);
  }
  // weather-feed health for the weather card: down = never loaded (red, chart
  // blind), stale = failing but last-good conditions still show (amber)
  const wxState=wxStale?(FLY.data?'stale':'down'):'ok';
  // Build THE weather card now: if a weather gate is limiting the NOW column (or
  // the feed is down), it's a top hazard and pins here with FAA / Kp / DATA; a
  // routine conditions card instead sinks to the bottom (pushed after the items).
  const wxc=wxCard(wxState, wn);
  if(wxc.pin) cards.push(wxc.card);

  // -- GENERAL context cards (area-wide, not a single map point). Collected here
  //    but appended at the BOTTOM of the pile (after the distance-sorted items) —
  //    they're background context, not the nearest thing to the crosshair. --
  const general=[];
  // SEVERE WEATHER OUTLOOK (SPC Day 1): is the map-centre under a severe /
  // tornado risk TODAY? It's just an OUTLOOK — "expected", not a warning — so
  // it's an INFO card (no colour, no title contribution) that sits just above
  // the weather card. Actual grounding weather promotes the weather card itself.
  const spcCards=[];
  const spcF=featsIn('spc');
  if(spcF.length){
    const tornHit=spcF.filter(f=>f.properties.kind==='torn'&&pointInFeature(f,lon,lat))
      .sort((a,b)=>(parseFloat(b.properties.code)||0)-(parseFloat(a.properties.code)||0))[0];
    const catHit=spcF.filter(f=>f.properties.kind==='cat'&&f.properties.rank>=1&&pointInFeature(f,lon,lat))
      .sort((a,b)=>b.properties.rank-a.properties.rank)[0];
    if(tornHit) spcCards.push(['','🌪️','TORNADO OUTLOOK',cut(tornHit.properties.label,16)+' today',
      tornHit.properties.sig?'significant EF2+ risk':'SPC Day 1 outlook',openBtn(SPCU),false]);
    if(catHit) spcCards.push(['','⛈️','SEVERE WX OUTLOOK',cut(catHit.properties.label,16)+' today',
      'tornado / hail / wind risk',openBtn(SPCU),false]);
  }
  // solar flare (global scalar): an M/X GOES X-ray flare risks an HF radio
  // blackout. Not a chart grounding gate (no flare gate), so it stays a context
  // card. The geomagnetic Kp storm is handled as the pinned red SPACE WEATHER
  // card above (it DOES ground the chart).
  if(XRAY&&/^[MX]/.test(XRAY)) general.push([/^X/.test(XRAY)?'danger':'alert','☀️','SOLAR FLARE '+XRAY,'GOES X-ray · '+(/^X/.test(XRAY)?'major':'moderate'),
    'HF radio blackout risk',openBtn(SWPC),true]);

  // -- INDIVIDUAL item cards: one per in-view feature (planes, warnings,
  //    emergencies), all interleaved. HAZARDS OUTRANK ROUTINE TRAFFIC: a
  //    thunderstorm warning or emergency squawk sorts above any plane no matter
  //    how close the plane is (a plane only beats it via the pinned LOW
  //    AIRCRAFT card, i.e. at warning distance/altitude). Tiers: red hazards,
  //    amber hazards, everything else — distance sorts WITHIN each tier.
  //    Capped so a busy area can't flood it. --
  const items=[];
  CATS.forEach(cfg=>catItems(cfg,lat,lon,cfg.air?warnKm:rangeKm).forEach(f=>{
    const g=f.geometry; if(!g) return;
    // Aircraft are tracked out to the grey 5 mi ring — every one in that net gets a
    // normal distance-sorted card. A LOW one becomes the LOW AIRCRAFT alert: RED
    // flashing if it's inside the red range ring, AMBER if it's only in the grey ring
    // (breachInfo carries which, keyed by hex/callsign).
    // pt = the CLOSEST EDGE point to the crosshair (label + sorting distance);
    // for an airspace/TFR zone the tap instead recentres on the polygon CENTRE
    // (flyPt below). Inside still sorts to the top / reads "overhead".
    const inside=g.type!=='Point'&&pointInFeature(f,lon,lat);
    let cls=cfg.cls?cfg.cls(f):'', det=null, headOv=null, subOv=null, icOv=null, flash=false, hazardOv=null;
    // LOW AIRCRAFT: this plane's own card BECOMES the LOW AIRCRAFT alert while it's
    // in breachInfo, and reverts to its normal card the moment it climbs out /
    // leaves the grey ring. RED flashing danger when in the red range ring; AMBER
    // alert (steady, no flash) when only in the grey ring. One card per plane, never
    // two. l2 carries the callsign / TAIL NUMBER tinted to the map icon colour; the
    // AGL rides det (l3), and the ground speed follows it like every plane card.
    const bi=cfg.air?breachInfo.get(acKey(f.properties)):null;
    if(bi){
      icOv=acIcon(f); hazardOv=true; headOv='LOW AIRCRAFT';   // ✈️/🚁, same as every card
      if(bi.inRange){ cls='danger'; flash=true; }             // red range ring → flashing
      else { cls='alert'; }                                   // grey ring only → amber heads-up
      subOv='<span style="color:'+AC_COL[cfg.src]+'">'+acTail(f,12,'aircraft')+'</span>';
      det=bi.label;
    }
    // Controlled-airspace cards (Class B/C/D/E) are hazard:false, so their
    // polygon colour (applied at render) tints the card without driving the title
    // or the hazard tier: the LAANC-ceiling severity is carried by the dedicated
    // FAA CEILING card above (same getAirspace result the chart uses), so the two
    // can't disagree. cls drives tier so a breaching plane sorts up with the
    // hazards; everything else (incl. all tracked grey-ring traffic) keeps its
    // hazard/neutral tier — distance sorts within each.
    // The effective hazard uses the per-card override (hazardOv) when set, so an
    // AMBER low-aircraft card (hazardOv=true, cls='alert') tiers as an amber hazard
    // (tier 1 — just below the red flashing tier) instead of routine traffic, and so
    // survives the card cap and raises the CANIFLY title to amber.
    const hazard=hazardOv!=null?hazardOv:cfg.hazard;
    const tier=flash?0:(hazard?(cls==='danger'?0:1):2);
    let pt, km;
    if(g.type==='Point'){ pt=g.coordinates; km=havKm(lat,lon,pt[1],pt[0]); }
    else {
      const ne=nearestEdge(f,lon,lat)||{pt:polyPt(f),km:0};
      pt=ne.pt; km=inside?0:ne.km;
    }
    if(!pt) return;
    // pt drives the label (direction/distance) + sorting = the NEAREST EDGE.
    // flyPt is where tapping recentres the crosshair: an airspace/TFR polygon
    // flies to its CENTRE, everything else flies to the same edge it's labelled.
    const flyPt=(g.type!=='Point'&&cfg.src==='airspace')?(polyCenter(f)||pt):pt;
    items.push({cfg,f,pt,flyPt,cls,tier,inside,km,det,headOv,subOv,icOv,flash,hazardOv});
  }));
  // A named airspace zone (esp. Class B) arrives as many same-name shelf
  // polygons — collapse them to the NEAREST single card per class+name.
  const nearestAsp=new Map();
  const aspKey=it=>(it.f.properties.cls||'')+'|'+(it.f.properties.name||'');
  items.forEach(it=>{ if(it.cfg.src!=='airspace') return;
    const k=aspKey(it), ex=nearestAsp.get(k); if(!ex||it.km<ex.km) nearestAsp.set(k,it); });
  const shown=items.filter(it=>it.cfg.src!=='airspace'||nearestAsp.get(aspKey(it))===it);
  shown.sort((a,z)=>a.tier-z.tier||a.km-z.km);
  const ITEM_CAP=14;
  shown.slice(0,ITEM_CAP).forEach(({cfg,f,pt,flyPt,cls,inside,det,headOv,subOv,icOv,flash,hazardOv})=>{
    const detTxt=det!=null?det:(cfg.detail?cfg.detail(f):'');
    const ic=icOv!=null?icOv:(typeof cfg.icon==='function'?cfg.icon(f):cfg.icon);
    const head=headOv!=null?headOv:cfg.head(f);
    const sub=subOv!=null?subOv:((cfg.sub?cfg.sub(f):'')||'—');
    // Headline (.s1) colour. Airspace cards take their MAP POLYGON colour so the
    // card matches what's drawn (blue B/D, magenta C/E, red defense/prohibited,
    // orange restricted, gold advisory). A REGULAR aircraft card tints its tail
    // number (the headline) to the same colour as its plane/heli map icon — green
    // civil, yellow military, red emergency. A LOW AIRCRAFT override (red flashing
    // OR amber) keeps its verdict-coloured headline — its tail number is tinted on
    // l2 instead. Only a bare hex passes, so a feed can't inject into the style attr.
    const rawCol=(flash||head==='LOW AIRCRAFT')?null:cfg.src==='airspace'?f.properties._col:cfg.air?AC_COL[cfg.src]:null;
    const col=/^#[0-9a-fA-F]{3,8}$/.test(rawCol||'')?rawCol:undefined;
    // Every plane card (civil / military / emergency / low-aircraft) carries its
    // ADS-B ground speed on line 3, AFTER the altitude — spd is knots, shown MPH,
    // omitted when unknown ('?'/NaN).
    let l3=(inside?'overhead':dirMi(pt[1],pt[0]))+(detTxt?' · '+detTxt:'');
    if(cfg.air){ const s=Number(f.properties.spd); if(isFinite(s)) l3+=' · '+Math.round(toMph(s))+U(' mph'); }
    cards.push([cls, ic, head, sub, l3,
      llBtn(flyPt[0],flyPt[1]), hazardOv!=null?hazardOv:cfg.hazard, flash?true:undefined, col]);
  });
  general.forEach(c=>cards.push(c));   // area-wide context cards sink to the bottom
  spcCards.forEach(c=>cards.push(c));  // SPC outlook (info) sits just above weather
  if(!wxc.pin) cards.push(wxc.card);   // routine conditions card — the bottom card
                                       // (a gate/outage already pinned it up top)

  // title severity: 0 none · 1 alert (amber) · 2 warn (red). Driven by the
  // flyability NOW column FIRST — any grounding value/condition reds it, any
  // reduced ceiling (below the 400 ft cap) OR any unverified gate input
  // (failed airspace / Kp / radar / weather pull — unknown ≠ clear) yellows
  // it — then raised further by any hazard card (emergency / severe warning /
  // restriction) in range.
  let titleSev=0;
  const g0=FLY.detail&&FLY.detail.grid&&FLY.detail.grid[0];
  if(g0) titleSev=g0.grounded?2:(g0.maxFly<SPEC.regFt?1:0);
  if(FLY.detail&&flyUnknown().length) titleSev=Math.max(titleSev,1);
  cards.forEach(cd=>{ if(cd[6]) titleSev=Math.max(titleSev,cd[0]==='danger'?2:cd[0]==='alert'?1:0); });
  // The CANIFLY title takes the verdict colour + breach-flash — applied to BOTH the
  // header title and the map-page tag (bottom-left, iPhone portrait) so the at-a-
  // glance verdict reads the same on either page.
  [$('#sit-title'),$('#map-title')].forEach(t=>{ if(!t) return;
    t.classList.remove('warn','alert');
    if(titleSev>=2) t.classList.add('warn'); else if(titleSev>=1) t.classList.add('alert');
    t.classList.toggle('acflash',acFlash);   // breaching aircraft → flash red/white
  });
  // BOTH map rings track the SITREP title severity: green clear / amber reduced-or-
  // unverified / red grounded (same 0·1·2 the title colour uses). The inner range ring
  // and the outer grey traffic ring share the verdict colour; they stay distinguishable
  // by dash pattern (inner dashed, outer dotted).
  const sevCol=SEV_COL[titleSev]||SEV_COL[0];
  if(gl.getLayer('ly-ring')) gl.setPaintProperty('ly-ring','line-color',sevCol);
  if(gl.getLayer('ly-warnring')) gl.setPaintProperty('ly-warnring','line-color',sevCol);
  // The red flashing LOW AIRCRAFT breach is the most immediate, out-of-nowhere threat
  // (a manned aircraft low and in range), so it jumps to the very TOP of the pile —
  // above even the pinned FAA / space-weather / data cards. cd[7] (the flash flag) is
  // set ONLY for an in-range low aircraft; filter is stable so multiple breaches keep
  // their distance order.
  const ordered=[...cards.filter(cd=>cd[7]), ...cards.filter(cd=>!cd[7])];
  ordered.forEach(cd=>row(cd[0],cd[1],cd[2],cd[3],cd[4],cd[5],cd[7],cd[8]));

  // the weather card is always appended, so there's always at least one row
  $('#sit-body').innerHTML=rows.join('');
}

// action handler for a clicked SITREP card: fly to a point, or open a source page
function handleAct(btn){
  const act=btn.dataset.act;
  if(act==='fly'&&btn.dataset.ll){
    const [lo,la]=btn.dataset.ll.split(',').map(Number);
    // Flying to a card takes over the camera, so drop any active FOLLOW-lock first —
    // otherwise the next GPS fix would snap the map straight back off the plane. The
    // button is left unlocked (crosshair icon, panning re-enabled); the next tap
    // re-locks + re-centres on you.
    if(locMode===2){ locMode=0; setLocIcon(false); setPanLock(false); }
    // zoom IN to at least 9 but never zoom the user OUT of a closer view
    if(isFinite(lo)&&isFinite(la)){ cancelCenterZoom();
      gl.flyTo({center:[lo,la],zoom:Math.max(gl.getZoom(),9)}); }
    if(MQ_MOBILE.matches&&window.panelClose) window.panelClose();   // show the map so the fly-to is visible
  } else if(act==='open'&&btn.dataset.url){ window.open(btn.dataset.url,'_blank','noopener'); }
  else if(act==='refresh'){ forceRefresh(); }   // DATA card → force a full refresh
}
$('#sit-body').addEventListener('click',e=>{ const b=e.target.closest('[data-act]'); if(b) handleAct(b); });
// Viewport-scoped feeds refetch for the new area whenever the visible bounds
// change — on every map move AND on every container resize. A resize (window,
// panel, orientation, sheet) enlarges the view without a pan, so without this
// the newly-revealed area kept its stale aircraft until the next pulse.
let moveDebounce=null, lastViewKey=null;
function refreshViewport(){
  clearTimeout(moveDebounce);
  moveDebounce=setTimeout(()=>{
    // Only refetch the viewport feeds when the visible area actually changed.
    // Rounding to ~1km + 0.1 zoom collapses jitter (a resize with the same
    // bounds, a tiny GPS ease) so we don't fire redundant ADS-B requests that
    // just invite rate-limiting. SITREP still recomputes every time.
    const b=gl.getBounds(),z=gl.getZoom();
    const key=[b.getWest(),b.getSouth(),b.getEast(),b.getNorth()].map(n=>n.toFixed(2)).join(',')+'@'+z.toFixed(1);
    if(key!==lastViewKey){
      lastViewKey=key;
      // DYNAMIC viewport feeds (aircraft) refetch for the new area on every view
      // change so their data tracks the view.
      LAYERS.filter(l=>l.viewport).forEach(cfg=>{
        const st=LAYER_STATE[cfg.id];
        if(st&&st.started) runLayer(cfg);
      });
      // A center move just refreshed the live viewport data, so restart the refresh
      // countdown (and the pulse cycle) from now — the next full refresh is a
      // fresh cycle away, not whatever was left on the clock.
      refreshBase=Date.now();
    }
    // STATIC regional layers (airspace, NPS) re-pull ONLY when the crosshair has
    // travelled past the cached region's overlap — never on zoom (the cached
    // region already covers every zoom) and never on the pulse. This is what
    // keeps airspace painted when you zoom out.
    ensureStaticRegion();
    // The canifly chart tracks the crosshair like the SITREP: refetch when the
    // centre really moved (flyOnMove's own threshold). scheduleSitrep repaints
    // the chart FIRST and then ticks the SITREP, so the title always reads the
    // NOW column computed for the NEW crosshair — never the previous one.
    flyOnMove();
    scheduleSitrep();
  },250);   // snappy: refetch the new area's data promptly after a pan/zoom settles
}
gl.on('moveend',refreshViewport);
// container resize doesn't reliably fire moveend, so refetch here too
gl.on('resize',refreshViewport);

// ---- MOBILE TWO-PAGE TOGGLE — the map and the CANIFLY panel are two full-screen
//      pages. Tap the map to bring the panel up; tap ANYWHERE on the panel to drop
//      back to the map — except the SITREP cards (they run their own fly-to/open
//      action) and the refresh dial (it refreshes without dismissing). No drag, no
//      peek, no snap points — one tap flips the page. Desktop keeps the docked-right
//      panel (guarded by MQ). --
(function panelToggle(){
  const body=document.body;
  const open =()=>{ if(MQ_MOBILE.matches) body.classList.add('panel-open'); };
  const close=()=>body.classList.remove('panel-open');
  window.panelClose=close;   // used by handleAct (fly-to → show the map)
  // a genuine tap on the map canvas (MapLibre fires 'click' only on a tap, never
  // a drag/pinch) brings the panel up; steppers/buttons are separate DOM overlays
  gl.on('click',open);
  // one big "back to the map" target: the whole panel (the chart, any empty space)
  // closes on tap; only a tap on a card is exempt, falling through to its own fly-to /
  // open action. (The refresh dial now lives on the map, outside the panel, so it
  // needs no exemption.)
  $('#sitrep').addEventListener('click',e=>{
    if(!MQ_MOBILE.matches) return;                    // desktop: docked panel, no toggle
    if(e.target.closest('.sit-row')) return;
    close();
  });
  // rotating to a desktop width clears the toggle so the docked panel shows
  MQ_MOBILE.addEventListener('change',e=>{ if(!e.matches) close(); });
})();

/* =====================================================================
   8. CAN I FLY — the canifly drone-preflight chart, FULLY INTEGRATED.
   Ported from the canifly repo (that app stays standalone and untouched).
   What's here: the flyability grid (altitudes 400→SFC × NOW/+1/+2/+3h) and
   the settings box with the max-wind and range steppers — no title,
   coordinates or refresh line. Location = the map-centre crosshair; data
   rides the unified refresh pulse (weather + radar sample every pulse,
   Kp on the 180s space-weather cadence, FAA airspace via a location/range-
   keyed cache). Two-way integration with the SITREP:
     • the RANGE setting is also the LOW AIRCRAFT warning radius;
     • manned traffic inside that range under the warning altitude reds its
       altitude cell in the NOW column (its own code: TRFC);
     • a NEXRAD echo inside that range — sampled from the SAME Iowa Mesonet
       mosaic the radar layer draws — grounds the NOW column like the other
       global gates (its own code: PCPN).
   ===================================================================== */
const M_TO_FT=3.28084, FT_TO_M=0.3048, M_TO_SM=1/1609.34, KT_TO_MPH=1.15078, MI_TO_KM=1.60934;
const toMph=kt=>kt==null?null:kt*KT_TO_MPH;
const comma=n=>Number(Math.round(n)).toLocaleString('en-US');
const fmt=(n,d=0)=>(n==null||isNaN(n))?'–':Number(n).toFixed(d);
// FAA Part 107 / physics limits — all fixed (see the canifly repo for rationale).
// Kp thresholds are right-sized to a drone's GPS/compass risk, not raw storm
// labels: NOAA's own G-scale only flags GPS degradation at G3 (Kp 7), so a G1–G2
// (Kp 5–6) is an amber CAUTION (accuracy may drop) and G3+ (Kp ≥ 7) is a red
// GROUNDING (nav unreliable). kpCaut = caution floor, kpGnd = grounding floor.
const SPEC={kpCaut:5,kpGnd:7,visSM:3,clrFt:500,regFt:400};
// FAA vertical separation to keep BELOW manned traffic [ft]. Part 107 sets no
// hard numeric drone-vs-aircraft separation — §107.37 is simply "yield the right
// of way" (see-and-avoid). 500 ft is the manned MINIMUM safe altitude over
// non-congested areas (§91.119(c)) — the closest a plane should legally get to
// the 400-ft drone band — so it's the natural, conservative buffer. One knob.
const FAA_SEP_FT=500;
// The traffic warning altitude [ft AGL] = the drone ceiling + that separation. A
// plane below this pushes its required-clearance floor into the 0–400 ft drone
// band, so it BOTH fires the LOW AIRCRAFT alert AND caps the chart's NOW column.
// ONE number shared by the SITREP card and the chart, so they always agree.
const WARN_AGL_FT=SPEC.regFt+FAA_SEP_FT;   // 400 + 500 = 900
// LIM.wind = the aircraft's max wind [mph] — gates the surface gust and caps the
// wind-aloft scan. FIXED at 27 mph (no setting).
const LIM={wind:27};
// The three FIXED radii [statute miles]. RED (the range ring, RNG.mi) = 1 mi VLOS:
// the FAA query radius, the RED low-aircraft alert, the TRFC chart cap + the PCPN
// radar-echo radius. GREY = 5 mi: the traffic net (planes tracked + amber low-
// aircraft heads-up out to here). VIEW = 10 mi (2× grey): the load / reset framing
// radius AND the tightest allowed zoom (the view never shows less than this).
const RED_MI=1, GREY_MI=5, VIEW_MI=10;
const RNG={mi:RED_MI};
// Altitude ladder, 50 ft steps through the FAA band (matches the grid rows).
const ALTS_UP=(()=>{const a=[];for(let f=0;f<=SPEC.regFt;f+=50)a.push(f);return a;})();
const ALTS=[...ALTS_UP].reverse();
const FC_HOURS=3;   // forecast columns: NOW + the next 3 hourly steps
const KP_URL='https://services.swpc.noaa.gov/products/noaa-planetary-k-index-forecast.json';
// FAA ArcGIS feature services (official AIS publications, CORS-open): the LAANC
// grid ceiling + the national-defense no-fly zones, point + RNG.mi buffer.
const FAA_GIS='https://services6.arcgis.com/ssFJjBXIUyZDrSYZ/ArcGIS/rest/services';
const gisUrl=(svc,lat,lon,rng,fields)=>`${FAA_GIS}/${svc}/FeatureServer/0/query`
  +`?geometry=${lon.toFixed(3)},${lat.toFixed(3)}&geometryType=esriGeometryPoint&inSR=4326`
  +`&spatialRel=esriSpatialRelIntersects&distance=${rng}&units=esriSRUnit_StatuteMile`
  +`&outFields=${fields}&returnGeometry=false&f=json`;
const aspUrl=(lat,lon,rng)=>gisUrl('FAA_UAS_FacilityMap_Data',lat,lon,rng,'CEILING,UNIT');
const defUrl=(lat,lon,rng)=>gisUrl('National_Defense_Airspace_TFR_Areas',lat,lon,rng,'NAME');
const FAA_ITEM='7b6891111bc94f2db9a2c1714e6ff43f';
const faaMapUrl=(lat,lon)=>`https://www.arcgis.com/apps/mapviewer/index.html?layers=${FAA_ITEM}&center=${lon.toFixed(3)},${lat.toFixed(3)}&level=11`;
// Pressure levels scanned for cloud decks; lowest level ≥12% cover = the base.
const PRES_LEVELS=[1000,975,950,925,900,850,800,700];
const CLOUD_FEW_PCT=12;
function aloftUrl(lat,lon){
  const h=['wind_speed_10m','wind_speed_80m','wind_speed_120m','wind_speed_180m','wind_gusts_10m','visibility',
    'cloud_cover_low','temperature_2m','dew_point_2m']
    .concat(PRES_LEVELS.map(p=>`geopotential_height_${p}hPa`))
    .concat(PRES_LEVELS.map(p=>`cloud_cover_${p}hPa`));
  const cur=['wind_speed_10m','wind_gusts_10m','cloud_cover_low',
    'visibility','temperature_2m','dew_point_2m','pressure_msl']
    .concat(PRES_LEVELS.map(p=>`cloud_cover_${p}hPa`));
  return `https://api.open-meteo.com/v1/forecast?latitude=${lat.toFixed(3)}&longitude=${lon.toFixed(3)}`
    +`&current=${cur.join(',')}`
    +`&hourly=${h.join(',')}`
    +`&wind_speed_unit=kn&forecast_days=2&timezone=auto`;
}
// Retry a flaky fetch before letting it fail — a transient blip on these public
// feeds is almost always gone by the next attempt.
async function retry(fn,tries=3,baseMs=600){
  let err;
  for(let a=0;a<tries;a++){
    try{ return await fn(); }
    catch(e){ err=e; if(a<tries-1) await new Promise(r=>setTimeout(r,baseMs*(a+1))); }
  }
  throw err;
}
// Open-Meteo: surface + winds aloft (height levels through the FAA band), gusts,
// visibility, per-level cloud cover/height. One row per grid column.
async function getAloft(lat,lon){
  const d=await getJSON(aloftUrl(lat,lon),{timeout:10000});
  let i=0;
  if(d.current?.time&&d.hourly?.time){const now=d.current.time.slice(0,13);i=d.hourly.time.findIndex(t=>t.slice(0,13)===now);if(i<0)i=0;}
  const H=d.hourly||{}, elev=d.elevation??0;
  const gh=H.wind_gusts_10m||[];
  const cur=d.current||{};
  // stash local sea-level pressure (≈ QNH) for the aircraft-AGL baro correction
  if(typeof cur.pressure_msl==='number'&&isFinite(cur.pressure_msl)) QNH_HPA=cur.pressure_msl;
  const cloudBaseAt=n=>{
    const idx=i+n, C=k=>n===0?(cur[k]??H[k]?.[idx]):H[k]?.[idx];
    let deckFt=null;
    for(const p of PRES_LEVELS){
      const cc=C(`cloud_cover_${p}hPa`), ghm=H[`geopotential_height_${p}hPa`]?.[idx]??H[`geopotential_height_${p}hPa`]?.[i];
      if(cc==null||ghm==null) continue;
      const agl=(ghm-elev)*M_TO_FT; if(agl<=0) continue;
      if(cc>=CLOUD_FEW_PCT){ deckFt=agl; break; }
    }
    const low=C('cloud_cover_low'), T=C('temperature_2m'), Td=C('dew_point_2m');
    const lclFt=((low??0)>=CLOUD_FEW_PCT && T!=null && Td!=null)?Math.max(0,Math.round((T-Td)*410)):null;
    let baseFt=null; for(const v of [deckFt,lclFt]) if(v!=null) baseFt=(baseFt==null?v:Math.min(baseFt,v));
    return baseFt;
  };
  const profAt=n=>{const idx=i+n;
    const w10=n===0?(d.current?.wind_speed_10m??H.wind_speed_10m?.[idx]):H.wind_speed_10m?.[idx];
    return [{h:10,w:w10},{h:80,w:H.wind_speed_80m?.[idx]},{h:120,w:H.wind_speed_120m?.[idx]},{h:180,w:H.wind_speed_180m?.[idx]}]
      .filter(x=>x.w!=null&&!isNaN(x.w)).sort((a,b)=>a.h-b.h);};
  const gustAt =n=>n===0?(d.current?.wind_gusts_10m??gh[i]):gh[i+n];
  const visAt  =n=>n===0?(cur.visibility??H.visibility?.[i]):H.visibility?.[i+n];
  const cols=[];
  for(let n=0;n<=FC_HOURS;n++){
    cols.push({n, windPts:profAt(n), gustKt:gustAt(n), baseFt:cloudBaseAt(n), visM:visAt(n)});
  }
  return {cols};
}
// NOAA SWPC planetary-Kp forecast: the FULL time-sorted bin list, so each grid
// hour can pick the value in force when it arrives (bins are 3-hourly — the
// +3h column can cross TWO bin boundaries, so "current + next" isn't enough).
async function getKp(){
  const d=await getJSON(KP_URL,{timeout:7000});
  if(!Array.isArray(d)||d.length===0) return null;
  const arrHdr=Array.isArray(d[0]);       // products feed = array rows w/ header
  const src=arrHdr?d.slice(1):d;
  const rows=src.map(r=>{
    const t=arrHdr?r[0]:r.time_tag, kp=Number(arrHdr?r[1]:r.kp);
    // 'observed' = finalized · 'estimated' = in-progress nowcast · 'predicted' =
    // forecast. The NOW column uses the last finalized observed bin (see kpAt).
    const obs=arrHdr?r[2]:r.observed;
    return {ms:Date.parse((t||'').replace(' ','T')+'Z'), kp, obs};
  }).filter(x=>!isNaN(x.ms)&&!isNaN(x.kp)).sort((a,b)=>a.ms-b.ms);
  return rows.length?{rows}:null;
}
// FAA airspace within `rng` mi: worst LAANC grid ceiling; a defense zone in
// range forces 0 (no-fly). A LEGAL warning, so anything that could quietly
// understate a restriction THROWS (→ amber via fail-open), never reads "clear".
async function getAirspace(lat,lon,rng){
  const [grid,def]=await Promise.all([ getJSON(aspUrl(lat,lon,rng),{timeout:7000}), getJSON(defUrl(lat,lon,rng),{timeout:7000}) ]);
  if(grid.error||!Array.isArray(grid.features)) throw new Error('airspace grid query failed');
  if(def.error ||!Array.isArray(def.features))  throw new Error('defense-airspace query failed');
  if(grid.exceededTransferLimit||def.exceededTransferLimit) throw new Error('airspace result truncated');
  let ceil=SPEC.regFt;
  for(const f of grid.features){
    const a=f&&f.attributes;
    const c=(a&&typeof a.CEILING==='number')?a.CEILING:NaN;
    if(!Number.isFinite(c)||c<0||c>10000) throw new Error('airspace cell has no usable ceiling');
    if(a.UNIT!=null&&!/^f/i.test(String(a.UNIT))) throw new Error('airspace ceiling in unexpected units');
    ceil=Math.min(ceil,c);
  }
  if(def.features.length>0) ceil=0;
  return {ceilFt:ceil};
}
// wind(ft) → knots, linearly interpolating the sparse model levels
function makeProfile(pts){
  const p=(pts||[]).filter(x=>x&&x.w!=null&&!isNaN(x.w)).sort((a,b)=>a.h-b.h);
  return function(ft){
    if(p.length===0) return null;
    const m=ft*FT_TO_M;
    if(m<=p[0].h) return p[0].w;
    if(m>=p[p.length-1].h) return p[p.length-1].w;
    for(let i=0;i<p.length-1;i++){if(m>=p[i].h&&m<=p[i+1].h){const t=(m-p[i].h)/(p[i+1].h-p[i].h);return p[i].w+t*(p[i+1].w-p[i].w);}}
    return p[p.length-1].w;
  };
}
// Airspace cache — LAANC is near-static (56-day chart cycle), and the FAA service
// is shared and rate-limited, so re-query only when the location or range really
// changes (or the TTL ages out). Persisted so reloads reuse it.
const ASP_CACHE_KEY='canifly.asp';
const ASP_TTL=6*60*60*1000, ASP_HARD_TTL=24*60*60*1000;
const ASP_TOL_KM=0.15;   // GPS/crosshair jitter tolerance — small next to the ≥0.5 mi radius
let aspCache=null;
function hydrateAsp(){
  try{ const s=JSON.parse(localStorage.getItem(ASP_CACHE_KEY)||'null');
    if(s&&Number.isFinite(s.lat)&&Number.isFinite(s.lon)&&Number.isFinite(s.rng)
       &&Number.isFinite(s.ceilFt)&&s.ceilFt>=0&&s.ceilFt<=SPEC.regFt
       &&Number.isFinite(s.ts)&&(Date.now()-s.ts)<ASP_HARD_TTL){ aspCache=s; } }catch(e){}
}
function persistAsp(){ store(ASP_CACHE_KEY,JSON.stringify(aspCache)); }

// ---- PCPN: is there NEXRAD reflectivity within `rngMi` of the point? Samples the
// SAME Iowa Mesonet mosaic the map's radar layer draws, at its native z8, on an
// offscreen canvas. Called twice per refresh — at the RED ring (1 mi, grounds NOW)
// and the GREY ring (5 mi, the "precip inbound" amber heads-up). Returns true/false,
// or null when the tiles can't be read (load/CORS failure) — unknown fails OPEN (no
// gate) and ambers the NOW header + the SITREP title via FLY.err. ----
const RADAR_Z=8, RADAR_ALPHA=80, RADAR_MIN_PX=2;
const radarMemo=new Map();   // key → val: identical minute+point+range reuses the scan.
const RADAR_MEMO_MAX=8;      // small LRU so the red + grey ring samples don't evict each other
async function sampleRadarPrecip(lat,lon,rngMi){
  const n=1<<RADAR_Z, d=Math.PI/180;
  const xf=(lon+180)/360*n;
  const yf=(1-Math.log(Math.tan(lat*d)+1/Math.cos(lat*d))/Math.PI)/2*n;
  if(!isFinite(yf)||yf<0||yf>=n) return false;         // poles — no NEXRAD there anyway
  const mPerPx=40075016.686*Math.cos(lat*d)/(n*256);   // metres per mosaic pixel at this lat
  const rPx=Math.max(1,rngMi*MI_TO_KM*1000/mPerPx);
  const cx=xf*256, cy=yf*256;                          // global pixel coords at z8
  const tx0=Math.floor((cx-rPx)/256), tx1=Math.floor((cx+rPx)/256);
  const ty0=Math.max(0,Math.floor((cy-rPx)/256)), ty1=Math.min(n-1,Math.floor((cy+rPx)/256));
  // cache key = the current refresh window (radarBust) — the mosaic itself only
  // updates on the order of minutes, so re-sampling within a window reuses the
  // memoised verdict (and, since the map's radar layer shares the SAME bust
  // value, the browser tile cache too)
  const bust=radarBust();
  const key=bust+'|'+lat.toFixed(3)+'|'+lon.toFixed(3)+'|'+rngMi;
  if(radarMemo.has(key)) return radarMemo.get(key);
  const tiles=[];
  for(let tx=tx0;tx<=tx1;tx++)for(let ty=ty0;ty<=ty1;ty++)
    tiles.push({x:((tx%n)+n)%n,y:ty,px:(tx-tx0)*256,py:(ty-ty0)*256});
  const imgs=await Promise.all(tiles.map(t=>new Promise((res,rej)=>{
    const im=new Image(); im.crossOrigin='anonymous';
    im.onload=()=>res({t,im}); im.onerror=()=>rej(new Error('radar tile failed'));
    im.src=RADAR_URL.replace('{z}',RADAR_Z).replace('{x}',t.x).replace('{y}',t.y)+'?'+bust;
  })));
  const w=(tx1-tx0+1)*256, h=(ty1-ty0+1)*256;
  const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
  const ctx=cv.getContext('2d',{willReadFrequently:true});
  imgs.forEach(({t,im})=>ctx.drawImage(im,t.px,t.py));
  const px=ctx.getImageData(0,0,w,h).data;   // throws on a tainted canvas → caller catches → null
  const ox=cx-tx0*256, oy=cy-ty0*256;
  const x0=Math.max(0,Math.floor(ox-rPx)), x1=Math.min(w-1,Math.ceil(ox+rPx));
  const y0=Math.max(0,Math.floor(oy-rPx)), y1=Math.min(h-1,Math.ceil(oy+rPx));
  let hits=0, found=false;
  for(let y=y0;y<=y1&&!found;y++)for(let x=x0;x<=x1;x++){
    const dx=x-ox, dy=y-oy; if(dx*dx+dy*dy>rPx*rPx) continue;
    if(px[(y*w+x)*4+3]>=RADAR_ALPHA && ++hits>=RADAR_MIN_PX){ found=true; break; }   // ≥2 px kills speckle
  }
  radarMemo.set(key,found);
  if(radarMemo.size>RADAR_MEMO_MAX) radarMemo.delete(radarMemo.keys().next().value);   // evict oldest
  return found;
}

// ---- TRFC: the traffic-imposed NOW-column CEILING [ft]: manned traffic requires FAA_SEP_FT
// of vertical clearance, so a plane at AGL A pins the highest usable drone band to
// the highest 50-ft step STRICTLY BELOW (A − FAA_SEP_FT) — the TRFC cell then
// marks that floor (red at/above it, green below). The most restrictive plane
// wins. Infinity = no intruding traffic; a value < 0 grounds the column. Scans
// only the RANGE RING (not the grey 3× net): grey-ring aircraft are tracked as
// ordinary SITREP cards but don't cap the chart until they're in range — matching
// the LOW AIRCRAFT breach set that drives the halo + title flash.
function flyTrafficCeilFt(){
  const c=gl.getCenter();
  const cross=groundElevFt(c.lat,c.lng);   // ft AMSL at crosshair, fallback ground
  const near=planesNear(c.lat,c.lng,RNG.mi*MI_TO_KM);
  ensureGroundElev([[c.lat,c.lng],...near.filter(a=>a.alt<AGL_CAND_MAX_FT).map(a=>[a.pt[1],a.pt[0]])]);
  let ceil=Infinity;
  near.forEach(a=>{
    const {agl}=planeAglFt(a,cross);   // per-plane terrain, QNH-corrected MSL
    if(agl>=WARN_AGL_FT) return;       // too high to intrude on the 0–400 band
    const safeFloor=agl-FAA_SEP_FT;    // drone must stay clear of (below) this
    // highest 50-ft band STRICTLY below the sep floor (−50 = none → grounds)
    let top=-50; for(const ft of ALTS){ if(ft<safeFloor){ top=ft; break; } }
    if(top<ceil) ceil=top;
  });
  return ceil;
}

// ---- state + render pipeline ----
const FLY={
  data:null,     // last good {lat,lon,aloft,kp,asp} — lat/lon = where it was fetched
  detail:null,   // computed render model (kept for tests/debug)
  precip:null,   // radar echo within the RED ring (1 mi)? true/false/null → grounds NOW
  precipInbound:null,   // radar echo in the GREY ring (1–5 mi) but NOT the red ring → amber "inbound"
  err:{om:false,kp:false,asp:false,radar:false},
};
// Gate inputs currently UNKNOWN (fetch failed / stale beyond fallback). Every
// unknown fails OPEN for the grid values, so it MUST be surfaced: the NOW
// header + the SITREP title amber IMMEDIATELY while any input is unverified
// (the quiet signal).
const FLY_ERR_LABEL={om:'weather',asp:'FAA airspace',kp:'Kp',radar:'radar'};
function flyUnknown(){
  return Object.keys(FLY_ERR_LABEL).filter(k=>FLY.err[k]).map(k=>FLY_ERR_LABEL[k]);
}
// The LOUD signal — the DATA card. A feed only counts here after it's stayed
// unverified past a grace window, so a single self-healing one-cycle blip (which the
// amber NOW header already flags quietly) doesn't pop a card. flyErrSince stamps
// when each input started erroring; a key that recovers resets to 0.
const DATA_ERR_GRACE_MS=35000;   // fixed ~35 s wall-clock grace: a self-healing blip (a pulse or two) won't pop the DATA card
const flyErrSince={om:0,asp:0,kp:0,radar:0};
function flyUnknownStable(){
  const now=Date.now(), out=[];
  for(const k in FLY_ERR_LABEL){
    if(FLY.err[k]){
      if(!flyErrSince[k]) flyErrSince[k]=now;
      if(now-flyErrSince[k]>=DATA_ERR_GRACE_MS) out.push(FLY_ERR_LABEL[k]);
    } else flyErrSince[k]=0;
  }
  return out;
}
window.__sitrep.fly={FLY,SPEC,LIM,RNG,paint:flyPaint,refresh:flyRefresh,unknownStable:flyUnknownStable};   // debug/test handle

// Hard airspace restriction under the crosshair, read from the loaded map layer:
// a Prohibited area (PROH) or a national-security UAS zone (NSUF) that grounds the
// chart. Defense zones are excluded here — the canifly FAA cap already grounds
// those. The layer is a static regional cache (pulled once for a box around the
// crosshair, kept at every zoom, re-pulled only on travel) so a grounding zone
// under the crosshair can't silently vanish when the view widens; the
// authoritative canifly point-query still runs regardless. Conditional/advisory
// zones (Restricted/stadium = amber "no-fly if active"; MOA/Warning/Alert/Danger
// = neutral "advisory only") never ground the chart — they're schedule-only or
// concern manned traffic, so they stay on the map + SITREP without grounding.
function flyRestriction(){
  const c=gl.getCenter(); let hit=null;
  featsIn('airspace').forEach(f=>{
    const p=f.properties;
    if(hit||p.sev!=='hard'||p.cls==='DEF') return;
    if(pointInFeature(f,c.lng,c.lat)) hit={code:p.code,name:p.name};
  });
  // NPS land is a hard no-fly too (can't launch/operate there)
  if(!hit) featsIn('nps').forEach(f=>{
    if(hit) return;
    if(pointInFeature(f,c.lng,c.lat)) hit={code:'PARK',name:f.properties.name};
  });
  return hit;
}

// Apply every gate and build the render model — the canifly paint() core, plus
// the sitrep integrations (TRFC cells, PCPN gate, hard-airspace grounding).
function flyComputeDetail(){
  const {aloft,kp,asp}=FLY.data;
  const aspCapFt=asp==null?SPEC.regFt:(asp.ceilFt<=0?-1:Math.min(SPEC.regFt,asp.ceilFt));
  const atLim=kt=>kt!=null&&Math.round(toMph(kt))>=LIM.wind;
  const one=kt=>kt==null?'—':fmt(toMph(kt),0);
  const cols=(aloft&&aloft.cols)||[];
  const nowMs=Date.now();
  // Kp in force at hour n: the last bin starting at or before that hour (bins are
  // 3-hourly and time-sorted; before the first bin, use it). The NOW column
  // (n=0) prefers the last FINALIZED observed bin — the in-progress bin is only an
  // estimate and can be revised, so it shouldn't drive a nowcast; the +1/+2/+3h
  // columns are inherently forecasts and use the estimated/predicted bins.
  const kpAt=n=>{
    if(!kp||!kp.rows||!kp.rows.length) return null;
    if(n===0){
      for(let i=kp.rows.length-1;i>=0;i--){
        const r=kp.rows[i]; if(r.ms<=nowMs && r.obs==='observed') return r.kp;
      }
    }
    const t=nowMs+n*3600e3; let v=null;
    for(const r of kp.rows){ if(r.ms<=t) v=r.kp; else break; }
    return v!=null?v:kp.rows[0].kp;
  };
  const trafficCeil=flyTrafficCeilFt();   // NOW-only manned-traffic ceiling (Infinity = none)
  const restrict=flyRestriction();   // a hard Prohibited/security zone grounds every column
  let wxNow=null;   // NOW-column weather-gate diagnostics for the weather card
  const grid=cols.map((c,n)=>{
    const prof=makeProfile(c.windPts);
    const visSM=c.visM!=null?c.visM*M_TO_SM:null;
    const kpv=kpAt(n);
    const gGust=atLim(c.gustKt), gVis=visSM!=null&&visSM<SPEC.visSM, gKp=kpv!=null&&kpv>=SPEC.kpGnd;
    // PCPN — radar is a NOW product, so only the NOW column can carry the gate
    const gPcpn=n===0&&FLY.precip===true;
    const globalGrounded=gGust||gVis||gKp||gPcpn||!!restrict;   // hard airspace grounds all hours
    const cloudCapFt=c.baseFt==null?Infinity:(c.baseFt-SPEC.clrFt);
    let hitFt=null; for(const ft of ALTS_UP){ if(atLim(prof(ft))){ hitFt=ft; break; } }
    const windCeilFt=hitFt==null?SPEC.regFt:hitFt-50;
    // capture NOW's weather gates for the SITREP weather card (which picks the
    // most severe of precip / wind / gust / visibility / cloud to show). Carries
    // the raw measured values too, so the card's third line reads real telemetry
    // (gust mph, wind aloft peak, visibility SM, cloud base) rather than a
    // redundant "grounded now".
    if(n===0){
      let windPeak=0; for(const ft of ALTS){ const v=prof(ft); if(v!=null&&v>windPeak) windPeak=v; }
      wxNow={gust:gGust,vis:gVis,precip:gPcpn,precipInbound:FLY.precipInbound===true,windCeilFt,cloudCapFt,
        gustMph:c.gustKt, visSM, windPeakMph:windPeak};
    }
    // manned traffic caps the NOW column only (it's a live snapshot, like radar)
    const tCeil = n===0 ? trafficCeil : Infinity;
    // TRFC is ALSO surfaced as its own flashing marker (trfcAlt) so intruding
    // low traffic is ALWAYS visible on the chart — even when a lower or grounding
    // gate (FAA / weather) owns the column's single binding-reason cell. The marker
    // sits at the first no-go band above the traffic ceiling (surface when the plane
    // is low enough to ground the whole band). Only NOW carries live traffic.
    let trfcAlt = (n===0 && trafficCeil!==Infinity)
      ? (trafficCeil<0 ? 0 : Math.min(SPEC.regFt, trafficCeil+50)) : null;
    const capFt=Math.min(SPEC.regFt, cloudCapFt, windCeilFt, aspCapFt, tCeil);
    const grounded=globalGrounded||capFt<0;
    let maxFly=-1;
    if(!grounded) for(const ft of ALTS){ if(ft<=capFt){ maxFly=ft; break; } }
    // which cap binds → the code shown at the ceiling row. Traffic wins ties (it's
    // the flashing safety alert), then FAA, then cloud, then wind.
    const capSrc = tCeil<=aspCapFt&&tCeil<=cloudCapFt&&tCeil<=windCeilFt ? 'TRFC'
             : aspCapFt<=cloudCapFt&&aspCapFt<=windCeilFt ? 'FAA'
             : cloudCapFt<=windCeilFt ? 'SKY' : 'WIND';
    let reasonAlt=null, reason='';
    if(grounded){
      reasonAlt=0;
      reason = aspCapFt<0 ? 'FAA'
             : restrict ? restrict.code
             : tCeil<0 ? 'TRFC'
             : gGust ? 'GUST'
             : gVis ? 'VIS'
             : gPcpn ? 'PCPN'
             : gKp ? ('KP'+Math.round(kpv))
             : capSrc;
    }else if(maxFly<SPEC.regFt){
      reasonAlt=maxFly+50; reason=capSrc;
    }
    // A grounding traffic ceiling lands the TRFC marker at the surface — the same
    // cell a DIFFERENT grounding reason (FAA / gust / …) already owns. Bump it up one
    // 50-ft band so BOTH stay visible: the reason at SFC, TRFC flashing just above it.
    // (If the reason IS traffic, they're the same marker — no bump.)
    if(trfcAlt===0 && reasonAlt===0 && reason!=='TRFC') trfcAlt=50;
    return {n,prof,gustKt:c.gustKt,capFt,maxFly,grounded,reason,reasonAlt,trfcAlt};
  });
  const cellState=(g,ft)=>{
    if(g.grounded) return 'bad';
    const kt=g.prof(ft); if(kt==null) return '';
    if(ft>g.capFt||atLim(kt)) return 'bad';   // above any cap (incl. the traffic ceiling) → red
    return 'good';
  };
  const nowMaxFly=grid.length?grid[0].maxFly:-1;
  // NOW-column advisories amber the header (grounded red wins): unverified inputs
  // (unknown ≠ clear) plus a G1–G2 geomagnetic caution (Kp 5–6, below the Kp-7
  // grounding line) — degraded GPS/compass accuracy you can fly with, cautiously.
  const unk=flyUnknown();
  const kpNowV=kpAt(0);
  const kpCautNow=kpNowV!=null&&kpNowV>=SPEC.kpCaut&&kpNowV<SPEC.kpGnd;
  const nowAdv=[...unk]; if(kpCautNow) nowAdv.push('Kp '+Math.round(kpNowV)+' storm');
  const colLabels=grid.map(g=>({v:g.n===0?'now':'+'+g.n+'h',
    st:g.grounded?'bad':(g.n===0&&nowAdv.length?'unk':''), now:g.n===0,
    t:g.n===0&&nowAdv.length?'advisory: '+nowAdv.join(', ')+' — treat as advisory':''}));
  const topFt=ALTS[0];
  const altRows=ALTS.map(ft=>{
    const cells=grid.map(g=>{
      // the column's own cap code wins its cell; the TRFC ceiling flashes red/white
      // (matching the LOW AIRCRAFT alert), every other cap code is static.
      if(g.reasonAlt===ft) return {v:g.reason, st:cellState(g,ft), rsn:true, flash:g.reason==='TRFC'};
      // the independent TRFC traffic marker: flashes at the traffic ceiling even when
      // another gate owns the binding-reason cell (so a low plane is always shown).
      if(g.trfcAlt===ft) return {v:'TRFC', st:cellState(g,ft), rsn:true, flash:true};
      return {v:one(g.prof(ft)), st:cellState(g,ft)};
    });
    // hi = the bold "highest you can fly right now" label (the top green row)
    return {a:ft===0?'sfc':comma(ft), u:ft===topFt?'ft':'',
      st:cells.length&&cells[0].st==='bad'?'bad':'',
      hi:nowMaxFly>=0&&ft===nowMaxFly, cells};
  });
  const gustCells=grid.map((g,i)=>({v:one(g.gustKt), st:atLim(g.gustKt)?'bad':'',
    u:i===grid.length-1?'mph':''}));
  const gustSt=gustCells.length&&gustCells[0].st==='bad'?'bad':'';
  return {board:{colLabels,gustCells,gustSt,altRows},
    // aspCapFt: the LAANC ceiling gate — -1 = grounds (no-fly), <400 = caps,
    // 400 = no limit. aspUnknown = the FAA query failed (fail-open). Read by the
    // SITREP so a controlled-airspace card you're OVERHEAD reflects the real cap.
    aspCapFt, aspUnknown:asp==null,
    // kpNow: the planetary Kp in force for the NOW column (null = unknown). The
    // SITREP reads this for its SPACE WEATHER card, so card + chart KP gate agree.
    kpNow:kpAt(0),
    // wxNow: the NOW-column weather gates (gust/vis/precip + wind & cloud ceilings)
    // — the SITREP weather card reads these so card + chart NOW column agree.
    wxNow,
    grid:grid.map(g=>({n:g.n,maxFly:g.maxFly,grounded:g.grounded,reason:g.reason,reasonAlt:g.reasonAlt,trfcAlt:g.trfcAlt}))};
}

const FLY_GRID_ATTRS='class="grid"';
function flyBoardHtml(b){
  const unit=u=>u?`<i class="gu">${u}</i>`:'';
  const cell=c=>`<span class="gc${c.st?' '+c.st:''}${c.rsn?' rsn':''}${c.flash?' acflash':''}">${c.v==null?'':c.v}${unit(c.u)}</span>`;
  const head=`<div class="grow ghead"><span class="ga"></span>${b.colLabels.map(l=>`<span class="gc${l.st?' '+l.st:''}${l.now?' now':''}"${l.t?` title="${escapeHtml(l.t)}"`:''}>${l.v}</span>`).join('')}</div>`;
  const alts=b.altRows.map(r=>`<div class="grow"><span class="ga${r.st?' '+r.st:''}${r.hi?' hi':''}">${r.a}${unit(r.u)}</span>${r.cells.map(cell).join('')}</div>`).join('');
  const gust=`<div class="grow ggust"><span class="ga${b.gustSt?' '+b.gustSt:''}">gust</span>${b.gustCells.map(cell).join('')}</div>`;
  return `<div ${FLY_GRID_ATTRS}>${head}${alts}${gust}</div>`;
}
// pre-data skeleton: the real grid frame with shimmer bars, so nothing shifts on load
function flySkeletonHtml(){
  const sk='<span class="gc"><i class="sk"></i></span>'.repeat(1+FC_HOURS);
  const cols=['now',...Array.from({length:FC_HOURS},(_,k)=>'+'+(k+1)+'h')];
  const head='<div class="grow ghead"><span class="ga"></span>'
    +cols.map((l,i)=>`<span class="gc${i===0?' now':''}">${l}</span>`).join('')+'</div>';
  const rows=ALTS.map(ft=>`<div class="grow"><span class="ga">${ft===0?'sfc':comma(ft)}${ft===ALTS[0]?'<i class="gu">ft</i>':''}</span>${sk}</div>`).join('');
  const gust=`<div class="grow ggust"><span class="ga">gust</span>${sk}</div>`;
  return `<div ${FLY_GRID_ATTRS}>${head}${rows}${gust}</div>`;
}
// RANGE and MAX WIND are no longer user-adjustable — the three radii are fixed
// (RED 1 / GREY 5 / VIEW 10 mi) and LIM.wind is hardcoded to 27 mph — so there's
// no settings box or range control to render; the chart just paints from data.
function flyRender(){
  const board=$('#fly-board'); if(!board) return;
  board.innerHTML=FLY.detail?flyBoardHtml(FLY.detail.board):flySkeletonHtml();
}
function flyPaint(){ FLY.detail=FLY.data?flyComputeDetail():null; flyRender(); }

// ---- refresh — called from the unified refresh pulse, on viewport moves, on range
// changes and at boot. Weather + the radar sample go every call; Kp re-fetches on
// the 180s space-weather cadence; airspace via its cache. SINGLE-FLIGHT: while a
// refresh is in the air new calls just flag a trailing re-run (which then reads
// the fresh centre/range) — so a pan burst or a pulse landing mid-fetch can never
// stack concurrent hits on the rate-limited FAA service. A failed weather pull
// keeps the stale grid, never wipes. ----
let flyBusy=false, flyAgain=false, flyKpAt=0;
const KP_STALE_MS=15*60*1000;   // a transient SWPC blip may not wipe a recent Kp
async function flyRefresh(){
  if(flyBusy){ flyAgain=true; return; }
  flyBusy=true;
  try{
    const c=gl.getCenter();
    const base={lat:c.lat,lon:c.lng};
    const rngMi=RNG.mi;   // snapshot — the radius can't shift mid-fetch
    if(aspCache==null) hydrateAsp();
    const cc=aspCache;
    const matches=cc!=null&&cc.rng===rngMi&&havKm(base.lat,base.lon,cc.lat,cc.lon)<ASP_TOL_KM;
    const age=cc!=null?Date.now()-cc.ts:Infinity;
    const fresh=matches&&age<ASP_TTL;
    const kpKeep=FLY.data!=null&&FLY.data.kp!=null&&Date.now()-flyKpAt<170000;
    // Fire all four in parallel, but DON'T let the slow FAA airspace query block
    // the chart: await weather FIRST and paint immediately (reusing the last-good
    // gates), then fold in airspace / Kp / radar as each lands. Airspace is a
    // single attempt (it's cached 6 h + fail-open) so it can never hang the grid.
    const pAloft = retry(()=>getAloft(base.lat,base.lon),2).catch(()=>null);
    const pKp    = kpKeep?Promise.resolve(FLY.data.kp):retry(()=>getKp(),2).catch(()=>null);
    const pAsp   = fresh?Promise.resolve({ceilFt:cc.ceilFt}):getAirspace(base.lat,base.lon,rngMi).catch(()=>null);
    // Two radar samples: the RED ring (1 mi) grounds NOW; the GREY ring (5 mi) is the
    // "precip inbound" heads-up (echo out there but not yet in the red ring).
    const pPrecip= retry(()=>sampleRadarPrecip(base.lat,base.lon,RED_MI),2).catch(()=>null);
    const pPrecipGrey= retry(()=>sampleRadarPrecip(base.lat,base.lon,GREY_MI),2).catch(()=>null);

    const aloft=await pAloft;
    if(aloft){
      // paint the winds/gust grid NOW with the last-good gates; the fresh gates
      // (below) repaint again when they arrive — no waiting on the FAA service.
      // Any gate we DON'T yet have a value for stays flagged unknown, so the NOW
      // header ambers "unverified" rather than showing a falsely-clear 400.
      FLY.data={lat:base.lat,lon:base.lon,aloft,
        kp:(FLY.data&&FLY.data.kp)||null, asp:(FLY.data&&FLY.data.asp)||null};
      FLY.err.om=false; FLY.err.asp=FLY.data.asp==null; FLY.err.kp=FLY.data.kp==null;
      flyPaint(); scheduleSitrep();
    }else{
      FLY.err.om=true;   // weather pull failed — keep the stale grid; next pulse retries
    }

    const [kpRaw,aspRaw,precip,precipGrey]=await Promise.all([pKp,pAsp,pPrecip,pPrecipGrey]);
    if(!kpKeep&&kpRaw!=null) flyKpAt=Date.now();   // a genuinely fresh Kp resets its clock
    // Kp fetch failed: fall back to the recent last-good value rather than losing
    // the gate to one blip; beyond KP_STALE_MS stay null and amber (unknown ≠ calm).
    let kp=kpRaw;
    if(kp==null&&FLY.data&&FLY.data.kp!=null&&Date.now()-flyKpAt<KP_STALE_MS) kp=FLY.data.kp;
    let asp=aspRaw;
    if(asp!=null){ if(!fresh){ aspCache={lat:base.lat,lon:base.lon,rng:rngMi,ceilFt:asp.ceilFt,ts:Date.now()}; persistAsp(); } }
    // failed refetch: fall back to a MATCHING cache only, within the hard TTL —
    // beyond that stay null and amber (unknown ≠ clear)
    else if(matches&&age<ASP_HARD_TTL) asp={ceilFt:cc.ceilFt};
    FLY.precip=precip; FLY.err.radar=precip==null;
    // inbound = echo in the grey ring but NOT already in the red ring (which grounds)
    FLY.precipInbound = precipGrey===true && precip!==true;
    if(aloft){
      FLY.data={lat:base.lat,lon:base.lon,aloft,kp,asp};
      FLY.err.om=false; FLY.err.asp=asp==null;
    }else{
      if(FLY.data){ FLY.data.kp=kp; if(asp!=null){ FLY.data.asp=asp; FLY.err.asp=false; } }
    }
    FLY.err.kp=kp==null;
    // repaint the chart AND re-tick the SITREP: the title reads the NOW column
    // (and the unknown-input flags), so fresh gate data must reach both.
    flyPaint();
    scheduleSitrep();
  }finally{
    flyBusy=false;
    if(flyAgain){ flyAgain=false; flyRefresh(); }
  }
}
// viewport changed: refetch only when the crosshair really moved (zoom-only view
// changes reuse the data in place). The threshold matches the airspace cache
// tolerance, so any pan big enough to matter legally also refreshes the chart.
function flyOnMove(){
  loadWeather();   // refresh the weather card for the new crosshair (self-throttled)
  if(FLY.data&&havKm(FLY.data.lat,FLY.data.lon,gl.getCenter().lat,gl.getCenter().lng)<ASP_TOL_KM) return;
  flyRefresh();
}

// Paint the refresh dial(s): the arc FILLS from 0→360° across the refresh cycle
// (a numberless countdown), and while ANY map layer / the canifly chart / the
// weather pull is mid-fetch the dial SPINS instead (the .busy class swaps the fill
// for a rotating arc — this folds in the old load spinner). Runs on a 200 ms tick.
function updateLoadRing(){
  const busy = flyBusy || wxBusy || LAYERS.some(cfg=>{ const st=LAYER_STATE[cfg.id]; return st&&st.loading; });
  const deg = (Math.min(1,(Date.now()-refreshBase)/(REFRESH_S*1000))*360).toFixed(0)+'deg';
  document.querySelectorAll('.rdial').forEach(d=>{ d.classList.toggle('busy',busy); d.style.setProperty('--rp',deg); });
}

/* =====================================================================
   9a. EXTRA-ALERT AIRCRAFT HALO — a pulsing red/white beacon under any aircraft
   breaching the range+altitude threshold (the same LOW AIRCRAFT set that reds
   the SITREP title and its card). setAcAlert() is called every SITREP tick with
   the breaching positions; the halo pulses while any exist and clears when none.
   Motion is suppressed under prefers-reduced-motion (a static red halo instead).
   ===================================================================== */
let acAlertN=0, acPulseRaf=0;
const AC_PULSE_REDUCED=!!(window.matchMedia&&window.matchMedia('(prefers-reduced-motion:reduce)').matches);
function setAcAlert(feats){
  const s=gl.getSource('src-acalert'); if(!s) return;   // not added yet (pre-boot)
  s.setData({type:'FeatureCollection',features:feats||[]});
  acAlertN=(feats&&feats.length)||0;
  if(acAlertN) startAcPulse();
}
function acPulseFrame(){
  if(!acAlertN||!gl.getLayer('ly-acalert')){ acPulseRaf=0; return; }
  const t=(Date.now()%1200)/1200, k=(1-Math.cos(t*2*Math.PI))/2;   // 0→1→0 each 1.2 s
  gl.setPaintProperty('ly-acalert','circle-radius',10+13*k);
  gl.setPaintProperty('ly-acalert','circle-opacity',0.12+0.5*(1-k));
  gl.setPaintProperty('ly-acalert','circle-color',k>0.5?'#ffffff':SEV_COL[2]);
  acPulseRaf=requestAnimationFrame(acPulseFrame);
}
function startAcPulse(){
  if(!gl.getLayer('ly-acalert')) return;
  if(AC_PULSE_REDUCED){   // static red halo — no motion
    gl.setPaintProperty('ly-acalert','circle-radius',15);
    gl.setPaintProperty('ly-acalert','circle-opacity',0.5);
    gl.setPaintProperty('ly-acalert','circle-color',SEV_COL[2]);
    return;
  }
  if(!acPulseRaf) acPulseFrame();
}

/* =====================================================================
   9. RANGE RING — a dashed circle drawn on the map around the crosshair (the
   map centre) at the fixed 1 mi RED radius (RED_MI). It tracks the crosshair as
   you pan, so the map shows exactly the radius the flyability check sweeps. Its
   colour tracks the SITREP title severity (see sitrepTick): green clear, amber
   reduced / unverified, red grounded.
   ===================================================================== */
// ring colour by title severity 0·1·2 — matches --accent / --warn / --danger
const SEV_COL=['#2fe07a','#ffb454','#ff4455'];
const RING_N=96;   // vertices — a smooth circle at any zoom
// A closed ring of [lon,lat] points approximating a circle of `km` radius around
// (lat,lon). Equirectangular — exact enough for the small radii here (range ring,
// 3 nm stadium rings). Shared by the range ring and the airspace stadium buffers.
function circleRing(lat,lon,km,n){
  n=n||RING_N;
  const {dLat,dLon}=geoDeltas(km,lat), ring=[];
  for(let i=0;i<=n;i++){ const t=i/n*2*Math.PI;
    ring.push([lon+dLon*Math.cos(t), lat+dLat*Math.sin(t)]); }
  return ring;
}
function ringFC(lat,lon,miles){
  return {type:'FeatureCollection',features:[{type:'Feature',
    geometry:{type:'Polygon',coordinates:[circleRing(lat,lon,miles*MI_TO_KM,RING_N)]},properties:{}}]};
}
let _ringRaf=0;
function updateRing(){
  const c=gl.getCenter();
  const s=gl.getSource('src-ring'); if(s) s.setData(ringFC(c.lat,c.lng,RED_MI));
  // the light-grey dotted ring marks the LOW-AIRCRAFT traffic net (the 5 mi grey ring)
  const w=gl.getSource('src-warnring'); if(w) w.setData(ringFC(c.lat,c.lng,GREY_MI));
}
// coalesce the burst of 'move' events into one setData per animation frame
function scheduleRing(){ if(_ringRaf) return; _ringRaf=requestAnimationFrame(()=>{ _ringRaf=0; updateRing(); }); }
gl.on('move',scheduleRing);

// Never zoom in tighter than the VIEW radius (10 mi = 2× the grey ring): the view
// always shows at least a 10-mile-radius extent. We enforce this as a dynamic MAX
// ZOOM — the zoom at which a VIEW_MI-radius box just fills the padded viewport.
// Zooming in past it is blocked (the center-anchored zoom clamp reads getMaxZoom),
// and panning north auto-eases the camera back out. Recomputed on latitude change
// / resize since the mile↔zoom relationship depends on cos(lat) and the viewport.
const RING_ZOOM_HARD=16;   // the absolute max-zoom ceiling (matches map init)
let _ringZoomKey=null;
function enforceRingZoom(){
  const c=gl.getCenter();
  // Only recompute when an INPUT to the cap actually changed (latitude band via
  // cos(lat), the pixel viewport, or the map padding) — otherwise every pan would
  // needlessly churn the max-zoom.
  const ct=gl.getContainer();
  const key=c.lat.toFixed(2)+'|'+ct.clientWidth+'x'+ct.clientHeight+'|'
    +(_pad?[_pad.top,_pad.left,_pad.right,_pad.bottom].join(','):'0');
  if(key===_ringZoomKey) return;
  _ringZoomKey=key;
  // the fixed 10 mi VIEW radius and the shared °↔km math
  const {dLat,dLon}=geoDeltas(VIEW_MI*MI_TO_KM,c.lat);
  // cameraForBounds CLAMPS its result to the current maxZoom, so from a locked-in
  // (zoomed-to-the-cap) state it could only ever ratchet the cap DOWN and never
  // back up when the ring is made smaller. Lift the cap to the hard ceiling first
  // so the true fit zoom can be measured, then apply the real cap.
  const prev=gl.getMaxZoom();
  if(prev<RING_ZOOM_HARD) gl.setMaxZoom(RING_ZOOM_HARD);
  let z;
  try{ const cam=gl.cameraForBounds([[c.lng-dLon,c.lat-dLat],[c.lng+dLon,c.lat+dLat]],{padding:_pad||0}); z=cam&&cam.zoom; }catch(e){}
  const cap=(z!=null&&isFinite(z))
    ? Math.max(gl.getMinZoom(),Math.min(RING_ZOOM_HARD,z)) : prev;
  if(Math.abs(cap-prev)>0.02) cancelCenterZoom();
  gl.setMaxZoom(cap);   // also restores from the temporary hard-ceiling lift
}
gl.on('moveend',enforceRingZoom);
gl.on('resize',enforceRingZoom);

/* =====================================================================
   10. BOOT
   ===================================================================== */
gl.on('load',()=>{
  registerIcons();
  initLayers();
  // FAA airspace + NPS lands are background context — sink their fills + outlines
  // beneath the aircraft icons so planes and warnings always read on top.
  ['ly-nps','lyl-nps','ly-airspace','lyl-airspace'].forEach(id=>{ if(gl.getLayer(id)&&gl.getLayer('ly-nearair')) gl.moveLayer(id,'ly-nearair'); });
  // extra-alert halo — a pulsing beacon under any breaching aircraft, sat just
  // below the plane icons so the icon stays crisp on top of its own halo.
  gl.addSource('src-acalert',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
  gl.addLayer({id:'ly-acalert',type:'circle',source:'src-acalert',
    paint:{'circle-radius':14,'circle-color':SEV_COL[2],'circle-opacity':0.4,
      'circle-stroke-color':'#ffffff','circle-stroke-width':1.5,'circle-stroke-opacity':0.9}});
  if(gl.getLayer('ly-nearair')) gl.moveLayer('ly-acalert','ly-nearair');
  // LOW-AIRCRAFT traffic ring — a light-grey DOTTED circle at the 5 mi grey
  // radius (GREY_MI), marking how far out manned traffic is tracked + the amber
  // low-aircraft heads-up reaches. Added before the green ring so it reads under it.
  gl.addSource('src-warnring',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
  gl.addLayer({id:'ly-warnring',type:'line',source:'src-warnring',
    layout:{'line-cap':'round'},
    paint:{'line-color':SEV_COL[0],'line-width':1.4,'line-opacity':0.55,'line-dasharray':[0,2.6]}});
  // range ring — a dashed accent circle tracking the crosshair at RNG.mi, added
  // last so it sits on top of the map layers (under the HTML crosshair overlay)
  gl.addSource('src-ring',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
  gl.addLayer({id:'ly-ring',type:'line',source:'src-ring',
    paint:{'line-color':SEV_COL[0],'line-width':1.5,'line-opacity':0.72,'line-dasharray':[2,2]}});
  updateRing();
  enforceRingZoom();   // establish the initial ring-≤-1/3 max-zoom cap
  // Pull DYNAMIC, NON-VIEWPORT layers once on load (mil/sos are small global queries;
  // SPC feeds the SITREP outlook card). We SKIP the pre-fix default centre for:
  //  • STATIC layers (airspace/NPS) — a regional cache, and
  //  • the heavy VIEWPORT aircraft feed — a 250 nm query over the US interior before we
  //    know where you are is pure waste (thousands of planes, the slowest pull) and gets
  //    thrown away the moment the fix lands.
  // The first location fix's moveend loads BOTH around YOU (fallback below if none lands).
  LAYERS.forEach(cfg=>{ LAYER_STATE[cfg.id].started=true; if(!cfg.static && !cfg.viewport) runLayer(cfg); });
  setTimeout(()=>{ ensureStaticRegion();   // fallback: load region + aircraft even if location never resolves
    if(USER.lat==null) LAYERS.forEach(cfg=>{ if(cfg.viewport) runLayer(cfg); }); },3500);
  refreshBase=Date.now(); setInterval(refreshTick,1000); refreshTick(); // refresh pulse + clock
  updateLoadRing(); setInterval(updateLoadRing,200);   // bottom-left data-loading ring
  loadXray(); setInterval(loadXray,180000); // space weather: GOES X-ray flare (SITREP card)
  loadWeather(true);   // weather forecast: the always-present bottom SITREP card
  setMapPadding();
  enforceRingZoom();   // recompute the cap now that desktop panel padding is applied
  flyRender(); flyRefresh();   // chart skeleton now, first data pull immediately
  locate();
  sitrepTick(); // SITREP works off the map area, even before a location fix
  if(!sitrepTimer) sitrepTimer=setInterval(sitrepTick,90000);
  [700,3000,7000].forEach(t=>setTimeout(()=>{ setMapPadding(); sitrepTick(); },t));
});
</script>
