<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="canifly">
<meta name="description" content="canifly — keyless drone preflight: can I fly here, now, and how high? GPS-located: live winds aloft, FAA airspace and traffic.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%9B%A9%3C/text%3E%3C/svg%3E">
<title>canifly</title>

<!-- canifly — single-file GPS drone-preflight brief (no build/keys; airspace reads the rmhiq hub). Logic map: README.md -->

<style>
  /* theme + base — read-only display: no selection, callout, tap highlight, or zoom */
  :root{
    --bg:#000000; --line:#1a2730;
    --ink:#d6e2ee; --ink-dim:#748596;
    --go:#2fe07a; --nogo:#ff4455;   /* the two verdict colors — GO green / NO-GO red */
    --mono:"SF Mono",ui-monospace,"Cascadia Code",Menlo,Consolas,monospace;
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;
    -webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);   /* 100% not dvh — iOS URL bar makes dvh short */
    font-family:var(--mono);font-size:13px;overflow:hidden;
    -webkit-text-size-adjust:100%;text-size-adjust:100%;   /* stops iOS font auto-inflate on orientation flip */
    overscroll-behavior:none;touch-action:manipulation;text-transform:uppercase}
  #sit-body{touch-action:pan-y}   /* the SITREP scrolls; pinch/double-tap zoom stays dead */
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:#233247;border-radius:4px}
  ::-webkit-scrollbar-track{background:transparent}

  /* app shell — one full-screen column, phone-width-capped on wide screens */
  #app{position:fixed;inset:0;display:flex;flex-direction:column;
    width:100%;max-width:620px;margin:0 auto;
    border-left:1px solid var(--line);border-right:1px solid var(--line)}

  /* flyability chart — top section, sized to content */
  #fly-pane{flex:0 0 auto;min-height:0;border-bottom:1px solid var(--line);background:#000;
    display:flex;flex-direction:column;align-items:center;
    gap:min(1.6vh,10px);padding:calc(var(--safe-top) + 10px) 14px min(2vh,12px)}
  #fly-board{position:relative;width:100%;max-width:560px}
  #fly-pane .grid{width:100%;border:1px solid var(--line);border-radius:12px;
    padding:8px 10px;display:grid;
    grid-template-columns:minmax(0,1.15fr) repeat(4,minmax(0,1fr));   /* labels + NOW..+3h */
    align-content:center;font-variant-numeric:tabular-nums}
  #fly-pane .grow{display:contents}
  #fly-pane .ga,#fly-pane .gc{display:flex;align-items:center;min-width:0;white-space:nowrap;
    padding:5px 6px;line-height:1}
  #fly-pane .ga{justify-content:flex-start;color:var(--ink);letter-spacing:.03em;font-size:12px}
  #fly-pane .gc{justify-content:center;font-weight:700;font-size:15px;
    color:var(--ink);border-left:1px solid #16212b}   /* faint rule between time columns */
  #fly-pane .gu,#fly-pane .wd{font-size:10px;font-weight:600;color:inherit;letter-spacing:.02em;margin-left:.18em}   /* ft/mph/dir tags — one fixed size everywhere */
  #fly-pane .gc.good{background:rgba(47,224,122,.14);color:var(--go)}   /* cells are strictly BINARY — no yellow in the grid, ever */
  #fly-pane .gc.bad{background:rgba(255,68,85,.16);color:var(--nogo)}
  #fly-pane .ga.bad{color:var(--nogo)}
  #fly-pane .ghead .gc.bad{background:none;color:var(--nogo)}
  #fly-pane .ghead .ga,#fly-pane .ghead .gc{border-bottom:1px solid var(--line);
    padding-bottom:5px;font-weight:500;font-size:12px;color:var(--ink)}
  #fly-pane .ghead .gc{border-left:0}
  #fly-pane .ghead .gc.now{font-weight:800;font-size:15px;letter-spacing:.02em}   /* NOW matches the clock's size/weight — it carries the verdict */
  #fly-pane .ghead .gc.now.go{color:var(--go)}   /* the NOW header carries the verdict color */
  #fly-pane .ghead .gc.now.nogo{color:var(--nogo)}
  #fly-pane .ga.hi{font-weight:700}   /* bold "highest flyable" altitude label */
  #fly-pane .ggust .ga,#fly-pane .ggust .gc{border-top:1px solid rgba(116,133,150,.4)}
  #fly-pane .gc.rsn{font-size:13px;font-weight:800;letter-spacing:.03em}   /* gate-code cell (GUST/VIS/SKY/WIND/FAA/TRFC/KPx) */
  #fly-pane .ga.clock{justify-content:flex-start;font-weight:800;font-size:15px;letter-spacing:.02em;color:#eaf1f8}   /* all-white clock — verdict lives on NOW, not here */
  #fly-pane .ga.clock .clk-colon{color:#eaf1f8;margin:0 .03em}   /* blinks white ↔ off-white, never black */
  @keyframes flypulse{0%,100%{opacity:1}50%{opacity:.2}}
  #fly-pane .sk{display:block;border-radius:4px;background:var(--ink-dim);opacity:.22;   /* loading shimmer, one text-line tall — no shift on load */
    width:58%;height:15px;margin:0 auto;animation:flypulse 1.6s ease-in-out infinite}
  @media (prefers-reduced-motion:reduce){#fly-pane .sk{animation:none}}

  /* SITREP — scrolling card list, fills the rest */
  #sit-body{display:flex;flex-direction:column;overflow-y:auto;
    padding:4px 0 calc(var(--safe-bottom) + 6px);-webkit-overflow-scrolling:touch;
    flex:1 1 auto;min-height:0}
  .sit-row{flex:0 0 auto;display:flex;align-items:center;gap:9px;padding:8px 12px;font-size:13px;   /* no-shrink keeps row height stable between fit and scroll states */
    min-height:62px;border-bottom:1px solid #10171f}
  .sit-row .ic{flex:0 0 30px;text-align:center;align-self:center;
    font-size:23px;line-height:1;text-transform:none}
  .sit-row .tx{flex:1;min-width:0;line-height:1.34;display:flex;flex-direction:column;justify-content:center}
  .sit-row .tx .s1,.sit-row .tx .s2,.sit-row .tx .s3{display:block;white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis}   /* overlong lines truncate with … */
  .sit-row .tx .s1{color:var(--ink);letter-spacing:.3px}
  .sit-row .tx .s2,.sit-row .tx .s3{color:var(--ink-dim);font-size:12px}
  .sit-row.danger .s1{color:var(--nogo)}     /* red no-go card */
  .u{letter-spacing:0;font-style:normal}   /* unit token keeps its own spacing in the upper-cased body */

  /* phone landscape ONLY — too short to stack, so chart LEFT / cards RIGHT; gated by height ≤500px (phones; iPad Mini is 744) + coarse pointer */
  @media (orientation:landscape) and (max-height:500px) and (pointer:coarse){
    #app{flex-direction:row;max-width:none}
    #fly-pane{flex:0 1 auto;max-width:60%;min-width:0;justify-content:center;
      border-bottom:none;border-right:1px solid var(--line);
      padding:10px 14px;padding-left:calc(env(safe-area-inset-left,0px) + 14px)}
    #sit-body{flex:1 1 0;padding-top:calc(var(--safe-top) + 4px);
      padding-right:calc(env(safe-area-inset-right,0px))}
  }
</style>
</head>
<body>
<main id="app"><!-- one full-screen column: chart (white clock top-left, verdict on NOW header), then the SITREP -->
  <section id="fly-pane">
    <div id="fly-board" role="group" aria-label="canifly"></div>
  </section>
  <span id="sit-title" hidden></span><!-- hidden canonical verdict element (tests/parity) -->
  <div id="sit-body"></div><!-- boot shows loading chart + GPS card; no empty screen -->
</main>


<script>
"use strict";
// 0. helpers
const $ = s => document.querySelector(s);
async function getJSON(url,opts={}){   // fetch + parse with a hard timeout (default 15 s)
  const c=new AbortController(); const to=setTimeout(()=>c.abort(),opts.timeout||15000);
  try{
    const r=await fetch(url,{signal:c.signal,headers:opts.headers||{}});
    if(!r.ok) throw new Error('HTTP '+r.status);
    return await r.json();
  } finally { clearTimeout(to); }
}
const REFRESH_S=5;   // THE refresh cadence [s] — every live pull rides it; slower feeds declare their own multiple
const store=(k,v)=>{ try{ localStorage.setItem(k,String(v)); }catch(e){} };   // persist; blocked storage (private mode) is fine
const geoDeltas=(mi,lat)=>({dLat:mi/69.172,   // equirectangular °-offsets spanning `mi` statute miles (69.172 mi/°lat)
  dLon:mi/(69.172*Math.max(0.2,Math.cos(lat*Math.PI/180)))});
function circleRing(lat,lon,mi,n){   // closed [lon,lat] ring ≈ mi-radius circle (buffers stadium points into TFR polygons)
  const {dLat,dLon}=geoDeltas(mi,lat), ring=[];
  for(let i=0;i<=n;i++){ const t=i/n*2*Math.PI;
    ring.push([lon+dLon*Math.cos(t), lat+dLat*Math.sin(t)]); }
  return ring;
}
function havMi(lat1,lon1,lat2,lon2){   // great-circle distance, statute miles
  const R=3958.7613,d=Math.PI/180;   // earth radius [mi]
  const a=Math.sin((lat2-lat1)*d/2)**2+
    Math.cos(lat1*d)*Math.cos(lat2*d)*Math.sin((lon2-lon1)*d/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function bearing(lat1,lon1,lat2,lon2){   // initial bearing 1 → 2, degrees (0 = N, clockwise)
  const d=Math.PI/180;
  const y=Math.sin((lon2-lon1)*d)*Math.cos(lat2*d);
  const x=Math.cos(lat1*d)*Math.sin(lat2*d)-Math.sin(lat1*d)*Math.cos(lat2*d)*Math.cos((lon2-lon1)*d);
  return (Math.atan2(y,x)/d+360)%360;
}
const COMPASS8=['N','NE','E','SE','S','SW','W','NW'];
const compass=deg=>COMPASS8[Math.round(deg/45)%8];
const U = s => `<span class="u">${s}</span>`;   // unit-token wrapper (keeps its spacing — see .u)
const fmtMi = mi =>   // under half a mile reads in feet
  mi<0.5?Math.round(mi*5280)+U(' ft'):mi<100?mi.toFixed(1)+U(' mi'):Math.round(mi)+U(' mi');

// ADS-B sources — airplanes.live + adsb.fi, BOTH queried every pull and merged by icao24.
// Each host declares its OWN point route and list key: adsb.fi has no /point route (400) and
// wraps results in `aircraft`, so a shared path/shape would silently drop one feed (verified live).
const ADSB_HOSTS=[
  {point:(la,lo,r)=>`https://api.airplanes.live/v2/point/${la}/${lo}/${r}`,       list:j=>j.ac||[]},
  {point:(la,lo,r)=>`https://opendata.adsb.fi/api/v2/lat/${la}/lon/${lo}/dist/${r}`, list:j=>j.aircraft||[]},
];
const MI_TO_NM=0.868976, ADSB_MAX_NM=100;   // point radii are NAUTICAL miles (the aviation unit) — the only NM in the app
function adsbRadiusNm(){   // pull radius = max(DATA ring, 15 nm floor) — at a 10 mi ring the 15 nm floor binds, keeping margin over the 1 mi ring; 100 nm guard cap
  return Math.min(ADSB_MAX_NM,Math.max(15,Math.ceil(DATA_MI*MI_TO_NM)));
}
function adsbMerge(lists){   // union of both feeds keyed on icao24 (`hex`) — for a duplicate the NEWEST report wins
  const byId=new Map(), out=[];
  for(const list of lists) for(const a of (list||[])){
    const id=String(a.hex||a.icao24||'').trim().toLowerCase();
    if(!id){ out.push(a); continue; }   // ID-less ghost (some tisb/mlat) — nothing to merge on, keep as-is
    const age=(typeof a.seen==='number'&&isFinite(a.seen))?a.seen:Infinity;   // `seen` = s since last message; smaller = newer
    const ex=byId.get(id);
    if(!ex||age<ex.age) byId.set(id,{a,age});
  }
  byId.forEach(v=>out.push(v.a));
  return out;
}
async function adsbViewport(){   // centred on your GPS position (only ever called after a fix)
  const la=USER.lat.toFixed(3), lo=USER.lon.toFixed(3), r=adsbRadiusNm();
  const pulls=await Promise.allSettled(ADSB_HOSTS.map(h=>   // both hosts in parallel, 9 s each — one down host can't hang or hide the other
    getJSON(h.point(la,lo,r),{timeout:9000}).then(j=>h.list(j))));
  const lists=pulls.filter(p=>p.status==='fulfilled').map(p=>p.value);
  if(!lists.length) throw pulls[0].reason||new Error('all ADS-B hosts unreachable');   // caller keeps last-good planes and retries
  return {ac:adsbMerge(lists)};
}
function acProps(a){   // ONE property builder per contact — card/chart/AGL fields can never drift
  return {flight:String(a.flight||a.r||a.hex||'?').trim(),
    reg:String(a.r||'').trim(),   // tail registration (line-2 fallback)
    type:a.t||'?',desc:a.desc||'',op:a.ownOp||'',
    alt:a.alt_baro??a.alt_geom??'?',
    altBaro:(typeof a.alt_baro==='number'?a.alt_baro:null),   // raw baro kept so AGL can QNH-correct it
    spd:a.gs!=null?Math.round(a.gs):'?',   // ground speed [kt]
    hex:a.hex||'',cat:a.category||'',src:a.type||''};   // emitter category + message source (line-2 fallbacks)
}
const acFeature=a=>({type:'Feature',
  geometry:{type:'Point',coordinates:[a.lon,a.lat]},
  properties:acProps(a)});
function acFeatures(j){
  return (j.ac||[]).filter(a=>a.lat!=null&&a.lon!=null).map(acFeature);
}
function featsIn(id){const st=LAYER_STATE[id];return (st&&st.features)||[];}   // last stored features for a layer
function viewEnv(){   // ArcGIS envelope (W,S,E,N) — the DATA-ring box around you, for the airspace/NPS pulls
  const {dLat,dLon}=geoDeltas(DATA_MI,USER.lat);
  return [USER.lon-dLon,USER.lat-dLat,USER.lon+dLon,USER.lat+dLat].map(n=>n.toFixed(3)).join(',');
}
function polyPt(f){   // representative [lon,lat] for a feature (first vertex)
  const g=f.geometry; if(!g) return null;
  if(g.type==='Point') return g.coordinates;
  if(g.type==='Polygon') return g.coordinates[0] && g.coordinates[0][0];
  if(g.type==='MultiPolygon') return g.coordinates[0] && g.coordinates[0][0] && g.coordinates[0][0][0];
  return null;
}
function nearestEdge(f,lon,lat){   // nearest boundary point to (lon,lat) → {pt,mi}; planar with cos(lat) x-scale
  const g=f.geometry; if(!g) return null;
  const rings=g.type==='Polygon'?g.coordinates:g.type==='MultiPolygon'?g.coordinates.flat():[];
  const k=Math.cos(lat*Math.PI/180)||1e-6;
  let best=null,bd=Infinity;
  rings.forEach(r=>{ for(let i=0;i+1<r.length;i++){
    const ax=(r[i][0]-lon)*k, ay=r[i][1]-lat, bx=(r[i+1][0]-lon)*k, by=r[i+1][1]-lat;
    const dx=bx-ax, dy=by-ay, l2=dx*dx+dy*dy;
    let t=l2>0?-(ax*dx+ay*dy)/l2:0; t=t<0?0:t>1?1:t;   // project onto the edge segment, clamped
    const cx=ax+t*dx, cy=ay+t*dy, d2=cx*cx+cy*cy;
    if(d2<bd){ bd=d2; best=[lon+cx/k, lat+cy]; }
  }});
  return best?{pt:best,mi:havMi(lat,lon,best[1],best[0])}:null;
}
function pointInRing(lon,lat,ring){   // ray casting
  let inside=false;
  for(let i=0,j=ring.length-1;i<ring.length;j=i++){
    const xi=ring[i][0],yi=ring[i][1],xj=ring[j][0],yj=ring[j][1];
    if(((yi>lat)!==(yj>lat)) && (lon<(xj-xi)*(lat-yi)/(yj-yi)+xi)) inside=!inside;
  }
  return inside;
}
function pointInFeature(f,lon,lat){   // inside the outer ring and not in a hole
  const g=f.geometry; if(!g) return false;
  const polys=g.type==='Polygon'?[g.coordinates]:g.type==='MultiPolygon'?g.coordinates:[];
  for(const poly of polys){
    if(poly[0] && pointInRing(lon,lat,poly[0]) && !poly.slice(1).some(h=>pointInRing(lon,lat,h))) return true;
  }
  return false;
}
const escapeHtml =s => String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

// RMHIQ hub — the airspace-listing backend (isquividet/rmhiq): it walks the national FAA/NPS layers
// into D1 on its own paced schedule; canifly only READS its bbox API, so no client can ever hit
// FAA's throttle. CORS-open, keyless, and it serves the exact properties FAA does — plus a
// `layer` id on each feature. Feature-bbox overlap is a superset of true intersection, so every
// query errs toward INCLUDING a restriction, never dropping one. (LAANC ceilings are the one
// exception — pulled direct from the FAA UAS Facility Map now that it's just a tiny point query.)
const RMHIQ='https://rmhiq.p9wtwsggnd.workers.dev';
async function rmhiqFC(bbox,layers,timeout){   // bbox query → FeatureCollection; anything short of complete coverage THROWS
  const fc=await getJSON(`${RMHIQ}/api/airspace?bbox=${bbox}&layers=${layers}`,{timeout:timeout||10000});
  if(fc.error||fc.type!=='FeatureCollection'||!Array.isArray(fc.features)) throw new Error('rmhiq airspace query failed');
  if(fc.truncated) throw new Error('rmhiq airspace result truncated');   // a clipped listing must not read as complete coverage
  return fc;
}
window.__sitrep={};   // debug/test handle (modules attach as the app wires up)

// 1. data feeds — {id, refresh[s], viewport?, loader → GeoJSON FC (null = keep current)}; features are
// STORED in LAYER_STATE for the SITREP/chart to read (no map). viewport = position-scoped, refetched on
// move. A loader THROWS on failure → the runtime keeps last-good data and retries on a short backoff.
const LAYERS=[];
const defLayer=c=>LAYERS.push(c);
const USER={lat:null,lon:null,acc:null};   // your GPS fix; acc in metres (the browser API's unit)

defLayer({   // AIRCRAFT — one layer, one /point pull, every contact civil + military alike (no military tagging)
  id:'nearair', refresh:REFRESH_S,
  viewport:true,   // refetched when you move + every pulse
  loader: async ()=>({type:'FeatureCollection',features:acFeatures(await adsbViewport())})
});

function floorFt(v){   // airspace floor → ft: SFC/blank → 0 · FLnnn → nnn×100 · number → itself · junk → 0 (conservative)
  if(v==null) return 0;
  const s=String(v).trim().toUpperCase();
  if(s===''||/^(SFC|SURF|GND|GROUND|0)$/.test(s)) return 0;
  const fl=s.match(/FL\s*0*(\d+)/); if(fl) return +fl[1]*100;
  const n=parseFloat(s.replace(/[, ]/g,''));
  return isFinite(n)?n:0;
}

defLayer({   // FAA AIRSPACE LISTING (cards + zones/restrict gates) — CONTEXT; the FAA ceiling gate has its own point queries
  id:'airspace', viewport:true, refresh:900,   // 15 min: TFRs/stadium events move, so stationary sessions stay fresh
  loader: async ()=>{
    const fc=await rmhiqFC(viewEnv(),'asp-class,asp-defense-tfr,asp-sua,asp-nsufr,asp-stadiums');   // ONE hub call replaces five FAA services; throw = keep last-good + retry; a clean [] is a real empty area
    const feats=[];
    const push=(geom,props)=>{ if(geom) feats.push({type:'Feature',geometry:geom,properties:props}); };
    const CTRL={B:'#5b8def',C:'#c06ad0',D:'#5b8def'};   // identity palette, never verdict colors (see README)
    const SUA={P:['hard','PROH','#7c5cff'],R:['caution','RSTD','#22d3ee'],   // P hard · R conditional · MOA/W/A/D advisory
      MOA:['advisory','MOA','#8fa3bf'],W:['advisory','WARN','#8fa3bf'],A:['advisory','ALRT','#8fa3bf'],D:['advisory','DNGR','#8fa3bf']};
    fc.features.forEach(f=>{ const p=f.properties||{},g=f.geometry;
      if(!g) return;
      switch(p.layer){
        case 'asp-class':{ const cl=p.CLASS;   // controlled airspace B/C/D + surface-E2
          if(!(/^[BCD]$/.test(cl)||p.LOCAL_TYPE==='CLASS_E2')) return;
          push(g,{sev:'ctrl',cls:cl,code:cl,name:p.NAME||'',_col:CTRL[cl]||'#c06ad0'}); break; }
        case 'asp-defense-tfr':   // defense TFRs — hard no-fly (violet)
          push(g,{sev:'hard',cls:'DEF',code:'DEF',name:p.NAME||'',_col:'#7c5cff'}); break;
        case 'asp-sua':{ const t=SUA[p.TYPE_CODE]; if(!t) return;
          if(floorFt(p.LOWER_VAL)>SPEC.regFt) return;   // floor above the drone band → irrelevant
          push(g,{sev:t[0],cls:p.TYPE_CODE,code:t[1],name:p.NAME||'',_col:t[2]}); break; }
        case 'asp-nsufr':   // part-time security UAS zones — hard no-fly
          if(floorFt(p.Floor)>SPEC.regFt) return;
          push(g,{sev:'hard',cls:'NSUFR',code:'NSUF',name:p.Facility||'security zone',_col:'#7c5cff'}); break;
        case 'asp-stadiums':   // stadium points → 3 nm (3.452 mi) TFR rings, conditional
          if(g.type!=='Point') return;
          push({type:'Polygon',coordinates:[circleRing(g.coordinates[1],g.coordinates[0],3.452,48)]},
            {sev:'caution',cls:'STDM',code:'STDM',name:p.NAME||'stadium',_col:'#22d3ee'}); break;
      }
    });
    return {type:'FeatureCollection',features:feats};
  }
});

defLayer({   // NPS lands — drones can't launch/land/operate in a unit → hard no-fly listing
  id:'nps', viewport:true,
  loader: async ()=>{
    const fc=await rmhiqFC(viewEnv(),'nps');   // throw = keep last-good + retry, never "no parks here"
    const feats=[];
    fc.features.forEach(f=>{ if(!f.geometry) return; const p=f.properties||{};
      feats.push({type:'Feature',geometry:f.geometry,properties:{
        name:p.UNIT_NAME||'',utype:p.UNIT_TYPE||''}}); });
    return {type:'FeatureCollection',features:feats};
  }
});

// 2. feed runtime — per-feed fetch state + the unified 5 s pulse
const LAYER_STATE={};
let sitrepRefreshT=null;
function scheduleSitrep(){ clearTimeout(sitrepRefreshT); sitrepRefreshT=setTimeout(()=>{   // debounce a burst of updates to one recompute
  try{if(FLY.data)flyPaint();}catch(e){console.warn('[fly-paint]',e);}   // chart first — the SITREP reads its NOW values
  try{sitrepTick();}catch(e){console.warn('[sitrep]',e);} },300); }

// ground-elevation cache (ft AMSL, ~0.7 mi cells) — terrain UNDER EACH PLANE keeps AGL honest over rolling ground
const _elevCache={}; let _elevBusy=false, _elevFailAt=0, _elevAt=0;   // failures are NEVER cached (a poisoned 0 would break AGL)
const ELEV_RETRY_MS=15000;     // wait after a failed batch
const ELEV_COOLDOWN_MS=20000;  // never-caching cells (over water) can't loop-fetch and rate-limit open-meteo
const elevKey=(la,lo)=>la.toFixed(2)+','+lo.toFixed(2);
function groundElevFt(la,lo){   // synchronous read; null until fetched
  const v=_elevCache[elevKey(la,lo)];
  return v==null?null:v;
}
function ensureGroundElev(pts){   // batch-fetch uncached cells (deduped, capped), then re-tick so AGL fills in
  if(_elevBusy || Date.now()-_elevFailAt<=ELEV_RETRY_MS || Date.now()-_elevAt<ELEV_COOLDOWN_MS) return;
  const need=[], seen=new Set();
  for(const p of pts){ if(!p||!isFinite(p[0])||!isFinite(p[1])) continue;
    const k=elevKey(p[0],p[1]); if((k in _elevCache)||seen.has(k)) continue;
    seen.add(k); need.push([p[0],p[1],k]); }
  if(!need.length) return;
  const batch=need.slice(0,90);
  _elevBusy=true; _elevAt=Date.now();
  const lats=batch.map(n=>n[0].toFixed(4)).join(',');
  const lons=batch.map(n=>n[1].toFixed(4)).join(',');
  getJSON(`https://api.open-meteo.com/v1/elevation?latitude=${lats}&longitude=${lons}`,{timeout:9000})
    .then(d=>{ const arr=d&&Array.isArray(d.elevation)?d.elevation:null;
      if(arr&&arr.length===batch.length){
        batch.forEach((n,idx)=>{ const m=arr[idx];
          if(typeof m==='number'&&isFinite(m)) _elevCache[n[2]]=m*M_TO_FT; }); }   // metres → ft at the feed edge
      else _elevFailAt=Date.now(); })
    .catch(()=>{ _elevFailAt=Date.now(); })
    .finally(()=>{ _elevBusy=false; scheduleSitrep(); });
}
let QNH_HPA=null;   // local sea-level pressure [hPa] from the aloft pull — QNH-corrects ADS-B pressure altitude

const failBackoffMs=n=>Math.min(6000,1500*n);   // failing-layer backoff: 1.5 s → 6 s cap (recovery within seconds)

async function runLayer(cfg){
  const st=LAYER_STATE[cfg.id];
  const myGen=++st.gen;   // generation token — only the newest call may write, out-of-order finishes can't clobber
  st.loading=true; st.loadStart=Date.now();
  try{
    if(st.quickTimer){ clearTimeout(st.quickTimer); st.quickTimer=null; }
    let lastErr=null;
    for(let attempt=0;attempt<2;attempt++){   // one quick in-loop retry — a dropped connection usually clears at once
      try{
        const fc=await cfg.loader();
        if(myGen!==st.gen) return;   // superseded by a newer refresh — drop this result
        if(fc) st.features=fc.features||[];   // null = "no update", keep what's loaded
        st.fails=0; st.failSince=0; st.everLoaded=true;
        scheduleSitrep();
        return;
      }catch(e){
        lastErr=e;
        if(myGen!==st.gen) return;   // a newer refresh owns the layer now
        if(attempt<1){
          await new Promise(r=>setTimeout(r,500));
          if(myGen!==st.gen) return;
        }
      }
    }
    st.fails=(st.fails||0)+1; st.failAt=Date.now();   // failed cycle — KEEP the data; the pulse backs off
    if(!st.failSince) st.failSince=Date.now();        // start the sustained-failure clock
    console.warn('[layer '+cfg.id+']',lastErr&&lastErr.message);
    if(!st.quickTimer){
      const delay=failBackoffMs(st.fails);
      st.quickTimer=setTimeout(()=>{ st.quickTimer=null; runLayer(cfg); },delay);   // sole retry path for cadence-less layers (NPS)
    }
  } finally {
    if(myGen===st.gen) st.loading=false;
  }
}

const LOAD_STALL_MS=20000;   // one full two-host ADS-B pass + margin — past this a pulse may start a fresh attempt (token drops the stale one)
let refreshBase=Date.now(), pulseCount=0;
function pulse(force){   // ONE pulse drives every data kick; force = pull every started layer now
  if(!force) pulseCount++;   // forced pulls don't shift the cadence grid
  LAYERS.forEach(cfg=>{
    const st=LAYER_STATE[cfg.id];
    if(!st||!st.started) return;
    if(cfg.viewport && USER.lat==null) return;   // position-scoped feeds wait for a fix
    if(st.loading && Date.now()-(st.loadStart||0)<LOAD_STALL_MS) return;   // still fetching, not yet stalled
    if(!force){
      if(!(cfg.refresh>0)) return;   // cadence-less (NPS) refetches on move only
      const everyN=Math.max(1,Math.round(cfg.refresh/REFRESH_S));   // grid-aligned — a move can't push a refresh past a cycle
      if(pulseCount%everyN!==0) return;
      if(st.fails && Date.now()-(st.failAt||0)<failBackoffMs(st.fails)) return;   // failing → the quickTimer owns the retry
    }
    runLayer(cfg);
  });
  flyRefresh();   // chart inputs self-throttle on their own natural cadences
  refreshBase=Date.now();
}
function refreshTick(){ if(!document.hidden && Date.now()-refreshBase>=REFRESH_S*1000) pulse(); }   // hidden page = pulse paused (resumes + refires on return)

function initLayers(){   // per-layer runtime state (features + fetch bookkeeping)
  LAYERS.forEach(cfg=>{
    LAYER_STATE[cfg.id]={features:[],started:false,everLoaded:false,
      gen:0,quickTimer:null,fails:0,failSince:0,loading:false,loadStart:0};
  });
}

const mkCard=(cls,ic,l1,l2,l3,hazard,col)=>({cls,ic,l1,l2,l3,hazard,col});   // cls = display color (from gate sev) · hazard = RANKING only, never a verdict vote · col = identity hex · mi (set later) = range sort key

// 3. location — GPS only, no IP fallback; position leaves the browser only as lat/lon params to the keyless feeds (pipeline: README)
let sitrepTimer=null;

const FIRST_FIX_SETTLE_MS=3000;   // collect pings this long, then commit the most accurate
const GOOD_ACCURACY_M=65;         // a ping this sharp commits immediately [m — the browser's unit]
const ACC_BAD_M=100;              // a committed fix worse than this (~330 ft) → a neutral "weak signal" heads-up (never changes the verdict)
const POSITION_SMOOTHING=0.25;    // low-pass factor for stationary jitter (0 frozen … 1 raw)

// movement refresh ladder [statute miles] — one tolerance per product, scaled to its spatial reach (see README)
const REAL_MOVE_MI=0.03;     // ~160 ft: below = jitter (smoothed) · above = real move (snap)
const ASP_TOL_MI=0.1;        // ~530 ft: re-query the point products — FAA gate + winds aloft
const REFETCH_MOVE_MI=0.5;   // recentre the 25 mi listing footprint + kick the aircraft pull

let firstFixCommitted=false, bestFirstPing=null, bestAccuracyM=Infinity;
let smoothedLat=null, smoothedLon=null, geoBlocked=false;   // geoBlocked = permission denied / no geolocation API (distinct from "still acquiring")
let geoWatchId=null;
let lastFetchLat=null, lastFetchLon=null;   // where the listing footprint was last centred

function commitFirstFix(){
  if(firstFixCommitted||!bestFirstPing) return;
  firstFixCommitted=true;
  smoothedLat=bestFirstPing.lat; smoothedLon=bestFirstPing.lon;
  setUserFix(bestFirstPing.lat,bestFirstPing.lon,bestFirstPing.acc);
}
function onGeoPing(lat,lon,acc){
  const a=acc==null?9999:acc;
  if(a<bestAccuracyM) bestAccuracyM=a;
  if(!firstFixCommitted){
    if(!bestFirstPing) setTimeout(commitFirstFix,FIRST_FIX_SETTLE_MS);   // first ping arms the settle timer
    if(!bestFirstPing || a<=bestFirstPing.acc) bestFirstPing={lat,lon,acc:a};   // pings compete on accuracy
    if(a<=GOOD_ACCURACY_M) commitFirstFix();   // sharp enough → commit at once
    return;
  }
  if(a>Math.max(150,bestAccuracyM*3)) return;   // junk vs what this device can do → drop
  if(smoothedLat==null || havMi(smoothedLat,smoothedLon,lat,lon)>REAL_MOVE_MI){
    smoothedLat=lat; smoothedLon=lon;   // real move → snap
  } else {
    smoothedLat+=POSITION_SMOOTHING*(lat-smoothedLat);   // stationary jitter → smooth
    smoothedLon+=POSITION_SMOOTHING*(lon-smoothedLon);
  }
  setUserFix(smoothedLat,smoothedLon,a);
}
function startGpsWatch(){   // ONE persistent watchPosition — GPS streams continuously, it never rides the pulse
  if(geoWatchId!=null) return;
  if(!navigator.geolocation){ geoBlocked=true; sitrepTick(); return; }   // no geolocation → no fix ever; the gps gate holds the verdict red
  try{
    geoWatchId=navigator.geolocation.watchPosition(
      pos=>onGeoPing(pos.coords.latitude,pos.coords.longitude,pos.coords.accuracy),
      err=>{ if(err&&err.code===1){ geoBlocked=true; sitrepTick(); } },   // PERMISSION_DENIED → stays fixless, verdict stays red
      {enableHighAccuracy:true,timeout:10000,maximumAge:5000});
  }catch(e){ geoBlocked=true; sitrepTick(); }
}
function locate(){ startGpsWatch(); }

function refetchNearbyFeeds(){   // recentre every position-scoped feed + the chart on the new area
  lastFetchLat=USER.lat; lastFetchLon=USER.lon;
  LAYERS.forEach(cfg=>{ if(cfg.viewport){ const st=LAYER_STATE[cfg.id];
    if(st&&st.started&&!st.loading) runLayer(cfg); } });
  flyRefresh();
}
function setUserFix(lat,lon,acc){   // adopt a committed fix — first fix kicks everything, later ones per the ladder
  const first=USER.lat==null;
  USER.lat=lat; USER.lon=lon;
  if(acc!=null) USER.acc=acc;
  if(first){ refetchNearbyFeeds(); }
  else if(lastFetchLat==null || havMi(lastFetchLat,lastFetchLon,lat,lon)>=REFETCH_MOVE_MI){
    refetchNearbyFeeds();
  }
  sitrepTick();   // always repaint
}

// 4. sitrep cards — CATS maps each feed to a card shape; cls = display color · head/sub/detail = lines 1/2/3
const cut=(s,n)=>escapeHtml(String(s==null?'':s).trim().slice(0,n));   // clip + escape (CSS adds the …)
const ALT=f=>{const a=f.properties.alt;   // readsb reports alt_baro:'ground' for taxiing aircraft
  return a==='ground'?'on ground':isFinite(+a)&&a!==''?Math.round(+a)+U(' ft'):'—';};   // numeric-coerced — a feed string can never reach innerHTML
const CAT_LABEL={A1:'light',A2:'small',A3:'large',A4:'large',A5:'heavy',A6:'high-perf',A7:'rotorcraft',   // emitter category — broadcast over-air, so often present when DB enrichment isn't
  B1:'glider',B2:'balloon',B4:'ultralight',B6:'drone',B7:'rocket'};
const SRC_LABEL=s=>/^tisb/.test(s)?'radar-only target':/^mlat/.test(s)?'mlat-only target':'';   // ID-less ghosts: say WHY there's no identity
const acSub=f=>{const p=f.properties;   // line-2 cascade — never '?', blank, or a repeat of line 1
  const type=p.type&&p.type!=='?'?p.type:'';
  const tail=String(p.flight||p.hex||'').trim().toUpperCase();
  const reg=p.reg&&p.reg.toUpperCase()!==tail?p.reg:'';
  return escapeHtml(p.desc||type||p.op||reg||CAT_LABEL[p.cat]||SRC_LABEL(p.src)||'unknown');};   // desc → type → operator → tail reg → category → source → unknown
const AIRCRAFT_COLOR='#eaf1f8';   // the ONE aircraft identity color (white) — tints the tail number
const AC_ICON='✈️';   // every contact is just an aircraft — no rotorcraft distinction
const acTail=(f,n,fb)=>cut(f.properties.flight||f.properties.hex||fb||'?',n);   // callsign → hex → fallback, clipped
const CATS=[
  {src:'nearair', hazard:false, air:true, icon:AC_ICON, cls:()=>'',   // ALL aircraft, military included — white identity
   head:f=>acTail(f,12),
   sub:acSub, detail:ALT},
  {src:'airspace', hazard:true, filter:f=>f.properties.sev==='hard'||f.properties.sev==='caution',   // restrictions that gate a drone
   icon:f=>({DEF:'🛡️',NSUFR:'🔒',P:'⛔',STDM:'🏟️',R:'⚠️'}[f.properties.cls]
     ||(f.properties.sev==='hard'?'⛔':'⚠️')),
   cls:(f,inside)=>(inside&&f.properties.sev==='hard')?'danger':'',   // red only when you're INSIDE a hard zone (PROH/NSUFR/DEF ground overhead, not from nearby); conditional R/STDM + near = neutral awareness
   head:f=>({DEF:'DEFENSE AIRSPACE',NSUFR:'SECURITY NO-FLY',P:'PROHIBITED AREA',R:'RESTRICTED AREA',
     STDM:'STADIUM TFR'}[f.properties.cls]||'AIRSPACE'),
   sub:f=>cut(f.properties.name||'—',26),
   detail:f=>f.properties.sev==='hard'?'drones prohibited'
     :f.properties.cls==='STDM'?'no-fly during events':'no-fly if active'},
  {src:'airspace', hazard:false, filter:f=>f.properties.sev==='advisory', icon:'🎯', cls:()=>'',   // MOA/W/A/D — awareness, not a drone no-fly
   head:f=>({MOA:'MILITARY OPS AREA',W:'WARNING AREA',A:'ALERT AREA',D:'DANGER AREA'}[f.properties.cls]||'SPECIAL-USE AIRSPACE'),
   sub:f=>cut(f.properties.name||'—',26), detail:()=>'advisory only'},
  {src:'airspace', hazard:false, ctrl:true, filter:f=>f.properties.sev==='ctrl', icon:'🗼',   // controlled B/C/D+E2 — fly WITH LAANC
   cls:(f,inside)=>{ const d=FLY.detail;   // red when you're INSIDE it and LAANC caps or grounds you (aspCapFt < 400) — matches the chart's FAA code; a full 400 ceiling stays neutral
     return (inside && d && !d.aspUnknown && d.aspCapFt<SPEC.regFt) ? 'danger':''; },
   head:f=>({B:'CLASS B AIRSPACE',C:'CLASS C AIRSPACE',D:'CLASS D AIRSPACE',E:'CLASS E AIRSPACE'}[f.properties.cls]||'AIRSPACE'),
   sub:f=>cut(f.properties.name||'—',26),
   detail:()=>'authorization (LAANC)'},
  {src:'nps', hazard:true, icon:'🏞️', cls:(f,inside)=>inside?'danger':'',   // park land: red ON it (chart grounds), neutral near it
   head:f=>cut(f.properties.name||'NPS LAND',20),
   sub:()=>'drones prohibited', detail:f=>cut(f.properties.utype||'NPS unit',18)},
];
function catItems(cfg,lat,lon,rMi){   // category features in range: point by radius · polygon if inside OR edge ≤ rMi
  let items=featsIn(cfg.src); if(cfg.filter) items=items.filter(cfg.filter);
  return items.filter(f=>{
    const g=f.geometry; if(!g) return false;
    if(g.type==='Point') return havMi(lat,lon,g.coordinates[1],g.coordinates[0])<=rMi;
    if(pointInFeature(f,lon,lat)) return true;
    const ne=nearestEdge(f,lon,lat);
    return !!ne&&ne.mi<=rMi;
  });
}
function planesNear(lat,lon,rMi){   // planes in range with a usable numeric altitude — shared by cards + chart
  const out=[];
  featsIn('nearair').forEach(f=>{
    const alt=+f.properties.alt; if(!isFinite(alt)) return;   // 'ground'/'?' → not airborne
    const g=f.geometry&&f.geometry.coordinates; if(!g) return;
    const mi=havMi(lat,lon,g[1],g[0]); if(mi>rMi) return;
    out.push({f,mi,alt,pt:g});
  });
  return out;
}
const FT_PER_HPA=27.3, ISA_MSL_HPA=1013.25;   // baro-correction constants
function planeMslFt(a){   // best MSL [ft]: ADS-B baro is PRESSURE altitude — QNH-correct when known
  const baro=a.f.properties.altBaro;
  if(baro!=null && QNH_HPA!=null) return baro+(QNH_HPA-ISA_MSL_HPA)*FT_PER_HPA;
  return a.alt;
}
function planeGroundFt(a,crossGround){   // terrain under the plane → else your cell → else null
  const g=groundElevFt(a.pt[1],a.pt[0]);
  return g!=null?g:crossGround;
}
function planeAglFt(a,crossGround){   // ground null → AGL is raw MSL (fails toward NOT flagging over unknown terrain)
  const ground=planeGroundFt(a,crossGround);
  return {ground, agl: ground==null?planeMslFt(a):planeMslFt(a)-ground};
}
const AGL_CAND_MAX_FT=16000;   // only plausibly-low planes need terrain — a FL350 cruiser can't breach 900 AGL

function sitrepTick(){   // fully synchronous — reads only already-loaded state
  const rangeMi=RED_MI;    // operational ring — every in-ring card, aircraft included
  const tr=assessTraffic();                          // ONE traffic assessment for gate + cards
  const gates=evalGates(tr);                         // THE verdict — computed before any card exists
  verdictSeverity=Math.max(...Object.values(gates)); // one fold
  window.__sitrep.gates=gates;                       // debug/test handle
  renderClock();                                     // visible verdict = the NOW column header color
  { const t=$('#sit-title'); if(t){                  // hidden canonical verdict element (tests/parity)
    t.classList.remove('warn','alert');
    if(verdictSeverity>=2) t.classList.add('warn');   // binary verdict — only the no-go class is ever set
  }}
  if(USER.lat==null){   // no fix — the gps gate holds the verdict red; show the one GPS card explaining why
    $('#sit-body').innerHTML=
      '<div class="sit-row danger"><span class="ic">📍</span><span class="tx">'
      +'<span class="s1">NO GPS FIX</span>'
      +'<span class="s2">'+(geoBlocked?'location is blocked for this site':'acquiring your position…')+'</span>'
      +'<span class="s3">'+(geoBlocked?'enable location, then reload':'hold still a moment')+'</span></span></div>';
    return;
  }
  const lat=USER.lat, lon=USER.lon;
  const rows=[];
  const row=c=>rows.push(   // card record → 3-line info row; col is a sanitised identity hex
    `<div class="sit-row${c.cls?' '+c.cls:''}"><span class="ic">${c.ic}</span>`+
    `<span class="tx"><span class="s1"${c.col?` style="color:${c.col}"`:''}>${c.l1||''}</span><span class="s2">${c.l2||''}</span><span class="s3">${c.l3||''}</span></span></div>`);
  const dirMi=(la,lo)=>compass(bearing(lat,lon,la,lo))+' '+fmtMi(havMi(lat,lon,la,lo));   // direction + distance from you

  const cards=[];

  const breachInfo=new Map();   // LOW AIRCRAFT tags: feature → {label}, straight from the shared traffic math
  tr.low.forEach(a=>{           // (object-keyed — an id string would collide for anonymous contacts)
    breachInfo.set(a.f,{
      label:Math.max(0,Math.round(a.agl))+U(' ft')+(a.ground==null?'':' AGL')});
  });

  // (no FAA card — a reduced or zero LAANC ceiling is carried by the chart's FAA code, the verdict, and any in-range airspace card)

  if(USER.acc!=null && USER.acc>ACC_BAD_M)   // WEAK GPS SIGNAL (pinned) — neutral heads-up; the fix still flies, it's just imprecise
    cards.push(mkCard('','🛰️','WEAK GPS SIGNAL','±'+Math.round(USER.acc*M_TO_FT)+U(' ft')+' — position may be off','',false));

  // (a Kp ≥ 7 storm still grounds via the kp gate and shows as the chart's KP<n> code — no separate card)

  // DATA HEALTH (pinned) — feeds classified by the ONE feedTier() rule
  const redFeeds=[], staleFeeds=[];
  const worstTier=(...t)=>t.includes('red')?'red':t.includes('stale')?'stale':null;
  const pushFeed=(tier,label)=>{ if(tier==='red') redFeeds.push(label); else if(tier==='stale') staleFeeds.push(label); };
  pushFeed(gateTier('om'),'weather');
  pushFeed(worstTier(gateTier('asp'),layerTier('airspace')),'FAA airspace');   // the LAANC ceiling gate + the airspace listing share one label — worst wins
  pushFeed(gateTier('kp'),'Kp');
  pushFeed(layerTier('nps'),'NPS');   // park data we've never loaded reds the no-fly check; a stale one just notes
  const acSt=LAYER_STATE.nearair;   // aircraft = traffic, not a no-fly gate: only ever stale, never red
  if((acSt && acSt.started && !acSt.everLoaded && (acSt.features||[]).length===0)
     || layerTier('nearair')==='stale')
    staleFeeds.push('aircraft');
  const dataFeeds=[...redFeeds,...staleFeeds];
  if(dataFeeds.length){
    const red=redFeeds.length>0;
    cards.push(mkCard(red?'danger':'','📡', red?'DATA NOT LOADED':'DATA UNVERIFIED',
      cut(dataFeeds.join(' · '),30), red?'acquiring — verify before flying':'retrying every 5 s', red));   // never-loaded reds; stale is neutral info
  }

  // in-ring item cards — one per feature; a low plane's OWN card transforms (one card per plane, never two)
  const items=[];
  CATS.forEach(cfg=>catItems(cfg,lat,lon,rangeMi).forEach(f=>{
    const g=f.geometry; if(!g) return;
    const inside=g.type!=='Point'&&pointInFeature(f,lon,lat);   // inside → "overhead", range 0
    let cls=cfg.cls?cfg.cls(f,inside):'', det=null, headOv=null, subOv=null, icOv=null, hazardOv=null;
    const bi=cfg.air?breachInfo.get(f):null;
    if(bi){   // LOW AIRCRAFT override — any manned plane < 900 ft AGL in the 1 mi ring reds, whether it caps or grounds
      icOv=AC_ICON; hazardOv=true; headOv='LOW AIRCRAFT';
      cls='danger';
      const idTxt=acSub(f);   // keep the identity data the headline displaced: tail · original line 2
      subOv='<span style="color:'+AIRCRAFT_COLOR+'">'+acTail(f,12,'aircraft')+'</span>'
        +(idTxt&&idTxt!=='unknown'?' · '+idTxt:'');   // skip a bare "unknown" — it adds nothing
      det=bi.label;   // '254 ft AGL'
    }
    const hazard=cls==='danger'?true:(hazardOv!=null?hazardOv:cfg.hazard);   // any red (no-go) card ranks at the top, even from a hazard:false source (controlled airspace)
    const tier=hazard?(cls==='danger'?0:1):2;
    let pt, mi;
    if(g.type==='Point'){ pt=g.coordinates; mi=havMi(lat,lon,pt[1],pt[0]); }
    else {
      const ne=nearestEdge(f,lon,lat)||{pt:polyPt(f),mi:0};
      pt=ne.pt; mi=inside?0:ne.mi;   // nearest edge drives label + sorting
    }
    if(!pt) return;
    items.push({cfg,f,pt,cls,tier,inside,mi,det,headOv,subOv,icOv,hazardOv});
  }));
  const nearestAsp=new Map();   // a named zone (esp. Class B) arrives as many shelf polygons — keep the nearest per class+name
  const aspKey=it=>(it.f.properties.cls||'')+'|'+(it.f.properties.name||'');
  items.forEach(it=>{ if(it.cfg.src!=='airspace') return;
    const k=aspKey(it), ex=nearestAsp.get(k); if(!ex||it.mi<ex.mi) nearestAsp.set(k,it); });
  const shown=items.filter(it=>it.cfg.src!=='airspace'||nearestAsp.get(aspKey(it))===it);
  shown.sort((a,z)=>a.tier-z.tier||a.mi-z.mi);   // warnings first, then range
  const ITEM_CAP=14;
  shown.slice(0,ITEM_CAP).forEach(({cfg,f,pt,cls,inside,mi,det,headOv,subOv,icOv,hazardOv})=>{
    const detTxt=det!=null?det:(cfg.detail?cfg.detail(f):'');
    const ic=icOv!=null?icOv:(typeof cfg.icon==='function'?cfg.icon(f):cfg.icon);
    const head=headOv!=null?headOv:cfg.head(f);
    const sub=subOv!=null?subOv:((cfg.sub?cfg.sub(f):'')||'—');
    const rawCol=(head==='LOW AIRCRAFT')?null:cfg.src==='airspace'?f.properties._col:cfg.air?AIRCRAFT_COLOR:null;   // identity hex: zone color / white tail
    const col=/^#[0-9a-fA-F]{3,8}$/.test(rawCol||'')?rawCol:undefined;   // bare hex only — a feed can't inject markup
    let l3=(inside?'overhead':dirMi(pt[1],pt[0]))+(detTxt?' · '+detTxt:'');
    if(cfg.air){ const s=Number(f.properties.spd); if(isFinite(s)) l3+=' · '+Math.round(toMph(s))+U(' mph'); }   // ground speed after the altitude
    const card=mkCard(cls, ic, head, sub, l3, hazardOv!=null?hazardOv:cfg.hazard, col);
    card.mi=mi; cards.push(card);   // range = the in-category sort key
  });
  // nearby context — objects beyond their ring but inside the DATA ring join `cards` as neutral general objects
  const screenMi=DATA_MI;
  const ctx=[];
  CATS.forEach(cfg=>{
    const ringRad=rangeMi;
    let feats=featsIn(cfg.src); if(cfg.filter) feats=feats.filter(cfg.filter);
    feats.forEach(f=>{
      const g=f.geometry; if(!g) return;
      let pt,mi;
      if(g.type==='Point'){ pt=g.coordinates; mi=havMi(lat,lon,pt[1],pt[0]); }
      else { const ne=nearestEdge(f,lon,lat); if(!ne) return;
        pt=ne.pt; mi=pointInFeature(f,lon,lat)?0:ne.mi; }
      if(mi<=ringRad) return;   // already carded in-ring above
      if(mi>screenMi) return;   // beyond the DATA ring → not shown
      ctx.push({cfg,f,pt,mi});
    });
  });
  const ctxKey=it=>(it.f.properties.cls||'')+'|'+(it.f.properties.name||'');   // collapse airspace shelves like the in-ring set
  const ctxAsp=new Map();
  ctx.forEach(it=>{ if(it.cfg.src!=='airspace') return; const k=ctxKey(it),ex=ctxAsp.get(k); if(!ex||it.mi<ex.mi) ctxAsp.set(k,it); });
  const CTX_CAP=24;
  ctx.filter(it=>it.cfg.src!=='airspace'||ctxAsp.get(ctxKey(it))===it)
     .sort((a,z)=>a.mi-z.mi).slice(0,CTX_CAP)
     .forEach(({cfg,f,pt,mi})=>{
       const ic=typeof cfg.icon==='function'?cfg.icon(f):cfg.icon;
       const head=cfg.head(f);
       const sub=(cfg.sub?cfg.sub(f):'')||'—';
       const detTxt=cfg.detail?cfg.detail(f):'';
       let l3=dirMi(pt[1],pt[0])+(detTxt?' · '+detTxt:'');
       if(cfg.air){ const s=Number(f.properties.spd); if(isFinite(s)) l3+=' · '+Math.round(toMph(s))+U(' mph'); }
       const rawCol=cfg.src==='airspace'?f.properties._col:cfg.air?AIRCRAFT_COLOR:null;
       const col=/^#[0-9a-fA-F]{3,8}$/.test(rawCol||'')?rawCol:undefined;
       const cc=mkCard('', ic, head, sub, l3, false, col);   // neutral general object
       cc.mi=mi; cards.push(cc);   // range-sorts with the in-ring general items
     });

  // ranking only (the verdict was folded at the top): 0 red no-go warning · 1 everything else,
  // range-sorted within each; area-wide cards (no mi) head their section
  const catOf=c=>(c.hazard&&c.cls==='danger')?0:1;
  const rng=c=>c.mi==null?-1:c.mi;
  const ordered=cards.map((c,i)=>({c,i}))
    .sort((a,z)=>catOf(a.c)-catOf(z.c) || rng(a.c)-rng(z.c) || a.i-z.i)
    .map(x=>x.c);
  ordered.forEach(row);

  $('#sit-body').innerHTML=rows.join('');
}


// 5. chart — the can-I-fly grid (400→sfc × NOW..+3h) at your position; the SITREP shares its TRFC inputs
// boundary conversions ONLY — internal math is imperial; providers speak metric (Open-Meteo metres, Mercator m/px)
const M_TO_FT=3.28084, FT_TO_M=0.3048, M_TO_SM=1/1609.34, KT_TO_MPH=1.15078, MI_TO_M=1609.34;
const toMph=kt=>kt==null?null:kt*KT_TO_MPH;   // ADS-B ground speed arrives in knots
const comma=n=>Number(Math.round(n)).toLocaleString('en-US');
const fmt=(n,d=0)=>(n==null||isNaN(n))?'–':Number(n).toFixed(d);
const SPEC={kpGnd:7,visSM:3,clrFt:500,regFt:400};   // Part 107 limits; Kp 7 = G3, where NOAA flags GPS degradation
const FAA_SEP_FT=500;   // stay this far BELOW manned traffic — §91.119(c) minimum safe altitude, the conservative buffer
const WARN_AGL_FT=SPEC.regFt+FAA_SEP_FT;   // 900 ft AGL — a plane below this in the ring caps the chart, and grounds it when the drone would have no legal band left (one shared number)
const LIM={wind:27};   // aircraft max wind [mph] — gates surface gust + caps the wind-aloft scan
const RED_MI=1;   // operational ring — the one ring aircraft + point queries use (see README ring table)
const RNG={mi:RED_MI};
const DATA_MI=10;   // data ring — everything inside is pulled + carded, fixed on every device (10 not 25: less to fetch per pulse)
const ALTS_UP=(()=>{const a=[];for(let f=0;f<=SPEC.regFt;f+=50)a.push(f);return a;})();   // 50 ft ladder, ascending
const ALTS=[...ALTS_UP].reverse();   // …and descending (grid row order)
const FC_HOURS=3;   // forecast columns beyond NOW
const KP_URL='https://services.swpc.noaa.gov/products/noaa-planetary-k-index-forecast.json';
const FAA_GIS='https://services6.arcgis.com/ssFJjBXIUyZDrSYZ/ArcGIS/rest/services';   // official AIS — the LAANC ceiling source (queried direct; see getLaancCeil)
const aspUrl=(lat,lon,rng)=>`${FAA_GIS}/FAA_UAS_FacilityMap_Data/FeatureServer/0/query`
  +`?geometry=${lon.toFixed(3)},${lat.toFixed(3)}&geometryType=esriGeometryPoint&inSR=4326`
  +`&spatialRel=esriSpatialRelIntersects&distance=${rng}&units=esriSRUnit_StatuteMile`
  +`&outFields=CEILING,UNIT&returnGeometry=false&f=json`;
const PRES_LEVELS=[1000,975,950,925,900,850,800,700];   // pressure levels scanned for cloud decks
const CLOUD_FEW_PCT=12;   // lowest level with ≥ this % cover = the base
function aloftUrl(lat,lon){
  const h=['wind_speed_10m','wind_direction_10m','wind_speed_80m','wind_speed_120m','wind_speed_180m','wind_gusts_10m',
    'visibility','cloud_cover_low','temperature_2m','dew_point_2m']
    .concat(PRES_LEVELS.map(p=>`geopotential_height_${p}hPa`))
    .concat(PRES_LEVELS.map(p=>`cloud_cover_${p}hPa`));
  const cur=['wind_speed_10m','wind_direction_10m','wind_gusts_10m','cloud_cover_low',
    'visibility','temperature_2m','dew_point_2m','pressure_msl']
    .concat(PRES_LEVELS.map(p=>`cloud_cover_${p}hPa`));
  return `https://api.open-meteo.com/v1/forecast?latitude=${lat.toFixed(3)}&longitude=${lon.toFixed(3)}`
    +`&current=${cur.join(',')}`
    +`&hourly=${h.join(',')}`
    +`&wind_speed_unit=mph&forecast_days=2&timezone=auto`;   // winds straight in mph — no conversion anywhere
}
async function retry(fn,tries=3,baseMs=600){   // a transient blip is usually gone next attempt
  let err;
  for(let a=0;a<tries;a++){
    try{ return await fn(); }
    catch(e){ err=e; if(a<tries-1) await new Promise(r=>setTimeout(r,baseMs*(a+1))); }
  }
  throw err;
}
async function getAloft(lat,lon){   // surface + winds aloft + gust + vis + cloud → one row per grid column
  const d=await getJSON(aloftUrl(lat,lon),{timeout:10000});
  let i=0;
  if(d.current?.time&&d.hourly?.time){const now=d.current.time.slice(0,13);i=d.hourly.time.findIndex(t=>t.slice(0,13)===now);if(i<0)i=0;}   // hourly index of the current hour
  const H=d.hourly||{}, elev=d.elevation??0;
  const gh=H.wind_gusts_10m||[];
  const cur=d.current||{};
  if(typeof cur.pressure_msl==='number'&&isFinite(cur.pressure_msl)) QNH_HPA=cur.pressure_msl;   // stash QNH for the AGL baro correction
  const cloudBaseAt=n=>{   // cloud base [ft AGL] at hour n: lowest pressure deck ≥12% cover, min'd with an LCL estimate
    const idx=i+n, C=k=>n===0?(cur[k]??H[k]?.[idx]):H[k]?.[idx];
    let deckFt=null;
    for(const p of PRES_LEVELS){
      const cc=C(`cloud_cover_${p}hPa`), ghm=H[`geopotential_height_${p}hPa`]?.[idx]??H[`geopotential_height_${p}hPa`]?.[i];
      if(cc==null||ghm==null) continue;
      const agl=(ghm-elev)*M_TO_FT; if(agl<=0) continue;   // below-ground levels don't count
      if(cc>=CLOUD_FEW_PCT){ deckFt=agl; break; }
    }
    const low=C('cloud_cover_low'), T=C('temperature_2m'), Td=C('dew_point_2m');
    const lclFt=((low??0)>=CLOUD_FEW_PCT && T!=null && Td!=null)?Math.max(0,Math.round((T-Td)*410)):null;   // LCL ≈ spread × 410 ft/°C
    let baseFt=null; for(const v of [deckFt,lclFt]) if(v!=null) baseFt=(baseFt==null?v:Math.min(baseFt,v));
    return baseFt;
  };
  const profAt=n=>{const idx=i+n;   // wind profile points at hour n (10/80/120/180 m model levels)
    const w10=n===0?(d.current?.wind_speed_10m??H.wind_speed_10m?.[idx]):H.wind_speed_10m?.[idx];
    return [{h:10,w:w10},{h:80,w:H.wind_speed_80m?.[idx]},{h:120,w:H.wind_speed_120m?.[idx]},{h:180,w:H.wind_speed_180m?.[idx]}]
      .filter(x=>x.w!=null&&!isNaN(x.w)).sort((a,b)=>a.h-b.h);};
  const gustAt =n=>n===0?(d.current?.wind_gusts_10m??gh[i]):gh[i+n];
  const visAt  =n=>n===0?(cur.visibility??H.visibility?.[i]):H.visibility?.[i+n];
  const dirAt  =n=>n===0?(d.current?.wind_direction_10m??H.wind_direction_10m?.[i]):H.wind_direction_10m?.[i+n];
  const cols=[];
  for(let n=0;n<=FC_HOURS;n++){
    cols.push({n, windPts:profAt(n), gustMph:gustAt(n), windDir:dirAt(n), baseFt:cloudBaseAt(n), visM:visAt(n)});   // winds/gust mph · dir ° · base ft · vis metres (all converted/gated at use)
  }
  const c0=cols[0];
  if(!c0.windPts.length&&c0.gustMph==null&&c0.visM==null) throw new Error('aloft response empty');   // a contentless 200 must NOT verify the weather gate (unknown ≠ clear)
  return {cols};
}
async function getKp(){   // SWPC planetary-Kp: full time-sorted 3 h bin list, so each grid hour picks its bin
  const d=await getJSON(KP_URL,{timeout:7000});
  if(!Array.isArray(d)||d.length===0) return null;
  const arrHdr=Array.isArray(d[0]);   // products feed = array rows with a header row
  const src=arrHdr?d.slice(1):d;
  const rows=src.map(r=>{
    const t=arrHdr?r[0]:r.time_tag, kp=Number(arrHdr?r[1]:r.kp);
    const obs=arrHdr?r[2]:r.observed;   // observed = finalized · estimated = nowcast · predicted = forecast
    return {ms:Date.parse((t||'').replace(' ','T')+'Z'), kp, obs};
  }).filter(x=>!isNaN(x.ms)&&!isNaN(x.kp)).sort((a,b)=>a.ms-b.ms);
  return rows.length?{rows}:null;
}
// LAANC gate — pulled DIRECT from the FAA UAS Facility Map, not rmhiq (the ceiling is now just a tiny
// OVERHEAD_MI box, a light point query). A LEGAL warning: anything that could understate the ceiling
// THROWS — it never reads "clear". (The rest of the airspace still comes from the rmhiq hub.)
async function getLaancCeil(lat,lon,rng){
  const grid=await getJSON(aspUrl(lat,lon,rng),{timeout:7000});
  if(grid.error||!Array.isArray(grid.features)) throw new Error('airspace grid query failed');
  if(grid.exceededTransferLimit) throw new Error('airspace result truncated');
  let ceil=SPEC.regFt;   // no grid cells in the box = uncontrolled → the Part 107 ceiling
  for(const f of grid.features){
    const a=f&&f.attributes;
    const c=(a&&typeof a.CEILING==='number')?a.CEILING:NaN;
    if(!Number.isFinite(c)||c<0||c>10000) throw new Error('airspace cell has no usable ceiling');
    if(a.UNIT!=null&&!/^f/i.test(String(a.UNIT))) throw new Error('airspace ceiling in unexpected units');
    ceil=Math.min(ceil,c);   // worst cell in the tight overhead box wins (your cell + a GPS buffer)
  }
  return {ceilFt:ceil};
}
function makeProfile(pts){   // wind(ft) → mph, linearly interpolating the sparse model levels
  const p=(pts||[]).filter(x=>x&&x.w!=null&&!isNaN(x.w)).sort((a,b)=>a.h-b.h);
  return function(ft){
    if(p.length===0) return null;
    const m=ft*FT_TO_M;   // model levels are metric heights — convert once here
    if(m<=p[0].h) return p[0].w;
    if(m>=p[p.length-1].h) return p[p.length-1].w;
    for(let i=0;i<p.length-1;i++){if(m>=p[i].h&&m<=p[i+1].h){const t=(m-p[i].h)/(p[i+1].h-p[i].h);return p[i].w+t*(p[i+1].w-p[i].w);}}
    return p[p.length-1].w;
  };
}
// LAANC cache — persisted 6 h (near-static, rate-limited service). Position match = ASP_TOL_MI.
const OVERHEAD_MI=0.1;   // FAA/LAANC ceiling is read in this tight box around your position (~530 ft, a GPS-error buffer) — your cell, not the worst cell within a mile
const ASP_CACHE_KEY='canifly.asp';
const ASP_TTL=6*60*60*1000, ASP_HARD_TTL=24*60*60*1000;   // fresh TTL · fallback-when-failing TTL
let aspCache=null;   // {lat,lon,rng,ceilFt,ts} — your-cell LAANC ceiling (defense TFRs ground via flyRestriction now, not here)
function hydrateAsp(){   // restore the persisted LAANC cache (validated, hard-TTL-bounded)
  try{ const s=JSON.parse(localStorage.getItem(ASP_CACHE_KEY)||'null');
    if(s&&Number.isFinite(s.lat)&&Number.isFinite(s.lon)&&Number.isFinite(s.rng)
       &&Number.isFinite(s.ceilFt)&&s.ceilFt>=0&&s.ceilFt<=SPEC.regFt
       &&Number.isFinite(s.ts)&&(Date.now()-s.ts)<ASP_HARD_TTL){ aspCache=s; } }catch(e){}
}
function persistAsp(){ store(ASP_CACHE_KEY,JSON.stringify(aspCache)); }

// traffic — the ONE assessment shared by the chart's TRFC gate, the verdict's traffic gate, and the
// LOW AIRCRAFT cards, so they can never disagree
function assessTraffic(){
  if(USER.lat==null) return {ceilFt:Infinity,low:[]};
  const lat=USER.lat,lon=USER.lon;
  const cross=groundElevFt(lat,lon);   // ft AMSL at your position — fallback ground for planes over unknown cells
  const near=planesNear(lat,lon,RNG.mi);   // scan the operational ring — the only ring aircraft are assessed in
  ensureGroundElev([[lat,lon],...near.filter(a=>a.alt<AGL_CAND_MAX_FT).map(a=>[a.pt[1],a.pt[0]])]);   // terrain for the low ones
  let ceilFt=Infinity; const low=[];
  near.forEach(a=>{
    const {ground,agl}=planeAglFt(a,cross);   // per-plane terrain, QNH-corrected MSL
    if(agl>=WARN_AGL_FT) return;              // too high to intrude on the 0–400 band
    const safeFloor=agl-FAA_SEP_FT;           // the drone must stay below this
    let top=-50; for(const ft of ALTS){ if(ft<safeFloor){ top=ft; break; } }   // highest band STRICTLY below (−50 = none)
    if(top<ceilFt) ceilFt=top;                // most restrictive plane wins; < 0 grounds the chart via ceilFt
    low.push({f:a.f,agl,ground});
  });
  return {ceilFt,low};
}

// chart state
const FLY={
  data:null,     // last good {lat,lon,aloft,kp,asp} — lat/lon = where it was fetched
  detail:null,   // computed render model (also read by cards/gates)
  err:{om:true,kp:true,asp:true},   // every gate starts UNVERIFIED — the app never opens falsely-green
};

// data freshness — ONE classifier for every source: red = never loaded (grounds, no grace) ·
// stale = was loaded, failing past the grace window (DATA card only, never the verdict) · null = healthy or within grace
const DATA_ERR_GRACE_MS=35000;   // a self-healing blip won't pop the DATA card
function feedTier(everLoaded, failing, since){
  if(!failing) return null;
  if(!everLoaded) return 'red';
  return since>0 && Date.now()-since>=DATA_ERR_GRACE_MS ? 'stale' : null;   // since 0 = not yet stamped → within grace
}
const flyEver={om:false,asp:false,kp:false};    // ever loaded, per chart gate
const flyErrSince={om:0,asp:0,kp:0};            // failing since, per chart gate
const FLY_ERR_LABEL={om:'weather',asp:'FAA airspace',kp:'Kp'};
const gateTier=k=>feedTier(flyEver[k], FLY.err[k], flyErrSince[k]);
const layerTier=id=>{ const st=LAYER_STATE[id]||{};   // a listing that has NEVER loaded this session reads RED (grounds — unknown ≠ clear); once loaded, only healthy/stale
  return !st.everLoaded ? 'red' : feedTier(true, st.failSince>0, st.failSince); };
function flyNeverVerified(){ return Object.keys(FLY_ERR_LABEL).some(k=>gateTier(k)==='red'); }   // any required gate never verified
window.__sitrep.fly={FLY,SPEC,LIM,RNG,paint:flyPaint,refresh:flyRefresh};   // debug/test handle

function flyRestriction(){   // hard zone directly UNDER you (PROH/NSUFR/DEF/NPS) — grounds only when you're INSIDE it, matching "fly straight up next to it, not over it"
  const c={lat:USER.lat,lng:USER.lon}; let hit=null;
  featsIn('airspace').forEach(f=>{
    const p=f.properties;
    if(hit||p.sev!=='hard') return;
    if(pointInFeature(f,c.lng,c.lat)) hit={code:p.code,name:p.name};
  });
  if(!hit) featsIn('nps').forEach(f=>{   // park land is a hard no-fly too
    if(hit) return;
    if(pointInFeature(f,c.lng,c.lat)) hit={code:'PARK',name:f.properties.name};
  });
  return hit;
}

function flyComputeDetail(){   // apply every gate and build the chart render model (the values the gates/cards read too)
  const {aloft,kp,asp}=FLY.data;
  const aspCapFt=asp==null?SPEC.regFt:(asp.ceilFt<=0?-1:Math.min(SPEC.regFt,asp.ceilFt));   // unknown fails OPEN (cap 400) — g.data carries it; the grid stays binary
  const atLim=mph=>mph!=null&&Math.round(mph)>=LIM.wind;
  const one=mph=>mph==null?'—':fmt(mph,0);
  const cols=(aloft&&aloft.cols)||[];
  const nowMs=Date.now();
  const kpAt=n=>{   // Kp in force at hour n = last bin ≤ that hour
    if(!kp||!kp.rows||!kp.rows.length) return null;
    const t=nowMs+n*3600e3; let v=null;
    for(const r of kp.rows){ if(r.ms<=t) v=r.kp; else break; }
    if(n===0){   // NOW takes the WORSE of the finalized observation and the in-progress estimate — a rising storm shows in the estimate first
      let obs=null;
      for(let i=kp.rows.length-1;i>=0;i--){
        const r=kp.rows[i]; if(r.ms<=nowMs && r.obs==='observed'){ obs=r.kp; break; }
      }
      if(obs!=null) v=v!=null?Math.max(obs,v):obs;
    }
    return v!=null?v:kp.rows[0].kp;
  };
  const trafficCeil=assessTraffic().ceilFt;   // NOW-only manned-traffic ceiling (Infinity = none)
  const restrict=flyRestriction();            // a hard zone under you grounds every column
  let wxNow=null;   // NOW-column weather diagnostics, captured for the gates
  const grid=cols.map((c,n)=>{
    const prof=makeProfile(c.windPts);
    const visSM=c.visM!=null?c.visM*M_TO_SM:null;   // metres → SM at the edge
    const kpv=kpAt(n);
    const gGust=atLim(c.gustMph), gVis=visSM!=null&&visSM<SPEC.visSM, gKp=kpv!=null&&kpv>=SPEC.kpGnd;
    const globalGrounded=gGust||gVis||gKp||!!restrict;
    const cloudCapFt=c.baseFt==null?Infinity:(c.baseFt-SPEC.clrFt);   // fly 500 below the base
    let hitFt=null; for(const ft of ALTS_UP){ if(atLim(prof(ft))){ hitFt=ft; break; } }   // first over-limit level
    const windCeilFt=hitFt==null?SPEC.regFt:hitFt-50;
    if(n===0) wxNow={gust:gGust,vis:gVis,windCeilFt,cloudCapFt};   // the NOW values the gates score from
    const tCeil = n===0 ? trafficCeil : Infinity;   // traffic is a live snapshot — NOW only
    let trfcAlt = (n===0 && trafficCeil!==Infinity)   // independent TRFC marker — low traffic is always visible on the chart
      ? (trafficCeil<0 ? 0 : Math.min(SPEC.regFt, trafficCeil+50)) : null;
    const capFt=Math.min(SPEC.regFt, cloudCapFt, windCeilFt, aspCapFt, tCeil);
    const grounded=globalGrounded||capFt<0;
    let maxFly=-1;
    if(!grounded) for(const ft of ALTS){ if(ft<=capFt){ maxFly=ft; break; } }   // highest 50 ft step ≤ cap
    const capSrc = tCeil<=aspCapFt&&tCeil<=cloudCapFt&&tCeil<=windCeilFt ? 'TRFC'   // binding cap code — traffic wins ties, then FAA, cloud, wind
             : aspCapFt<=cloudCapFt&&aspCapFt<=windCeilFt ? 'FAA'
             : cloudCapFt<=windCeilFt ? 'SKY' : 'WIND';
    let reasonAlt=null, reason='';
    if(grounded){
      reasonAlt=0;   // grounding reason prints at the surface row
      reason = aspCapFt<0 ? 'FAA'
             : restrict ? restrict.code
             : tCeil<0 ? 'TRFC'
             : gGust ? 'GUST'
             : gVis ? 'VIS'
             : gKp ? ('KP'+Math.round(kpv))
             : capSrc;
    }else if(maxFly<SPEC.regFt){
      reasonAlt=maxFly+50; reason=capSrc;   // cap code prints one band above the highest flyable row
    }
    if(trfcAlt===0 && reasonAlt===0 && reason!=='TRFC') trfcAlt=50;   // grounding collision at SFC → bump TRFC one band so both show
    return {n,prof,gustMph:c.gustMph,windDir:c.windDir,capFt,maxFly,grounded,reason,reasonAlt,trfcAlt};
  });
  const cellState=(g,ft)=>{
    if(g.grounded) return 'bad';
    const mph=g.prof(ft); if(mph==null) return '';
    if(ft>g.capFt||atLim(mph)) return 'bad';   // above any cap → red
    return 'good';
  };
  const nowMaxFly=grid.length?grid[0].maxFly:-1;
  const colLabels=grid.map(g=>({v:g.n===0?'now':'+'+g.n+'h',   // a grounded FUTURE column reds its header; NOW's color comes from the verdict (renderClock)
    st:(g.n>0&&g.grounded)?'bad':'', now:g.n===0}));
  const topFt=ALTS[0];
  const altRows=ALTS.map(ft=>{
    const cells=grid.map(g=>{
      if(g.reasonAlt===ft) return {v:g.reason, st:cellState(g,ft), rsn:true};   // the binding cap/grounding code wins its cell
      if(g.trfcAlt===ft) return {v:'TRFC', st:cellState(g,ft), rsn:true};       // independent traffic marker
      return {v:one(g.prof(ft)), st:cellState(g,ft)};
    });
    return {a:ft===0?'sfc':comma(ft), u:ft===topFt?'ft':'',
      st:cells.length&&cells[0].st==='bad'?'bad':'',
      hi:nowMaxFly>=0&&ft===nowMaxFly, cells};   // hi = bold "highest you can fly right now" label
  });
  const gustCells=grid.map(g=>({v:one(g.gustMph), dir:g.windDir!=null?compass(g.windDir):''}));   // gust + 8-point direction; a gust grounding shows on the SFC row instead
  return {board:{colLabels,gustCells,altRows},
    aspCapFt, aspUnknown:asp==null,   // FAA gate value + unknown flag (read by the FAA card + gates)
    kpNow:kpAt(0),                    // NOW Kp (read by the kp gate → chart KP code)
    wxNow,
    grid:grid.map(g=>({n:g.n,maxFly:g.maxFly,grounded:g.grounded,reason:g.reason,reasonAlt:g.reasonAlt,trfcAlt:g.trfcAlt}))};
}

const FLY_GRID_ATTRS='class="grid"';
const clockCellHtml=()=>`<span class="ga clock">${clockInnerHtml()}</span>`;   // top-left header cell = the white clock
function flyBoardHtml(b){
  const unit=u=>u?`<i class="gu">${u}</i>`:'';
  const tail=c=>c.dir?`<i class="wd">${c.dir}</i>`:'';   // gust cells carry the compass direction after the number
  const cell=c=>`<span class="gc${c.st?' '+c.st:''}${c.rsn?' rsn':''}">${c.v==null?'':c.v}${tail(c)}</span>`;
  const head=`<div class="grow ghead">${clockCellHtml()}${b.colLabels.map(l=>`<span class="gc${l.st?' '+l.st:''}${l.now?' now '+VERDICT_CLASS[verdictSeverity]:''}">${l.v}</span>`).join('')}</div>`;   // NOW baked with the verdict class — no flicker between refreshes
  const alts=b.altRows.map(r=>`<div class="grow"><span class="ga${r.st?' '+r.st:''}${r.hi?' hi':''}">${r.a}${unit(r.u)}</span>${r.cells.map(cell).join('')}</div>`).join('');
  const gust=`<div class="grow ggust"><span class="ga">gust${unit('mph')}</span>${b.gustCells.map(cell).join('')}</div>`;
  return `<div ${FLY_GRID_ATTRS}>${head}${alts}${gust}</div>`;
}
function flySkeletonHtml(){   // pre-data skeleton — the real grid frame with shimmer bars, so nothing shifts on load
  const sk='<span class="gc"><i class="sk"></i></span>'.repeat(1+FC_HOURS);
  const cols=['now',...Array.from({length:FC_HOURS},(_,k)=>'+'+(k+1)+'h')];
  const head='<div class="grow ghead">'+clockCellHtml()
    +cols.map((l,i)=>`<span class="gc${i===0?' now '+VERDICT_CLASS[verdictSeverity]:''}">${l}</span>`).join('')+'</div>';
  const rows=ALTS.map(ft=>`<div class="grow"><span class="ga">${ft===0?'sfc':comma(ft)}${ft===ALTS[0]?'<i class="gu">ft</i>':''}</span>${sk}</div>`).join('');
  const gust=`<div class="grow ggust"><span class="ga">gust<i class="gu">mph</i></span>${sk}</div>`;
  return `<div ${FLY_GRID_ATTRS}>${head}${rows}${gust}</div>`;
}
function flyRender(){
  const board=$('#fly-board'); if(!board) return;
  board.innerHTML=FLY.detail?flyBoardHtml(FLY.detail.board):flySkeletonHtml();   // skeleton until data exists
}
function flyPaint(){ FLY.detail=FLY.data?flyComputeDetail():null; flyRender(); }

// chart refresh — SINGLE-FLIGHT: while one is in the air, new calls flag a trailing re-run,
// so bursts can't stack concurrent hits on the rate-limited FAA service
let flyBusy=false, flyAgain=false, flyKpAt=0, flyAloftAt=0, flyGen=0, flyBusyAt=0;
const KP_STALE_MS=15*60*1000;   // a transient SWPC blip may reuse a recent Kp this long
const ALOFT_TTL_MS=15000;       // winds-aloft is an hourly model — 15 s reuse is already generous
const FLY_STALL_MS=45000;       // > the longest bounded cycle — past this the cycle is presumed wedged and a new one takes over
async function flyRefresh(){
  if(USER.lat==null) return;   // nothing to compute pre-fix
  if(flyBusy && Date.now()-flyBusyAt<FLY_STALL_MS){ flyAgain=true; return; }   // in flight and healthy → queue a trailing re-run
  flyBusy=true; flyBusyAt=Date.now();
  const myGen=++flyGen;   // generation token — a stall-superseded cycle must not write stale gates over fresh ones
  try{
    const base={lat:USER.lat,lon:USER.lon};
    if(aspCache==null) hydrateAsp();
    const cc=aspCache;
    const matches=cc!=null&&cc.rng===OVERHEAD_MI&&havMi(base.lat,base.lon,cc.lat,cc.lon)<ASP_TOL_MI;   // LAANC cache position match
    const age=cc!=null?Date.now()-cc.ts:Infinity;
    const fresh=matches&&age<ASP_TTL;
    const kpKeep=FLY.data!=null&&FLY.data.kp!=null&&Date.now()-flyKpAt<170000;   // Kp self-throttle ~3 min
    const aloftKeep=FLY.data!=null&&FLY.data.aloft!=null&&Date.now()-flyAloftAt<ALOFT_TTL_MS
      &&havMi(FLY.data.lat,FLY.data.lon,base.lat,base.lon)<ASP_TOL_MI;   // reuse in-hand columns while fresh for this spot
    const pAloft = aloftKeep?Promise.resolve(FLY.data.aloft):retry(()=>getAloft(base.lat,base.lon),2).catch(()=>null);   // all inputs fire in parallel
    const pKp    = kpKeep?Promise.resolve(FLY.data.kp):retry(()=>getKp(),2).catch(()=>null);
    const pGrid  = fresh?Promise.resolve({ceilFt:cc.ceilFt}):retry(()=>getLaancCeil(base.lat,base.lon,OVERHEAD_MI),2).catch(()=>null);   // the legal gate deserves the same 2 tries as everything else

    const aloft=await pAloft;   // weather first — paint with last-good gates rather than wait on the slow FAA query
    if(myGen!==flyGen) return;   // superseded by a stall takeover — drop this cycle's writes
    if(aloft){
      FLY.data={lat:base.lat,lon:base.lon,aloft,
        kp:(FLY.data&&FLY.data.kp)||null, asp:(FLY.data&&FLY.data.asp)||null};
      FLY.err.om=false; FLY.err.asp=FLY.data.asp==null; FLY.err.kp=FLY.data.kp==null;
      flyPaint(); scheduleSitrep();
    }else{
      FLY.err.om=true;   // weather pull failed — keep the stale grid; next pulse retries
    }

    const [kpRaw,gridRaw]=await Promise.all([pKp,pGrid]);
    if(myGen!==flyGen) return;   // superseded mid-flight — a newer cycle owns the gates now
    if(!aloftKeep&&aloft!=null) flyAloftAt=Date.now();   // fresh pulls reset their clocks
    if(!kpKeep&&kpRaw!=null) flyKpAt=Date.now();
    let kp=kpRaw;
    if(kp==null&&FLY.data&&FLY.data.kp!=null&&Date.now()-flyKpAt<KP_STALE_MS) kp=FLY.data.kp;   // Kp blip → recent last-good; beyond that stays null (unknown ≠ calm)
    let gridRes=gridRaw;
    if(gridRes!=null){ if(!fresh){ aspCache={lat:base.lat,lon:base.lon,rng:OVERHEAD_MI,ceilFt:gridRes.ceilFt,ts:Date.now()}; persistAsp(); } }
    else if(matches&&age<ASP_HARD_TTL) gridRes={ceilFt:cc.ceilFt};   // failed refetch → matching cache within hard TTL
    const asp=(gridRes!=null)?{ceilFt:gridRes.ceilFt}:null;   // your-cell LAANC ceiling; defense TFRs ground via flyRestriction now, not here
    if(aloft){
      FLY.data={lat:base.lat,lon:base.lon,aloft,kp,asp};
      FLY.err.om=false; FLY.err.asp=asp==null;
    }else{
      if(FLY.data){ FLY.data.kp=kp;
        if(asp!=null){ FLY.data.asp=asp; FLY.err.asp=false; }
        else FLY.err.asp=true; }   // gate unresolved this cycle → last-good paints, but flagged unverified
    }
    FLY.err.kp=kp==null;
    for(const k in FLY_ERR_LABEL){   // maintain freshness per gate: latch ever-loaded, stamp/clear failing-since
      if(!FLY.err[k]) flyEver[k]=true;
      flyErrSince[k]=FLY.err[k] ? (flyErrSince[k]||Date.now()) : 0;
    }
    flyPaint();        // fresh gate data must reach both the chart…
    scheduleSitrep();  // …and the SITREP/verdict
  }finally{
    if(myGen===flyGen){   // a superseded cycle leaves the flags to its successor
      flyBusy=false;
      if(flyAgain){ flyAgain=false; flyRefresh(); }
    }
  }
}

// 6. verdict gate table — the ONE point of verdict logic; every condition scored once (0 clear / 2 no-go —
// binary, no caution tier), verdict = max over the table, cards + chart are views (model: README "Verdict color")
function evalGates(tr){   // tr = the shared assessTraffic() result, so gate and cards read one assessment
  const d=FLY.detail, wn=d&&d.wxNow;
  const capSev=c=>c!=null&&c<0?2:0;   // ceiling → severity: only a grounding cap (< 0) scores; a reduced-but-flyable ceiling doesn't (binary — no caution)
  const g={};
  g.gps=USER.lat==null?2:0;   // no fix = nothing briefable; any committed fix flies (no poor-accuracy caution)
  g.data=(flyNeverVerified()||layerTier('airspace')==='red'||layerTier('nps')==='red')?2:0;   // required feed never verified grounds (unknown ≠ clear): the chart gates PLUS the airspace/NPS listings — with no listing we can't say you're clear of a no-fly zone. stale-but-once-loaded doesn't vote (last-good paints)
  g.gust=wn&&wn.gust?2:0;                      // weather gates — the same NOW values the chart paints
  g.vis =wn&&wn.vis?2:0;
  g.wind=wn?capSev(wn.windCeilFt):0;
  g.cloud=wn?capSev(wn.cloudCapFt):0;
  const kpv=d?d.kpNow:null;
  g.kp=kpv!=null&&kpv>=SPEC.kpGnd?2:0;   // grounding storm only — always was no-go-or-nothing
  g.faa=(d&&!d.aspUnknown)?capSev(d.aspCapFt):0;   // unknown scores 0 here — g.data carries the unknown
  g.traffic=tr.ceilFt<0?2:0;   // red only when an in-ring plane GROUNDS the chart; a plane that merely caps no longer votes
  g.restrict=flyRestriction()?2:0;   // hard restriction UNDER you — the chart grounds with it
  return g;
}

// 7. clock + verdict paint — the clock is plain white; the NOW header carries the verdict color
const VERDICT_CLASS=['go','nogo','nogo'];   // CSS class per severity: 0 go · 2 nogo (binary — no caution tier; a stray 1 fails safe to nogo)
let verdictSeverity=2;   // born RED (unknown ≠ clear) — the first paint can't read green even for a frame
function clockParts(){   // local device time, 12-hour, no AM/PM
  const d=new Date(); let h=d.getHours()%12; if(h===0) h=12;
  return {h:String(h), m:String(d.getMinutes()).padStart(2,'0')};
}
const clockInnerHtml=()=>{ const {h,m}=clockParts();   // colon is its own span so the blink never rewrites the digits
  return `<span class="clk-h">${h}</span><span class="clk-colon">:</span><span class="clk-m">${m}</span>`; };
function renderClock(){   // tick the digits + repaint the NOW header from verdictSeverity
  const clock=document.querySelector('#fly-board .ga.clock');
  if(clock){
    let h=clock.querySelector('.clk-h'), m=clock.querySelector('.clk-m');
    if(!h||!m){ clock.innerHTML=clockInnerHtml(); h=clock.querySelector('.clk-h'); m=clock.querySelector('.clk-m'); }
    const p=clockParts(); h.textContent=p.h; m.textContent=p.m;
  }
  const now=document.querySelector('#fly-board .ghead .gc.now');
  if(now) now.className='gc now '+VERDICT_CLASS[verdictSeverity];
}
const COLON_WHITE='#eaf1f8', COLON_OFFWHITE='#9aa4af';
let _colonBright=true;
function blinkColon(){ const c=document.querySelector('#fly-board .clk-colon');   // white ↔ off-white, never black; re-queried so it survives re-renders
  if(c) c.style.color=(_colonBright=!_colonBright)?COLON_WHITE:COLON_OFFWHITE; }

// 8. boot
function boot(){
  document.addEventListener('dblclick',e=>e.preventDefault(),{passive:false});   // read-only display: no double-tap zoom…
  document.addEventListener('contextmenu',e=>e.preventDefault());                // …no context menu…
  ['gesturestart','gesturechange','gestureend'].forEach(ev=>
    document.addEventListener(ev,e=>e.preventDefault(),{passive:false}));        // …no iOS pinch gestures
  document.addEventListener('visibilitychange',()=>{ if(!document.hidden) pulse(); });   // back to visible → refresh at once
  { const sb=$('#sit-body');   // tap the SITREP list → scroll it back to the top (a scroll-drag fires no click, so only a real tap triggers it)
    if(sb) sb.addEventListener('click',()=>sb.scrollTo({top:0,
      behavior:matchMedia('(prefers-reduced-motion:reduce)').matches?'auto':'smooth'})); }
  initLayers();
  LAYERS.forEach(cfg=>{ LAYER_STATE[cfg.id].started=true; if(!cfg.viewport) runLayer(cfg); });   // every layer is position-scoped — all wait for a fix
  refreshBase=Date.now(); setInterval(refreshTick,1000); refreshTick();   // 5 s data pulse
  setInterval(renderClock,1000);                                          // live clock tick
  setInterval(blinkColon,500);                                            // blink the H:MM colon
  flyRender();     // chart skeleton until the first fix pulls data
  locate();        // start the GPS watch
  sitrepTick();    // GPS locating card under the loading chart
  if(!sitrepTimer) sitrepTimer=setInterval(sitrepTick,90000);   // safety tick between data-driven repaints
  window.__sitrep.ready=true;   // test/boot signal
}
if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',boot);
else boot();
</script>
