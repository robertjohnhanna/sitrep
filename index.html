  const wxState=wxStale?(FLY.data?'stale':'down'):'ok';
  // a limiting weather gate (or a down feed) pins here; a routine card sinks to the bottom
  const wxc=wxCard(wxState, wn, kpNow);
  if(wxc.pin) cards.push(wxc.card);

  // SPC Day-1 outlook: are you under a severe/tornado risk today? Just an
  // OUTLOOK, so an info card (no colour) above the weather card.
  const spcCards=[];
  const spcF=featsIn('spc');
  if(spcF.length){
    const tornHit=spcF.filter(f=>f.properties.kind==='torn'&&pointInFeature(f,lon,lat))
      .sort((a,b)=>(parseFloat(b.properties.code)||0)-(parseFloat(a.properties.code)||0))[0];
    const catHit=spcF.filter(f=>f.properties.kind==='cat'&&f.properties.rank>=1&&pointInFeature(f,lon,lat))
      .sort((a,b)=>b.properties.rank-a.properties.rank)[0];
    if(tornHit) spcCards.push(mkCard('','🌪️','TORNADO OUTLOOK',cut(tornHit.properties.label,16)+' today',
      tornHit.properties.sig?'significant EF2+ risk':'SPC Day 1 outlook',false));
    if(catHit) spcCards.push(mkCard('','⛈️','SEVERE WX OUTLOOK',cut(catHit.properties.label,16)+' today',
      'tornado / hail / wind risk',false));
  }
  // -- INDIVIDUAL item cards: one per in-view feature, interleaved. Hazards outrank
  //    routine traffic; tiers red → yellow → rest, distance sorts within each. Capped. --
  const items=[];
  CATS.forEach(cfg=>catItems(cfg,lat,lon,cfg.air?warnMi:rangeMi).forEach(f=>{
    const g=f.geometry; if(!g) return;
    // pt = closest edge point to your position (label + sorting); inside → "overhead"
    const inside=g.type!=='Point'&&pointInFeature(f,lon,lat);
    let cls=cfg.cls?cfg.cls(f,inside):'', det=null, headOv=null, subOv=null, icOv=null, hazardOv=null;
    // LOW AIRCRAFT: a low plane's own card BECOMES the alert and reverts on climb-out —
    // one card per plane, never two. Colour = the gate math: RED only when it GROUNDS
    // the chart (the NOW column reds with it); capping / buffer-ring = YELLOW heads-up
    const bi=cfg.air?breachInfo.get(f):null;
    if(bi){
      icOv=acIcon(f); hazardOv=true; headOv='LOW AIRCRAFT';   // ✈️/🚁, same as every card
      cls=bi.grounds?'danger':'alert';
      subOv='<span style="color:'+AIRCRAFT_COLOR+'">'+acTail(f,12,'aircraft')+'</span>';
      det=bi.label;
    }
    // effective hazard uses the per-card override (hazardOv) when set, so a low-aircraft card
    // tiers as a hazard — surviving the cap, colouring the verdict
    const hazard=hazardOv!=null?hazardOv:cfg.hazard;
    const tier=hazard?(cls==='danger'?0:1):2;
    let pt, mi;
    if(g.type==='Point'){ pt=g.coordinates; mi=havMi(lat,lon,pt[1],pt[0]); }
    else {
      const ne=nearestEdge(f,lon,lat)||{pt:polyPt(f),mi:0};
      pt=ne.pt; mi=inside?0:ne.mi;
    }
    if(!pt) return;
    // pt drives the label (direction/distance) + sorting = the NEAREST EDGE.
    items.push({cfg,f,pt,cls,tier,inside,mi,det,headOv,subOv,icOv,hazardOv});
  }));
  // a named airspace zone (esp. Class B) arrives as many shelf polygons — collapse
  // to the nearest single card per class+name
  const nearestAsp=new Map();
  const aspKey=it=>(it.f.properties.cls||'')+'|'+(it.f.properties.name||'');
  items.forEach(it=>{ if(it.cfg.src!=='airspace') return;
    const k=aspKey(it), ex=nearestAsp.get(k); if(!ex||it.mi<ex.mi) nearestAsp.set(k,it); });
  const shown=items.filter(it=>it.cfg.src!=='airspace'||nearestAsp.get(aspKey(it))===it);
  shown.sort((a,z)=>a.tier-z.tier||a.mi-z.mi);
  const ITEM_CAP=14;
  shown.slice(0,ITEM_CAP).forEach(({cfg,f,pt,cls,inside,mi,det,headOv,subOv,icOv,hazardOv})=>{
    const detTxt=det!=null?det:(cfg.detail?cfg.detail(f):'');
    const ic=icOv!=null?icOv:(typeof cfg.icon==='function'?cfg.icon(f):cfg.icon);
    const head=headOv!=null?headOv:cfg.head(f);
    const sub=subOv!=null?subOv:((cfg.sub?cfg.sub(f):'')||'—');
    // headline colour: airspace takes its polygon colour; a plain aircraft card tints its tail
    // number to the aircraft identity colour; a LOW AIRCRAFT override keeps its verdict colour
    // (tail tinted on line 2). Only a bare hex passes, so a feed can't inject markup.
    const rawCol=(head==='LOW AIRCRAFT')?null:cfg.src==='airspace'?f.properties._col:cfg.air?AIRCRAFT_COLOR:null;
    const col=/^#[0-9a-fA-F]{3,8}$/.test(rawCol||'')?rawCol:undefined;
    // every plane card carries its ground speed on line 3 after the altitude (mph, omit if unknown)
    let l3=(inside?'overhead':dirMi(pt[1],pt[0]))+(detTxt?' · '+detTxt:'');
    if(cfg.air){ const s=Number(f.properties.spd); if(isFinite(s)) l3+=' · '+Math.round(toMph(s))+U(' mph'); }
    const card=mkCard(cls, ic, head, sub, l3, hazardOv!=null?hazardOv:cfg.hazard, col);
    card.mi=mi; cards.push(card);   // range → sorts within its category
  });
  // WEATHER is the LAST category on the SITREP. wxTail renders after EVERYTHING else (even the
  // nearby context): WX outlook first, then general weather — the very last card. A binding
  // weather gate/outage instead PROMOTES the card (wxc.pin): it rose into the ranked cards above.
  const wxTail=[...spcCards];            // WX outlook (SPC severe/tornado)
  if(!wxc.pin) wxTail.push(wxc.card);    // then general weather conditions — dead last

  // -- NEARBY CONTEXT: objects OUTSIDE their range (but within the 25 mi data radius) are
  //    neutral GENERAL objects — pushed into the SAME `cards` list so they sort by RANGE together
  //    with the in-ring general items (aircraft / airspace interleaved by distance, not by type). --
  // "on screen" = within the fixed #3 DATA RADIUS (DATA_MI) — the same on every device,
  // so every object within the data radius lands on the SITREP
  const screenMi=DATA_MI;
  const ctx=[];
  CATS.forEach(cfg=>{
    const ringRad=cfg.air?warnMi:rangeMi;
    let feats=featsIn(cfg.src); if(cfg.filter) feats=feats.filter(cfg.filter);
    feats.forEach(f=>{
      const g=f.geometry; if(!g) return;
      let pt,mi;
      if(g.type==='Point'){ pt=g.coordinates; mi=havMi(lat,lon,pt[1],pt[0]); }
      else { const ne=nearestEdge(f,lon,lat); if(!ne) return;
        pt=ne.pt; mi=pointInFeature(f,lon,lat)?0:ne.mi; }
      if(mi<=ringRad) return;   // already shown as an in-ring card above
      if(mi>screenMi) return;   // beyond the on-screen radius → not shown
      ctx.push({cfg,f,pt,mi});
    });
  });
  // collapse airspace shelves (same class+name) to the nearest, like the in-ring set
  const ctxKey=it=>(it.f.properties.cls||'')+'|'+(it.f.properties.name||'');
  const ctxAsp=new Map();
  ctx.forEach(it=>{ if(it.cfg.src!=='airspace') return; const k=ctxKey(it),ex=ctxAsp.get(k); if(!ex||it.mi<ex.mi) ctxAsp.set(k,it); });
  const CTX_CAP=24;
  ctx.filter(it=>it.cfg.src!=='airspace'||ctxAsp.get(ctxKey(it))===it)
     .sort((a,z)=>a.mi-z.mi).slice(0,CTX_CAP)
     .forEach(({cfg,f,pt,mi})=>{
       const ic=typeof cfg.icon==='function'?cfg.icon(f):cfg.icon;
       const head=cfg.head(f);
       const sub=(cfg.sub?cfg.sub(f):'')||'—';
       const detTxt=cfg.detail?cfg.detail(f):'';
       let l3=dirMi(pt[1],pt[0])+(detTxt?' · '+detTxt:'');
       if(cfg.air){ const s=Number(f.properties.spd); if(isFinite(s)) l3+=' · '+Math.round(toMph(s))+U(' mph'); }
       const rawCol=cfg.src==='airspace'?f.properties._col:cfg.air?AIRCRAFT_COLOR:null;
       const col=/^#[0-9a-fA-F]{3,8}$/.test(rawCol||'')?rawCol:undefined;
       const cc=mkCard('', ic, head, sub, l3, false, col);   // neutral general object
       cc.mi=mi; cards.push(cc);   // out-of-ring → GENERAL category, range-sorted with in-ring items
     });

  // -- PERMANENT LOCATION CARD — your live GPS fix, always shown so position status is never
  //    ambiguous (there is no map to glance at). Pre-lock is red (above). After lock:
  //    • good accuracy (≤ ACC_WARN_M) → neutral card at the very bottom (wxTail)
  //    • significantly inaccurate (> ACC_WARN_M) → yellow, promoted into the alert section
  //      (the gps gate cautions the verdict from the SAME threshold — this card is its view).
  const accM = USER.acc;
  const accPoor = accM != null && accM > ACC_WARN_M;
  const locCard = mkCard(
    accPoor ? 'alert' : '',
    '📍',
    'GPS LOCK',
    accM != null
      ? 'accuracy ±' + Math.round(accM * 3.28084) + U(' ft') + (accPoor ? ' · poor' : '')
      : 'locating…',
    lat.toFixed(4) + ', ' + lon.toFixed(4),
    accPoor
  );
  if (accPoor) cards.push(locCard);   // promote to yellow-alert section at top
  else wxTail.push(locCard);          // good lock stays at the bottom

  // The verdict was computed at the TOP of this tick (gate table fold) — cards never
  // vote. What remains here is pure RANKING.
  // CARD CATEGORIES, top → bottom: 0 red warning · 1 yellow alert · 2 general objects (every
  // non-promoted aircraft / airspace / etc within 25 mi). A card is PROMOTED out of general
  // only by its hazard flag + colour (ranking metadata) — a plain plane stays general.
  // WITHIN each category cards sort by RANGE (mi ascending); area-wide cards (data /
  // FAA / Kp / promoted weather — no mi) head their category. WEATHER (wxTail) is the
  // final category, rendered after all of the above.
  const catOf=c=>(c.hazard&&c.cls==='danger')?0:(c.hazard&&c.cls==='alert')?1:2;
  const rng=c=>c.mi==null?-1:c.mi;   // area-wide (no location) → head of its category
  const ordered=cards.map((c,i)=>({c,i}))
    .sort((a,z)=>catOf(a.c)-catOf(z.c) || rng(a.c)-rng(z.c) || a.i-z.i)
    .map(x=>x.c);
  [...ordered, ...wxTail].forEach(row);

  $('#sit-body').innerHTML=rows.join('');
}


/* =====================================================================
   6. CAN I FLY — the drone-preflight chart (altitudes 400→SFC × NOW/+1/+2/+3h) at your
   GPS position, riding the unified refresh pulse. Two-way integration with the SITREP: the
   1 mi RED range is also the LOW AIRCRAFT radius — manned traffic in it under the warning
   altitude reds the NOW cell (TRFC); a NEXRAD echo in it grounds the NOW column (PCPN),
   from the same mosaic the precip gate samples.
   ===================================================================== */
// Boundary conversions ONLY — the app's own math is all imperial (statute miles / feet /
// mph / SM). These exist because the data providers speak metric: Open-Meteo returns
// elevation + visibility in metres and reports winds at metric height levels (10/80/120/180 m),
// and Web Mercator radar tiles are metres-per-pixel. Convert once at the feed edge, never again.
const M_TO_FT=3.28084, FT_TO_M=0.3048, M_TO_SM=1/1609.34, KT_TO_MPH=1.15078, MI_TO_M=1609.34;
const toMph=kt=>kt==null?null:kt*KT_TO_MPH;
const comma=n=>Number(Math.round(n)).toLocaleString('en-US');
const fmt=(n,d=0)=>(n==null||isNaN(n))?'–':Number(n).toFixed(d);
// FAA Part 107 / physics limits — all fixed. Kp is right-sized to a drone's GPS/compass
// risk: NOAA flags GPS degradation only at G3 (Kp 7), so kpCaut (Kp 5) yellows and kpGnd
// (Kp 7) grounds.
const SPEC={kpCaut:5,kpGnd:7,visSM:3,clrFt:500,regFt:400};
// vertical separation to keep BELOW manned traffic [ft] — 500 ft is the manned minimum
// safe altitude over non-congested areas (§91.119(c)), the conservative buffer
const FAA_SEP_FT=500;
// traffic warning altitude [ft AGL] = drone ceiling + separation. A plane below this
// fires the LOW AIRCRAFT alert AND caps the chart's NOW column — one shared number.
const WARN_AGL_FT=SPEC.regFt+FAA_SEP_FT;   // 400 + 500 = 900
const LIM={wind:27};   // aircraft max wind [mph] — gates surface gust + caps the wind-aloft scan
// The three FIXED range rings [statute miles], all centred on your GPS position:
//   • OPERATIONAL ring (red, 1 mi)  — the FAA point query, the low-aircraft red warning,
//     the TRFC cap, and the precipitation grounding.
//   • BUFFER ring (yellow, 5 mi)    — the traffic net + the yellow low-aircraft heads-up
//     + the yellow "precipitation nearby".
const RED_MI=1, BUFFER_MI=5;
const RNG={mi:RED_MI};
//   • DATA ring (25 mi) — a FIXED radius, identical on every device: everything within it
// is PULLED (aircraft, airspace) and carded on the SITREP. Fixed (not a pixel viewport)
// so results never vary by screen. (Precipitation is gated by the 1/5 mi rings above.)
const DATA_MI=25;
// Altitude ladder, 50 ft steps through the FAA band (matches the grid rows).
const ALTS_UP=(()=>{const a=[];for(let f=0;f<=SPEC.regFt;f+=50)a.push(f);return a;})();
const ALTS=[...ALTS_UP].reverse();
const FC_HOURS=3;   // forecast columns: NOW + the next 3 hourly steps
const KP_URL='https://services.swpc.noaa.gov/products/noaa-planetary-k-index-forecast.json';
// FAA ArcGIS services (official AIS, CORS-open): LAANC grid ceiling + defense no-fly zones
const FAA_GIS='https://services6.arcgis.com/ssFJjBXIUyZDrSYZ/ArcGIS/rest/services';
const gisUrl=(svc,lat,lon,rng,fields)=>`${FAA_GIS}/${svc}/FeatureServer/0/query`
  +`?geometry=${lon.toFixed(3)},${lat.toFixed(3)}&geometryType=esriGeometryPoint&inSR=4326`
  +`&spatialRel=esriSpatialRelIntersects&distance=${rng}&units=esriSRUnit_StatuteMile`
  +`&outFields=${fields}&returnGeometry=false&f=json`;
const aspUrl=(lat,lon,rng)=>gisUrl('FAA_UAS_FacilityMap_Data',lat,lon,rng,'CEILING,UNIT');
const defUrl=(lat,lon,rng)=>gisUrl('National_Defense_Airspace_TFR_Areas',lat,lon,rng,'NAME');
// Pressure levels scanned for cloud decks; lowest level ≥12% cover = the base.
const PRES_LEVELS=[1000,975,950,925,900,850,800,700];
const CLOUD_FEW_PCT=12;
function aloftUrl(lat,lon){
  const h=['wind_speed_10m','wind_direction_10m','wind_speed_80m','wind_speed_120m','wind_speed_180m','wind_gusts_10m',
    'visibility','cloud_cover_low','temperature_2m','dew_point_2m']
    .concat(PRES_LEVELS.map(p=>`geopotential_height_${p}hPa`))
    .concat(PRES_LEVELS.map(p=>`cloud_cover_${p}hPa`));
  const cur=['wind_speed_10m','wind_direction_10m','wind_gusts_10m','cloud_cover_low',
    'visibility','temperature_2m','dew_point_2m','pressure_msl']
    .concat(PRES_LEVELS.map(p=>`cloud_cover_${p}hPa`));
  // winds in MPH — the unit we display + gate in — so no kt→mph conversion is needed anywhere
  return `https://api.open-meteo.com/v1/forecast?latitude=${lat.toFixed(3)}&longitude=${lon.toFixed(3)}`
    +`&current=${cur.join(',')}`
    +`&hourly=${h.join(',')}`
    +`&wind_speed_unit=mph&forecast_days=2&timezone=auto`;
}
// retry a flaky fetch before letting it fail — a transient blip is usually gone next attempt
async function retry(fn,tries=3,baseMs=600){
  let err;
  for(let a=0;a<tries;a++){
    try{ return await fn(); }
    catch(e){ err=e; if(a<tries-1) await new Promise(r=>setTimeout(r,baseMs*(a+1))); }
  }
  throw err;
}
// Open-Meteo: surface + winds aloft (height levels through the FAA band), gusts,
// visibility, per-level cloud cover/height. One row per grid column.
async function getAloft(lat,lon){
  const d=await getJSON(aloftUrl(lat,lon),{timeout:10000});
  let i=0;
  if(d.current?.time&&d.hourly?.time){const now=d.current.time.slice(0,13);i=d.hourly.time.findIndex(t=>t.slice(0,13)===now);if(i<0)i=0;}
  const H=d.hourly||{}, elev=d.elevation??0;
  const gh=H.wind_gusts_10m||[];
  const cur=d.current||{};
  // stash local sea-level pressure (≈ QNH) for the aircraft-AGL baro correction
  if(typeof cur.pressure_msl==='number'&&isFinite(cur.pressure_msl)) QNH_HPA=cur.pressure_msl;
  const cloudBaseAt=n=>{
    const idx=i+n, C=k=>n===0?(cur[k]??H[k]?.[idx]):H[k]?.[idx];
    let deckFt=null;
    for(const p of PRES_LEVELS){
      const cc=C(`cloud_cover_${p}hPa`), ghm=H[`geopotential_height_${p}hPa`]?.[idx]??H[`geopotential_height_${p}hPa`]?.[i];
      if(cc==null||ghm==null) continue;
      const agl=(ghm-elev)*M_TO_FT; if(agl<=0) continue;
      if(cc>=CLOUD_FEW_PCT){ deckFt=agl; break; }
    }
    const low=C('cloud_cover_low'), T=C('temperature_2m'), Td=C('dew_point_2m');
    const lclFt=((low??0)>=CLOUD_FEW_PCT && T!=null && Td!=null)?Math.max(0,Math.round((T-Td)*410)):null;
    let baseFt=null; for(const v of [deckFt,lclFt]) if(v!=null) baseFt=(baseFt==null?v:Math.min(baseFt,v));
    return baseFt;
  };
  const profAt=n=>{const idx=i+n;
    const w10=n===0?(d.current?.wind_speed_10m??H.wind_speed_10m?.[idx]):H.wind_speed_10m?.[idx];
    return [{h:10,w:w10},{h:80,w:H.wind_speed_80m?.[idx]},{h:120,w:H.wind_speed_120m?.[idx]},{h:180,w:H.wind_speed_180m?.[idx]}]
      .filter(x=>x.w!=null&&!isNaN(x.w)).sort((a,b)=>a.h-b.h);};
  const gustAt =n=>n===0?(d.current?.wind_gusts_10m??gh[i]):gh[i+n];
  const visAt  =n=>n===0?(cur.visibility??H.visibility?.[i]):H.visibility?.[i+n];
  const dirAt  =n=>n===0?(d.current?.wind_direction_10m??H.wind_direction_10m?.[i]):H.wind_direction_10m?.[i+n];
  const cols=[];
  for(let n=0;n<=FC_HOURS;n++){
    // windPts[].w and gustMph are in MPH (requested that way); windDir in °; baseFt in ft; visM in metres
    cols.push({n, windPts:profAt(n), gustMph:gustAt(n), windDir:dirAt(n), baseFt:cloudBaseAt(n), visM:visAt(n)});
  }
  return {cols};
}
// NOAA SWPC planetary-Kp forecast: the full time-sorted bin list, so each grid hour
// picks the value in force when it arrives (3-hourly bins).
async function getKp(){
  const d=await getJSON(KP_URL,{timeout:7000});
  if(!Array.isArray(d)||d.length===0) return null;
  const arrHdr=Array.isArray(d[0]);       // products feed = array rows w/ header
  const src=arrHdr?d.slice(1):d;
  const rows=src.map(r=>{
    const t=arrHdr?r[0]:r.time_tag, kp=Number(arrHdr?r[1]:r.kp);
    // observed = finalized · estimated = nowcast · predicted = forecast; NOW uses the last observed
    const obs=arrHdr?r[2]:r.observed;
    return {ms:Date.parse((t||'').replace(' ','T')+'Z'), kp, obs};
  }).filter(x=>!isNaN(x.ms)&&!isNaN(x.kp)).sort((a,b)=>a.ms-b.ms);
  return rows.length?{rows}:null;
}
// The FAA gate is TWO queries with very different lifetimes, cached separately:
// the LAANC grid is near-static (6 h cache below), but a national-defense TFR can
// activate on hours' notice — it must never ride that long cache. Both are LEGAL
// warnings, so anything that could quietly understate a restriction THROWS
// (→ yellow via fail-open), never reads "clear".
async function getLaancCeil(lat,lon,rng){
  const grid=await getJSON(aspUrl(lat,lon,rng),{timeout:7000});
  if(grid.error||!Array.isArray(grid.features)) throw new Error('airspace grid query failed');
  if(grid.exceededTransferLimit) throw new Error('airspace result truncated');
  let ceil=SPEC.regFt;
  for(const f of grid.features){
    const a=f&&f.attributes;
    const c=(a&&typeof a.CEILING==='number')?a.CEILING:NaN;
    if(!Number.isFinite(c)||c<0||c>10000) throw new Error('airspace cell has no usable ceiling');
    if(a.UNIT!=null&&!/^f/i.test(String(a.UNIT))) throw new Error('airspace ceiling in unexpected units');
    ceil=Math.min(ceil,c);
  }
  return {ceilFt:ceil};
}
async function getDefense(lat,lon,rng){
  const def=await getJSON(defUrl(lat,lon,rng),{timeout:7000});
  if(def.error||!Array.isArray(def.features)) throw new Error('defense-airspace query failed');
  if(def.exceededTransferLimit) throw new Error('defense-airspace result truncated');
  return {active:def.features.length>0};
}
// wind(ft) → mph, linearly interpolating the sparse model levels
function makeProfile(pts){
  const p=(pts||[]).filter(x=>x&&x.w!=null&&!isNaN(x.w)).sort((a,b)=>a.h-b.h);
  return function(ft){
    if(p.length===0) return null;
    const m=ft*FT_TO_M;
    if(m<=p[0].h) return p[0].w;
    if(m>=p[p.length-1].h) return p[p.length-1].w;
    for(let i=0;i<p.length-1;i++){if(m>=p[i].h&&m<=p[i+1].h){const t=(m-p[i].h)/(p[i+1].h-p[i].h);return p[i].w+t*(p[i+1].w-p[i].w);}}
    return p[p.length-1].w;
  };
}
// Airspace caches. LAANC is near-static + the FAA service is rate-limited, so the GRID
// half re-queries only on a real location/range change or TTL expiry (persisted so
// reloads reuse it). The DEFENSE-TFR half is time-sensitive — a TFR appearing while
// you're parked must still be caught — so it gets its own short in-memory cache: a
// stationary session re-checks every ~10 min instead of every 6 h.
// (aspCache.ceilFt is the GRID-ONLY ceiling. An old persisted entry may embed a
// defense-forced 0 — that reads as a grid no-fly, conservative, and ages out ≤24 h.)
const ASP_CACHE_KEY='canifly.asp';
const ASP_TTL=6*60*60*1000, ASP_HARD_TTL=24*60*60*1000;
const DEF_TTL=10*60*1000, DEF_HARD_TTL=60*60*1000;
// position match uses ASP_TOL_MI — see the MOVEMENT REFRESH LADDER (fix-pipeline section)
let aspCache=null;
let defCache=null;   // {lat,lon,rng,active,ts} — in-memory only (short-lived by design)
function hydrateAsp(){
  try{ const s=JSON.parse(localStorage.getItem(ASP_CACHE_KEY)||'null');
    if(s&&Number.isFinite(s.lat)&&Number.isFinite(s.lon)&&Number.isFinite(s.rng)
       &&Number.isFinite(s.ceilFt)&&s.ceilFt>=0&&s.ceilFt<=SPEC.regFt
       &&Number.isFinite(s.ts)&&(Date.now()-s.ts)<ASP_HARD_TTL){ aspCache=s; } }catch(e){}
}
function persistAsp(){ store(ASP_CACHE_KEY,JSON.stringify(aspCache)); }

// ---- PCPN: NEXRAD reflectivity within `rngMi` of the point? Samples the same Iowa
// Mesonet mosaic, at native z8, on an offscreen canvas. Called twice per
// refresh — OPERATIONAL ring (1 mi, grounds NOW) and BUFFER ring (5 mi, the yellow "nearby"). Returns
// true/false, or null when tiles can't be read (fails OPEN, yellows via FLY.err). ----
const RADAR_Z=8, RADAR_ALPHA=80, RADAR_MIN_PX=2;
const radarMemo=new Map();   // key → val: identical minute+point+range reuses the scan.
const RADAR_MEMO_MAX=8;      // small LRU so the buffer-ring + screen samples don't evict each other
async function sampleRadarPrecip(lat,lon,rngMi){
  const n=1<<RADAR_Z, d=Math.PI/180;
  const xf=(lon+180)/360*n;
  const yf=(1-Math.log(Math.tan(lat*d)+1/Math.cos(lat*d))/Math.PI)/2*n;
  if(!isFinite(yf)||yf<0||yf>=n) return false;         // poles — no NEXRAD there anyway
  const mPerPx=40075016.686*Math.cos(lat*d)/(n*256);   // metres per mosaic pixel at this lat
  const rPx=Math.max(1,rngMi*MI_TO_M/mPerPx);
  const cx=xf*256, cy=yf*256;                          // global pixel coords at z8
  const tx0=Math.floor((cx-rPx)/256), tx1=Math.floor((cx+rPx)/256);
  const ty0=Math.max(0,Math.floor((cy-rPx)/256)), ty1=Math.min(n-1,Math.floor((cy+rPx)/256));
  // cache key = the current refresh window; re-sampling within a window reuses the
  // memoised verdict (and shares the browser tile cache across the two range samples)
  const bust=currentRadarBust();
  const key=bust+'|'+lat.toFixed(3)+'|'+lon.toFixed(3)+'|'+rngMi;
  if(radarMemo.has(key)){ const v=radarMemo.get(key);
    radarMemo.delete(key); radarMemo.set(key,v);   // refresh recency — eviction is truly LRU
    return v; }
  const tiles=[];
  for(let tx=tx0;tx<=tx1;tx++)for(let ty=ty0;ty<=ty1;ty++)
    tiles.push({x:((tx%n)+n)%n,y:ty,px:(tx-tx0)*256,py:(ty-ty0)*256});
  const imgs=await Promise.all(tiles.map(t=>new Promise((res,rej)=>{
    const im=new Image(); im.crossOrigin='anonymous';
    im.onload=()=>res({t,im}); im.onerror=()=>rej(new Error('radar tile failed'));
    im.src=RADAR_TILE_URL.replace('{z}',RADAR_Z).replace('{x}',t.x).replace('{y}',t.y)+'?'+bust;
  })));
  const w=(tx1-tx0+1)*256, h=(ty1-ty0+1)*256;
  const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
  const ctx=cv.getContext('2d',{willReadFrequently:true});
  imgs.forEach(({t,im})=>ctx.drawImage(im,t.px,t.py));
  const px=ctx.getImageData(0,0,w,h).data;   // throws on a tainted canvas → caller catches → null
  const ox=cx-tx0*256, oy=cy-ty0*256;
  const x0=Math.max(0,Math.floor(ox-rPx)), x1=Math.min(w-1,Math.ceil(ox+rPx));
  const y0=Math.max(0,Math.floor(oy-rPx)), y1=Math.min(h-1,Math.ceil(oy+rPx));
  let hits=0, found=false;
  for(let y=y0;y<=y1&&!found;y++)for(let x=x0;x<=x1;x++){
    const dx=x-ox, dy=y-oy; if(dx*dx+dy*dy>rPx*rPx) continue;
    if(px[(y*w+x)*4+3]>=RADAR_ALPHA && ++hits>=RADAR_MIN_PX){ found=true; break; }   // ≥2 px kills speckle
  }
  radarMemo.set(key,found);
  if(radarMemo.size>RADAR_MEMO_MAX) radarMemo.delete(radarMemo.keys().next().value);   // evict oldest
  return found;
}

// ---- TRAFFIC — the ONE assessment shared by the chart's TRFC gate, the traffic gate in
// the verdict table, and the LOW AIRCRAFT cards, so they can never disagree. Scans the
// BUFFER ring (5 mi) for planes under the warning altitude; each is tagged inRange
// (inside the 1 mi operational ring) and, in range, imposes a NOW ceiling: the highest 50-ft
// band STRICTLY below (plane AGL − FAA_SEP_FT). The most restrictive plane wins
// (ceilFt Infinity = none, < 0 = grounds); grounds is also tagged per plane so a
// card's colour derives from the same math as the chart column. ----
function assessTraffic(){
  if(USER.lat==null) return {ceilFt:Infinity,low:[]};
  const lat=USER.lat,lon=USER.lon;
  const cross=groundElevFt(lat,lon);   // ft AMSL at your position, fallback ground
  const near=planesNear(lat,lon,BUFFER_MI);
  ensureGroundElev([[lat,lon],...near.filter(a=>a.alt<AGL_CAND_MAX_FT).map(a=>[a.pt[1],a.pt[0]])]);
  const rMi=RNG.mi;
  let ceilFt=Infinity; const low=[];
  near.forEach(a=>{
    const {ground,agl}=planeAglFt(a,cross);   // per-plane terrain, QNH-corrected MSL
    if(agl>=WARN_AGL_FT) return;              // too high to intrude on the 0–400 band
    const inRange=havMi(lat,lon,a.pt[1],a.pt[0])<=rMi;
    let grounds=false;
    if(inRange){
      const safeFloor=agl-FAA_SEP_FT;         // drone must stay clear of (below) this
      // highest 50-ft band STRICTLY below the sep floor (−50 = none → grounds)
      let top=-50; for(const ft of ALTS){ if(ft<safeFloor){ top=ft; break; } }
      if(top<ceilFt) ceilFt=top;
      grounds=top<0;
    }
    low.push({f:a.f,agl,ground,inRange,grounds});
  });
  return {ceilFt,low};
}

// ---- state + render pipeline ----
const FLY={
  data:null,     // last good {lat,lon,aloft,kp,asp} — lat/lon = where it was fetched
  detail:null,   // computed render model (kept for tests/debug)
  precip:null,   // radar echo within the operational ring (1 mi)? true/false/null → grounds NOW
  precipInbound:null,   // radar echo within the BUFFER ring (5 mi) but NOT the 1 mi operational ring → yellow "nearby"
  // Every gate starts UNVERIFIED (true), not clear — so the app never opens falsely-green.
  // Each clears as its feed pulls + prints; while a gate has NEVER loaded the verdict
  // GROUNDS RED (can't confirm → don't fly) and a red DATA card names it, immediately (no
  // grace). Once a feed has loaded, a later blip cautions (yellow) once it outlasts the
  // ONE grace window (feedTier) — the verdict and the DATA card change colour together.
  err:{om:true,kp:true,asp:true,radar:true},
};
// ---- UNIFIED DATA FRESHNESS ----
// ONE classifier for every data source (chart gates AND airspace/NPS feeds). Given whether it has
// EVER loaded, whether it's failing NOW, and since when → its DATA-card tier:
//   'red'   = never pulled yet (startup / not yet loaded) — shown at once, grounds the verdict
//   'yellow' = was loaded, now failing past the grace window — caution (fail-open)
//   null    = healthy, or a failure still inside the grace window
const DATA_ERR_GRACE_MS=35000;   // ~35 s: a self-healing blip won't pop the DATA card
function feedTier(everLoaded, failing, since){
  if(!failing) return null;
  if(!everLoaded) return 'red';
  return since>0 && Date.now()-since>=DATA_ERR_GRACE_MS ? 'yellow' : null;   // 0 = not yet stamped → within grace
}
// per chart gate: FLY.err = failing now · flyEver = ever loaded · flyErrSince = when it began
// failing. All three maintained together in flyRefresh.
const flyEver={om:false,asp:false,kp:false,radar:false};
const flyErrSince={om:0,asp:0,kp:0,radar:0};
const FLY_ERR_LABEL={om:'weather',asp:'FAA airspace',kp:'Kp',radar:'radar'};
const gateTier=k=>feedTier(flyEver[k], FLY.err[k], flyErrSince[k]);
// a map layer's OVERLAY (airspace/aircraft polygons): failSince is both the flag and the
// clock, and everLoaded is forced true so a purely-visual feed only ever goes YELLOW (its
// startup is already covered by the matching gate) — never red-grounds the verdict.
const layerTier=id=>{ const st=LAYER_STATE[id]||{}; return feedTier(true, st.failSince>0, st.failSince); };
// verdict red while any required GATE has never verified — keyed to the authoritative gates
function flyNeverVerified(){ return Object.keys(FLY_ERR_LABEL).some(k=>gateTier(k)==='red'); }
window.__sitrep.fly={FLY,SPEC,LIM,RNG,paint:flyPaint,refresh:flyRefresh};   // debug/test handle

/* =====================================================================
   VERDICT GATE TABLE — the ONE point of verdict logic. Every condition that can colour
   the NOW verdict is scored here, exactly once: 0 clear · 1 caution · 2 no-go.
   verdictSeverity is a pure fold (max) over this table; everything else is a VIEW —
   the chart is the altitude × hour projection of the ceiling gates, and cards carry
   info + ranking (a card NEVER votes on the verdict).
   Chart-consistency rule: an altitude-expressible gate scores from the same values the
   chart paints, so the NOW colour can never contradict the cells; only conditions the
   chart cannot express (a warning polygon, a nearby zone, GPS, data health) may raise
   the verdict beyond the chart's own state.
   ===================================================================== */
const SEV_CLS=['','alert','danger'];   // gate severity → card display class
// NWS warning severity — the ONE classifier, used by the nws gate AND the card colour
const nwsSev=f=>/Extreme|Severe/i.test(f.properties.severity)?2:1;
// a hazard zone (hard/conditional airspace, or NPS land) within the 1 mi ring: a
// PROXIMITY caution — being NEAR a zone is legal; being INSIDE one is g.restrict's no-go.
// (A defense TFR in range still reds via g.faa — its gate query grounds the ceiling.)
function zonesNearSev(){
  if(USER.lat==null) return 0;
  const rMi=RED_MI;
  const near=f=>{ if(pointInFeature(f,USER.lon,USER.lat)) return true;
    const ne=nearestEdge(f,USER.lon,USER.lat); return !!ne&&ne.mi<=rMi; };
  if(featsIn('airspace').some(f=>(f.properties.sev==='hard'||f.properties.sev==='caution')&&near(f))) return 1;
  if(featsIn('nps').some(near)) return 1;
  return 0;
}
// worst NWS warning in play — covering you, or its edge within the 1 mi ring
function nwsGateSev(){
  if(USER.lat==null) return 0;
  const rMi=RED_MI;
  let sev=0;
  featsIn('nws').forEach(f=>{ if(sev===2) return;
    if(pointInFeature(f,USER.lon,USER.lat)){ sev=Math.max(sev,nwsSev(f)); return; }
    const ne=nearestEdge(f,USER.lon,USER.lat);
    if(ne&&ne.mi<=rMi) sev=Math.max(sev,nwsSev(f));
  });
  return sev;
}
// takes the shared traffic assessment (assessTraffic) so gate and cards read one result
function evalGates(tr){
  const d=FLY.detail, wn=d&&d.wxNow;
  const capSev=c=>c==null?0:c<0?2:c<SPEC.regFt?1:0;   // ceiling → severity (Infinity → 0)
  const g={};
  // GPS: no fix = nothing can be briefed (no-go); poor accuracy = caution
  g.gps=USER.lat==null?2:(USER.acc!=null&&USER.acc>ACC_WARN_M?1:0);
  // DATA: a required gate feed never verified grounds (unknown ≠ clear); a feed stale
  // past the ONE grace window (feedTier) cautions. The verdict and the DATA card change
  // colour TOGETHER now — the old immediate "quiet yellow" (an unexplained NOW colour
  // change up to 35 s before its card) is retired.
  g.data=flyNeverVerified()?2
    :(Object.keys(FLY_ERR_LABEL).some(k=>gateTier(k)==='yellow')
      ||layerTier('airspace')==='yellow'||layerTier('nps')==='yellow')?1:0;
  // weather gates — the same NOW values the chart paints (wn = flyComputeDetail's wxNow)
  g.gust=wn&&wn.gust?2:0;
  g.vis =wn&&wn.vis?2:0;
  g.wind=wn?capSev(wn.windCeilFt):0;
  g.cloud=wn?capSev(wn.cloudCapFt):0;
  g.precip=wn?(wn.precip?2:wn.precipInbound?1:0):0;
  // Kp: ONE gate, both thresholds — storm grounds, elevated cautions
  const kpv=d?d.kpNow:null;
  g.kp=kpv==null?0:kpv>=SPEC.kpGnd?2:kpv>=SPEC.kpCaut?1:0;
  // FAA: LAANC/defense ceiling (unknown scores 0 here — g.data carries the unknown)
  g.faa=(d&&!d.aspUnknown)?capSev(d.aspCapFt):0;
  // traffic: a GROUNDING plane reds (the chart NOW column reds with it); a capping or
  // in-buffer-ring low plane cautions — the chart shows the cap, so the NOW colour never
  // reads no-go over flyable green cells
  g.traffic=tr.ceilFt<0?2:(tr.ceilFt<SPEC.regFt||tr.low.length?1:0);
  // hard restriction UNDER you (the chart grounds every column) vs zones merely NEAR
  g.restrict=flyRestriction()?2:0;
  g.zones=zonesNearSev();
  // NWS warning here: severe/extreme = no-go, any other warning = caution
  g.nws=nwsGateSev();
  return g;
}

// Hard airspace restriction under the GPS position, from the loaded map layer: a Prohibited
// (PROH) or national-security UAS (NSUF) zone that grounds the chart. Defense zones are
// excluded (the FAA cap already grounds those); conditional/advisory zones never ground.
function flyRestriction(){
  const c={lat:USER.lat,lng:USER.lon}; let hit=null;
  featsIn('airspace').forEach(f=>{
    const p=f.properties;
    if(hit||p.sev!=='hard'||p.cls==='DEF') return;
    if(pointInFeature(f,c.lng,c.lat)) hit={code:p.code,name:p.name};
  });
  // NPS land is a hard no-fly too (can't launch/operate there)
  if(!hit) featsIn('nps').forEach(f=>{
    if(hit) return;
    if(pointInFeature(f,c.lng,c.lat)) hit={code:'PARK',name:f.properties.name};
  });
  return hit;
}

// Apply every gate and build the render model — the canifly paint() core, plus
// the sitrep integrations (TRFC cells, PCPN gate, hard-airspace grounding).
function flyComputeDetail(){
  const {aloft,kp,asp}=FLY.data;
  // FAA gate unknown (query failing, no usable cache) → the ceiling math fails OPEN
  // (cap 400). The unknown is surfaced by the VERDICT — the data gate in evalGates —
  // and by the DATA card that names the feed; the grid itself stays strictly binary
  // (green fly / red can't-fly). Colour logic lives on NOW alone.
  const aspCapFt=asp==null?SPEC.regFt:(asp.ceilFt<=0?-1:Math.min(SPEC.regFt,asp.ceilFt));
  // winds arrive in MPH now, so no conversion — gate at the mph limit, print mph
  const atLim=mph=>mph!=null&&Math.round(mph)>=LIM.wind;
  const one=mph=>mph==null?'—':fmt(mph,0);
  const cols=(aloft&&aloft.cols)||[];
  const nowMs=Date.now();
  // Kp in force at hour n = the last bin at or before that hour. NOW (n=0) takes the
  // WORSE of the last FINALIZED observed bin and the in-progress bin: the current bin is
  // a revisable estimate, but a rising storm shows up there FIRST — trusting only the
  // (up to 3 h old) observation would understate a storm in progress. Fail-safe.
  const kpAt=n=>{
    if(!kp||!kp.rows||!kp.rows.length) return null;
    const t=nowMs+n*3600e3; let v=null;
    for(const r of kp.rows){ if(r.ms<=t) v=r.kp; else break; }
    if(n===0){
      let obs=null;
      for(let i=kp.rows.length-1;i>=0;i--){
        const r=kp.rows[i]; if(r.ms<=nowMs && r.obs==='observed'){ obs=r.kp; break; }
      }
      if(obs!=null) v=v!=null?Math.max(obs,v):obs;
    }
    return v!=null?v:kp.rows[0].kp;
  };
  const trafficCeil=assessTraffic().ceilFt;   // NOW-only manned-traffic ceiling (Infinity = none)
  const restrict=flyRestriction();   // a hard Prohibited/security zone grounds every column
  let wxNow=null;   // NOW-column weather-gate diagnostics for the weather card
  const grid=cols.map((c,n)=>{
    const prof=makeProfile(c.windPts);
    const visSM=c.visM!=null?c.visM*M_TO_SM:null;
    const kpv=kpAt(n);
    const gGust=atLim(c.gustMph), gVis=visSM!=null&&visSM<SPEC.visSM, gKp=kpv!=null&&kpv>=SPEC.kpGnd;
    // PCPN — radar is a NOW product, so only the NOW column can carry the gate
    const gPcpn=n===0&&FLY.precip===true;
    const globalGrounded=gGust||gVis||gKp||gPcpn||!!restrict;   // hard airspace grounds all hours
    const cloudCapFt=c.baseFt==null?Infinity:(c.baseFt-SPEC.clrFt);
    let hitFt=null; for(const ft of ALTS_UP){ if(atLim(prof(ft))){ hitFt=ft; break; } }
    const windCeilFt=hitFt==null?SPEC.regFt:hitFt-50;
    // capture NOW's weather gates + raw values for the SITREP weather card (its line 3
    // reads real telemetry: gust mph, wind-aloft peak, visibility SM, cloud base)
    if(n===0){
      let windPeakMph=0; for(const ft of ALTS){ const v=prof(ft); if(v!=null&&v>windPeakMph) windPeakMph=v; }
      wxNow={gust:gGust,vis:gVis,precip:gPcpn,precipInbound:FLY.precipInbound===true,windCeilFt,cloudCapFt,
        gustMph:c.gustMph, visSM, windPeakMph};   // gustMph / windPeakMph are now genuine MPH
    }
    // manned traffic caps the NOW column only (it's a live snapshot, like radar)
    const tCeil = n===0 ? trafficCeil : Infinity;
    // TRFC also gets its own marker (trfcAlt) so intruding low traffic is always
    // visible even when a lower gate owns the binding-reason cell; at the first no-go band
    // above the traffic ceiling (surface if low enough). Only NOW carries live traffic.
    let trfcAlt = (n===0 && trafficCeil!==Infinity)
      ? (trafficCeil<0 ? 0 : Math.min(SPEC.regFt, trafficCeil+50)) : null;
    const capFt=Math.min(SPEC.regFt, cloudCapFt, windCeilFt, aspCapFt, tCeil);
    const grounded=globalGrounded||capFt<0;
    let maxFly=-1;
    if(!grounded) for(const ft of ALTS){ if(ft<=capFt){ maxFly=ft; break; } }
    // which cap binds → the code at the ceiling row (traffic wins ties, then FAA, cloud, wind)
    const capSrc = tCeil<=aspCapFt&&tCeil<=cloudCapFt&&tCeil<=windCeilFt ? 'TRFC'
             : aspCapFt<=cloudCapFt&&aspCapFt<=windCeilFt ? 'FAA'
             : cloudCapFt<=windCeilFt ? 'SKY' : 'WIND';
    let reasonAlt=null, reason='';
    if(grounded){
      reasonAlt=0;
      reason = aspCapFt<0 ? 'FAA'
             : restrict ? restrict.code
             : tCeil<0 ? 'TRFC'
             : gGust ? 'GUST'
             : gVis ? 'VIS'
             : gPcpn ? 'PCPN'
             : gKp ? ('KP'+Math.round(kpv))
             : capSrc;
    }else if(maxFly<SPEC.regFt){
      reasonAlt=maxFly+50; reason=capSrc;
    }
    // if a grounding traffic marker collides with a different grounding reason at SFC,
    // bump TRFC up one band so both stay visible (same reason → same marker, no bump)
    if(trfcAlt===0 && reasonAlt===0 && reason!=='TRFC') trfcAlt=50;
    return {n,prof,gustMph:c.gustMph,windDir:c.windDir,capFt,maxFly,grounded,reason,reasonAlt,trfcAlt};
  });
  // hand the NOW column's binding reason to the weather card so its headline MATCHES the
  // chart cell exactly (chart says GUST → card says HIGH WIND, never a different gate)
  if(wxNow){ const g0=grid[0]; wxNow.reason=g0.reason; wxNow.grounded=g0.grounded; }
  const cellState=(g,ft)=>{
    if(g.grounded) return 'bad';
    const mph=g.prof(ft); if(mph==null) return '';
    if(ft>g.capFt||atLim(mph)) return 'bad';   // above any cap (incl. the traffic ceiling) → red
    return 'good';
  };
  const nowMaxFly=grid.length?grid[0].maxFly:-1;
  // Column headers. A FUTURE column that's grounded shows red. The NOW header is left
  // uncoloured here and painted with the OVERALL verdict colour by renderClock() (so it
  // matches the clock) — the verdict is a superset of the chart's own NOW state.
  const colLabels=grid.map(g=>({v:g.n===0?'now':'+'+g.n+'h',
    st:(g.n>0&&g.grounded)?'bad':'', now:g.n===0}));
  const topFt=ALTS[0];
  const altRows=ALTS.map(ft=>{
    const cells=grid.map(g=>{
      // the column's own binding cap code wins its cell (TRFC / FAA / SKY / WIND / …)
      if(g.reasonAlt===ft) return {v:g.reason, st:cellState(g,ft), rsn:true};
      // the independent TRFC traffic marker: shown at the traffic ceiling even when another
      // gate owns the binding-reason cell, so a low plane is always visible on the chart
      if(g.trfcAlt===ft) return {v:'TRFC', st:cellState(g,ft), rsn:true};
      return {v:one(g.prof(ft)), st:cellState(g,ft)};
    });
    // hi = the bold "highest you can fly right now" label (the top green row)
    return {a:ft===0?'sfc':comma(ft), u:ft===topFt?'ft':'',
      st:cells.length&&cells[0].st==='bad'?'bad':'',
      hi:nowMaxFly>=0&&ft===nowMaxFly, cells};
  });
  // gust row: shows wind DIRECTION (8-point compass, small) + gust speed. It no longer changes
  // colour — a gust grounding already surfaces on the surface row (the red 'GUST' reason cell).
  // The 'mph' unit rides the row's "gust" label (like "ft" on the top altitude label), not a cell.
  const gustCells=grid.map(g=>({v:one(g.gustMph), dir:g.windDir!=null?compass(g.windDir):''}));
  return {board:{colLabels,gustCells,altRows},
    // aspCapFt: LAANC ceiling gate (-1 grounds, <400 caps, 400 = no limit); aspUnknown =
    // the FAA query failed (fail-open). Read by the SITREP's FAA CEILING card.
    aspCapFt, aspUnknown:asp==null,
    // kpNow / wxNow: the NOW-column Kp + weather gates, read by the SITREP so its
    // SPACE WEATHER and weather cards agree with the chart.
    kpNow:kpAt(0),
    wxNow,
    grid:grid.map(g=>({n:g.n,maxFly:g.maxFly,grounded:g.grounded,reason:g.reason,reasonAlt:g.reasonAlt,trfcAlt:g.trfcAlt}))};
}

const FLY_GRID_ATTRS='class="grid"';
// the chart's top-left header cell = the CLOCK (all-white live local time, blinking colon)
const clockCellHtml=()=>`<span class="ga clock">${clockInnerHtml()}</span>`;
function flyBoardHtml(b){
  const unit=u=>u?`<i class="gu">${u}</i>`:'';
  // gust cells put the 8-point compass direction AFTER the number (small)
  const tail=c=>c.dir?`<i class="wd">${c.dir}</i>`:'';
  const cell=c=>`<span class="gc${c.st?' '+c.st:''}${c.rsn?' rsn':''}">${c.v==null?'':c.v}${tail(c)}</span>`;
  // the NOW header is rendered WITH the current verdict class baked in (not left uncoloured for
  // renderClock to fill later) so it never flickers to the default ink between refreshes.
  const head=`<div class="grow ghead">${clockCellHtml()}${b.colLabels.map(l=>`<span class="gc${l.st?' '+l.st:''}${l.now?' now '+VERDICT_CLASS[verdictSeverity]:''}">${l.v}</span>`).join('')}</div>`;
  const alts=b.altRows.map(r=>`<div class="grow"><span class="ga${r.st?' '+r.st:''}${r.hi?' hi':''}">${r.a}${unit(r.u)}</span>${r.cells.map(cell).join('')}</div>`).join('');
  const gust=`<div class="grow ggust"><span class="ga">gust${unit('mph')}</span>${b.gustCells.map(cell).join('')}</div>`;
  return `<div ${FLY_GRID_ATTRS}>${head}${alts}${gust}</div>`;
}
// pre-data skeleton: the real grid frame with shimmer bars, so nothing shifts on load
function flySkeletonHtml(){
  const sk='<span class="gc"><i class="sk"></i></span>'.repeat(1+FC_HOURS);
  const cols=['now',...Array.from({length:FC_HOURS},(_,k)=>'+'+(k+1)+'h')];
  const head='<div class="grow ghead">'+clockCellHtml()
    +cols.map((l,i)=>`<span class="gc${i===0?' now '+VERDICT_CLASS[verdictSeverity]:''}">${l}</span>`).join('')+'</div>';
  const rows=ALTS.map(ft=>`<div class="grow"><span class="ga">${ft===0?'sfc':comma(ft)}${ft===ALTS[0]?'<i class="gu">ft</i>':''}</span>${sk}</div>`).join('');
  const gust=`<div class="grow ggust"><span class="ga">gust<i class="gu">mph</i></span>${sk}</div>`;
  return `<div ${FLY_GRID_ATTRS}>${head}${rows}${gust}</div>`;
}
function flyRender(){
  const board=$('#fly-board'); if(!board) return;
  // loading skeleton until FLY.detail exists, then the real grid (pane always visible)
  board.innerHTML=FLY.detail?flyBoardHtml(FLY.detail.board):flySkeletonHtml();
}
function flyPaint(){ FLY.detail=FLY.data?flyComputeDetail():null; flyRender(); }

// ---- refresh — from the pulse, viewport moves and boot. Each input keeps its cadence
// (aloft ALOFT_TTL_MS, radar per bust window, Kp ~3 min, airspace its cache).
// SINGLE-FLIGHT: while a refresh is in the air, new calls flag a trailing re-run, so a
// pan burst can't stack concurrent hits on the rate-limited FAA service. ----
let flyBusy=false, flyAgain=false, flyKpAt=0, flyAloftAt=0;
const KP_STALE_MS=15*60*1000;   // a transient SWPC blip may not wipe a recent Kp
const ALOFT_TTL_MS=15000;       // winds-aloft is an hourly model — 15 s is already generous
async function flyRefresh(){
  if(USER.lat==null) return;   // GPS-located only — nothing to compute pre-fix
  if(flyBusy){ flyAgain=true; return; }
  flyBusy=true;
  try{
    const base={lat:USER.lat,lon:USER.lon};
    const rngMi=RNG.mi;   // snapshot — the radius can't shift mid-fetch
    if(aspCache==null) hydrateAsp();
    const cc=aspCache;
    const matches=cc!=null&&cc.rng===rngMi&&havMi(base.lat,base.lon,cc.lat,cc.lon)<ASP_TOL_MI;
    const age=cc!=null?Date.now()-cc.ts:Infinity;
    const fresh=matches&&age<ASP_TTL;
    // defense TFR — same match logic, its own (much shorter) freshness window
    const dc=defCache;
    const defMatches=dc!=null&&dc.rng===rngMi&&havMi(base.lat,base.lon,dc.lat,dc.lon)<ASP_TOL_MI;
    const defAge=dc!=null?Date.now()-dc.ts:Infinity;
    const defFresh=defMatches&&defAge<DEF_TTL;
    const kpKeep=FLY.data!=null&&FLY.data.kp!=null&&Date.now()-flyKpAt<170000;
    // winds-aloft: reuse the in-hand columns while they're fresh for this spot —
    // the 5 s pulse then costs nothing between real fetches
    const aloftKeep=FLY.data!=null&&FLY.data.aloft!=null&&Date.now()-flyAloftAt<ALOFT_TTL_MS
      &&havMi(FLY.data.lat,FLY.data.lon,base.lat,base.lon)<ASP_TOL_MI;
    // Fire all inputs in parallel but don't let the slow FAA query block the chart:
    // await weather FIRST and paint with the last-good gates, then fold in the rest.
    const pAloft = aloftKeep?Promise.resolve(FLY.data.aloft):retry(()=>getAloft(base.lat,base.lon),2).catch(()=>null);
    const pKp    = kpKeep?Promise.resolve(FLY.data.kp):retry(()=>getKp(),2).catch(()=>null);
    const pGrid  = fresh?Promise.resolve({ceilFt:cc.ceilFt}):getLaancCeil(base.lat,base.lon,rngMi).catch(()=>null);
    const pDef   = defFresh?Promise.resolve({active:dc.active}):getDefense(base.lat,base.lon,rngMi).catch(()=>null);
    // two radar samples, BOTH centred on YOU: an echo in the 1 mi operational ring GROUNDS NOW; an
    // echo in the 5 mi BUFFER ring (but not the 1 mi ring) is the YELLOW "nearby" heads-up
    const pPrecipRed = retry(()=>sampleRadarPrecip(base.lat,base.lon,RED_MI),2).catch(()=>null);
    const pPrecipBuf= retry(()=>sampleRadarPrecip(base.lat,base.lon,BUFFER_MI),2).catch(()=>null);

    const aloft=await pAloft;
    if(aloft){
      // paint now with the last-good gates (fresh ones repaint below); a gate with no
      // value yet stays flagged unknown for the DATA gate (unknown ≠ clear)
      FLY.data={lat:base.lat,lon:base.lon,aloft,
        kp:(FLY.data&&FLY.data.kp)||null, asp:(FLY.data&&FLY.data.asp)||null};
      FLY.err.om=false; FLY.err.asp=FLY.data.asp==null; FLY.err.kp=FLY.data.kp==null;
      flyPaint(); scheduleSitrep();
    }else{
      FLY.err.om=true;   // weather pull failed — keep the stale grid; next pulse retries
    }

    const [kpRaw,gridRaw,defRaw,precipRed,precipBuf]=await Promise.all([pKp,pGrid,pDef,pPrecipRed,pPrecipBuf]);
    if(!aloftKeep&&aloft!=null) flyAloftAt=Date.now();   // a fresh aloft pull resets its clock
    if(!kpKeep&&kpRaw!=null) flyKpAt=Date.now();
    // Kp failed: fall back to recent last-good rather than lose the gate to one blip;
    // beyond KP_STALE_MS stay null and yellow (unknown ≠ calm)
    let kp=kpRaw;
    if(kp==null&&FLY.data&&FLY.data.kp!=null&&Date.now()-flyKpAt<KP_STALE_MS) kp=FLY.data.kp;
    let gridRes=gridRaw;
    if(gridRes!=null){ if(!fresh){ aspCache={lat:base.lat,lon:base.lon,rng:rngMi,ceilFt:gridRes.ceilFt,ts:Date.now()}; persistAsp(); } }
    else if(matches&&age<ASP_HARD_TTL) gridRes={ceilFt:cc.ceilFt};   // failed refetch → matching cache within hard TTL
    let defRes=defRaw;
    if(defRes!=null){ if(!defFresh) defCache={lat:base.lat,lon:base.lon,rng:rngMi,active:defRes.active,ts:Date.now()}; }
    else if(defMatches&&defAge<DEF_HARD_TTL) defRes={active:dc.active};
    // the FAA gate is known only when BOTH halves are (unknown ≠ clear); a defense
    // TFR in range forces the combined ceiling to 0 (no-fly)
    const asp=(gridRes!=null&&defRes!=null)?{ceilFt:defRes.active?0:gridRes.ceilFt}:null;
    FLY.precip=precipRed; FLY.err.radar=precipRed==null;
    // yellow "nearby" = an echo within the 5 mi BUFFER ring but NOT already in the 1 mi operational ring
    FLY.precipInbound = precipBuf===true && precipRed!==true;
    if(aloft){
      FLY.data={lat:base.lat,lon:base.lon,aloft,kp,asp};
      FLY.err.om=false; FLY.err.asp=asp==null;
    }else{
      if(FLY.data){ FLY.data.kp=kp;
        if(asp!=null){ FLY.data.asp=asp; FLY.err.asp=false; }
        else FLY.err.asp=true; }   // gate unresolved this cycle → last-good paints, but flagged unverified
    }
    FLY.err.kp=kp==null;
    // maintain the freshness state per gate: latch "ever loaded" on a verified pull, and
    // stamp/clear the failing-since clock — so gateTier() reads a consistent picture
    for(const k in FLY_ERR_LABEL){
      if(!FLY.err[k]) flyEver[k]=true;
      flyErrSince[k]=FLY.err[k] ? (flyErrSince[k]||Date.now()) : 0;
    }
    // repaint the chart AND re-tick the SITREP: the title reads the NOW column
    // (and the unknown-input flags), so fresh gate data must reach both.
    flyPaint();
    scheduleSitrep();
  }finally{
    flyBusy=false;
    if(flyAgain){ flyAgain=false; flyRefresh(); }
  }
}
/* =====================================================================
   7. CLOCK + VERDICT COLOUR — the top-left clock is plain white (live local time, blinking
   colon). The overall can-I-fly verdict is shown as the COLOUR of the NOW column header:
   green = go, yellow = caution, red = no-go. sitrepTick folds the gate table (evalGates)
   into verdictSeverity (0/1/2); renderClock ticks the time + repaints the NOW colour
   every second.
   ===================================================================== */
const VERDICT_CLASS=['go','caution','nogo'];   // CSS class per severity 0/1/2
// born RED (unknown ≠ clear): nothing is verified before the first sitrepTick, so the
// very first paint must not read green even for a frame — the invariant is structural,
// not an accident of boot call-order
let verdictSeverity=2;
// current local time (device timezone), 12-hour, NO AM/PM — {h:'3', m:'07'}
function clockParts(){
  const d=new Date(); let h=d.getHours()%12; if(h===0) h=12;
  return {h:String(h), m:String(d.getMinutes()).padStart(2,'0')};
}
// clock cell contents: white digits either side of a persistent colon span (its own
// element so the blink can tick without re-writing the digits).
const clockInnerHtml=()=>{ const {h,m}=clockParts();
  return `<span class="clk-h">${h}</span><span class="clk-colon">:</span><span class="clk-m">${m}</span>`; };
// Advance the time on the (all-white) clock and repaint the verdict colour on the NOW header —
// the "can I fly right now?" glance point. Updates ONLY the digit text (leaving the colon
// element alone so its blink is uninterrupted). The clock itself carries no verdict class.
function renderClock(){
  const clock=document.querySelector('#fly-board .ga.clock');
  if(clock){
    let h=clock.querySelector('.clk-h'), m=clock.querySelector('.clk-m');
    if(!h||!m){ clock.innerHTML=clockInnerHtml(); h=clock.querySelector('.clk-h'); m=clock.querySelector('.clk-m'); }
    const p=clockParts(); h.textContent=p.h; m.textContent=p.m;
  }
  const now=document.querySelector('#fly-board .ghead .gc.now');
  if(now) now.className='gc now '+VERDICT_CLASS[verdictSeverity];
}
// blink the colon every half-second (bright 0.5 s / dim 0.5 s = one blink per second) between
// white and OFF-WHITE — it dims, never disappears (never black). Re-queried each tick so it
// survives chart re-renders.
const COLON_WHITE='#eaf1f8', COLON_OFFWHITE='#9aa4af';
let _colonBright=true;
function blinkColon(){ const c=document.querySelector('#fly-board .clk-colon');
  if(c) c.style.color=(_colonBright=!_colonBright)?COLON_WHITE:COLON_OFFWHITE; }

/* =====================================================================
   8. BOOT — no map. Start the GPS watch, kick the location-independent feeds, and run
   the 5 s refresh pulse. Position-scoped feeds (aircraft/NWS/airspace/NPS) start on the
   first GPS fix (see setUserFix); until then the SITREP shows the GPS locating card
   under the loading chart (no empty acquiring screen).
   ===================================================================== */
function boot(){
  // read-only display: block double-click / double-tap zoom, iOS pinch-zoom gestures, and
  // the browser context menu, so a stray tap can never zoom or select the interface.
  document.addEventListener('dblclick',e=>e.preventDefault(),{passive:false});
  document.addEventListener('contextmenu',e=>e.preventDefault());
  ['gesturestart','gesturechange','gestureend'].forEach(ev=>
    document.addEventListener(ev,e=>e.preventDefault(),{passive:false}));
  // Returning to a visible page → refresh immediately (data went stale while hidden), then
  // the heartbeat resumes its normal cadence. While hidden, refreshTick pauses the pulse.
  document.addEventListener('visibilitychange',()=>{ if(!document.hidden) pulse(); });
  initLayers();
  // location-INDEPENDENT feeds load now (SPC outlook — the only one); position-scoped
  // feeds wait for the first fix, which kicks them via setUserFix().
  LAYERS.forEach(cfg=>{ LAYER_STATE[cfg.id].started=true; if(!cfg.viewport) runLayer(cfg); });
  refreshBase=Date.now(); setInterval(refreshTick,1000); refreshTick();   // 5 s data pulse
  setInterval(renderClock,1000);                                          // live clock tick
  setInterval(blinkColon,500);                                            // blink the H:MM colon
  flyRender();     // chart skeleton until the first fix pulls data
  locate();        // start the GPS watch
  sitrepTick();    // shows GPS locating card under the loading chart
  if(!sitrepTimer) sitrepTimer=setInterval(sitrepTick,90000);
  window.__sitrep.ready=true;   // test/boot signal (replaces the old map 'load')
}
if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',boot);
else boot();
</script>
