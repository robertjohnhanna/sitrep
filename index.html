<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0e14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="description" content="sitrep — keyless multi-domain OSINT dashboard: one map, every liftable public signal.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%A1%3C/text%3E%3C/svg%3E">
<title>SITREP</title>

<!-- ============================================================
     sitrep — self-contained OSINT map dashboard
     ------------------------------------------------------------
     Constraints (non-negotiable): one HTML file, no backend, no
     build step, no API keys, no npm. Opens directly in a browser.
     Vanilla JS + MapLibre GL (CDN).

     Layout: a full-map canvas with a single docked SITREP panel on
     the right (on mobile, a bottom sheet). The panel lists in-view
     signals as distance-sorted cards, then embeds the canifly
     drone-preflight tool, both driven by the map-centre crosshair.

     Map layers (all keyless, CORS-*): live aircraft (adsb), NWS
     warnings, NEXRAD radar (Iowa State Mesonet). SITREP-only feeds:
     SPC Day-1 outlook, NOAA SWPC space weather (Kp / GOES X-ray).
     All sources are keyless with ACAO:* so fetch works cross-origin;
     anything requiring a key is excluded by the keyless rule.
     ============================================================ -->

<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

<style>
  :root{
    --bg:#000000; --panel:#000000f5; --panel2:#0a0f14; --line:#1a2730;
    --ink:#d6e2ee; --ink-dim:#748596; --accent:#2fe07a; --accent2:#ff4455;
    --danger:#ff4455; --warn:#ffb454; --ok:#2fe07a; --live:#ff4455;
    --mono:"SF Mono",ui-monospace,"Cascadia Code",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --sa-t:env(safe-area-inset-top,0px); --sa-b:env(safe-area-inset-bottom,0px);
    --sa-l:env(safe-area-inset-left,0px); --sa-r:env(safe-area-inset-right,0px);
    --topbar-h:var(--sa-t);
    /* mobile bottom-nav height. Text-only tabs (no icons) → a slim bar, so the
       SITREP sheet gets the maximum vertical room. */
    --navh:42px;
    /* symmetric top/bottom inset so the gaps match even with a home-indicator
       safe area (which is only on the bottom) */
    --inset:calc(max(var(--sa-t),var(--sa-b)) + 8px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  /* Full viewport height so the bottom nav anchors to the true bottom of the
     page. (dvh was tried but iOS Safari's floating URL bar makes it resolve
     shorter than the visible area, leaving the nav floating with a gap below —
     100% fills correctly. Closed panels use visibility:hidden below so nothing
     bleeds under the nav regardless.) */
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font-family:var(--mono);font-size:13px;overflow:hidden;
    overscroll-behavior:none;touch-action:manipulation}
  #map{position:absolute;inset:0}
  /* centre reticle: white, subtle, never blocks the map (pointer-events:none).
     Position is set in JS to the map's projected centre so it stays exact under
     panel padding and on mobile. */
  #crosshair{position:absolute;z-index:5;left:50%;top:50%;
    transform:translate(-50%,-50%);pointer-events:none;opacity:.8;
    filter:drop-shadow(0 0 1px #000) drop-shadow(0 0 2px #0008)}
  button{font-family:var(--mono);cursor:pointer}
  a{color:var(--accent)}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:#233247;border-radius:4px}
  ::-webkit-scrollbar-track{background:transparent}

  /* ---------- status badges (in SITREP header) ---------- */
  /* ---------- SITREP panel (desktop: docked right / mobile: bottom sheet) ----------
     The only panel now: header, scrolling cards, then canifly. The
     map fills everything to its left. */
  .panel{position:absolute;z-index:15;background:var(--panel);
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    display:flex;flex-direction:column;overflow:hidden}
  #sitrep{top:0;right:0;left:auto;width:320px;bottom:0;
    padding-right:var(--sa-r);border:1px solid var(--line)}
  /* data-refresh countdown on the SITREP title line, right-justified */
  #refresh-badge{margin-left:auto;color:var(--ink-dim);font-weight:400;letter-spacing:.5px;
    font-size:13px;white-space:nowrap;font-variant-numeric:tabular-nums;flex:0 0 auto}
  #refresh-badge b{color:var(--ink)}
  /* canifly preflight tool sits below the cards, taking half the panel
     height (flex-basis 50%); the cards scroll in the other half. */
  #fly-pane{flex:0 0 50%;min-height:0;
    border-top:1px solid var(--line);background:#000;display:flex;justify-content:center}
  #fly-frame{width:100%;height:100%;border:0;display:block;background:#000;margin:0 auto}

  /* ---------- popups ---------- */
  .maplibregl-popup-content{background:var(--panel);color:var(--ink);
    border:1px solid var(--line);border-radius:10px;font-family:var(--mono);
    box-shadow:0 10px 34px #000c;max-width:300px;padding:12px 14px;
    overflow-wrap:anywhere;word-break:break-word}
  .maplibregl-popup-close-button{color:var(--ink-dim);font-size:18px;padding:2px 8px}
  .maplibregl-popup-anchor-bottom .maplibregl-popup-tip{border-top-color:#000}
  .maplibregl-popup-anchor-top .maplibregl-popup-tip{border-bottom-color:#000}
  .pop h4{margin:0 0 6px;color:var(--accent);font-size:13px;overflow-wrap:anywhere}
  /* kv is a block, not flex: the label is a fixed-width inline-block and the
     value flows as inline text that WRAPS (long place names / areas no longer
     overflow the box). :first-child keeps unit .u spans out of the label rule. */
  .pop .kv{font-size:13px;margin:2px 0;overflow-wrap:anywhere}
  .pop .kv>span:first-child{color:var(--ink-dim);display:inline-block;
    min-width:66px;margin-right:6px;vertical-align:top}
  .pop .sub{font-size:13px;color:var(--ink);line-height:1.45;margin-top:6px;
    max-height:120px;overflow:auto;overflow-wrap:anywhere}
  .pop .lnk{margin-top:7px;font-size:13px;overflow-wrap:anywhere}

  /* ---------- toasts ---------- */
  #toast{position:absolute;top:calc(var(--topbar-h) + 10px);left:50%;transform:translateX(-50%);
    z-index:25;max-width:min(320px,86vw);display:flex;flex-direction:column;gap:6px;
    align-items:center;pointer-events:none}
  .tmsg{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--accent);
    padding:8px 11px;border-radius:8px;font-size:13px;color:var(--ink);animation:sl .25s ease}
  .tmsg.err{border-left-color:var(--danger)}
  .tmsg.warn{border-left-color:var(--warn)}
  @keyframes sl{from{transform:translateY(8px);opacity:0}to{transform:none;opacity:1}}
  .spin{display:inline-block;width:9px;height:9px;border:2px solid #2a3a4d;
    border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  /* ---------- SITREP briefing panel (right side, matches OBJECTS) ---------- */
  #sit-title.warn{color:var(--danger)!important}
  #sit-title.alert{color:var(--warn)!important}
  #sit-head{display:flex;align-items:center;gap:8px;padding:9px 12px;
    border-bottom:1px solid var(--line);flex:0 0 auto;min-height:48px}
  #sit-head .title{color:var(--accent);font-size:13px;letter-spacing:2px;font-weight:700;
    flex:0 0 auto}
  /* center-on-me: floating control at the bottom-right corner of the map
     (the open area sits just left of the 320px right panel) */
  #loc-btn{position:absolute;z-index:16;right:calc(334px + var(--sa-r));bottom:16px;
    width:42px;height:42px;padding:0;font-size:20px;line-height:1;
    background:var(--panel);border:1px solid var(--accent);color:var(--accent);border-radius:9px;
    display:flex;align-items:center;justify-content:center;
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
  #loc-btn:active{background:var(--accent);color:#00140a}
  #sit-body{display:flex;flex-direction:column;align-content:start;
    overflow-y:auto;padding:4px 0;-webkit-overflow-scrolling:touch;flex:1 1 auto;min-height:0}
  /* every SITREP row is a uniform 3-line block: icon · three text lines (or a
     3-line-clamped news blurb) · an action button. Lines CLIP (no "…") — content
     is written concise enough to fit the width. */
  .sit-row{display:flex;align-items:center;gap:9px;padding:8px 12px;font-size:13px;min-height:62px;
    border-bottom:1px solid #10171f}
  .sit-row .ic{flex:0 0 18px;text-align:center;align-self:flex-start;padding-top:1px}
  .sit-row .tx{flex:1;min-width:0;line-height:1.34;display:flex;flex-direction:column;justify-content:center}
  .sit-row .tx s1,.sit-row .tx s2,.sit-row .tx s3{display:block;white-space:nowrap;
    overflow:hidden;text-overflow:clip}
  .sit-row .tx s1{color:var(--ink)}
  .sit-row .tx s2,.sit-row .tx s3{color:var(--ink-dim);font-size:12px}
  /* news items are one blurb clamped to exactly three lines */
  .sit-row .tx.news{display:-webkit-box;-webkit-line-clamp:3;line-clamp:3;
    -webkit-box-orient:vertical;white-space:normal;overflow:hidden;color:var(--ink)}
  .sit-row .act{flex:0 0 auto;align-self:center;background:var(--panel2);border:1px solid var(--accent);
    color:var(--accent);border-radius:14px;padding:4px 11px;font-size:13px;cursor:pointer;
    letter-spacing:.5px;min-height:28px}
  .sit-row .act:active{background:var(--accent);color:#06231e}
  .sit-row.alert s1{color:var(--warn)}
  .sit-row.danger s1{color:var(--danger)}
  .sit-empty{padding:14px 12px;font-size:13px;color:var(--ink-dim);line-height:1.5}
  .sit-div{grid-column:1/-1;height:1px;background:var(--line);margin:5px 12px}
  /* ---- minimalist: EVERYTHING is upper-case except unit tokens (.u) ---- */
  body{text-transform:uppercase}
  .u{text-transform:none!important;letter-spacing:0;font-style:normal}
  .sit-row .tx s1{letter-spacing:.3px}

  #user-dot{width:16px;height:16px;border-radius:50%;background:var(--accent);
    border:2.5px solid #fff;box-shadow:0 0 0 0 rgba(47,224,122,.6);animation:pulse 2.2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(47,224,122,.6)}70%{box-shadow:0 0 0 16px rgba(47,224,122,0)}100%{box-shadow:0 0 0 0 rgba(47,224,122,0)}}

  /* ---------- mobile bottom navigation + sheets ---------- */
  #mnav{display:none}
  @media (max-width:1000px){
    /* map stops at the nav bar so no tiles bleed under it */
    #map{bottom:calc(var(--navh) + var(--sa-b))}
    #mnav{position:absolute;left:0;right:0;bottom:0;z-index:30;display:flex;
      height:calc(var(--navh) + var(--sa-b));padding:0 var(--sa-r) var(--sa-b) var(--sa-l);
      background:#000;border-top:1px solid var(--line)}
    /* text-only tabs (icons dropped) — a single slim line to reclaim sheet space */
    #mnav button{flex:1;background:none;border:none;color:var(--ink-dim);
      font-size:12px;letter-spacing:1px;display:flex;
      align-items:center;justify-content:center}
    #mnav button.active{color:var(--accent)}
    /* Selected panel fills the whole screen (down to the nav bar) and scrolls
       internally. It's opaque and, when closed, fully HIDDEN (visibility) so a
       closed panel can never leak its rows into the strip below the nav. Top
       padding is just the safe-area inset (the notch when installed; 0 in a
       Safari tab, where the web content already sits below Safari's chrome — a
       hard 54px fallback here was what made the header look absurdly tall). */
    .panel{left:0!important;right:0!important;top:0!important;width:auto!important;
      bottom:calc(var(--navh) + var(--sa-b))!important;max-height:none!important;z-index:20;
      padding-top:var(--sa-t)!important;background:var(--bg);
      backdrop-filter:none;-webkit-backdrop-filter:none;
      border-radius:0;border:none;visibility:hidden;
      transform:translateY(100%);
      transition:transform .28s cubic-bezier(.32,.72,.35,1),visibility 0s linear .28s;
      box-shadow:0 -12px 40px #000a}
    .panel.open{transform:translateY(0);visibility:visible;
      transition:transform .28s cubic-bezier(.32,.72,.35,1),visibility 0s}
    .maplibregl-ctrl-bottom-right{bottom:calc(var(--navh) + 4px + var(--sa-b))}
    /* map is full-width on mobile; keep the button above the bottom nav */
    #loc-btn{right:calc(14px + var(--sa-r));bottom:calc(var(--navh) + var(--sa-b) + 14px)}
    /* canifly's built-in "rotate to portrait" guard fires on a short (≤480px),
       landscape-ish, touch viewport — which the embedded iframe looked like on a
       phone (nearly square). Keep the iframe TALLER than 480px so that guard
       never matches and canifly renders its app. */
    #fly-pane{flex:0 0 auto;height:clamp(486px,64vh,640px)}
  }
</style>
</head>
<body>
<div id="map"></div>
<!-- fixed reticle marking the exact map centre (what SITREP / the ME button use) -->
<svg id="crosshair" width="30" height="30" viewBox="0 0 30 30" aria-hidden="true">
  <g fill="none" stroke="#fff" stroke-width="1.4" stroke-linecap="round">
    <line x1="15" y1="2"  x2="15" y2="10"/><line x1="15" y1="20" x2="15" y2="28"/>
    <line x1="2"  y1="15" x2="10" y2="15"/><line x1="20" y1="15" x2="28" y2="15"/>
  </g>
  <circle cx="15" cy="15" r="1.3" fill="#fff"/>
</svg>

<!-- SITREP briefing panel (right) — cards, then canifly. The only panel
     now; the map fills everything else. -->
<div id="sitrep" class="panel">
  <div id="sit-head">
    <span class="title" id="sit-title">◈ SITREP</span>
    <span id="refresh-badge" title="time to next data refresh"><b id="refresh-count">30</b>s to update</span>
  </div>
  <div id="sit-body">
    <div class="sit-empty">ACQUIRING POSITION…</div>
  </div>
  <!-- canifly drone-preflight tool, embedded live from its own repo
       (github.io/canifly), driven by the map centre via postMessage so it
       tracks the crosshair like the SITREP does. -->
  <div id="fly-pane"><iframe id="fly-frame" title="Can I Fly? — drone preflight" allow="geolocation"></iframe></div>
</div>

<!-- center-on-me: floating control, bottom-right of the map -->
<button id="loc-btn" title="center map on my location" aria-label="center on my location"><svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><circle cx="12" cy="12" r="3.2" fill="currentColor"/><circle cx="12" cy="12" r="7" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M12 1.5v3.4M12 19.1v3.4M1.5 12h3.4M19.1 12h3.4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></button>

<!-- mobile bottom navigation -->
<div id="mnav">
  <button data-p="" class="active">MAP</button>
  <button data-p="sitrep">SITREP</button>
</div>

<div id="toast"></div>

<script>
"use strict";
/* =====================================================================
   0. helpers
   ===================================================================== */
const $ = s => document.querySelector(s);
const el = (t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
// SINGLE mobile breakpoint, matching the CSS @media (max-width:1000px). Every
// JS layout decision reads this — a 900/1000 mix once left the 901–1000px range
// with sheet panels but desktop map padding.
const MQ_MOBILE=window.matchMedia('(max-width:1000px)');
function toast(msg,kind){
  const t=el('div','tmsg'+(kind?' '+kind:''),msg);
  $('#toast').appendChild(t);
  setTimeout(()=>{t.style.transition='opacity .4s';t.style.opacity='0';setTimeout(()=>t.remove(),400);},4500);
}
async function getJSON(url,opts={}){
  const c=new AbortController(); const to=setTimeout(()=>c.abort(),opts.timeout||15000);
  try{
    const r=await fetch(url,{signal:c.signal,headers:opts.headers||{}});
    if(!r.ok) throw new Error('HTTP '+r.status);
    return await r.json();
  } finally { clearTimeout(to); }
}
async function getText(url,opts={}){
  const c=new AbortController(); const to=setTimeout(()=>c.abort(),opts.timeout||20000);
  try{ const r=await fetch(url,{signal:c.signal}); if(!r.ok)throw new Error('HTTP '+r.status); return await r.text(); }
  finally{ clearTimeout(to); }
}
// All times shown in the user's LOCAL time — the timezone detected for their
// location (USER.tz, from IP geolocation), falling back to the browser's zone.
const tzOpt = () => USER.tz ? {timeZone:USER.tz} : {};
const fmtTime = ts => new Date(ts).toLocaleTimeString([], Object.assign({hour:'2-digit',minute:'2-digit',second:'2-digit'}, tzOpt()));
const fmtDateTime = iso => { const d=new Date(iso); return isNaN(d.getTime())
  ? String(iso).slice(0,16).replace('T',' ')
  : d.toLocaleString([], Object.assign({month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}, tzOpt())); };
// great-circle distance, km
function havKm(lat1,lon1,lat2,lon2){
  const R=6371,d=Math.PI/180;
  const a=Math.sin((lat2-lat1)*d/2)**2+
    Math.cos(lat1*d)*Math.cos(lat2*d)*Math.sin((lon2-lon1)*d/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
// Initial compass bearing from point 1 → point 2, degrees (0=N, clockwise).
function bearing(lat1,lon1,lat2,lon2){
  const d=Math.PI/180;
  const y=Math.sin((lon2-lon1)*d)*Math.cos(lat2*d);
  const x=Math.cos(lat1*d)*Math.sin(lat2*d)-Math.sin(lat1*d)*Math.cos(lat2*d)*Math.cos((lon2-lon1)*d);
  return (Math.atan2(y,x)/d+360)%360;
}
const COMPASS8=['N','NE','E','SE','S','SW','W','NW'];
const compass=deg=>COMPASS8[Math.round(deg/45)%8];
// Imperial units. U() wraps a unit token so it stays lowercase inside
// ALL-CAPS chrome (see .u in CSS). Distances in mi/ft, temp °F, wind mph.
const U = s => `<span class="u">${s}</span>`;
const fmtMi = km => { const mi=km*0.621371;
  return mi<0.5?Math.round(mi*5280)+U(' ft'):mi<100?mi.toFixed(1)+U(' mi'):Math.round(mi)+U(' mi'); };

// ---- ADS-B: airplanes.live primary, adsb.fi fallback (adsb.lol is down).
// Both share the readsb /v2 schema: {ac:[{hex,flight,lat,lon,alt_baro,gs,...}]}
const ADSB_HOSTS=['https://api.airplanes.live/v2','https://opendata.adsb.fi/api/v2'];
async function adsb(path){
  let err;
  for(const h of ADSB_HOSTS){
    try{ return await getJSON(h+path,{timeout:12000}); }catch(e){ err=e; }
  }
  throw err||new Error('all ADS-B hosts unreachable');
}
// Aircraft near the MAP CENTRE — one single 250-nm point query, nothing fancy.
// The readsb mirrors cap point queries at 250 nm; that one circle around the
// centre is plenty and dead reliable. Refetched on every map move and once a
// minute. adsb() throws if every mirror is unreachable, which the runtime
// treats as an error (keeps the planes already on the map + retries) rather
// than a "zero aircraft" wipe.
async function adsbViewport(){
  const c=gl.getCenter();
  const j=await adsb('/point/'+c.lat.toFixed(3)+'/'+c.lng.toFixed(3)+'/250');
  return {ac:j.ac||[]};
}
function acFeatures(j,kind){
  return (j.ac||[]).filter(a=>a.lat!=null&&a.lon!=null).map(a=>({
    type:'Feature',geometry:{type:'Point',coordinates:[a.lon,a.lat]},
    properties:{_kind:kind,
      flight:String(a.flight||a.r||a.hex||'?').trim(),
      type:a.t||'?',desc:a.desc||'',op:a.ownOp||'',
      alt:a.alt_baro??a.alt_geom??'?',spd:a.gs!=null?Math.round(a.gs):'?',
      trk:a.track!=null?Math.round(a.track):null,
      _rot:a.track!=null?a.track:(a.true_heading!=null?a.true_heading:0),
      sq:a.squawk||'',hex:a.hex||'',mil:a.dbFlags&1?1:0}}));
}
const acPopup=p=>`<h4>${p.mil?'🎖':'✈'} ${escapeHtml(p.flight)}</h4>
  ${p.desc?`<div class="kv"><span>aircraft</span>${escapeHtml(p.desc)}</div>`:
    `<div class="kv"><span>type</span>${escapeHtml(p.type)}</div>`}
  ${p.op?`<div class="kv"><span>operator</span>${escapeHtml(p.op)}</div>`:''}
  <div class="kv"><span>alt</span>${p.alt} ft</div>
  <div class="kv"><span>speed</span>${p.spd} kt${p.trk!=null?' · '+p.trk+'°':''}</div>
  <div class="kv"><span>squawk</span>${escapeHtml(p.sq||'—')}</div>
  <div class="kv"><span>hex</span>${escapeHtml(p.hex)}</div>`;
// nearest feature (Point geometry) in a layer's current data to a lat/lon
// map-area (viewport bounds) scoped variants — SITREP reflects only what's in view
function inBounds(b,lon,lat){return lon>=b.getWest()&&lon<=b.getEast()&&lat>=b.getSouth()&&lat<=b.getNorth();}
function featsIn(srcId){const s=gl.getSource(srcId);return s&&s._data?(s._data.features||[]):[];}
// Bounds of the map area actually VISIBLE — i.e. left of the docked SITREP
// panel on the right. gl.getBounds() spans the whole canvas including the strip
// hidden under that panel, so it over-counts "in view". On mobile the panel is
// an overlay sheet, so the full canvas is the visible area.
function viewBounds(){
  const cv=gl.getCanvas();
  const w=cv.clientWidth, h=cv.clientHeight;
  const r=MQ_MOBILE.matches ? w : w-Math.min(320,w*0.4);
  const bb=new maplibregl.LngLatBounds();
  [[0,0],[r,0],[r,h],[0,h]].forEach(pt=>bb.extend(gl.unproject(pt)));
  return bb;
}
// polygon feature -> a representative [lon,lat] (first vertex), for fly-to / bounds
function polyPt(f){
  const g=f.geometry; if(!g) return null;
  if(g.type==='Point') return g.coordinates;
  if(g.type==='Polygon') return g.coordinates[0] && g.coordinates[0][0];
  if(g.type==='MultiPolygon') return g.coordinates[0] && g.coordinates[0][0] && g.coordinates[0][0][0];
  return null;
}
// point-in-polygon (ray casting) for a GeoJSON Polygon/MultiPolygon feature —
// used to test whether a location sits inside an SPC outlook risk area
function pointInRing(lon,lat,ring){
  let inside=false;
  for(let i=0,j=ring.length-1;i<ring.length;j=i++){
    const xi=ring[i][0],yi=ring[i][1],xj=ring[j][0],yj=ring[j][1];
    if(((yi>lat)!==(yj>lat)) && (lon<(xj-xi)*(lat-yi)/(yj-yi)+xi)) inside=!inside;
  }
  return inside;
}
function pointInFeature(f,lon,lat){
  const g=f.geometry; if(!g) return false;
  const polys=g.type==='Polygon'?[g.coordinates]:g.type==='MultiPolygon'?g.coordinates:[];
  for(const poly of polys){
    if(poly[0] && pointInRing(lon,lat,poly[0]) && !poly.slice(1).some(h=>pointInRing(lon,lat,h))) return true;
  }
  return false;
}
const escapeHtml =s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

// NEXRAD base-reflectivity mosaic tiles (Iowa State Mesonet, keyless). The ?ts
// cache-bust makes each 30s refresh pull the latest mosaic.
const RADAR_URL='https://mesonet.agron.iastate.edu/cache/tile.py/1.0.0/nexrad-n0q-900913/{z}/{x}/{y}.png';
const RADAR_TILE=RADAR_URL+'?'+Date.now();
function refreshRadar(){ const s=gl.getSource('radar'); if(s&&s.setTiles) s.setTiles([RADAR_URL+'?'+Date.now()]); }
const gl = new maplibregl.Map({
  container:'map',
  style:{
    version:8,
    glyphs:'https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf',
    sources:{
      carto:{ type:'raster', tileSize:256,
        tiles:['https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png',
               'https://b.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png',
               'https://c.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png'],
        attribution:'© OpenStreetMap · © CARTO' },
      // NEXRAD base-reflectivity mosaic (~1 km, latest) — Iowa State Mesonet,
      // keyless. Refreshed on the 30s pulse via refreshRadar(). Sits above the
      // basemap, below the aircraft/warning layers (added later). maxzoom caps
      // the TILE fetch at the mosaic's native detail (~z8); it does NOT cap the
      // map's zoom — you can still zoom all the way in, and beyond z8 MapLibre
      // bilinearly upsamples that tile so the radar stays smooth instead of
      // showing the blocky server-upscaled tiles you'd get by fetching deeper.
      radar:{ type:'raster', tileSize:256, maxzoom:8,
        tiles:[RADAR_TILE], attribution:'NEXRAD · Iowa State Mesonet' }
    },
    layers:[{id:'carto',type:'raster',source:'carto'},
      {id:'radar',type:'raster',source:'radar',
        paint:{'raster-opacity':0.5,'raster-resampling':'linear'}}]
  },
  center:[-96,39], zoom:3.4, minZoom:1.1, maxZoom:16,   // start over the USA until a location fix lands
  renderWorldCopies:true, attributionControl:false
});
// No on-map controls — they were hidden behind the right panel. Zoom is
// scroll/pinch, recentre is the ⌖ ME button, and attribution lives in the
// left-panel footer so nothing overlaps the panels.
try{ gl.setProjection && gl.setProjection({type:'globe'}); }catch(e){/* flat fallback */}
window.__sitrep={map:gl}; // debug/test handle

// Zoom is a SEPARATE action from panning. MapLibre's built-in scroll and
// double-click zoom anchor to the CURSOR, which slides the map sideways as you
// zoom. We disable those and re-implement zoom around the map CENTRE, so the
// map never drifts while zooming — pan (drag) stays the only way to move it.
// (Touch pinch is left alone: anchoring to the fingers is the natural mobile
// gesture.)
gl.scrollZoom.disable();
gl.doubleClickZoom.disable();
// Programmatic camera moves (ME button, fly-to, fitBounds) must CANCEL the
// wheel-zoom loop below first — its per-frame setZoom would abort their
// easeTo/flyTo mid-animation if the user had just scroll-zoomed.
let cancelCenterZoom=()=>{};
(function centerZoom(){
  const cvs=gl.getCanvasContainer();
  const clamp=z=>Math.max(gl.getMinZoom(),Math.min(gl.getMaxZoom(),z));
  // A single requestAnimationFrame loop eases the LIVE zoom toward a target that
  // wheel/double-click nudge. One continuous animation (not a new easeTo per
  // event) is what makes it smooth — stacked easeTos restart every frame and
  // stutter. setZoom keeps the map CENTRE fixed, so zoom never pans the view.
  let target=gl.getZoom(), running=false, last=-1e9;
  function frame(){
    if(!running) return;                 // cancelled by a programmatic camera move
    const cur=gl.getZoom(), diff=target-cur;
    if(Math.abs(diff)<0.003){ if(cur!==target) gl.setZoom(target); running=false; return; }
    gl.setZoom(cur+diff*0.2);            // exponential ease-out toward target
    requestAnimationFrame(frame);
  }
  function kick(){ if(!running){ running=true; requestAnimationFrame(frame); } }
  cancelCenterZoom=()=>{ running=false; target=gl.getZoom(); };
  cvs.addEventListener('wheel',e=>{
    e.preventDefault();
    const now=e.timeStamp;
    if(now-last>200) target=gl.getZoom();   // idle gap: resync to the live zoom
    last=now;
    let d=e.deltaY;
    if(e.deltaMode===1) d*=16; else if(e.deltaMode===2) d*=400;   // line / page → px
    target=clamp(target - d*0.0022);
    kick();
  },{passive:false});
  cvs.addEventListener('dblclick',e=>{
    e.preventDefault();
    target=clamp((running?target:gl.getZoom())+(e.shiftKey?-1:1));
    kick();
  });
})();

/* =====================================================================
   ICONS — the only map markers left are the three aircraft silhouettes
   (green civil / yellow military / red emergency), drawn nose-up so
   icon-rotate = heading works. Rasterised to canvas, registered with addImage.
   ===================================================================== */
function shapeIcon(color,pts,px){
  const s=px||40, c=document.createElement('canvas'); c.width=c.height=s;
  const x=c.getContext('2d',{willReadFrequently:true}); x.translate(s/2,s/2); const u=s/32;
  x.fillStyle=color; x.strokeStyle='rgba(3,8,14,.75)'; x.lineWidth=u*1.4;
  x.lineJoin='round'; x.beginPath();
  pts.forEach((p,i)=>{const X=p[0]*u,Y=p[1]*u; i?x.lineTo(X,Y):x.moveTo(X,Y);});
  x.closePath(); x.fill(); x.stroke();
  return x.getImageData(0,0,s,s);
}

function addImg(name,data){ if(!gl.hasImage(name)) gl.addImage(name,data,{pixelRatio:2}); }

function registerIcons(){

}

/* =====================================================================
   3. LAYER RUNTIME — sources, styles, toggles, refresh loop
   ===================================================================== */
const LAYER_STATE={};
// icons grow with zoom so they read clearly world-wide and up close
const iconSize=base=>['interpolate',['linear'],['zoom'],2,base*1.4,6,base*2.2,11,base*3.2];
// The SITREP re-reads layer data as part of every refresh — debounced so a
// burst of near-simultaneous layer updates recomputes it once, not N times.
let sitrepRefreshT=null;
function scheduleSitrep(){ clearTimeout(sitrepRefreshT); sitrepRefreshT=setTimeout(()=>{ try{sitrepTick();}catch(e){} },300); }

// Ground elevation (ft AMSL) at a point, for AGL = baro-alt − ground. Keyless
// Open-Meteo lookup, cached by ~0.01° cell (≈1 km, so every plane inside the
// 1-mile warning radius shares the crosshair's cell). Returns the cached value
// synchronously (null until known) and kicks off a fetch on a miss, re-running
// the SITREP when it lands so the AGL card fills in on the next tick.
const _elevCache={}; let _elevBusy=false;
function groundElevFt(la,lo){
  const key=la.toFixed(2)+','+lo.toFixed(2);
  if(key in _elevCache) return _elevCache[key];
  if(!_elevBusy){
    _elevBusy=true;
    getJSON(`https://api.open-meteo.com/v1/elevation?latitude=${la.toFixed(4)}&longitude=${lo.toFixed(4)}`,{timeout:8000})
      .then(d=>{ const m=d&&d.elevation&&d.elevation[0]; _elevCache[key]=isFinite(m)?m*3.28084:0; })
      .catch(()=>{ _elevCache[key]=0; })
      .finally(()=>{ _elevBusy=false; scheduleSitrep(); });
  }
  return null;
}

function ensureMapLayer(cfg){
  const sid='src-'+cfg.id;
  if(gl.getSource(sid)) return;
  gl.addSource(sid,{type:'geojson',data:{type:'FeatureCollection',features:[]}});
  if(cfg.geom==='fill'){
    const fillCol=cfg.colored?['coalesce',['get','_col'],cfg.color]:cfg.color;
    gl.addLayer({id:'ly-'+cfg.id,type:'fill',source:sid,
      paint:{'fill-color':fillCol,'fill-opacity':cfg.fillOpacity!=null?cfg.fillOpacity:0.26,
        'fill-outline-color':cfg.outline===false?'rgba(0,0,0,0)':fillCol}});
    if(cfg.outline!==false)   // outline:false = seamless filled cells (aurora grid)
      gl.addLayer({id:'lyl-'+cfg.id,type:'line',source:sid,
        paint:{'line-color':fillCol,'line-width':1.4,'line-opacity':0.85}});
  }else if(cfg.icon){
    gl.addLayer({id:'ly-'+cfg.id,type:'symbol',source:sid,layout:{
      'icon-image': cfg.iconProp?['coalesce',['get','_icon'],cfg.icon]:cfg.icon,
      'icon-size': iconSize(cfg.iconSize||0.6),
      'icon-rotate': cfg.rotate?['coalesce',['get','_rot'],0]:0,
      'icon-rotation-alignment':'map','icon-pitch-alignment':'map',
      'icon-allow-overlap':true,'icon-ignore-placement':true}});
  }else{
    gl.addLayer({id:'ly-'+cfg.id,type:'circle',source:sid,
      paint:{
        'circle-radius': cfg.sized?['coalesce',['get','_r'],5]:5,
        'circle-color': cfg.colored?['coalesce',['get','_col'],cfg.color]:cfg.color,
        'circle-opacity':0.85,
        'circle-stroke-color':'#0a0e14','circle-stroke-width':1
      }});
  }
  const vis=cfg.defaultOff?'none':'visible';
  gl.setLayoutProperty('ly-'+cfg.id,'visibility',vis);
  if(gl.getLayer('lyl-'+cfg.id)) gl.setLayoutProperty('lyl-'+cfg.id,'visibility',vis);
}

async function runLayer(cfg){
  const st=LAYER_STATE[cfg.id];
  // Generation token: every call bumps it, and a call only writes data/state if
  // it's still the newest. Overlapping refreshes (pan + tick + resize) can
  // finish out of order; without this a slow stale fetch could clobber a fresh
  // one. The latest request always wins. st.loading lets the master scheduler
  // skip a layer that's still fetching.
  const myGen=++st.gen;
  st.loading=true;
  try{
    if(st.quickTimer){ clearTimeout(st.quickTimer); st.quickTimer=null; }
    const row=$('#row-'+cfg.id);
    const cntEl=row&&row.querySelector('.cnt');
    if(cntEl && !st.retrying) cntEl.innerHTML='<span class="spin"></span>';
    // up to 3 attempts with exponential backoff before giving up this cycle
    let lastErr=null;
    for(let attempt=0;attempt<3;attempt++){
      try{
        const fc=await cfg.loader();
        if(myGen!==st.gen) return;               // superseded by a newer refresh — drop this result
        const src=gl.getSource('src-'+cfg.id);
        if(src) src.setData(fc);
        st.cnt=(fc.features||[]).length;
        st.at=Date.now(); st.errored=false; st.retrying=false; st.fails=0;
        if(cntEl) cntEl.textContent=st.cnt;
        if(row) row.title=cfg.label+' · updated '+fmtTime(st.at);
        scheduleSitrep();   // SITREP re-reads the fresh data as part of the refresh
        return;
      }catch(e){
        lastErr=e;
        if(myGen!==st.gen) return;                // a newer refresh owns the layer now
        if(attempt<2){ st.retrying=true;
          if(cntEl) cntEl.innerHTML='<span class="spin" title="retry '+(attempt+1)+'…"></span>';
          await new Promise(r=>setTimeout(r,1200*Math.pow(3,attempt))); // 1.2s, 3.6s
          if(myGen!==st.gen) return;
        }
      }
    }
    // Failed this cycle. NEVER wipe what's on the map — keep the existing features
    // and count, show a neutral dash, and retry with a short bounded backoff
    // (6→30s) instead of waiting a full refresh interval.
    st.errored=true; st.retrying=false; st.fails=(st.fails||0)+1;
    if(cntEl) cntEl.textContent=st.cnt||'–';
    console.warn('[layer '+cfg.id+']',lastErr&&lastErr.message);
    if(st.on && !st.quickTimer){
      const delay=Math.min(30000,6000*st.fails);
      st.quickTimer=setTimeout(()=>{ st.quickTimer=null; if(st.on) runLayer(cfg); },delay);
    }
  } finally { if(myGen===st.gen) st.loading=false; }
}

function scheduleLayer(cfg){ runLayer(cfg); }  // initial pull; refreshTick handles ongoing refresh

// ---- unified refresh: a single 30s countdown drives the refresh of every DUE
//      layer (each still respects its own refresh interval, so rate-limited
//      feeds like CelesTrak update less often). "Xs to update" reflects the
//      primary live cadence. ----
const REFRESH_S=30;
let refreshBase=Date.now(), pulseCount=0;
function refreshDueLayers(){
  pulseCount++;
  LAYERS.forEach(cfg=>{
    const st=LAYER_STATE[cfg.id];
    if(!st||!st.started||cfg.refresh<=0||st.loading) return;
    if(!(st.on||cfg.bg||cfg.viewport)) return; // only fetch what's needed
    // refresh every N pulses (N=refresh/30), grid-aligned so a moveend that
    // reset a layer's timestamp can't push its refresh past a whole cycle
    const everyN=Math.max(1,Math.round(cfg.refresh/REFRESH_S));
    if(pulseCount%everyN===0) runLayer(cfg);
  });
}
// data-refresh countdown ("Xs to update") in the SITREP header
function refreshTick(){
  const el=$('#refresh-count');
  const elapsed=Math.floor((Date.now()-refreshBase)/1000);
  if(elapsed>=REFRESH_S){ refreshBase=Date.now(); refreshDueLayers(); refreshRadar(); if(el) el.textContent=REFRESH_S; }
  else if(el) el.textContent=REFRESH_S-elapsed;
}

// No layer selector: every layer's map source + style is created here and stays
// on (SPC is defaultOff = hidden, loaded only to feed the SITREP outlook card).
function initLayers(){
  LAYERS.forEach(cfg=>{
    LAYER_STATE[cfg.id]={cnt:0,on:!cfg.defaultOff,started:false,
      gen:0,quickTimer:null,fails:0,loading:false};
    ensureMapLayer(cfg);
  });
}

function bindLayerPopups(){
  LAYERS.forEach(cfg=>{
    const lid='ly-'+cfg.id;
    gl.on('click',lid,e=>{
      const f=e.features[0];
      const html=cfg.popup?cfg.popup(f.properties):'';
      if(!html) return;
      new maplibregl.Popup({closeButton:true,maxWidth:'300px'})
        .setLngLat(f.geometry.type==='Point'?f.geometry.coordinates:e.lngLat)
        .setHTML('<div class="pop">'+html+'</div>').addTo(gl);
    });
    gl.on('mouseenter',lid,()=>gl.getCanvas().style.cursor='pointer');
    gl.on('mouseleave',lid,()=>gl.getCanvas().style.cursor='');
  });
}

async function openDossier(lngLat){
  const {lng,lat}=lngLat;
  const pop=new maplibregl.Popup({closeButton:true,maxWidth:'300px'})
    .setLngLat(lngLat)
    .setHTML(`<div class="pop"><h4>Dossier</h4>
      <div class="kv"><span>coords</span>${lat.toFixed(3)}, ${lng.toFixed(3)}</div>
      <div class="sub"><span class="spin"></span> resolving place, country…</div></div>`)
    .addTo(gl);
  try{
    const g=await getJSON(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}&zoom=10`,
      {headers:{'Accept-Language':'en'}});
    const a=g.address||{};
    const cc=(a.country_code||'').toUpperCase();
    const placeName=g.name||a.city||a.town||a.village||a.state||a.county||
      (g.display_name||'open ocean').split(',')[0];
    let html=`<h4>${escapeHtml(placeName)}</h4>
      <div class="kv"><span>coords</span>${lat.toFixed(3)}, ${lng.toFixed(3)}</div>`;
    if(a.country) html+=`<div class="kv"><span>country</span>${escapeHtml(a.country)}</div>`;

    const tasks=[
      getJSON('https://en.wikipedia.org/api/rest_v1/page/summary/'+
        encodeURIComponent(placeName)).then(r=>({wiki:r})).catch(()=>({}))
    ];
    if(cc){
      tasks.push(getJSON('https://restcountries.com/v3.1/alpha/'+cc).then(r=>({country:r})).catch(()=>({})));
      if(a.country) tasks.push(headOfState(a.country).then(h=>({hos:h})).catch(()=>({})));
    }
    const res=Object.assign({},...(await Promise.all(tasks)));

    if(res.country){
      const c=Array.isArray(res.country)?res.country[0]:res.country;
      if(c){
        html+=`<div class="kv"><span>capital</span>${escapeHtml((c.capital||[])[0]||'—')}</div>`;
        html+=`<div class="kv"><span>population</span>${(c.population||0).toLocaleString()}</div>`;
      }
    }
    if(res.hos) html+=`<div class="kv"><span>head of st.</span>${escapeHtml(res.hos)}</div>`;
    if(res.wiki&&res.wiki.extract) html+=`<div class="sub">${escapeHtml(res.wiki.extract.slice(0,260))}</div>`;
    if(res.wiki&&res.wiki.content_urls)
      html+=`<div class="lnk"><a target="_blank" rel="noopener" href="${res.wiki.content_urls.desktop.page}">Wikipedia ↗</a></div>`;
    pop.setHTML('<div class="pop">'+html+'</div>');
  }catch(err){
    pop.setHTML(`<div class="pop"><h4>Dossier</h4>
      <div class="kv"><span>coords</span>${lat.toFixed(3)}, ${lng.toFixed(3)}</div>
      <div class="sub" style="color:var(--danger)">lookup failed: ${escapeHtml(err.message)}</div></div>`);
  }
}

(function(){

async function headOfState(countryName){
  const safe=String(countryName).replace(/[\\"]/g,'\\$&');  // escape for the SPARQL string literal
  const q=`SELECT ?hosLabel WHERE{
    ?c wdt:P31 wd:Q6256; rdfs:label "${safe}"@en.
    ?c wdt:P35 ?hos.
    SERVICE wikibase:label{bd:serviceParam wikibase:language "en".}
  } LIMIT 1`;
  const j=await getJSON('https://query.wikidata.org/sparql?format=json&query='+encodeURIComponent(q),
    {timeout:9000});
  const b=j.results.bindings[0];
  return b?b.hosLabel.value:null;
}

/* =====================================================================
   6. SPACE WEATHER (global Kp index, GOES X-ray flare class)
   NOAA SWPC — keyless, CORS *. Surfaced in the SITREP as geomagnetic-storm /
   solar-flare anomalies (the auroral-oval map layer is the visual half).
   ===================================================================== */
let KP=null, XRAY=null; // latest planetary Kp + GOES X-ray flare class
async function loadKp(){
  try{
    const j=await getJSON('https://services.swpc.noaa.gov/products/noaa-planetary-k-index.json');
    let kp=null;
    for(let i=j.length-1;i>=0;i--){
      const r=j[i]; const v=Array.isArray(r)?r[1]:r.Kp;
      const n=parseFloat(v); if(isFinite(n)){kp=n;break;}
    }
    KP=kp;
  }catch(e){ KP=null; }
  scheduleSitrep();
}
async function loadXray(){
  try{
    const j=await getJSON('https://services.swpc.noaa.gov/json/goes/primary/xray-flares-latest.json');
    const f=Array.isArray(j)?j[0]:j;
    XRAY=(f&&(f.current_class||f.max_class))||null;
  }catch(e){ XRAY=null; }
  scheduleSitrep();
}
/* =====================================================================
   6b. LOCATION + SITREP — the "at a glance" intelligence layer
   Fix chain: ipwho.is (instant, keyless, no prompt) -> browser GPS
   refine (one prompt; denial silently keeps the IP fix). Everything
   is computed client-side; position never leaves the browser except
   as anonymous lat/lon query params to the public weather APIs.
   ===================================================================== */
let userMarker=null, sitrepTimer=null;

// Frame the map to a `miles`-radius circle around (lat,lon). fitBounds honours
// the panel padding, so the point lands centred in the visible area between the
// panels. Used identically on load and on the ⌖ ME button so both give the same
// ~10-mile view.
// the view radius applied once a location fix lands
const FIX_VIEW_MI=50;   // statute miles
function flyToRadiusMi(lat,lon,miles,opts){
  cancelCenterZoom();
  const km=miles*1.60934;
  const dLat=km/111.32;
  const dLon=km/(111.32*Math.max(0.2,Math.cos(lat*Math.PI/180)));
  try{
    gl.fitBounds([[lon-dLon,lat-dLat],[lon+dLon,lat+dLat]],
      Object.assign({duration:1200,maxZoom:15},opts||{}));
  }catch(e){ gl.flyTo({center:[lon,lat],zoom:11}); }
}

async function locate(){
  try{
    const j=await getJSON('https://ipwho.is/',{timeout:9000});
    if(j&&j.success!==false&&j.latitude!=null)
      setUserFix(j.latitude,j.longitude,'ip',
        {place:j.city,region:j.region,rc:j.region_code,cc:j.country_code,
         tz:(j.timezone&&j.timezone.id)||''});
  }catch(e){ console.warn('[ip-locate]',e.message); }
  if(navigator.geolocation){
    try{
      navigator.geolocation.getCurrentPosition(
        pos=>setUserFix(pos.coords.latitude,pos.coords.longitude,'gps',null),
        ()=>{},{enableHighAccuracy:true,timeout:10000,maximumAge:60000});
    }catch(e){}
  }
}
// "center on me": pan to the fix and reset the view to north-up, flat (bearing
// and pitch back to 0) — but keep the CURRENT zoom. If no fix yet, kick off IP +
// GPS location and prompt for precise GPS.
function centerOnMe(){
  if(USER.lat!=null){
    cancelCenterZoom();
    gl.easeTo({center:[USER.lon,USER.lat],bearing:0,pitch:0,duration:800});
    // refine the fix in the background (locate() already does this on first fix,
    // so only the has-fix branch asks — never two concurrent GPS requests)
    if(navigator.geolocation) try{ navigator.geolocation.getCurrentPosition(
      p=>setUserFix(p.coords.latitude,p.coords.longitude,'gps',null),()=>{},
      {enableHighAccuracy:true,timeout:10000}); }catch(e){}
  } else {
    toast('LOCATING…','');
    locate();
  }
}
$('#loc-btn').addEventListener('click',centerOnMe);

// Map padding keeps the geographic centre inside the open area left of the
// docked SITREP panel (desktop only; on mobile the panel is an overlay sheet).
let _pad=null;
function setMapPadding(){
  // the SITREP panel is docked right (320px) — keep map content centred in the
  // area to its left; on mobile the panel is an overlay sheet so no padding.
  const p=MQ_MOBILE.matches
    ? {top:0,right:0,bottom:0,left:0}
    : {top:20,left:24,right:336,bottom:24};
  if(_pad&&_pad.top===p.top&&_pad.left===p.left&&_pad.right===p.right&&_pad.bottom===p.bottom) return;
  _pad=p; gl.setPadding(p);   // only when it actually changed — avoids needless camera nudges
}
window.addEventListener('resize',()=>{ clearTimeout(window.__pad);
  window.__pad=setTimeout(setMapPadding,200); });
// Pin the centre reticle to the map's projected centre (accounts for panel
// padding on desktop and the raised map bottom on mobile). Cheap: only writes
// when the pixel actually moves.
let _chx=-1,_chy=-1;
function placeCrosshair(){
  const ch=$('#crosshair'); if(!ch) return;
  const c=gl.project(gl.getCenter());
  const x=Math.round(c.x), y=Math.round(c.y);
  if(x===_chx&&y===_chy) return;
  _chx=x; _chy=y; ch.style.left=x+'px'; ch.style.top=y+'px';
}
gl.on('render',placeCrosshair);
window.addEventListener('resize',placeCrosshair);

function setUserFix(lat,lon,src,meta){
  const first=USER.lat==null;
  if(!first&&src==='ip'&&USER.src==='gps') return; // never downgrade gps -> ip
  const pLat=USER.lat,pLon=USER.lon;
  USER.lat=lat; USER.lon=lon; USER.src=src;
  if(meta&&meta.tz) USER.tz=meta.tz;   // timezone drives the local-time formatting
  if(!userMarker){
    const d=el('div'); d.id='user-dot';
    userMarker=new maplibregl.Marker({element:d}).setLngLat([lon,lat]).addTo(gl);
  } else userMarker.setLngLat([lon,lat]);
  // One clean camera move. The first fix flies in from the world view; a later
  // GPS refinement of the IP guess only gently recenters, and only if it moved
  // us far — so the load isn't a stutter of two back-to-back zoom animations.
  if(first){
    // first fix: one clean animation to a 50-mile view (regional context, not
    // zoomed tight to the street)
    flyToRadiusMi(lat,lon,FIX_VIEW_MI);
  } else if(src==='gps'&&pLat!=null&&havKm(pLat,pLon,lat,lon)>8){
    // GPS refined the IP guess by a lot (>8 km): re-frame to the 50-mile view at
    // the precise spot. Re-framing (not easeTo) so the final ZOOM is always the
    // right one — easeTo mid-fitBounds was leaving the zoom half-finished ("hung").
    // For small corrections we leave the camera and just move the marker.
    flyToRadiusMi(lat,lon,FIX_VIEW_MI);
  }
  sitrepTick();
}


// concise text, no "…" (CSS clips)
const cut=(s,n)=>escapeHtml(String(s==null?'':s).trim().slice(0,n));

// -- CATEGORY MODEL --------------------------------------------------------
// Each in-view feature becomes ONE individual SITREP card. A cfg maps a feed to
// a card shape; distance/direction (to the crosshair) is added by the SITREP
// code. Only items inside the current map area are ever shown.
//   cls(f) → '', 'alert' (amber) or 'danger' (red) for THIS item
//   hazard : contributes to the SITREP title colour (traffic doesn't)
//   head   : line 1 — the item's headline
//   sub    : line 2 — secondary detail
//   detail : appended to line 3 after the distance (extra datum; '' to omit)
const ALT=f=>{const a=f.properties.alt;return a!=null&&a!=='?'?a+U(' ft'):'—';};
const CATS=[
  {src:'src-sos', hazard:true, icon:'🚨', cls:()=>'danger',
   head:f=>cut(f.properties.flight||f.properties.hex||'?',12),
   sub:f=>escapeHtml(f.properties.desc||f.properties.type||'aircraft'),
   detail:f=>'sq '+(f.properties.code||'7700')},
  {src:'src-nws', hazard:true, icon:'⚠',
   cls:f=>/Extreme|Severe/i.test(f.properties.severity)?'danger':'alert',
   head:f=>cut((f.properties.event||'warning').replace(/\s*warning$/i,'').toUpperCase(),22),
   sub:f=>cut(f.properties.area,26),
   // line 3 shows when the warning ENDS (the severity is already in the headline
   // + the card colour, so repeating it here is noise). '' if no end time known.
   detail:f=>{const e=f.properties.ends,d=e&&new Date(e);
     return d&&!isNaN(d)?'til '+d.toLocaleTimeString([],Object.assign({hour:'numeric',minute:'2-digit'},tzOpt())):'';}},
  {src:'src-nearair', hazard:false, icon:'✈', cls:()=>'',
   head:f=>cut(f.properties.flight||f.properties.hex||'?',12),
   sub:f=>escapeHtml(f.properties.desc||f.properties.type||'aircraft'), detail:ALT},
  {src:'src-mil', hazard:false, icon:'🎖', mil:true, cls:()=>'alert',
   head:f=>cut(f.properties.flight||f.properties.hex||'?',10),
   sub:f=>escapeHtml(f.properties.desc||f.properties.type||'military'), detail:ALT},
];
// is a point/polygon feature inside the given view bounds? For polygons: any
// vertex in view, OR the polygon CONTAINS the view centre — without the second
// test, zooming deep inside a large warning area made its card vanish exactly
// when you were standing in it (all vertices off-screen).
function featInBounds(f,b){
  const g=f.geometry; if(!g) return false;
  if(g.type==='Point') return inBounds(b,g.coordinates[0],g.coordinates[1]);
  const rings=g.type==='Polygon'?g.coordinates:g.type==='MultiPolygon'?g.coordinates.flat():[];
  if(rings.some(r=>r.some(pt=>inBounds(b,pt[0],pt[1])))) return true;
  return pointInFeature(f,(b.getWest()+b.getEast())/2,(b.getSouth()+b.getNorth())/2);
}
// features of a category currently inside the map area
function catItems(cfg,b){
  let items=featsIn(cfg.src); if(cfg.filter) items=items.filter(cfg.filter);
  return items.filter(f=>featInBounds(f,b));
}

let sitrepGen=0;
async function sitrepTick(){
  // SITREP reflects the CURRENT MAP AREA (viewport bounds), not just the user.
  const myGen=++sitrepGen;
  const c=gl.getCenter(), b=viewBounds();   // only the area visible between the panels
  const lat=c.lat, lon=c.lng;
  const rows=[];
  // Every row is 3 lines (l1/l2/l3) + an action button. Helpers below always
  // yield a button so no row is action-less.
  const row=(cls,ic,l1,l2,l3,act)=>rows.push(
    `<div class="sit-row${cls?' '+cls:''}"><span class="ic">${ic}</span>`+
    `<span class="tx"><s1>${l1||''}</s1><s2>${l2||''}</s2><s3>${l3||''}</s3></span>`+
    `${act||''}</div>`);
  const llBtn=(lo,la,lbl)=>isFinite(lo)&&isFinite(la)?`<button class="act" data-act="fly" data-ll="${lo+','+la}">${lbl||'VIEW'}</button>`:'';
  const openBtn=(url,lbl)=>`<button class="act" data-act="open" data-url="${escapeHtml(url)}">${lbl||'OPEN'}</button>`;
  // Distance + direction are measured from the CROSSHAIR (map centre) — the
  // location chip already reverse-geocodes it, so the whole panel describes the
  // point you're looking at. It sits on you by default and after the ME button.
  const dirMi=(la,lo)=>compass(bearing(lat,lon,la,lo))+' '+fmtMi(havKm(lat,lon,la,lo));
  const SWPC='https://www.swpc.noaa.gov/', SPCU='https://www.spc.noaa.gov/products/outlook/day1otlk.html';

  const cards=[];   // [cls, icon, l1, l2, l3, action, hazard]

  // -- LOW AIRCRAFT PROXIMITY (top, red-title): any plane (civil / military /
  //    emergency) within 1 mile of the crosshair AND under 1000' ABOVE GROUND
  //    LEVEL → danger card. Reported altitude is barometric (MSL), so we look
  //    up the ground elevation at the crosshair (cached, keyless Open-Meteo)
  //    and subtract it: AGL = alt − ground. Recomputed every SITREP tick for
  //    the planes currently in the radius. Ground aircraft report
  //    alt='ground'/'?' → skipped. --
  const inRing=[];
  ['src-nearair','src-mil','src-sos'].forEach(s=>featsIn(s).forEach(f=>{
    const alt=+f.properties.alt; if(!isFinite(alt)) return;
    const g=f.geometry&&f.geometry.coordinates; if(!g) return;
    const km=havKm(lat,lon,g[1],g[0]); if(km>1.609) return;   // within one mile
    inRing.push({f,km,alt,pt:g});
  }));
  if(inRing.length){
    const ground=groundElevFt(lat,lon);          // ft AMSL, null until fetched
    const lowAc=inRing.map(a=>({...a,agl:ground==null?a.alt:a.alt-ground}))
                      .filter(a=>a.agl<1000);
    if(lowAc.length){
      lowAc.sort((a,z)=>a.km-z.km); const lo=lowAc[0], p=lo.f.properties;
      const aglTxt=Math.max(0,Math.round(lo.agl))+U(' ft')+(ground==null?'':' AGL');
      cards.push(['danger','🛩️','LOW AIRCRAFT',
        cut(p.flight||p.hex||'aircraft',12)+(lowAc.length>1?' +'+(lowAc.length-1):''),
        dirMi(lo.pt[1],lo.pt[0])+' · '+aglTxt,
        llBtn(lo.pt[0],lo.pt[1]), true]);
    }
  }

  // -- GENERAL context cards (area-wide, not a single map point). Collected here
  //    but appended at the BOTTOM of the pile (after the distance-sorted items) —
  //    they're background context, not the nearest thing to the crosshair. --
  const general=[];
  // SEVERE WEATHER OUTLOOK (SPC Day 1): is the map-centre under a severe /
  // tornado risk TODAY? "Expected", not yet a warning. US only.
  const spcF=featsIn('src-spc');
  if(spcF.length){
    const tornHit=spcF.filter(f=>f.properties.kind==='torn'&&pointInFeature(f,lon,lat))
      .sort((a,b)=>(parseFloat(b.properties.code)||0)-(parseFloat(a.properties.code)||0))[0];
    const catHit=spcF.filter(f=>f.properties.kind==='cat'&&f.properties.rank>=1&&pointInFeature(f,lon,lat))
      .sort((a,b)=>b.properties.rank-a.properties.rank)[0];
    if(tornHit){ const tp=parseFloat(tornHit.properties.code)||0; const red=tornHit.properties.sig||tp>=0.10;
      general.push([red?'danger':'alert','🌪️','TORNADO OUTLOOK',cut(tornHit.properties.label,16)+' today',
        tornHit.properties.sig?'significant EF2+ risk':'SPC Day 1 outlook',openBtn(SPCU,'SPC'),true]); }
    if(catHit) general.push([catHit.properties.rank>=4?'danger':'alert','⛈','SEVERE WX OUTLOOK',cut(catHit.properties.label,16)+' today',
      'tornado / hail / wind risk',openBtn(SPCU,'SPC'),true]);
  }
  // space weather (global scalars): geomagnetic storm + solar flare
  if(KP!=null&&KP>=5) general.push(['alert','🧲','GEOMAGNETIC STORM','Kp '+KP+' · K-index',
    'HF / GPS / grid impact',openBtn(SWPC,'SWPC'),true]);
  if(XRAY&&/^[MX]/.test(XRAY)) general.push([/^X/.test(XRAY)?'danger':'alert','☀','SOLAR FLARE '+XRAY,'GOES X-ray · '+(/^X/.test(XRAY)?'major':'moderate'),
    'HF radio blackout risk',openBtn(SWPC,'SWPC'),true]);

  // -- INDIVIDUAL item cards: one per in-view feature (planes, warnings,
  //    emergencies), all interleaved. HAZARDS OUTRANK ROUTINE TRAFFIC: a
  //    thunderstorm warning or emergency squawk sorts above any plane no matter
  //    how close the plane is (a plane only beats it via the pinned LOW
  //    AIRCRAFT card, i.e. at warning distance/altitude). Tiers: red hazards,
  //    amber hazards, everything else — distance sorts WITHIN each tier.
  //    Capped so a busy area can't flood it. --
  const items=[];
  CATS.forEach(cfg=>catItems(cfg,b).forEach(f=>{
    const pt=polyPt(f); if(!pt) return;
    const cls=cfg.cls?cfg.cls(f):'';
    const tier=cfg.hazard?(cls==='danger'?0:1):2;
    items.push({cfg,f,pt,cls,tier,km:havKm(lat,lon,pt[1],pt[0])});
  }));
  items.sort((a,z)=>a.tier-z.tier||a.km-z.km);
  const ITEM_CAP=14;
  items.slice(0,ITEM_CAP).forEach(({cfg,f,pt,cls})=>{
    const det=cfg.detail?cfg.detail(f):'';
    cards.push([cls, cfg.icon,
      cfg.head(f), (cfg.sub?cfg.sub(f):'')||'—',
      dirMi(pt[1],pt[0])+(det?' · '+det:''),
      llBtn(pt[0],pt[1]), cfg.hazard]);
  });
  general.forEach(c=>cards.push(c));   // area-wide context cards sink to the bottom

  // title severity from HAZARD cards only: 0 none · 1 alert (amber) · 2 warn (red)
  let titleSev=0;
  cards.forEach(cd=>{ if(cd[6]) titleSev=Math.max(titleSev,cd[0]==='danger'?2:cd[0]==='alert'?1:0); });
  if(myGen!==sitrepGen) return; // a newer tick superseded this one — don't clobber
  const t=$('#sit-title'); t.classList.remove('warn','alert');
  if(titleSev>=2) t.classList.add('warn'); else if(titleSev>=1) t.classList.add('alert');
  cards.forEach(cd=>row(cd[0],cd[1],cd[2],cd[3],cd[4],cd[5]));

  $('#sit-body').innerHTML=rows.length?rows.join(''):
    '<div class="sit-empty">NO SIGNALS IN THIS AREA — PAN OR ZOOM THE MAP</div>';
}

// action handler for SITREP card buttons: fly to a point, or open a source page
function handleAct(btn){
  const act=btn.dataset.act;
  if(act==='fly'&&btn.dataset.ll){
    const [lo,la]=btn.dataset.ll.split(',').map(Number);
    // zoom IN to at least 9 but never zoom the user OUT of a closer view
    if(isFinite(lo)&&isFinite(la)){ cancelCenterZoom();
      gl.flyTo({center:[lo,la],zoom:Math.max(gl.getZoom(),9)}); }
    if(MQ_MOBILE.matches) openSheet('');
  } else if(act==='open'&&btn.dataset.url){ window.open(btn.dataset.url,'_blank','noopener'); }
}
$('#sit-body').addEventListener('click',e=>{ const b=e.target.closest('[data-act]'); if(b) handleAct(b); });
// Viewport-scoped feeds refetch for the new area whenever the visible bounds
// change — on every map move AND on every container resize. A resize (window,
// panel, orientation, sheet) enlarges the view without a pan, so without this
// the newly-revealed area kept its stale aircraft until the next 60s refresh.
let moveDebounce=null, lastViewKey=null;
function refreshViewport(){
  clearTimeout(moveDebounce);
  moveDebounce=setTimeout(()=>{
    // Only refetch the viewport feeds when the visible area actually changed.
    // Rounding to ~1km + 0.1 zoom collapses jitter (a resize with the same
    // bounds, a tiny GPS ease) so we don't fire redundant ADS-B requests that
    // just invite rate-limiting. SITREP still recomputes every time.
    const b=gl.getBounds(),z=gl.getZoom();
    const key=[b.getWest(),b.getSouth(),b.getEast(),b.getNorth()].map(n=>n.toFixed(2)).join(',')+'@'+z.toFixed(1);
    if(key!==lastViewKey){
      lastViewKey=key;
      // Refetch the viewport-scoped feeds for the new area regardless of on/off,
      // so their counts track the view (flood gauges load only when zoomed in,
      // so at the wide boot view they read 0 until this runs for the real area).
      LAYERS.filter(l=>l.viewport).forEach(cfg=>{
        const st=LAYER_STATE[cfg.id];
        if(st&&st.started) runLayer(cfg);
      });
      // A center move just refreshed the live viewport data, so restart the 30s
      // countdown (and the pulse cycle) from now — the next full refresh is a
      // fresh 30s away, not whatever was left on the clock.
      refreshBase=Date.now();
    }
    sitrepTick();
  },450);
}
gl.on('moveend',refreshViewport);
// container resize doesn't reliably fire moveend, so refetch here too
gl.on('resize',refreshViewport);

/* ---- CAN I FLY tab: embed canifly (own repo) and drive it from the crosshair.
   The iframe loads lazily on first open; sitrep posts the map CENTRE to it so
   the flyability read tracks wherever you're looking, exactly like the SITREP.
   Contract: sitrep → canifly {type:'sitrep:loc',lat,lon}; canifly → sitrep
   {type:'canifly:ready'} once it can accept a location. canifly stays fully
   standalone (it only enters embed mode when it detects it's in an iframe). ---- */
const CANIFLY_URL='https://robertjohnhanna.github.io/canifly/';
const CANIFLY_ORIGIN=new URL(CANIFLY_URL).origin;
let flyReady=false;
function pushFlyLoc(){
  const fr=$('#fly-frame');
  if(!flyReady||!fr||!fr.contentWindow) return;
  const c=gl.getCenter();
  fr.contentWindow.postMessage({type:'sitrep:loc',lat:c.lat,lon:c.lng},CANIFLY_ORIGIN);
}
// load canifly the first time the DATA panel is actually shown — immediately on
// desktop (panel always visible), on sheet-open on mobile (skips a boot fetch
// nobody asked for).
function ensureFly(){ const fr=$('#fly-frame'); if(fr&&!fr.getAttribute('src')) fr.src=CANIFLY_URL; }
// once canifly signals it can take a location (or the frame just finishes
// loading), send the current crosshair; keep it in sync as the map moves
$('#fly-frame').addEventListener('load',()=>{ flyReady=true; pushFlyLoc(); });
window.addEventListener('message',e=>{
  if(e.origin===CANIFLY_ORIGIN && e.data && e.data.type==='canifly:ready'){ flyReady=true; pushFlyLoc(); }
});
gl.on('moveend',pushFlyLoc);

/* =====================================================================
   13. BOOT
   ===================================================================== */
gl.on('load',()=>{
  registerIcons();
  initLayers();
  bindLayerPopups();
  // Pull every layer once on load (kept layers stay on the map; SPC feeds the
  // SITREP outlook card only).
  LAYERS.forEach(cfg=>{ LAYER_STATE[cfg.id].started=true; scheduleLayer(cfg); });
  refreshBase=Date.now(); setInterval(refreshTick,1000); refreshTick(); // 30s refresh + clock
  loadKp();   setInterval(loadKp,180000);   // space weather: planetary Kp (SITREP card)
  loadXray(); setInterval(loadXray,180000); // space weather: GOES X-ray flare (SITREP card)
  setMapPadding();
  if(!MQ_MOBILE.matches) ensureFly();   // desktop: SITREP panel is always visible → load canifly now
  locate();
  sitrepTick(); // SITREP works off the map area, even before a location fix
  if(!sitrepTimer) sitrepTimer=setInterval(sitrepTick,90000);
  [700,3000,7000].forEach(t=>setTimeout(()=>{ setMapPadding(); sitrepTick(); },t));
});
</script>
</body>
