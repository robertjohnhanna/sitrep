<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="canifly">
<meta name="description" content="canifly — keyless drone preflight: can I fly here, now, and how high? GPS-located: live weather, winds aloft, FAA airspace, radar and traffic.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%9B%A9%3C/text%3E%3C/svg%3E">
<title>canifly</title>

<!-- canifly — self-contained drone-preflight brief. One HTML file: no backend,
     build step, API keys, npm, or map library. Vanilla JS only. Located by GPS;
     a full-screen card interface carries the flyability chart (with a white live
     clock in its top-left corner) above a distance-sorted SITREP of nearby
     aircraft, airspace and hazards. Data refreshes every 5 s; the overall verdict
     reads off the NOW-column colour (green = go, yellow = caution, red = no-go). Every
     data feed is keyless and CORS-open. -->

<style>
  :root{
    --bg:#000000; --line:#1a2730;
    --ink:#d6e2ee; --ink-dim:#748596;
    /* the three verdict colours — go / caution / no-go — used everywhere a
       severity is shown (clock, chart cells, card text). Caution is YELLOW. */
    --go:#2fe07a; --caution:#ffd43b; --nogo:#ff4455;
    --mono:"SF Mono",ui-monospace,"Cascadia Code",Menlo,Consolas,monospace;
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  /* read-only display: no text selection, callout, tap highlight, or double-tap zoom */
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;
    -webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
  /* height:100% (not dvh — iOS Safari's floating URL bar makes dvh resolve short) */
  /* text-size-adjust:100% stops iOS Safari from auto-inflating the list text for a beat
     on an orientation flip (the "fonts go wild for a second" glitch). */
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font-family:var(--mono);font-size:13px;overflow:hidden;
    -webkit-text-size-adjust:100%;text-size-adjust:100%;
    overscroll-behavior:none;touch-action:manipulation;text-transform:uppercase}
  /* the SITREP still scrolls, but double-tap / pinch zoom is disabled everywhere */
  #sit-body{touch-action:pan-y}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:#233247;border-radius:4px}
  ::-webkit-scrollbar-track{background:transparent}

  /* ---- APP SHELL — ONE full-screen column on every device (iPhone-first). On wide
          screens it's centred at a phone-like max width so all devices match. ---- */
  #app{position:fixed;inset:0;display:flex;flex-direction:column;
    width:100%;max-width:620px;margin:0 auto;
    border-left:1px solid var(--line);border-right:1px solid var(--line)}

  /* ---- FLYABILITY CHART — the top section, sized to its content ---- */
  #fly-pane{flex:0 0 auto;min-height:0;border-bottom:1px solid var(--line);background:#000;
    display:flex;flex-direction:column;align-items:center;
    gap:min(1.6vh,10px);padding:calc(var(--safe-top) + 10px) 14px min(2vh,12px)}
  #fly-board{position:relative;width:100%;max-width:560px}
  #fly-pane .grid{width:100%;border:1px solid var(--line);border-radius:12px;
    padding:8px 10px;display:grid;
    grid-template-columns:minmax(0,1.15fr) repeat(4,minmax(0,1fr));   /* labels + NOW..+3h */
    align-content:center;font-variant-numeric:tabular-nums}
  #fly-pane .grow{display:contents}
  #fly-pane .ga,#fly-pane .gc{display:flex;align-items:center;min-width:0;white-space:nowrap;
    padding:5px 6px;line-height:1}
  #fly-pane .ga{justify-content:flex-start;color:var(--ink);letter-spacing:.03em;font-size:12px}
  #fly-pane .gc{justify-content:center;font-weight:700;font-size:15px;
    color:var(--ink);border-left:1px solid #16212b}   /* faint rule between time columns */
  /* reference tags — unit (FT / MPH) and the gust-cell compass direction — ALL one fixed
     size, so ft, mph and direction render identically despite sitting in different cells */
  #fly-pane .gu,#fly-pane .wd{font-size:10px;font-weight:600;color:inherit;letter-spacing:.02em;margin-left:.18em}
  /* cell fills — strictly BINARY: fly / can't fly. No yellow in the grid, ever — the
     caution colour belongs to the NOW header (the verdict), never to a cell. */
  #fly-pane .gc.good{background:rgba(47,224,122,.14);color:var(--go)}
  #fly-pane .gc.bad{background:rgba(255,68,85,.16);color:var(--nogo)}
  #fly-pane .ga.bad{color:var(--nogo)}
  #fly-pane .ghead .gc.bad{background:none;color:var(--nogo)}
  #fly-pane .ghead .ga,#fly-pane .ghead .gc{border-bottom:1px solid var(--line);
    padding-bottom:5px;font-weight:500;font-size:12px;color:var(--ink)}
  #fly-pane .ghead .gc{border-left:0}
  #fly-pane .ghead .gc.now{font-weight:700}
  /* the NOW header follows the overall verdict colour, exactly like the clock */
  #fly-pane .ghead .gc.now.go{color:var(--go)}
  #fly-pane .ghead .gc.now.caution{color:var(--caution)}
  #fly-pane .ghead .gc.now.nogo{color:var(--nogo)}
  #fly-pane .ga.hi{font-weight:700}
  #fly-pane .ggust .ga,#fly-pane .ggust .gc{border-top:1px solid rgba(116,133,150,.4)}
  /* a cap/gate code cell (GUST/VIS/SKY/WIND/FAA/TRFC/PCPN/KPx) */
  #fly-pane .gc.rsn{font-size:13px;font-weight:800;letter-spacing:.03em}
  /* CLOCK — the chart's top-left header cell: an all-white live local time with a blinking
     colon. (The verdict colour lives on the NOW column header, not here.) */
  #fly-pane .ga.clock{justify-content:flex-start;font-weight:800;font-size:15px;letter-spacing:.02em;color:#eaf1f8}
  /* the H:MM colon blinks between white and OFF-WHITE (never off/black) — see blinkColon */
  #fly-pane .ga.clock .clk-colon{color:#eaf1f8;margin:0 .03em}
  /* loading shimmer — one cell-text line tall, so nothing shifts on load */
  @keyframes flypulse{0%,100%{opacity:1}50%{opacity:.2}}
  #fly-pane .sk{display:block;border-radius:4px;background:var(--ink-dim);opacity:.22;
    width:58%;height:15px;margin:0 auto;animation:flypulse 1.6s ease-in-out infinite}
  @media (prefers-reduced-motion:reduce){#fly-pane .sk{animation:none}}

  /* ---- SITREP — scrolling list of nearby aircraft / airspace / hazards, fills the rest ---- */
  #sit-body{display:flex;flex-direction:column;overflow-y:auto;
    padding:4px 0 calc(var(--safe-bottom) + 6px);-webkit-overflow-scrolling:touch;
    flex:1 1 auto;min-height:0}
/* every SITREP row is a uniform info-only 3-line block: icon • three text lines.
flex:0 0 auto (no shrink) keeps a row at its natural height whether the list fits or
overflows - without it, the flex column squeezes rows toward min-height once they
scroll, so cards changed size between the fit and scroll states. */
  .sit-row{flex:0 0 auto;display:flex;align-items:center;gap:9px;padding:8px 12px;font-size:13px;
    min-height:62px;border-bottom:1px solid #10171f}
  .sit-row .ic{flex:0 0 30px;text-align:center;align-self:center;
    font-size:23px;line-height:1;text-transform:none}
  .sit-row .tx{flex:1;min-width:0;line-height:1.34;display:flex;flex-direction:column;justify-content:center}
  .sit-row .tx .s1,.sit-row .tx .s2,.sit-row .tx .s3{display:block;white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis}   /* any overlong line truncates with … */
  .sit-row .tx .s1{color:var(--ink);letter-spacing:.3px}
  .sit-row .tx .s2,.sit-row .tx .s3{color:var(--ink-dim);font-size:12px}
  .sit-row.alert .s1{color:var(--caution)}   /* yellow-alert card */
  .sit-row.danger .s1{color:var(--nogo)}     /* red-warning card */
  /* unit tokens keep their own spacing inside the upper-cased body */
  .u{letter-spacing:0;font-style:normal}

  /* ---- PHONE IN LANDSCAPE ONLY — chart top / cards bottom is the default EVERYWHERE
          (portrait, tablets, laptops, desktops). A phone on its side is the sole exception:
          it's too short to stack, so lay chart LEFT / cards RIGHT. Gated to a phone by
          landscape + a short viewport (≤500px tall — phones are; the smallest tablet, iPad
          Mini, is 744px) + a coarse (touch) pointer (excludes a small laptop/desktop window). */
  @media (orientation:landscape) and (max-height:500px) and (pointer:coarse){
    #app{flex-direction:row;max-width:none}
    #fly-pane{flex:0 1 auto;max-width:60%;min-width:0;justify-content:center;
      border-bottom:none;border-right:1px solid var(--line);
      padding:10px 14px;padding-left:calc(env(safe-area-inset-left,0px) + 14px)}
    #sit-body{flex:1 1 0;padding-top:calc(var(--safe-top) + 4px);
      padding-right:calc(env(safe-area-inset-right,0px))}
  }
</style>
</head>
<body>
<!-- One full-screen column on every device: the flyability chart (a plain white clock
     in its top-left corner), then the scrolling SITREP. The overall verdict is the
     NOW column header colour — there is no map. -->
<main id="app">
  <section id="fly-pane">
    <div id="fly-board" role="group" aria-label="canifly"></div>
  </section>
  <!-- hidden canonical verdict element; sitrepTick stamps its class (tests/parity) -->
  <span id="sit-title" hidden></span>
  <div id="sit-body">
    <!-- boot shows loading chart + GPS card; no empty "acquiring" screen -->
  </div>
</main>


<script>
"use strict";
/* =====================================================================
   0. helpers
   ===================================================================== */
const $ = s => document.querySelector(s);
async function getJSON(url,opts={}){
  const c=new AbortController(); const to=setTimeout(()=>c.abort(),opts.timeout||15000);
  try{
    const r=await fetch(url,{signal:c.signal,headers:opts.headers||{}});
    if(!r.ok) throw new Error('HTTP '+r.status);
    return await r.json();
  } finally { clearTimeout(to); }
}
// All times shown in the user's LOCAL time — the browser's own timezone (which, for a
// GPS-located device, is the local zone).
// THE data-refresh cadence, seconds. Everything live reads this one knob: the
// auto-refresh pulse, the every-pulse feeds (refresh:REFRESH_S below) and the
// per-layer cadences (refresh/REFRESH_S pulses). Feeds with their own natural
// cadence declare it explicitly (NWS 15 s, SPC 15 min, Kp ~3 min, radar via
// RADAR_BUST_SECONDS, winds-aloft via ALOFT_TTL_MS) so a faster pulse doesn't hammer
// sources whose data doesn't change that fast.
const REFRESH_S=5;
// persist a setting; storage can be blocked (private mode) and that's fine
const store=(k,v)=>{ try{ localStorage.setItem(k,String(v)); }catch(e){} };
// equirectangular °-offsets spanning `mi` STATUTE MILES at a latitude — THE lat/lon↔mile
// math, shared by the distance tests and the stadium-buffer geometry (69.172 mi per degree
// of latitude).
const geoDeltas=(mi,lat)=>({dLat:mi/69.172,
  dLon:mi/(69.172*Math.max(0.2,Math.cos(lat*Math.PI/180)))});
// a closed [lon,lat] ring approximating a mi-radius circle (equirectangular — exact enough
// at these radii); used to buffer stadium points into their 3 nm TFR polygons
function circleRing(lat,lon,mi,n){
  const {dLat,dLon}=geoDeltas(mi,lat), ring=[];
  for(let i=0;i<=n;i++){ const t=i/n*2*Math.PI;
    ring.push([lon+dLon*Math.cos(t), lat+dLat*Math.sin(t)]); }
  return ring;
}
// great-circle distance, STATUTE MILES (earth radius 3958.76 mi)
function havMi(lat1,lon1,lat2,lon2){
  const R=3958.7613,d=Math.PI/180;
  const a=Math.sin((lat2-lat1)*d/2)**2+
    Math.cos(lat1*d)*Math.cos(lat2*d)*Math.sin((lon2-lon1)*d/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
// Initial compass bearing from point 1 → point 2, degrees (0=N, clockwise).
function bearing(lat1,lon1,lat2,lon2){
  const d=Math.PI/180;
  const y=Math.sin((lon2-lon1)*d)*Math.cos(lat2*d);
  const x=Math.cos(lat1*d)*Math.sin(lat2*d)-Math.sin(lat1*d)*Math.cos(lat2*d)*Math.cos((lon2-lon1)*d);
  return (Math.atan2(y,x)/d+360)%360;
}
const COMPASS8=['N','NE','E','SE','S','SW','W','NW'];
const compass=deg=>COMPASS8[Math.round(deg/45)%8];
// wraps a unit token so it keeps its own spacing (see .u)
const U = s => `<span class="u">${s}</span>`;
const fmtMi = mi =>
  mi<0.5?Math.round(mi*5280)+U(' ft'):mi<100?mi.toFixed(1)+U(' mi'):Math.round(mi)+U(' mi');

// ADS-B: airplanes.live primary, adsb.fi fallback (readsb /v2 schema)
const ADSB_HOSTS=['https://api.airplanes.live/v2','https://opendata.adsb.fi/api/v2'];
async function adsb(path){
  let err;
  for(const h of ADSB_HOSTS){   // 9s/host: fall to the next mirror before a stuck one hangs the load
    try{ return await getJSON(h+path,{timeout:9000}); }catch(e){ err=e; }
  }
  throw err||new Error('all ADS-B hosts unreachable');   // treated as error → keep existing planes, retry
}
// ADS-B's /point radius is in NAUTICAL MILES (the API's unit) — MI_TO_NM converts our
// statute-mile DATA radius at the wire, the only place NM appears.
const MI_TO_NM=0.868976, ADSB_MAX_NM=100;
// Fetch radius = the fixed #3 DATA RADIUS (DATA_MI), centred on your GPS position, so
// every plane in the area is pulled. Floor 15 nm covers the 5 mi net; 100 nm cap is a guard.
function adsbRadiusNm(){
  return Math.min(ADSB_MAX_NM,Math.max(15,Math.ceil(DATA_MI*MI_TO_NM)));
}
async function adsbViewport(){
  // Centred on YOUR GPS position (only ever called after a fix).
  const j=await adsb('/point/'+USER.lat.toFixed(3)+'/'+USER.lon.toFixed(3)+'/'+adsbRadiusNm());
  return {ac:j.ac||[]};
}
// Rotorcraft ICAO type designators (Doc 8643). The feed's `t` field is the RELIABLE signal —
// the ADS-B emitter category (A7) is frequently sent late or not at all, which is why a Bell
// 407 flickered plane→heli and a Robinson R66 stayed a plane (their descriptions are just
// "BELL 407" / "ROBINSON R66" — no "helicopter"/"rotor" word to catch either).
const HELI_TYPES=new Set([
  'R22','R44','R66',                                                                   // Robinson
  'B06','B06T','B47','B204','B205','B206','B212','B214','B222','B230','B407','B412',    // Bell
  'B427','B429','B430','B505','B525','UH1',
  'AS32','AS3B','AS50','AS55','AS65','SA30','ALO3','LAMA','GAZL','PUMA',                 // Airbus/Aerospatiale
  'EC20','EC25','EC30','EC35','EC45','EC55','EC75',
  'H120','H125','H130','H135','H140','H145','H155','H160','H175','H215','H225',
  'A109','A119','A129','A139','A149','A169','A189','AW09','EH10',                       // Leonardo/Agusta
  'S51','S55','S58','S61','S64','S65','S70','S76','S92','H53','H60','S300','S330',       // Sikorsky
  'MD52','H500','H600','EXPL','H269','S269','EN28','EN48','CBRA',                       // MD/Schweizer/Enstrom/Guimbal
  'KA26','KA32','KA50','KA52','MI2','MI8','MI17','MI24','MI26','MI28','MI34','MI38','NH90','LYNX' // Kamov/Mil/others
]);
const HELI_NAME=/helicopter|rotorcraft|\brotor|robinson|sikorsky|eurocopter|\bagusta|kamov|\bbell\s*\d/i;
const isHeli=a=> a.category==='A7'
  || HELI_TYPES.has(String(a.t||'').trim().toUpperCase())
  || HELI_NAME.test(a.desc||'');
// ONE property builder for every ADS-B contact (civil + military feeds), so the
// card / chart / AGL fields never drift apart between feeds.
function acProps(a){
  return {heli:isHeli(a)?1:0,
    flight:String(a.flight||a.r||a.hex||'?').trim(),
    reg:String(a.r||'').trim(),   // tail registration, a line-2 fallback
    type:a.t||'?',desc:a.desc||'',op:a.ownOp||'',
    alt:a.alt_baro??a.alt_geom??'?',
    // barometric altitude kept separate so AGL can QNH-correct it; null if only geometric
    altBaro:(typeof a.alt_baro==='number'?a.alt_baro:null),
    spd:a.gs!=null?Math.round(a.gs):'?',
    hex:a.hex||'',mil:a.dbFlags&1?1:0};
}
const acFeature=a=>({type:'Feature',
  geometry:{type:'Point',coordinates:[a.lon,a.lat]},
  properties:acProps(a)});
function acFeatures(j){
  return (j.ac||[]).filter(a=>a.lat!=null&&a.lon!=null).map(acFeature);
}
// features last loaded for a layer id (from our own LAYER_STATE — the stored fetch result)
function featsIn(id){const st=LAYER_STATE[id];return (st&&st.features)||[];}
// ArcGIS envelope (west,south,east,north) for the airspace/NPS pulls — a fixed
// DATA_MI (#3) box centred on your GPS position, so airspace covers the same 25 mi as
// the aircraft pull, identical on every device. Only called after a fix. Refetched when
// you move (see refetchNearbyOnMove). A box circumscribes the 25 mi circle; the SITREP
// then cards zones within the 25 mi radius, exactly like aircraft.
function viewEnv(){
  const {dLat,dLon}=geoDeltas(DATA_MI,USER.lat);
  return [USER.lon-dLon,USER.lat-dLat,USER.lon+dLon,USER.lat+dLat].map(n=>n.toFixed(3)).join(',');
}
// polygon feature -> a representative [lon,lat] (first vertex)
function polyPt(f){
  const g=f.geometry; if(!g) return null;
  if(g.type==='Point') return g.coordinates;
  if(g.type==='Polygon') return g.coordinates[0] && g.coordinates[0][0];
  if(g.type==='MultiPolygon') return g.coordinates[0] && g.coordinates[0][0] && g.coordinates[0][0][0];
  return null;
}
// nearest point on a polygon's boundary to (lon,lat) — projected onto the nearest
// edge segment (not just a vertex); drives a zone's distance/direction and range test.
// Planar lon/lat with a cos(lat) x-scale. Returns {pt:[lon,lat], mi} (statute miles).
function nearestEdge(f,lon,lat){
  const g=f.geometry; if(!g) return null;
  const rings=g.type==='Polygon'?g.coordinates:g.type==='MultiPolygon'?g.coordinates.flat():[];
  const k=Math.cos(lat*Math.PI/180)||1e-6;
  let best=null,bd=Infinity;
  rings.forEach(r=>{ for(let i=0;i+1<r.length;i++){
    const ax=(r[i][0]-lon)*k, ay=r[i][1]-lat, bx=(r[i+1][0]-lon)*k, by=r[i+1][1]-lat;
    const dx=bx-ax, dy=by-ay, l2=dx*dx+dy*dy;
    let t=l2>0?-(ax*dx+ay*dy)/l2:0; t=t<0?0:t>1?1:t;
    const cx=ax+t*dx, cy=ay+t*dy, d2=cx*cx+cy*cy;
    if(d2<bd){ bd=d2; best=[lon+cx/k, lat+cy]; }
  }});
  return best?{pt:best,mi:havMi(lat,lon,best[1],best[0])}:null;
}
// point-in-polygon (ray casting) — e.g. is a location inside an SPC outlook risk area
function pointInRing(lon,lat,ring){
  let inside=false;
  for(let i=0,j=ring.length-1;i<ring.length;j=i++){
    const xi=ring[i][0],yi=ring[i][1],xj=ring[j][0],yj=ring[j][1];
    if(((yi>lat)!==(yj>lat)) && (lon<(xj-xi)*(lat-yi)/(yj-yi)+xi)) inside=!inside;
  }
  return inside;
}
function pointInFeature(f,lon,lat){
  const g=f.geometry; if(!g) return false;
  const polys=g.type==='Polygon'?[g.coordinates]:g.type==='MultiPolygon'?g.coordinates:[];
  for(const poly of polys){
    if(poly[0] && pointInRing(lon,lat,poly[0]) && !poly.slice(1).some(h=>pointInRing(lon,lat,h))) return true;
  }
  return false;
}
const escapeHtml =s => String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));


/* =====================================================================
   1. RADAR TILE SOURCE — NEXRAD base-reflectivity mosaic (Iowa State Mesonet,
   keyless). There is no map, so these tiles are never DRAWN — the precipitation
   gate SAMPLES them on an offscreen canvas (see sampleRadarPrecip). A ?bust query
   pulls a fresh mosaic once per RADAR_BUST_S window (the source updates ~5 min);
   the sampler's memo keys on that bust value, so advancing it invalidates old scans.
   ===================================================================== */
const RADAR_TILE_URL='https://mesonet.agron.iastate.edu/cache/tile.py/1.0.0/nexrad-n0q-900913/{z}/{x}/{y}.png';
const RADAR_BUST_SECONDS=60;
const currentRadarBust=()=>Math.floor(Date.now()/(RADAR_BUST_SECONDS*1000));
let radarBustWindow=currentRadarBust();
// advance the shared bust window; the precip sampler's memo keys on it, so a new
// window simply invalidates the cached scans (there is nothing to redraw).
function refreshRadar(){ const b=currentRadarBust(); if(b!==radarBustWindow) radarBustWindow=b; }

// debug/test handle — modules attached as the app wires up (see boot)
window.__sitrep={};

/* =====================================================================
   2. DATA FEED DEFINITIONS
   Each feed is {id, refresh (sec), viewport?, loader}. loader() returns a GeoJSON
   FeatureCollection (or null = keep current); its features are STORED in LAYER_STATE for
   the SITREP and chart to read — there is no map, so nothing is drawn. viewport:true means
   the feed is scoped to your GPS area and refetches when you move. A loader throws on
   failure → the runtime keeps the last-good data and retries on a short backoff.
   ===================================================================== */
const LAYERS=[];
const defLayer=c=>LAYERS.push(c);
// your GPS position — {lat,lon} once fixed; acc = fix accuracy (m)
const USER={lat:null,lon:null,acc:null};

/* ---------------- Aircraft ----------------
   Every layer def is just {id, refresh, viewport?, loader}. The loader returns a
   GeoJSON FeatureCollection whose features the SITREP reads (there is no map).
   ONE layer, ONE /point pull — every aircraft in your area, civil and military alike.
   There is no military split: a plane is a plane (one white identity colour, one card
   shape, one traffic net); the dbFlags military bit only feeds the line-2 "military
   aircraft" fallback text. Emergency squawks get NO special treatment either — a plane
   in distress is a general aircraft, caught by the position-scoped pull like any other. */
defLayer({
  id:'nearair', refresh:REFRESH_S,
  viewport:true,   // scoped to your GPS area → refetched when you move + every pulse
  loader: async ()=>({type:'FeatureCollection',features:acFeatures(await adsbViewport())})
});


/* ---------------- Hazard / Environment ---------------- */
defLayer({
  // NOAA/NWS active alerts AT YOUR POINT (the API's ?point= filter does the containment
  // server-side — only alerts whose area covers you come back, a few KB instead of the
  // whole nationwide list). WARNINGS ONLY (no watches/advisories/statements). Keyless,
  // CORS *. Polygons where present (tornado / severe-tstorm / flash-flood / red-flag).
  id:'nws', refresh:15, viewport:true,   // point-scoped → waits for a fix, refetches on move
  loader: async ()=>{
    const j=await getJSON('https://api.weather.gov/alerts/active?point='
      +USER.lat.toFixed(3)+','+USER.lon.toFixed(3),{timeout:20000});
    const feats=[];
    (j.features||[]).forEach(f=>{
      const p=f.properties||{}, ev=(p.event||'').trim();
      if(!/warning$/i.test(ev)) return;   // WARNINGS only — excludes Watch/Advisory/Statement
      if(!f.geometry) return;             // needs an area polygon to test containment
      feats.push({type:'Feature',geometry:f.geometry,properties:{
        event:ev,severity:p.severity||'',area:p.areaDesc||'',ends:p.ends||p.expires||''}});
    });
    return {type:'FeatureCollection',features:feats};
  }
});

defLayer({
  // SPC Day-1 Convective Outlook (US): where severe weather is expected today
  // (categorical risk + tornado-prob polygons). Keyless. Loads so the SITREP can flag
  // "you're in an Enhanced/tornado area".
  id:'spc', refresh:900,
  loader: async ()=>{
    const base='https://www.spc.noaa.gov/products/outlook/';
    const [cat,torn]=await Promise.all([
      getJSON(base+'day1otlk_cat.nolyr.geojson',{timeout:20000}).catch(()=>null),
      getJSON(base+'day1otlk_torn.nolyr.geojson',{timeout:20000}).catch(()=>null)]);
    const RANK={TSTM:0,MRGL:1,SLGT:2,ENH:3,MDT:4,HIGH:5};
    const feats=[];
    ((cat&&cat.features)||[]).forEach(f=>{ const p=f.properties||{}; if(!f.geometry) return;
      feats.push({type:'Feature',geometry:f.geometry,properties:{kind:'cat',
        code:p.LABEL||'',label:p.LABEL2||p.LABEL||'',rank:RANK[p.LABEL]||0}}); });
    ((torn&&torn.features)||[]).forEach(f=>{ const p=f.properties||{}; if(!f.geometry) return;
      feats.push({type:'Feature',geometry:f.geometry,properties:{kind:'torn',
        code:p.LABEL||'',label:p.LABEL2||p.LABEL||'',sig:/SIGN/i.test(p.LABEL||'')}}); });

// airspace FLOOR in feet: SFC/blank/0 → 0; FL180 → 18000; a number → that; else 0
// (conservative). Used to drop zones that begin above the drone band.
function floorFt(v){
  if(v==null) return 0;
  const s=String(v).trim().toUpperCase();
  if(s===''||/^(SFC|SURF|GND|GROUND|0)$/.test(s)) return 0;
  const fl=s.match(/FL\s*0*(\d+)/); if(fl) return +fl[1]*100;
  const n=parseFloat(s.replace(/[, ]/g,''));
  return isFinite(n)?n:0;
}

defLayer({
  // FAA AIRSPACE — the zones that gate low drone flight, listed on the SITREP. Keyless FAA
  // ArcGIS: controlled airspace (B/C/D + surface-E2), national-defense TFRs (ceiling→0), low
  // SUA, NSUFR, stadiums. Each feature carries a per-class identity colour (_col) used to
  // tint its card headline. Scoped to your GPS area, refetched when you move. This listing is
  // CONTEXT only — the canifly gate runs its own strict point-buffer queries (getLaancCeil +
  // getDefense), so a soft-failing feed here never understates a no-fly.
  // refresh:900 — TFRs/stadium events are time-sensitive, so a STATIONARY session still
  // re-pulls the listing every 15 min (the verdict-critical defense gate re-checks even
  // faster via getDefense; this keeps the cards from fossilising too).
  id:'airspace', viewport:true, refresh:900,
  loader: async ()=>{
    const env=viewEnv();
    // maxAllowableOffset generalises the geometry server-side (~440 m) — the SITREP only needs
    // nearest-edge distance, so exact vertices don't matter, and it roughly halves the payload
    // over the 25 mi box (a dense Class-B metro drops from ~2.2 MB to ~1 MB) so the query
    // lands well inside its timeout instead of failing on a slow connection.
    const q=(svc,fields,where)=>`https://services6.arcgis.com/ssFJjBXIUyZDrSYZ/ArcGIS/rest/services/${svc}/FeatureServer/0/query`
      +`?geometry=${env}&geometryType=esriGeometryEnvelope&inSR=4326`
      +`&spatialRel=esriSpatialRelIntersects&returnGeometry=true&maxAllowableOffset=0.004&outFields=${fields}`
      +(where?`&where=${encodeURIComponent(where)}`:'')+`&f=geojson`;
    // five feeds. Class_Airspace is filtered server-side to B/C/D + surface-E2 so the huge
    // Class-E5 never hits the wire; it's the heavy one, so it gets the longest timeout.
    const [cls,def,sua,nsufr,stad]=await Promise.all([
      getJSON(q('Class_Airspace','NAME,CLASS,LOCAL_TYPE',"CLASS IN ('B','C','D') OR LOCAL_TYPE='CLASS_E2'"),{timeout:10000}).catch(()=>null),
      getJSON(q('National_Defense_Airspace_TFR_Areas','NAME'),{timeout:9000}).catch(()=>null),
      getJSON(q('Special_Use_Airspace','NAME,TYPE_CODE,LOWER_VAL'),{timeout:10000}).catch(()=>null),
      getJSON(q('Part_Time_National_Security_UAS_Flight_Restrictions','Facility,Floor'),{timeout:9000}).catch(()=>null),
      getJSON(q('Stadiums','NAME'),{timeout:9000}).catch(()=>null)]);
    // A feed "failed" if the fetch threw (null) OR it came back as an FAA error-in-200 /
    // malformed body — these ArcGIS services routinely answer HTTP 200 with {error:{…}} or a
    // non-array features under load, which is NOT "no airspace here". Treat that as a failure
    // so the runtime keeps the last-good listing and the DATA warning up, and RETRIES, rather
    // than clearing to empty. If the PRIMARY (Class_Airspace) feed is bad — or every feed is —
    // throw. A genuine empty area returns a clean {features:[]}, so it's kept (nothing to show)
    // without tripping this; minor-feed blips still fail soft.
    const bad=r=>r==null||r.error||!Array.isArray(r.features);
    if(bad(cls) || [cls,def,sua,nsufr,stad].every(bad)) throw new Error('airspace feeds unreachable');
    const feats=[];
    const push=(geom,props)=>{ if(geom) feats.push({type:'Feature',geometry:geom,properties:props}); };
    // controlled airspace around airports (advisory, aeronautical blue/magenta)
    const CTRL={B:'#5b8def',C:'#c06ad0',D:'#5b8def'};
    ((cls&&cls.features)||[]).forEach(f=>{ const p=f.properties||{},cl=p.CLASS;
      if(!(/^[BCD]$/.test(cl)||p.LOCAL_TYPE==='CLASS_E2')||!f.geometry) return;
      push(f.geometry,{sev:'ctrl',cls:cl,code:cl,name:p.NAME||'',_col:CTRL[cl]||'#c06ad0'}); });
    // national-defense TFR zones — hard no-fly. Airspace fills use a COOL identity palette
    // kept OFF the green/yellow/red verdict colours (violet = no-fly · cyan = conditional ·
    // blue/magenta = controlled · steel = advisory); severity is carried by the card position,
    // card position and clock, not the fill hue.
    ((def&&def.features)||[]).forEach(f=>push(f.geometry,{sev:'hard',cls:'DEF',code:'DEF',
      name:(f.properties&&f.properties.NAME)||'',_col:'#7c5cff'}));
    // special-use airspace, right-sized to a drone at ≤400 ft:
    //   • Prohibited (P)        → HARD no-fly (red)
    //   • Restricted (R)        → CONDITIONAL no-fly (yellow, only when active)
    //   • MOA/Warning/Alert/Danger → ADVISORY (they don't restrict a Part-107
    //     drone — military/hazard activity to be aware of, not a no-fly)
    // zones whose FLOOR is above the drone band (400 ft) are dropped — irrelevant here
    // hard→violet · conditional→cyan · advisory→steel — none in the verdict (R/A/G) palette
    const SUA={P:['hard','PROH','#7c5cff'],R:['caution','RSTD','#22d3ee'],
      MOA:['advisory','MOA','#8fa3bf'],W:['advisory','WARN','#8fa3bf'],A:['advisory','ALRT','#8fa3bf'],D:['advisory','DNGR','#8fa3bf']};
    ((sua&&sua.features)||[]).forEach(f=>{ const p=f.properties||{},t=SUA[p.TYPE_CODE]; if(!t||!f.geometry) return;
      if(floorFt(p.LOWER_VAL)>SPEC.regFt) return;   // starts above the drone band → irrelevant
      push(f.geometry,{sev:t[0],cls:p.TYPE_CODE,code:t[1],name:p.NAME||'',_col:t[2]}); });
    // part-time national-security UAS zones — hard no-fly for drones (violet)
    ((nsufr&&nsufr.features)||[]).forEach(f=>{ const p=f.properties||{};
      if(floorFt(p.Floor)>SPEC.regFt) return;
      push(f.geometry,{sev:'hard',cls:'NSUFR',code:'NSUF',
        name:p.Facility||'security zone',_col:'#7c5cff'}); });
    // stadiums → 3 nm (3.45 statute mi) rings (the 99.7 event TFR), conditional (cyan, not verdict yellow)
    ((stad&&stad.features)||[]).forEach(f=>{ const g=f.geometry; if(!g||g.type!=='Point') return;
      push({type:'Polygon',coordinates:[circleRing(g.coordinates[1],g.coordinates[0],3.452,48)]},
        {sev:'caution',cls:'STDM',code:'STDM',name:(f.properties&&f.properties.NAME)||'stadium',_col:'#22d3ee'}); });
    return {type:'FeatureCollection',features:feats};
  }
});

defLayer({
  // NATIONAL PARK SERVICE lands — NPS prohibits operating a drone from within a unit, so a
  // preflight treats it as hard no-fly. Keyless NPS ArcGIS, scoped to your GPS area;
  // boundary generalised ~150 m.
  id:'nps', viewport:true,
  loader: async ()=>{
    const env=viewEnv();
    const url='https://services1.arcgis.com/fBc8EJBxQRMcHlei/ArcGIS/rest/services/NPS_Land_Resources_Division_Boundary_and_Tract_Data_Service/FeatureServer/2/query'
      +`?geometry=${env}&geometryType=esriGeometryEnvelope&inSR=4326`
      +`&spatialRel=esriSpatialRelIntersects&returnGeometry=true&maxAllowableOffset=0.0015`
      +'&outFields=UNIT_NAME,UNIT_TYPE&f=geojson';
    const j=await getJSON(url,{timeout:15000});
    const feats=[];
    (j.features||[]).forEach(f=>{ if(!f.geometry) return; const p=f.properties||{};
      feats.push({type:'Feature',geometry:f.geometry,properties:{
        name:p.UNIT_NAME||'',utype:p.UNIT_TYPE||''}}); });
    return {type:'FeatureCollection',features:feats};
  }
});

/* =====================================================================
   3. FEED RUNTIME — per-feed fetch state + the unified 5 s refresh pulse
   ===================================================================== */
const LAYER_STATE={};
// SITREP re-reads layer data every refresh — debounced so a burst of layer updates
// recomputes once. The chart repaints FIRST (its TRFC cells read the aircraft layers)
// so the SITREP tick can colour its title from the chart's fresh NOW column.
let sitrepRefreshT=null;
function scheduleSitrep(){ clearTimeout(sitrepRefreshT); sitrepRefreshT=setTimeout(()=>{
  try{if(FLY.data)flyPaint();}catch(e){console.warn('[fly-paint]',e);}
  try{sitrepTick();}catch(e){console.warn('[sitrep]',e);} },300); }

// Ground elevation (ft AMSL) for AGL = alt − ground, cached by ~0.7 mi cell.
// groundElevFt() is a synchronous read (null until known); ensureGroundElev() kicks the
// fetch. Terrain is sampled UNDER EACH PLANE so AGL stays right over rolling ground.
// A FAILED lookup is NEVER cached (a poisoned 0 would silently disable AGL in high
// terrain) — it backs off and retries on a later tick.
const _elevCache={}; let _elevBusy=false, _elevFailAt=0, _elevAt=0;
const ELEV_RETRY_MS=15000;
// Cooldown between elevation fetches — without it, cells that never cache (plane over
// water → non-finite elevation) would loop-fetch and rate-limit the weather pull (same host).
const ELEV_COOLDOWN_MS=20000;
const elevKey=(la,lo)=>la.toFixed(2)+','+lo.toFixed(2);
function groundElevFt(la,lo){
  const v=_elevCache[elevKey(la,lo)];
  return v==null?null:v;
}
// Pull elevation for any uncached [lat,lon] cells in one batched request (deduped +
// capped), then re-run the SITREP so AGL fills in.
function ensureGroundElev(pts){
  if(_elevBusy || Date.now()-_elevFailAt<=ELEV_RETRY_MS || Date.now()-_elevAt<ELEV_COOLDOWN_MS) return;
  const need=[], seen=new Set();
  for(const p of pts){ if(!p||!isFinite(p[0])||!isFinite(p[1])) continue;
    const k=elevKey(p[0],p[1]); if((k in _elevCache)||seen.has(k)) continue;
    seen.add(k); need.push([p[0],p[1],k]); }
  if(!need.length) return;
  const batch=need.slice(0,90);
  _elevBusy=true; _elevAt=Date.now();
  const lats=batch.map(n=>n[0].toFixed(4)).join(',');
  const lons=batch.map(n=>n[1].toFixed(4)).join(',');
  getJSON(`https://api.open-meteo.com/v1/elevation?latitude=${lats}&longitude=${lons}`,{timeout:9000})
    .then(d=>{ const arr=d&&Array.isArray(d.elevation)?d.elevation:null;
      if(arr&&arr.length===batch.length){
        batch.forEach((n,idx)=>{ const m=arr[idx];
          if(typeof m==='number'&&isFinite(m)) _elevCache[n[2]]=m*M_TO_FT; }); }
      else _elevFailAt=Date.now(); })
    .catch(()=>{ _elevFailAt=Date.now(); })
    .finally(()=>{ _elevBusy=false; scheduleSitrep(); });
}
// Local sea-level pressure [hPa] (≈ QNH) from the weather pull — converts ADS-B
// pressure altitude to true MSL. null until the first weather fetch lands.
let QNH_HPA=null;

// retry backoff while a layer is failing — short and bounded (1.5s, 3s, 4.5s, cap 6s) so a
// recovering feed is caught within seconds. Shared by the quickTimer and the pulse skip gate.
const failBackoffMs=n=>Math.min(6000,1500*n);

async function runLayer(cfg){
  const st=LAYER_STATE[cfg.id];
  // Generation token: a call only writes if it's still the newest, so overlapping
  // refreshes (move + tick) finishing out of order can't clobber fresh data.
  // st.loading lets the scheduler skip a layer that's still fetching.
  const myGen=++st.gen;
  st.loading=true; st.loadStart=Date.now();
  try{
    if(st.quickTimer){ clearTimeout(st.quickTimer); st.quickTimer=null; }
    // one quick in-loop retry (a single dropped connection often clears at once); a
    // persistent failure hands off to the fast quickTimer below rather than burning more
    // time here (these are small queries — recovery should be seconds, not tens of seconds)
    let lastErr=null;
    for(let attempt=0;attempt<2;attempt++){
      try{
        const fc=await cfg.loader();
        if(myGen!==st.gen) return;               // superseded by a newer refresh — drop this result
        // a null result = "no update" — keep what's loaded. Features are STORED for the
        // SITREP/chart to read; there is no map layer to push them to.
        if(fc) st.features=fc.features||[];
        st.fails=0; st.failSince=0; st.everLoaded=true;   // recovered / printed at least once
        scheduleSitrep();   // SITREP re-reads the fresh data as part of the refresh
        return;
      }catch(e){
        lastErr=e;
        if(myGen!==st.gen) return;                // a newer refresh owns the layer now
        if(attempt<1){
          await new Promise(r=>setTimeout(r,500));
          if(myGen!==st.gen) return;
        }
      }
    }
    // Failed this cycle — NEVER discard the data; keep features and retry on a SHORT bounded
    // backoff (1.5→6s) so a recovering feed is caught within a few seconds (a cadence-less
    // viewport layer like NPS has no pulse retry — this quickTimer is its only retry path).
    st.fails=(st.fails||0)+1; st.failAt=Date.now();   // the pulse backs off while failing
    if(!st.failSince) st.failSince=Date.now();          // first fail of a run → start the sustained clock
    console.warn('[layer '+cfg.id+']',lastErr&&lastErr.message);
    if(!st.quickTimer){
      const delay=failBackoffMs(st.fails);
      st.quickTimer=setTimeout(()=>{ st.quickTimer=null; runLayer(cfg); },delay);
    }
  } finally {
    if(myGen===st.gen) st.loading=false;
  }
}

// ---- unified refresh: ONE pulse() drives every data kick. Scheduled pulls the DUE
//      dynamic layers on their cadence; forced pulls every started layer. Both then
//      kick the chart, weather and radar. NPS (cadence-less) doesn't ride the pulse —
//      it refetches only when you move (see refetchNearbyFeeds); park boundaries don't
//      change mid-session. ----
// A stuck/slow mirror could hold st.loading through the whole retry chain (tens of
// seconds), freezing the aircraft mid-air. Once a load runs past this, a pulse may
// start a FRESH attempt — the generation token drops the stale one.
const LOAD_STALL_MS=20000;   // one full two-host ADS-B pass (2 × 9 s timeouts) + margin; a healthy load is a second or two
let refreshBase=Date.now(), pulseCount=0;
function pulse(force){
  if(!force) pulseCount++;   // forced pulls don't shift the slow-layer cadence grid
  LAYERS.forEach(cfg=>{
    const st=LAYER_STATE[cfg.id];
    if(!st||!st.started) return;
    // position-scoped loaders read USER.lat/lon — before the first fix there is nothing to
    // query (and running one anyway would just churn the failure/retry machinery)
    if(cfg.viewport && USER.lat==null) return;
    if(st.loading && Date.now()-(st.loadStart||0)<LOAD_STALL_MS) return;   // fetching, not yet stalled
    if(!force){
      if(!(cfg.refresh>0)) return;
      // refresh every N pulses (N = refresh/REFRESH_S), grid-aligned so a moveend
      // that reset the countdown can't push a layer's refresh past a whole cycle
      const everyN=Math.max(1,Math.round(cfg.refresh/REFRESH_S));
      if(pulseCount%everyN!==0) return;
      // a failing feed backs off on the shared short window; the quickTimer owns the retry
      if(st.fails && Date.now()-(st.failAt||0)<failBackoffMs(st.fails)) return;
    }
    runLayer(cfg);
  });
  // the chart rides the same pulse; each of its inputs self-throttles inside
  // flyRefresh()/loadWeather() on its own natural cadence
  flyRefresh(); loadWeather(force); refreshRadar();
  refreshBase=Date.now();   // restart the auto-refresh countdown from zero
}
// The 1 s heartbeat fires a data pulse every REFRESH_S — but NOT while the page is hidden
// (backgrounded tab / locked phone): there's no point fetching aircraft, weather and airspace
// that no one can see, and it wastes battery + mobile data. Coming back to a visible page
// pulses at once (see the visibilitychange handler in boot) so you never read stale data.
function refreshTick(){ if(!document.hidden && Date.now()-refreshBase>=REFRESH_S*1000) pulse(); }

// initialise per-layer runtime state (features + fetch bookkeeping). There is no map, so
// nothing is drawn — the loaders just populate LAYER_STATE[id].features for the SITREP.
function initLayers(){
  LAYERS.forEach(cfg=>{
    LAYER_STATE[cfg.id]={features:[],started:false,everLoaded:false,
      gen:0,quickTimer:null,fails:0,failSince:0,loading:false,loadStart:0};
  });
}

/* =====================================================================
   4. WEATHER FORECAST (SITREP card)
   Open-Meteo — keyless. Kp is NOT fetched here; the SPACE WEATHER card reads the
   chart's own kpNow so they always agree.
   ===================================================================== */
// ---- WEATHER FORECAST (Open-Meteo, keyless) — the always-present bottom SITREP card.
//      Refetched when the GPS position moves >1.25 mi or the reading ages past ~5 min.
//      WMO codes map to emoji + plain-english condition. ----
let WX=null, wxLat=null, wxLon=null, wxAt=0, wxBusy=false;
const WMO={0:['☀️','clear'],1:['🌤️','mostly clear'],2:['⛅','partly cloudy'],3:['☁️','overcast'],
  45:['🌫️','fog'],48:['🌫️','icy fog'],
  51:['🌦️','light drizzle'],53:['🌦️','drizzle'],55:['🌧️','heavy drizzle'],56:['🌧️','freezing drizzle'],57:['🌧️','freezing drizzle'],
  61:['🌧️','light rain'],63:['🌧️','rain'],65:['🌧️','heavy rain'],66:['🌧️','freezing rain'],67:['🌧️','freezing rain'],
  71:['🌨️','light snow'],73:['🌨️','snow'],75:['🌨️','heavy snow'],77:['🌨️','snow grains'],
  80:['🌦️','light showers'],81:['🌧️','showers'],82:['⛈️','heavy showers'],85:['🌨️','snow showers'],86:['🌨️','snow showers'],
  95:['⛈️','thunderstorm'],96:['⛈️','storm, hail'],99:['⛈️','storm, hail']};
async function loadWeather(force){
  if(wxBusy || USER.lat==null) return;   // GPS-located only
  if(!force && WX && wxLat!=null && havMi(wxLat,wxLon,USER.lat,USER.lon)<WX_MOVE_MI && Date.now()-wxAt<300000) return;
  wxBusy=true;
  try{
    // Pull wind straight in MPH (the unit we display + gate in) — the chart does too — so the
    // card and the chart's SFC wind read off the identical value with a single rounding. (We
    // used to request knots and convert, which double-rounded and showed a 1 mph discrepancy.)
    const u=`https://api.open-meteo.com/v1/forecast?latitude=${USER.lat.toFixed(3)}&longitude=${USER.lon.toFixed(3)}`
      +`&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m`
      +`&daily=temperature_2m_max,temperature_2m_min`
      +`&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=auto&forecast_days=1`;
    const d=await getJSON(u,{timeout:12000});
    const cur=d.current||{}, day=d.daily||{};
    WX={tempF:cur.temperature_2m, feelsF:cur.apparent_temperature, code:cur.weather_code,
        windMph:cur.wind_speed_10m, windDir:cur.wind_direction_10m,
        hiF:(day.temperature_2m_max||[])[0], loF:(day.temperature_2m_min||[])[0]};
    wxLat=USER.lat; wxLon=USER.lon; wxAt=Date.now();
  }catch(e){ /* keep the last-good WX */ }
  finally{ wxBusy=false; scheduleSitrep(); }
}
// One SITREP card is a NAMED record, not a positional tuple, so the sort/render code reads
// fields instead of magic indices. cls: '' / 'alert' (yellow) / 'danger' (red) — DISPLAY
// colour, derived from the gate table's severity (SEV_CLS / the gate classifiers), never
// decided ad hoc. hazard: RANKING only — promotes the card into the red/yellow warning
// sections; a card NEVER votes on the verdict (that is evalGates' job alone). col: an
// explicit headline hex (airspace / aircraft identity colour). mi: range in statute miles
// for the in-category sort (set after construction). Absent fields are undefined.
const mkCard=(cls,ic,l1,l2,l3,hazard,col)=>({cls,ic,l1,l2,l3,hazard,col});
// THE ONE weather card — a single feed, a single card. It changes rank/colour/text
// with severity: a weather GATE limiting NOW promotes it to a top hazard (red grounded /
// yellow reduced-ceiling) with conditions folded onto line 3; otherwise it's the routine
// bottom conditions card ('stale' = last-good yellow, 'down' = never loaded, red+promoted).
// Returns {pin, card}: pin floats it up with hazards.
function wxCard(wxState, wn, kpNow){
  const rnd=n=>n==null?null:Math.round(n);
  // compact conditions line — reused as line 3 of a promoted card so temp/sky/wind show once
  const condLine=()=>{
    if(!WX) return '';
    const [,d]=WMO[WX.code]||['','—'];
    const t=rnd(WX.tempF), w=rnd(WX.windMph), wd=WX.windDir!=null?compass(WX.windDir)+' ':'';
    return (t!=null?t+'° · ':'')+d.toUpperCase()+(w!=null?' · '+wd+w+U(' mph'):'');
  };
  // feed totally down — chart can't compute; pin it so the outage is unmissable
  if(wxState==='down') return {pin:true, card:mkCard('danger','🌡️','WEATHER UNAVAILABLE',
    'feed down · chart can\'t compute','retrying every 5 s',true)};
  // The weather card's headline is driven by the chart's NOW binding reason (wn.reason),
  // so it can NEVER show a different gate than the chart cell. Only the WEATHER reasons
  // promote it; FAA / TRFC / Kp / restriction groundings are shown by their own cards, so
  // for those the weather card stays the routine bottom card (no mismatched hazard).
  if(wn){
    const wxCap=Math.min(wn.windCeilFt,wn.cloudCapFt);   // weather-only ceiling (ft)
    // headline per chart reason. GUST/VIS/PCPN are groundings; WIND (winds aloft) / SKY
    // (cloud) are the weather CAPS — the same codes the chart prints in the cell.
    const WXHEAD={
      PCPN:['⛈️','PRECIPITATION','radar echo within '+RED_MI+U(' mi')],
      GUST:['💨','HIGH WIND','gust '+Math.round(wn.gustMph)+U(' mph')+' · max '+LIM.wind],
      WIND:['💨','HIGH WIND',Math.round(wn.windPeakMph)+U(' mph')+' aloft · max '+LIM.wind],
      VIS: ['🌫️','LOW VISIBILITY',(wn.visSM!=null?wn.visSM.toFixed(1):'—')+U(' SM')+' · min 3'+U(' SM')],
      SKY: ['☁️','LOW CLOUD','base '+Math.round(wn.cloudCapFt+SPEC.clrFt)+U(' ft')+' · need 500 clr'],
    };
    // grounded by a weather reason → red, headline exactly matching the chart cell
    if(wn.grounded && WXHEAD[wn.reason]){
      const [ic,head,sub]=WXHEAD[wn.reason];
      return {pin:true, card:mkCard('danger',ic,head,sub,condLine(),true)};
    }               
    // reduced ceiling (not grounded) where WEATHER is the binding cap → yellow. Show the
    // ACTUAL highest altitude you can fly (floored to the 50 ft chart step, so the card and the
    // chart's top green row always agree), and — for cloud — the cloud BASE, so "max fly 300 ft"
    // is never mistaken for the cloud height. Cloud limits fly to 500 ft below the base.
    if(!wn.grounded && (wn.reason==='WIND'||wn.reason==='SKY') && wxCap<SPEC.regFt){
      const wind=wn.reason==='WIND';
      const flyMax=Math.max(0,Math.floor(wxCap/50)*50);
      const why=wind ? 'winds aloft over max'
                     : 'cloud base '+Math.round(wn.cloudCapFt+SPEC.clrFt)+U(' ft');
      return {pin:true, card:mkCard('alert', wind?'💨':'☁️', wind?'HIGH WIND ALOFT':'LOW CLOUD',
        'max fly '+flyMax+U(' ft')+' · '+why, condLine(), true)};
    }
    // PRECIPITATION NEARBY: an echo within the 5 mi BUFFER ring but not yet grounding — yellow
    if(wn.precipInbound){
      return {pin:true, card:mkCard('alert','🌧️','PRECIPITATION NEARBY','radar echo within '+BUFFER_MI+U(' mi'),condLine(),true)};
    }
  }
  // no gate — routine conditions card at the bottom (neutral / yellow-if-stale)
  if(!WX) return {pin:false, card: wxState==='stale'   // no conditions loaded yet
    ? mkCard('alert','🌡️','WEATHER','feed unreachable','retrying every 5 s',true)
    : mkCard('','🌡️','WEATHER','ACQUIRING FORECAST…','',false)};
  const [emoji,desc]=WMO[WX.code]||['🌡️','—'];
  const t=rnd(WX.tempF), f=rnd(WX.feelsF), w=rnd(WX.windMph), hi=rnd(WX.hiF), lo=rnd(WX.loF);
  const l1=(t!=null?t+'°':'—')+' · '+desc.toUpperCase();
  const wd=WX.windDir!=null?compass(WX.windDir)+' ':'';
  const l2='WIND '+wd+(w!=null?w+U(' mph'):'—')+(f!=null?' · FEELS '+f+'°':'');
  // line 3: daily HIGH/LOW plus the current planetary Kp (from the chart's own kpNow, so
  // they agree). Kp is omitted when unknown — never shown as a bare "KP —".
  const l3=[hi!=null?'HIGH '+hi+'°':'', lo!=null?'LOW '+lo+'°':'',
    kpNow!=null?'KP '+Math.round(kpNow):''].filter(Boolean).join(' · ');
  if(wxState==='stale') return {pin:false, card:mkCard('alert',emoji,l1,l2,(l3?l3+' · ':'')+'STALE',true)};
  return {pin:false, card:mkCard('',emoji,l1,l2,l3,false)};
}
/* =====================================================================
   5. LOCATION — GPS ONLY (no IP fallback)
   watchPosition() streams fixes. The FIRST commits after a short settle window (or at
   once if a ping is accurate enough); later fixes update the position — smoothed while
   you're stationary, snapped on a real move. Moving far enough refetches the nearby
   feeds for your new area. If permission is denied or unavailable, geolocationDenied is
   set and the SITREP shows a permanent red LOCATION card. Position never leaves the
   browser except as anonymous lat/lon query params to the keyless data feeds.
   ===================================================================== */
let sitrepTimer=null;

// --- fix pipeline tuning ---
const FIRST_FIX_SETTLE_MS=3000;   // collect pings this long, then commit the most accurate
const GOOD_ACCURACY_M=65;         // a ping at least this accurate commits immediately
const ACC_WARN_M=50;              // GPS accuracy worse than this (m ≈ 164 ft) → yellow GPS card + hazard (promoted to alert section)
const POSITION_SMOOTHING=0.25;    // low-pass factor for stationary jitter (0 frozen … 1 raw)

// --- MOVEMENT REFRESH LADDER — the distance a GPS move must exceed to refresh each
//     product, in STATUTE MILES. Deliberately NOT one number: the tolerance scales with the
//     product's own spatial reach, so the farther-reaching the query, the farther you can
//     move before it is meaningfully stale. These are independent physical judgements — a
//     1 mi FAA point query goes stale per-foot faster than a 25 mi disk, which beats a
//     regional temp reading — NOT multiples of a single base. All compared via havMi().
//     (Aircraft ignore the ladder — they re-pull every 5 s pulse.)
const REAL_MOVE_MI=0.03;     // ~160 ft — below this a fix is jitter → low-pass smoothed; above → a real move, snap
const ASP_TOL_MI=0.1;        // ~530 ft — re-query the POINT products: FAA gate (LAANC + defense) + winds aloft
const REFETCH_MOVE_MI=0.5;   // 0.5 mi — recentre the 25 mi listing footprint (airspace / NPS) + kick the aircraft pull
const WX_MOVE_MI=1.25;       // 1.25 mi — refetch the regional conditions card (temp / feels / wind / hi-lo)

let firstFixCommitted=false, bestFirstPing=null, bestAccuracyM=Infinity;
let smoothedLat=null, smoothedLon=null;
let geolocationDenied=false, geoWatchId=null;
let lastFetchLat=null, lastFetchLon=null;

function commitFirstFix(){
  if(firstFixCommitted||!bestFirstPing) return;
  firstFixCommitted=true;
  smoothedLat=bestFirstPing.lat; smoothedLon=bestFirstPing.lon;
  setUserFix(bestFirstPing.lat,bestFirstPing.lon,bestFirstPing.acc);
}
function onGeoPing(lat,lon,acc){
  const a=acc==null?9999:acc;
  if(a<bestAccuracyM) bestAccuracyM=a;
  if(!firstFixCommitted){
    // the first ping arms the settle timer; every ping competes on accuracy; a sharp
    // enough ping commits at once (the timer only bites if none does)
    if(!bestFirstPing) setTimeout(commitFirstFix,FIRST_FIX_SETTLE_MS);
    if(!bestFirstPing || a<=bestFirstPing.acc) bestFirstPing={lat,lon,acc:a};
    if(a<=GOOD_ACCURACY_M) commitFirstFix();
    return;
  }
  if(a>Math.max(150,bestAccuracyM*3)) return;   // junk vs what this device can do → drop
  if(smoothedLat==null || havMi(smoothedLat,smoothedLon,lat,lon)>REAL_MOVE_MI){
    smoothedLat=lat; smoothedLon=lon;                                   // real move → snap
  } else {
    smoothedLat+=POSITION_SMOOTHING*(lat-smoothedLat);                  // stationary jitter → smooth
    smoothedLon+=POSITION_SMOOTHING*(lon-smoothedLon);
  }
  setUserFix(smoothedLat,smoothedLon,a);
}
function startGpsWatch(){
  if(geoWatchId!=null) return;
  if(!navigator.geolocation){ geolocationDenied=true; sitrepTick(); return; }
  try{
    geoWatchId=navigator.geolocation.watchPosition(
      pos=>onGeoPing(pos.coords.latitude,pos.coords.longitude,pos.coords.accuracy),
      err=>{ if(err&&err.code===1){ geolocationDenied=true; sitrepTick(); } },   // PERMISSION_DENIED
      {enableHighAccuracy:true,timeout:10000,maximumAge:5000});
  }catch(e){ geolocationDenied=true; sitrepTick(); }
}
function locate(){ startGpsWatch(); }

// Refetch the position-scoped feeds (aircraft/airspace/NPS) + the chart when you've
// moved far enough that the old 25 mi query no longer covers you well.
function refetchNearbyFeeds(){
  lastFetchLat=USER.lat; lastFetchLon=USER.lon;
  LAYERS.forEach(cfg=>{ if(cfg.viewport){ const st=LAYER_STATE[cfg.id];
    if(st&&st.started&&!st.loading) runLayer(cfg); } });
  flyRefresh();
}
// Adopt a committed GPS fix. The first fix kicks every feed around you; a later fix only
// refetches if you've genuinely moved. Always repaints the SITREP.
function setUserFix(lat,lon,acc){
  const first=USER.lat==null;
  USER.lat=lat; USER.lon=lon;
  if(acc!=null) USER.acc=acc;
  if(first){ refetchNearbyFeeds(); loadWeather(true); }
  else if(lastFetchLat==null || havMi(lastFetchLat,lastFetchLon,lat,lon)>=REFETCH_MOVE_MI){
    refetchNearbyFeeds();
  }
  sitrepTick();
}


// concise text, no "…" (CSS clips)
const cut=(s,n)=>escapeHtml(String(s==null?'':s).trim().slice(0,n));

// -- CATEGORY MODEL --------------------------------------------------------
// Each in-view feature becomes ONE SITREP card; a cfg maps a feed to a card shape
// (distance/direction added by the SITREP code):
//   cls(f) → '' / 'alert' (yellow) / 'danger' (red)   hazard : drives the title colour
//   head : line 1     sub : line 2     detail : appended to line 3 after the distance
// readsb reports alt_baro:'ground' for taxiing aircraft — show as a word, not "ground ft"
const ALT=f=>{const a=f.properties.alt;
  return a==='ground'?'on ground':a!=null&&a!=='?'?a+U(' ft'):'—';};
// aircraft line-2 cascade that never shows '?', blank or a repeat of line 1:
// description → ICAO type → operator → tail reg (if different) → generic by kind
const acSub=f=>{const p=f.properties;
  const type=p.type&&p.type!=='?'?p.type:'';
  const tail=String(p.flight||p.hex||'').trim().toUpperCase();
  const reg=p.reg&&p.reg.toUpperCase()!==tail?p.reg:'';
  const generic=p.mil?'military aircraft':(p.heli?'helicopter':'aircraft');
  return escapeHtml(p.desc||type||p.op||reg||generic);};
// aircraft card icon — ✈️ / 🚁 for every aircraft. All aircraft share ONE identity colour
// (white); the tail number on a card is tinted with it.
const AIRCRAFT_COLOR='#eaf1f8';
const acIcon=f=>f.properties.heli?'🚁':'✈️';
// tail-number label (callsign → hex → `fb`), clipped
const acTail=(f,n,fb)=>cut(f.properties.flight||f.properties.hex||fb||'?',n);
const CATS=[
  {src:'nws', hazard:true, icon:'⚠️',
   cls:f=>SEV_CLS[nwsSev(f)],   // the ONE classifier — the nws gate scores from it too
   head:f=>cut((f.properties.event||'warning').replace(/\s*warning$/i,'').toUpperCase(),22),
   sub:f=>cut(f.properties.area,26),
   // line 3 = when the warning ends (severity is already in the headline + colour)
   detail:f=>{const e=f.properties.ends,d=e&&new Date(e);
     return d&&!isNaN(d)?'til '+d.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'}):'';}},
  // ALL aircraft, military included — one card shape, one white identity colour
  // (yellow/red belong to the verdict, never to a plane's identity)
  {src:'nearair', hazard:false, air:true, icon:acIcon, cls:()=>'',
   head:f=>acTail(f,12),
   sub:acSub, detail:ALT},
  // FAA airspace restrictions that gate a drone — HARD no-fly or CONDITIONAL
  // (restricted/stadium, only when active). hazard:true. Colour follows the gate table:
  // RED only when you're INSIDE a hard zone (g.restrict grounds the chart with it);
  // a zone merely NEAR you — even a hard one — is the g.zones proximity caution (yellow).
  {src:'airspace', hazard:true, filter:f=>f.properties.sev==='hard'||f.properties.sev==='caution',
   // class glyph: 🛡️ defense · 🔒 security · ⛔ prohibited · 🏟️ stadium · ⚠️ restricted
   icon:f=>({DEF:'🛡️',NSUFR:'🔒',P:'⛔',STDM:'🏟️',R:'⚠️'}[f.properties.cls]
     ||(f.properties.sev==='hard'?'⛔':'⚠️')),
   cls:(f,inside)=>(inside&&f.properties.sev==='hard')?'danger':'alert',
   head:f=>({DEF:'DEFENSE AIRSPACE',NSUFR:'SECURITY NO-FLY',P:'PROHIBITED AREA',R:'RESTRICTED AREA',
     STDM:'STADIUM TFR'}[f.properties.cls]||'AIRSPACE'),
   sub:f=>cut(f.properties.name||'—',26),
   detail:f=>f.properties.sev==='hard'?'drones prohibited'
     :f.properties.cls==='STDM'?'no-fly during events':'no-fly if active'},
  // ADVISORY special-use airspace (MOA/Warning/Alert/Danger): does NOT restrict a
  // ≤400 ft drone — activity to be aware of, not a no-fly. hazard:false.
  {src:'airspace', hazard:false, filter:f=>f.properties.sev==='advisory', icon:'🎯', cls:()=>'',
   head:f=>({MOA:'MILITARY OPS AREA',W:'WARNING AREA',A:'ALERT AREA',D:'DANGER AREA'}[f.properties.cls]||'SPECIAL-USE AIRSPACE'),
   sub:f=>cut(f.properties.name||'—',26), detail:()=>'advisory only'},
  // Controlled airspace (Class B/C/D + surface E) — the AUTHORIZATION case: fly with
  // LAANC up to the grid ceiling, so the actual no-fly severity is carried by the FAA
  // CEILING card. hazard:false; cls 'alert' is a fallback tint if _col is missing.
  {src:'airspace', hazard:false, ctrl:true, filter:f=>f.properties.sev==='ctrl', icon:'🗼', cls:()=>'alert',
   head:f=>({B:'CLASS B AIRSPACE',C:'CLASS C AIRSPACE',D:'CLASS D AIRSPACE',E:'CLASS E AIRSPACE'}[f.properties.cls]||'AIRSPACE'),
   sub:f=>cut(f.properties.name||'—',26),
   detail:()=>'authorization (LAANC)'},
  // National Park Service lands — a drone no-fly (can't launch / land / operate).
  // RED when you're ON park land (g.restrict grounds); NEAR it = proximity caution.
  {src:'nps', hazard:true, icon:'🏞️', cls:(f,inside)=>inside?'danger':'alert',
   head:f=>cut(f.properties.name||'NPS LAND',20),
   sub:()=>'drones prohibited', detail:f=>cut(f.properties.utype||'NPS unit',18)},
];
// features of a category within rMi (statute miles) of the GPS position — a point by its
// radius, a polygon when the GPS position is inside it OR its nearest edge is within range
function catItems(cfg,lat,lon,rMi){
  let items=featsIn(cfg.src); if(cfg.filter) items=items.filter(cfg.filter);
  return items.filter(f=>{
    const g=f.geometry; if(!g) return false;
    if(g.type==='Point') return havMi(lat,lon,g.coordinates[1],g.coordinates[0])<=rMi;
    if(pointInFeature(f,lon,lat)) return true;
    const ne=nearestEdge(f,lon,lat);
    return !!ne&&ne.mi<=rMi;
  });
}
// planes within rMi (statute miles) with a usable numeric altitude — ONE shared collector
// so the LOW AIRCRAFT card and the chart's TRFC cells agree
function planesNear(lat,lon,rMi){
  const out=[];
  featsIn('nearair').forEach(f=>{
    const alt=+f.properties.alt; if(!isFinite(alt)) return;   // 'ground'/'?' → not airborne data
    const g=f.geometry&&f.geometry.coordinates; if(!g) return;
    const mi=havMi(lat,lon,g[1],g[0]); if(mi>rMi) return;
    out.push({f,mi,alt,pt:g});
  });
  return out;
}
// best-estimate MSL altitude [ft]: ADS-B barometric alt is PRESSURE altitude (~27.3
// ft/hPa off true MSL), QNH-corrected when known; else the raw value
const FT_PER_HPA=27.3, ISA_MSL_HPA=1013.25;
function planeMslFt(a){
  const baro=a.f.properties.altBaro;
  if(baro!=null && QNH_HPA!=null) return baro+(QNH_HPA-ISA_MSL_HPA)*FT_PER_HPA;
  return a.alt;
}
// ground elevation for a plane's AGL: terrain under the plane, else the GPS position cell, else null
function planeGroundFt(a,crossGround){
  const g=groundElevFt(a.pt[1],a.pt[0]);
  return g!=null?g:crossGround;
}
// {ground, agl}; ground null → AGL is raw MSL (fails toward NOT flagging over unknown terrain)
function planeAglFt(a,crossGround){
  const ground=planeGroundFt(a,crossGround);
  return {ground, agl: ground==null?planeMslFt(a):planeMslFt(a)-ground};
}
// only plausibly-low planes need a terrain lookup — a FL350 cruiser can't breach 1,000 ft AGL
const AGL_CAND_MAX_FT=16000;

function sitrepTick(){
  // SITREP reflects what's within the OPERATIONAL RANGE (RED_MI) around your GPS position;
  // fully synchronous — reads only already-loaded state.
  const rangeMi=RED_MI;
  // aircraft are tracked further out (the 5 mi BUFFER ring) so you see traffic approaching:
  // low in the buffer ring → yellow heads-up; low inside the 1 mi operational ring → escalated.
  const warnMi=BUFFER_MI;
  // THE VERDICT — one traffic assessment, one gate table, one fold. Computed before any
  // card exists: cards below are pure info + ranking views of the same gates.
  const tr=assessTraffic();
  const gates=evalGates(tr);
  verdictSeverity=Math.max(...Object.values(gates));
  window.__sitrep.gates=gates;   // debug/test handle
  renderClock();   // the visible verdict = the NOW column header colour
  { const t=$('#sit-title'); if(t){   // hidden canonical verdict element (tests/parity)
    t.classList.remove('warn','alert');
    if(verdictSeverity>=2) t.classList.add('warn'); else if(verdictSeverity>=1) t.classList.add('alert');
  }}
  // no GPS fix yet → the gps gate reds the verdict; show the locating card
  if(USER.lat==null){
    const rows=[];
    const row=c=>rows.push(
      `<div class="sit-row${c.cls?' '+c.cls:''}"><span class="ic">${c.ic}</span>`+
      `<span class="tx"><span class="s1">${c.l1||''}</span><span class="s2">${c.l2||''}</span><span class="s3">${c.l3||''}</span></span></div>`);
    if(geolocationDenied){
      row(mkCard('danger','📍','LOCATION REQUIRED','enable GPS and reload','permission denied',true));
    }else{
      row(mkCard('danger','📍','GPS LOCK','locating…','waiting for fix',true));
    }
    $('#sit-body').innerHTML=rows.join('');
    return;
  }
  const lat=USER.lat, lon=USER.lon;
  const rows=[];
  // render one card record → a 3-line info row. col: an explicit headline hex (airspace
  // polygon colour / aircraft identity colour), sanitised upstream.
  const row=c=>rows.push(
    `<div class="sit-row${c.cls?' '+c.cls:''}"><span class="ic">${c.ic}</span>`+
    `<span class="tx"><span class="s1"${c.col?` style="color:${c.col}"`:''}>${c.l1||''}</span><span class="s2">${c.l2||''}</span><span class="s3">${c.l3||''}</span></span></div>`);
  // Distance + direction are measured from your GPS position.
  const dirMi=(la,lo)=>compass(bearing(lat,lon,la,lo))+' '+fmtMi(havMi(lat,lon,la,lo));

  const cards=[];   // array of mkCard() records

  // -- LOW AIRCRAFT: a plane below WARN_AGL_FT (400 ft ceiling + 500 ft separation) from
  //    the SAME assessTraffic() result the traffic gate and the chart's TRFC cells read,
  //    so card, gate and chart can never disagree. The plane's OWN card (below) transforms
  //    while it's low and reverts on climb-out — exactly ONE card per plane. Colour follows
  //    the gate math: RED only when the plane GROUNDS the chart (AGL ≤ separation, in the
  //    1 mi ring — the NOW column reds with it); a capping or buffer-ring plane is a
  //    YELLOW heads-up. AGL = QNH-corrected MSL − ground elevation UNDER THE PLANE.
  //    Keyed by the FEATURE OBJECT (the card loop iterates the same stored features) —
  //    an id string would collide for anonymous contacts with no hex and no callsign.
  const breachInfo=new Map();   // feature → {label:'254 ft AGL', inRange, grounds}
  tr.low.forEach(a=>{
    breachInfo.set(a.f,{
      label:Math.max(0,Math.round(a.agl))+U(' ft')+(a.ground==null?'':' AGL'),
      inRange:a.inRange, grounds:a.grounds});
  });

  // -- FAA CEILING (pinned): a VIEW of the faa gate — value from the chart's aspCapFt,
  //    colour from the gate's severity (SEV_CLS), so card, gate and chart agree. --
  if(gates.faa){
    const rangeTxt='within '+RNG.mi.toFixed(1)+U(' mi');
    const faaCap=FLY.detail.aspCapFt;
    cards.push(gates.faa===2
      ? mkCard('danger','⛔','FAA NO-FLY','LAANC grid · 0 ft ceiling',rangeTxt,true)
      : mkCard('alert','🛑','FAA CEILING '+faaCap+U(' ft'),'LAANC grid',rangeTxt,true));
  }

  // the weather card (below) folds every weather gate into itself — one feed, one card
  const wn=FLY.detail&&FLY.detail.wxNow;

  // -- SPACE WEATHER (pinned): a VIEW of the kp gate — a Kp storm degrades GPS/compass.
  //    Value from the chart's kpNow, colour from the gate severity. Quiet/unknown → no card. --
  const kpNow=FLY.detail?FLY.detail.kpNow:null;
  if(gates.kp){
    cards.push(mkCard(SEV_CLS[gates.kp],'🧲','SPACE WEATHER','Kp '+Math.round(kpNow)+' · geomagnetic storm',
      gates.kp===2?'GPS / compass unreliable':'GPS accuracy may be reduced',true));
  }

  // -- DATA HEALTH (pinned): every feed classified by the ONE feedTier() rule. RED "not
  //    loaded" (never verified — startup / not yet pulled, shown at once, grounds) vs
  //    YELLOW "unverified" (was loaded, now blipping past the grace window). Weather rides the
  //    weather card, not this one. --
  // weather stale = failing past grace (whether or not it ever loaded — a dead feed still
  // escalates to WEATHER UNAVAILABLE); forcing everLoaded=true reuses the same grace rule.
  const wxStale=feedTier(true, FLY.err.om, flyErrSince.om)==='yellow';
  const redFeeds=[], yellowFeeds=[];
  for(const [k,label] of [['asp','FAA airspace'],['kp','Kp'],['radar','radar']]){
    let tier=gateTier(k);
    // 'FAA airspace' also covers the heavier airspace feed — a failing feed keeps the card up
    // even when the lightweight gate query is fine, so it reflects the empty listing.
    if(k==='asp' && !tier && layerTier('airspace')==='yellow') tier='yellow';
    if(tier==='red') redFeeds.push(label); else if(tier==='yellow') yellowFeeds.push(label);
  }
  if(layerTier('nps')==='yellow') yellowFeeds.push('NPS');   // a failing NPS feed degrades the park no-fly check
  // AIRCRAFT is traffic, not a flyability gate — always YELLOW (missing traffic ≠ grounded),
  // never red. Shown until the planes are drawn (never loaded, none pulled) or while the
  // feed is failing.
  const acSt=LAYER_STATE.nearair;
  if((acSt && acSt.started && !acSt.everLoaded && (acSt.features||[]).length===0)
     || layerTier('nearair')==='yellow')
    yellowFeeds.push('aircraft');
  const dataFeeds=[...redFeeds,...yellowFeeds];
  if(dataFeeds.length){
    const red=redFeeds.length>0;
    // hazard (RANKING) mirrors the data gate's scope: promoted for a real gate-feed
    // problem, NOT when the only thing pending is aircraft (traffic is informational —
    // the data gate likewise scores 0 for an aircraft-only gap)
    const dataHazard=dataFeeds.some(f=>f!=='aircraft');
    cards.push(mkCard(red?'danger':'alert','📡', red?'DATA NOT LOADED':'DATA UNVERIFIED',
      cut(dataFeeds.join(' · '),30), red?'acquiring — verify before flying':'retrying every 5 s', dataHazard));
  }
